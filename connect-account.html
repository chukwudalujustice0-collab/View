<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connect Accounts | View</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f7fc;
      margin:0;
      padding:20px;
    }

    h1{
      color:#1d4ed8;
      font-size:26px;
      margin-bottom:10px;
    }

    .card{
      background:#fff;
      border-radius:20px;
      padding:16px;
      margin-bottom:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
    }

    .platform{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:700;
    }

    .btn{
      padding:8px 14px;
      border:none;
      border-radius:999px;
      cursor:pointer;
      font-weight:700;
    }

    .connect{background:#1d4ed8;color:#fff;}
    .connected{background:#dcfce7;color:#15803d;}

    .input{
      width:100%;
      padding:10px;
      border-radius:10px;
      border:1px solid #ddd;
      margin-top:6px;
    }

    .small{
      font-size:12px;
      color:#6b7280;
      margin-top:4px;
    }
  </style>
</head>
<body>

<h1>Connect Accounts</h1>

<div id="notice"></div>

<!-- TELEGRAM -->
<div class="card">
  <div class="row">
    <div class="platform">📨 Telegram</div>
    <button id="telegramBtn" class="btn connect">Connect</button>
  </div>

  <input id="telegramChatId" class="input" placeholder="Enter your Telegram Chat ID"/>
  <div class="small">
    Open your bot and send a message, then get chat ID via:
    https://api.telegram.org/botYOUR_TOKEN/getUpdates
  </div>
</div>

<!-- LINKEDIN -->
<div class="card">
  <div class="row">
    <div class="platform">💼 LinkedIn</div>
    <button id="linkedinBtn" class="btn connect">Connect</button>
  </div>

  <div class="small">
    Connect your LinkedIn account for cross-posting
  </div>
</div>

<!-- FACEBOOK (EXISTING) -->
<div class="card">
  <div class="row">
    <div class="platform">📘 Facebook</div>
    <button id="facebookBtn" class="btn connect">Connect</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const notice = document.getElementById("notice");

function show(msg){
  notice.innerHTML = `<div style="background:#fee2e2;padding:10px;border-radius:10px;color:#b91c1c">${msg}</div>`;
}

async function getUser(){
  const { data } = await supabase.auth.getSession();
  return data.session?.user;
}

/* ===========================
   TELEGRAM CONNECT
=========================== */
document.getElementById("telegramBtn").onclick = async () => {
  const user = await getUser();
  if(!user) return show("Login required");

  const chatId = document.getElementById("telegramChatId").value.trim();
  if(!chatId) return show("Enter chat ID");

  const { error } = await supabase
    .from("connected_accounts")
    .upsert({
      user_id: user.id,
      telegram_chat_id: chatId
    });

  if(error) return show(error.message);

  alert("Telegram connected!");
};

/* ===========================
   LINKEDIN CONNECT
=========================== */
document.getElementById("linkedinBtn").onclick = () => {
  const clientId = "YOUR_LINKEDIN_CLIENT_ID";
  const redirectUri = encodeURIComponent("https://view.ceetice.com/linkedin-callback.html");

  const url = `https://www.linkedin.com/oauth/v2/authorization
  ?response_type=code
  &client_id=${clientId}
  &redirect_uri=${redirectUri}
  &scope=r_liteprofile%20w_member_social`;

  window.location.href = url;
};

/* ===========================
   FACEBOOK CONNECT
=========================== */
document.getElementById("facebookBtn").onclick = () => {
  const fbAppId = "YOUR_FB_APP_ID";
  const redirectUri = encodeURIComponent("https://view.ceetice.com/facebook-callback.html");

  const url = `https://www.facebook.com/v18.0/dialog/oauth
  ?client_id=${fbAppId}
  &redirect_uri=${redirectUri}
  &scope=pages_manage_posts,pages_read_engagement`;

  window.location.href = url;
};
</script>

</body>
</html>
