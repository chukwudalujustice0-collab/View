<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Forgot Password | View</title>

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0b5ed7" />

  <style>
    :root {
      --primary: #0b5ed7;
      --primary-dark: #083b8a;
      --bg: #f5f8ff;
      --card: #ffffff;
      --text: #1f1f1f;
      --soft-text: #6b7280;
      --border: #e5e7eb;
      --success: #16a34a;
      --danger: #dc2626;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      --radius: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(11, 94, 215, 0.14), transparent 25%),
        linear-gradient(180deg, #eef5ff 0%, #f8fbff 50%, #ffffff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text);
    }

    .container {
      width: 100%;
      max-width: 430px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 30px 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo h1 {
      color: var(--primary);
      font-size: 30px;
      margin-bottom: 4px;
    }

    .logo p {
      font-size: 12px;
      color: var(--soft-text);
    }

    .heading {
      text-align: center;
      margin-bottom: 18px;
    }

    .heading h2 {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .heading span {
      font-size: 13px;
      color: var(--soft-text);
      line-height: 1.5;
      display: block;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 600;
    }

    .input-group input {
      width: 100%;
      height: 48px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 14px;
      font-size: 14px;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    .message-box,
    .success-message {
      display: none;
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      line-height: 1.5;
    }

    .success-message {
      color: var(--success);
    }

    .links {
      text-align: center;
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }

    .links a {
      font-size: 14px;
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    .links .muted {
      color: var(--soft-text);
      font-size: 13px;
      font-weight: 500;
    }

    .install-btn {
      display: none;
      margin-top: 14px;
      width: 100%;
      height: 44px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--primary);
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <h1 data-view-brand>View</h1>
        <p data-view-tagline>Your world, your view</p>
      </div>

      <div class="heading">
        <h2>Forgot Password</h2>
        <span>Enter your email and we’ll send a reset link.</span>
      </div>

      <form id="forgotPasswordForm">
        <div class="input-group">
          <label for="resetEmail">Email Address</label>
          <input type="email" id="resetEmail" placeholder="Enter your email" required />
        </div>

        <button type="submit" class="btn">Send Reset Link</button>

        <div id="forgotPasswordMessage" class="message-box"></div>
        <div id="successMessage" class="success-message">
          Reset link sent successfully. Check your email.
        </div>
      </form>

      <button class="install-btn" data-install-app>Install View App</button>

      <div class="links">
        <a href="login.html">Back to Login</a>
        <a href="index.html" class="muted">Back to Home</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="utils.js"></script>
  <script src="app.js"></script>
  <script src="auth.js"></script>
  <script src="forgot-password.js"></script>
</body>
</html>
