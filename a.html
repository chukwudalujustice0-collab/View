<!DOCTYPE html>
<html>
<head>
  <title>Protected A</title>
  <script>
    document.documentElement.classList.add("auth-loading");
  </script>
  <style>
    html.auth-loading body { visibility: hidden; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0f24;
      color: #fff;
      font-family: Arial, sans-serif;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/auth-guard.js"></script>
</head>
<body>
  <div>
    <h2>Protected Page</h2>
    <p>Hello <span data-user-name>...</span></p>
    <p><span data-user-email></span></p>
    <button id="logoutBtn">Logout</button>
  </div>

  <script>
    async function start() {
      const auth = await protectPage();
      if (!auth) return;

      document.getElementById("logoutBtn").addEventListener("click", async () => {
        await window.viewSupabase.auth.signOut();
        window.location.replace("/login.html");
      });
    }

    start();
  </script>
</body>
</html>
