<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>View Chats</title>
  <meta name="theme-color" content="#120a2f" />
  <link rel="manifest" href="/manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --text:#f7f4ff;
      --muted:#c9bde9;
      --blue:#4e88ff;
      --red:#ff3c63;
      --green:#4be282;
      --shadow:0 18px 36px rgba(0,0,0,.28);
      --shadow-soft:0 10px 22px rgba(0,0,0,.18);
      --safe-top:env(safe-area-inset-top, 0px);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      font-family:Inter, Arial, sans-serif;
    }

    html,body{
      min-height:100%;
      background:
        radial-gradient(circle at 20% 12%, rgba(255,85,120,.14), transparent 12%),
        radial-gradient(circle at 72% 18%, rgba(90,140,255,.14), transparent 14%),
        radial-gradient(circle at 35% 42%, rgba(255,110,160,.11), transparent 16%),
        radial-gradient(circle at 80% 58%, rgba(120,90,255,.10), transparent 16%),
        radial-gradient(circle at 55% 78%, rgba(255,80,120,.08), transparent 20%),
        linear-gradient(180deg, #14092e 0%, #190a3d 42%, #110820 100%);
      color:var(--text);
    }

    body{
      overflow-x:hidden;
      padding-bottom:92px;
    }

    .app{
      position:relative;
      width:min(100%, 820px);
      margin:0 auto;
      padding:calc(10px + var(--safe-top)) 12px 0;
    }

    .notice{
      display:none;
      margin-bottom:10px;
      padding:11px 12px;
      border-radius:14px;
      border:1px solid transparent;
      font-size:12px;
      line-height:1.45;
      box-shadow:var(--shadow-soft);
      backdrop-filter:blur(10px);
    }
    .notice.show{display:block}
    .notice.error{background:rgba(239,68,68,.14);border-color:rgba(239,68,68,.24);color:#ffd9df}
    .notice.success{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.24);color:#ddffea}
    .notice.info{background:rgba(78,136,255,.14);border-color:rgba(78,136,255,.24);color:#dcebff}

    .topbar{
      display:grid;
      grid-template-columns:40px 1fr 40px;
      align-items:center;
      gap:8px;
      margin-bottom:10px;
    }

    .icon-btn{
      width:40px;
      height:40px;
      border:none;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      font-size:18px;
      cursor:pointer;
      box-shadow:var(--shadow-soft);
      text-decoration:none;
      backdrop-filter:blur(12px);
    }

    .title{
      text-align:center;
      font-size:22px;
      font-weight:900;
      letter-spacing:-.03em;
      text-transform:lowercase;
    }

    .hero-card{
      border-radius:22px;
      padding:14px;
      margin-bottom:12px;
      background:
        radial-gradient(circle at top right, rgba(78,136,255,.14), transparent 26%),
        radial-gradient(circle at bottom left, rgba(255,60,99,.14), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
    }

    .hero-text h1{
      font-size:18px;
      font-weight:900;
      margin-bottom:10px;
      text-transform:capitalize;
    }

    .hero-chip-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .hero-chip{
      min-height:28px;
      padding:0 10px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      font-size:11px;
      font-weight:800;
    }

    .menu{
      position:fixed;
      top:62px;
      right:12px;
      width:220px;
      border-radius:18px;
      background:rgba(20,10,45,.96);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 20px 44px rgba(0,0,0,.34);
      backdrop-filter:blur(16px);
      padding:8px;
      display:none;
      z-index:100;
    }
    .menu.show{display:block}

    .menu-btn{
      width:100%;
      min-height:40px;
      border:none;
      background:transparent;
      color:#fff;
      text-align:left;
      padding:0 12px;
      border-radius:12px;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }

    .menu-btn:hover{
      background:rgba(255,255,255,.06);
    }

    .search-shell{
      margin-bottom:12px;
    }

    .search-wrap{
      min-height:50px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:0 14px;
      border-radius:22px;
      background:rgba(255,255,255,.055);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
    }

    .search-input{
      flex:1;
      border:none;
      background:transparent;
      color:#fff;
      font-size:14px;
    }

    .search-input::placeholder{
      color:#c8b8ef;
    }

    .tabs{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      align-items:end;
      margin-bottom:10px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .tab{
      position:relative;
      min-height:44px;
      border:none;
      background:transparent;
      color:#cfc2eb;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }

    .tab.active{ color:#fff; }

    .tab.active::after{
      content:"";
      position:absolute;
      left:18%;
      right:18%;
      bottom:-1px;
      height:3px;
      border-radius:999px;
      background:linear-gradient(90deg, var(--red), var(--blue));
    }

    .tab .dot{
      display:inline-block;
      width:8px;
      height:8px;
      background:var(--green);
      border-radius:50%;
      margin-left:5px;
      vertical-align:middle;
    }

    .chat-list{
      display:grid;
      gap:2px;
      padding-bottom:8px;
    }

    .chat-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 4px;
      border-bottom:1px solid rgba(255,255,255,.08);
      cursor:pointer;
    }

    .chat-main{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
    }

    .avatar-wrap{
      position:relative;
      width:58px;
      height:58px;
      min-width:58px;
    }

    .avatar-ring{
      width:58px;
      height:58px;
      border-radius:50%;
      padding:2px;
      background:linear-gradient(135deg, #4e88ff, #ff5d7f);
    }

    .avatar{
      width:100%;
      height:100%;
      border-radius:50%;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#1f1240;
      color:#fff;
      font-size:18px;
      font-weight:1000;
      border:2px solid rgba(255,255,255,.92);
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .online-dot{
      position:absolute;
      right:2px;
      bottom:3px;
      width:13px;
      height:13px;
      border-radius:50%;
      background:var(--green);
      border:2px solid #1a0d39;
      display:none;
    }
    .online-dot.show{display:block}

    .chat-meta{
      min-width:0;
      flex:1;
    }

    .chat-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:8px;
      margin-bottom:5px;
    }

    .name-line{
      min-width:0;
      flex:1;
    }

    .chat-name{
      font-size:15px;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-bottom:2px;
    }

    .chat-username{
      font-size:11px;
      color:#d6c8f1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chat-time{
      font-size:11px;
      color:#dbcff3;
      white-space:nowrap;
      flex-shrink:0;
      padding-top:2px;
    }

    .chat-preview{
      font-size:12px;
      color:#ddd2f6;
      line-height:1.4;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
    }

    .chat-side{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      justify-content:center;
      gap:6px;
      min-width:30px;
    }

    .badge{
      min-width:22px;
      height:22px;
      padding:0 7px;
      border-radius:999px;
      background:linear-gradient(135deg, var(--red), #bf2049);
      color:#fff;
      font-size:11px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .archived-pill{
      min-height:20px;
      padding:0 8px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:10px;
      font-weight:800;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,.08);
    }

    .voice-preview{
      display:inline-flex;
      align-items:center;
      gap:6px;
    }

    .voice-play{
      width:22px;
      height:22px;
      border-radius:50%;
      border:1px solid #5b74ff;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:#6f88ff;
      font-size:10px;
      flex-shrink:0;
    }

    .empty-state{
      padding:32px 18px;
      text-align:center;
      color:#d8cdf2;
      font-size:13px;
      line-height:1.7;
    }

    .empty-state strong{
      display:block;
      font-size:16px;
      color:#fff;
      margin-bottom:6px;
    }

    .footer{
      position:fixed;
      left:50%;
      bottom:10px;
      transform:translateX(-50%);
      width:min(460px, calc(100% - 18px));
      padding:8px 8px calc(8px + var(--safe-bottom));
      border-radius:22px;
      background:rgba(12,7,26,.92);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 18px 38px rgba(0,0,0,.34);
      backdrop-filter:blur(16px);
      display:grid;
      grid-template-columns:repeat(3,1fr);
      z-index:90;
    }

    .footer a{
      min-height:50px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      text-decoration:none;
      color:#baacd9;
      font-size:11px;
      font-weight:800;
      border-radius:16px;
    }

    .footer a span.icon{
      font-size:18px;
      line-height:1;
    }

    .footer a.active{
      color:#fff;
    }

    .footer a.active span.icon{
      color:#7aa3ff;
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="notice" class="notice"></div>

    <div class="topbar">
      <a class="icon-btn" href="home.html" aria-label="Back to home">←</a>
      <div class="title">view chats</div>
      <button id="menuToggle" class="icon-btn" type="button" aria-label="More options">☰</button>
    </div>

    <section class="hero-card">
      <div class="hero-text">
        <h1>Your inbox</h1>
      </div>
      <div class="hero-chip-row">
        <span class="hero-chip" id="heroTotalChip">Chats: 0</span>
        <span class="hero-chip" id="heroUnreadChip">Unread: 0</span>
        <span class="hero-chip" id="heroOnlineChip">Online: 0</span>
      </div>
    </section>

    <div id="menu" class="menu">
      <button class="menu-btn" id="newChatBtn" type="button">New Chat</button>
      <button class="menu-btn" id="refreshBtn" type="button">Refresh</button>
      <button class="menu-btn" id="menuUnreadBtn" type="button">Unread Only</button>
      <button class="menu-btn" id="menuOnlineBtn" type="button">Online Only</button>
      <button class="menu-btn" id="menuArchivedBtn" type="button">Archived Chats</button>
      <button class="menu-btn" id="menuAllBtn" type="button">All Chats</button>
      <button class="menu-btn" id="markReadBtn" type="button">Mark All Read</button>
      <button class="menu-btn" id="notificationsBtn" type="button">Notifications</button>
      <button class="menu-btn" id="settingsBtn" type="button">Settings</button>
    </div>

    <div class="search-shell">
      <div class="search-wrap">
        <div>⌕</div>
        <input id="searchInput" class="search-input" type="text" placeholder="Search chats..." />
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-filter="all" type="button">All</button>
      <button class="tab" data-filter="unread" type="button">Unread</button>
      <button class="tab" data-filter="online" type="button">Online <span class="dot"></span></button>
      <button class="tab" data-filter="archived" type="button">Archived</button>
    </div>

    <div id="chatList" class="chat-list"></div>
  </div>

  <nav class="footer">
    <a href="explore.html">
      <span class="icon">⌕</span>
      <span>Explore</span>
    </a>
    <a href="chats.html" class="active">
      <span class="icon">💬</span>
      <span>Chat</span>
    </a>
    <a href="calls.html">
      <span class="icon">📞</span>
      <span>Calls</span>
    </a>
  </nav>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        flowType: "pkce"
      }
    });

    const ARCHIVE_KEY = "view_archived_conversations_v5";
    const HIDE_KEY = "view_hidden_conversations_v5";

    const noticeBox = document.getElementById("notice");
    const chatList = document.getElementById("chatList");
    const searchInput = document.getElementById("searchInput");
    const menu = document.getElementById("menu");
    const menuToggle = document.getElementById("menuToggle");
    const tabs = [...document.querySelectorAll(".tab")];

    const newChatBtn = document.getElementById("newChatBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const menuUnreadBtn = document.getElementById("menuUnreadBtn");
    const menuOnlineBtn = document.getElementById("menuOnlineBtn");
    const menuArchivedBtn = document.getElementById("menuArchivedBtn");
    const menuAllBtn = document.getElementById("menuAllBtn");
    const markReadBtn = document.getElementById("markReadBtn");
    const notificationsBtn = document.getElementById("notificationsBtn");
    const settingsBtn = document.getElementById("settingsBtn");

    const heroTotalChip = document.getElementById("heroTotalChip");
    const heroUnreadChip = document.getElementById("heroUnreadChip");
    const heroOnlineChip = document.getElementById("heroOnlineChip");

    let currentUserId = "";
    let currentFilter = "all";
    let allChats = [];
    let currentConversationIds = [];
    let messagesChannel = null;
    let membersChannel = null;
    let profilesChannel = null;

    function showNotice(message, type = "error") {
      noticeBox.className = `notice show ${type}`;
      noticeBox.textContent = message || "";
    }

    function clearNotice() {
      noticeBox.className = "notice";
      noticeBox.textContent = "";
    }

    function getLocalMap(key) {
      try { return JSON.parse(localStorage.getItem(key) || "{}"); }
      catch { return {}; }
    }

    function setLocalMap(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function isArchived(conversationId) {
      return !!getLocalMap(ARCHIVE_KEY)[conversationId];
    }

    function isHidden(conversationId) {
      return !!getLocalMap(HIDE_KEY)[conversationId];
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function getSessionWithRetry(maxWaitMs = 3200) {
      const start = Date.now();
      while (Date.now() - start < maxWaitMs) {
        const { data, error } = await client.auth.getSession();
        if (error) throw error;
        if (data.session?.user) return data.session;
        await new Promise(resolve => setTimeout(resolve, 200));
      }
      return null;
    }

    async function requireSession() {
      const session = await getSessionWithRetry();
      if (!session?.user) {
        window.location.href = "login.html?next=chats.html";
        return null;
      }
      return session;
    }

    function formatDate(value) {
      if (!value) return "";
      try {
        const d = new Date(value);
        const now = new Date();
        const diffMs = now - d;
        const mins = Math.floor(diffMs / 60000);
        const hours = Math.floor(diffMs / 3600000);
        const days = Math.floor(diffMs / 86400000);

        if (mins < 1) return "now";
        if (mins < 60) return `${mins}m`;
        if (hours < 24) return `${hours}h`;
        if (days < 2) return "Yesterday";
        if (days < 7) return `${days}d`;
        return d.toLocaleDateString([], { day: "2-digit", month: "short" });
      } catch {
        return "";
      }
    }

    function updateHeroStats() {
      const total = allChats.filter(chat => !chat.archived).length;
      const unread = allChats.filter(chat => !chat.archived && chat.unread_count > 0).length;
      const online = allChats.filter(chat => !chat.archived && chat.online).length;

      heroTotalChip.textContent = `Chats: ${total}`;
      heroUnreadChip.textContent = `Unread: ${unread}`;
      heroOnlineChip.textContent = `Online: ${online}`;
    }

    function buildPreview(messageRow) {
      if (!messageRow) {
        return { text: "Start chatting...", voice: false };
      }

      if (messageRow.message_type === "voice") {
        return { text: `${messageRow.voice_duration || "0:15"}`, voice: true };
      }
      if (messageRow.message_type === "image") {
        return { text: "📷 Photo", voice: false };
      }
      if (messageRow.message_type === "video") {
        return { text: "🎥 Video", voice: false };
      }
      if (messageRow.message_type === "document" || messageRow.message_type === "file") {
        return { text: `📄 ${messageRow.file_name || "Document"}`, voice: false };
      }

      return { text: messageRow.message || "Start chatting...", voice: false };
    }

    async function fetchConversationIds() {
      const { data, error } = await client
        .from("conversation_members")
        .select("conversation_id")
        .eq("user_id", currentUserId);

      if (error) throw error;
      return [...new Set((data || []).map(row => row.conversation_id).filter(Boolean))];
    }

    async function fetchAllMembers(conversationIds) {
      const { data, error } = await client
        .from("conversation_members")
        .select("conversation_id,user_id")
        .in("conversation_id", conversationIds);

      if (error) throw error;
      return data || [];
    }

    async function fetchConversations(conversationIds) {
      const { data, error } = await client
        .from("conversations")
        .select(`
          id,
          title,
          avatar_url,
          is_group,
          created_by,
          created_at,
          updated_at,
          last_message,
          last_message_type,
          last_message_sender_id,
          last_message_at
        `)
        .in("id", conversationIds);

      if (error) throw error;
      return new Map((data || []).map(row => [row.id, row]));
    }

    async function fetchLatestMessages(conversationIds) {
      const { data, error } = await client
        .from("messages")
        .select(`
          id,
          conversation_id,
          sender_id,
          receiver_id,
          message,
          message_type,
          file_name,
          voice_duration,
          is_read,
          read_at,
          created_at
        `)
        .in("conversation_id", conversationIds)
        .order("created_at", { ascending: false });

      if (error) throw error;
      return data || [];
    }

    async function fetchProfiles(userIds) {
      if (!userIds.length) return new Map();

      const { data, error } = await client
        .from("profiles")
        .select("id,full_name,username,avatar_url,is_online,last_seen_at,last_seen")
        .in("id", userIds);

      if (error) throw error;
      return new Map((data || []).map(row => [row.id, row]));
    }

    function getProfileName(profile) {
      return (
        profile?.full_name ||
        profile?.username ||
        "User"
      );
    }

    function getProfileUsername(profile) {
      return profile?.username ? `@${profile.username}` : "";
    }

    async function loadChats() {
      clearNotice();

      try {
        currentConversationIds = await fetchConversationIds();

        if (!currentConversationIds.length) {
          allChats = [];
          updateHeroStats();
          renderChats();
          return;
        }

        const [members, conversationsMap, messages] = await Promise.all([
          fetchAllMembers(currentConversationIds),
          fetchConversations(currentConversationIds),
          fetchLatestMessages(currentConversationIds)
        ]);

        const latestMap = new Map();
        const unreadMap = new Map();
        const allPossibleUserIds = new Set();

        messages.forEach(msg => {
          if (!latestMap.has(msg.conversation_id)) {
            latestMap.set(msg.conversation_id, msg);
          }

          if (msg.sender_id) allPossibleUserIds.add(msg.sender_id);
          if (msg.receiver_id) allPossibleUserIds.add(msg.receiver_id);

          const isUnread = msg.sender_id !== currentUserId && !(msg.is_read === true || msg.read_at);
          if (isUnread) {
            unreadMap.set(msg.conversation_id, (unreadMap.get(msg.conversation_id) || 0) + 1);
          }
        });

        members.forEach(member => {
          if (member.user_id) allPossibleUserIds.add(member.user_id);
        });

        const profilesMap = await fetchProfiles([...allPossibleUserIds]);

        allChats = currentConversationIds
          .filter(id => !isHidden(id))
          .map(conversationId => {
            const conversation = conversationsMap.get(conversationId) || {};
            const latest = latestMap.get(conversationId) || null;
            const preview = buildPreview(latest);
            const conversationMembers = members.filter(row => row.conversation_id === conversationId);
            const isGroup = !!conversation.is_group;

            let otherUserId = "";
            let fullName = "";
            let username = "";
            let avatarUrl = "";
            let online = false;

            if (isGroup) {
              fullName = conversation.title || "Group";
              username = `${conversationMembers.length} members`;
              avatarUrl = conversation.avatar_url || "";
            } else {
              const memberUserIds = conversationMembers
                .map(row => row.user_id)
                .filter(Boolean);

              otherUserId = memberUserIds.find(id => id !== currentUserId) || "";

              if (!otherUserId && latest) {
                const candidates = [latest.sender_id, latest.receiver_id].filter(Boolean);
                otherUserId = candidates.find(id => id !== currentUserId) || "";
              }

              const profile = profilesMap.get(otherUserId) || null;

              fullName = getProfileName(profile);
              username = getProfileUsername(profile);
              avatarUrl = profile?.avatar_url || "";
              online = !!profile?.is_online;
            }

            return {
              id: conversationId,
              other_user_id: otherUserId,
              full_name: fullName,
              username,
              avatar_url: avatarUrl,
              online,
              last_message: preview.text,
              preview_is_voice: preview.voice,
              last_message_at: latest?.created_at || conversation.last_message_at || conversation.updated_at || conversation.created_at || "",
              unread_count: unreadMap.get(conversationId) || 0,
              archived: isArchived(conversationId)
            };
          })
          .sort((a, b) => new Date(b.last_message_at || 0) - new Date(a.last_message_at || 0));

        updateHeroStats();
        renderChats();
      } catch (error) {
        showNotice(error.message || "Could not load chats.");
        chatList.innerHTML = `
          <div class="empty-state">
            <strong>Could not load chats</strong>
            Please refresh the page.
          </div>
        `;
      }
    }

    function renderChats() {
      const term = searchInput.value.trim().toLowerCase();

      const filtered = allChats.filter(chat => {
        if (currentFilter === "all" && chat.archived) return false;
        if (currentFilter === "unread" && (chat.archived || !(chat.unread_count > 0))) return false;
        if (currentFilter === "online" && (chat.archived || !chat.online)) return false;
        if (currentFilter === "archived" && !chat.archived) return false;

        const combined = `${chat.full_name} ${chat.username} ${chat.last_message}`.toLowerCase();
        return combined.includes(term);
      });

      if (!filtered.length) {
        chatList.innerHTML = `
          <div class="empty-state">
            <strong>No chats found</strong>
            Start a new conversation or try a different search.
          </div>
        `;
        return;
      }

      chatList.innerHTML = filtered.map(chat => {
        const name = chat.full_name || "User";
        const initial = name.charAt(0).toUpperCase();
        const avatar = chat.avatar_url
          ? `<img src="${escapeHtml(chat.avatar_url)}" alt="${escapeHtml(name)}">`
          : escapeHtml(initial);

        const previewHtml = chat.preview_is_voice
          ? `<span class="voice-preview"><span class="voice-play">▶</span><span>${escapeHtml(chat.last_message)}</span></span>`
          : escapeHtml(chat.last_message);

        return `
          <div class="chat-item" onclick="openChat('${escapeHtml(chat.id)}','${escapeHtml(chat.other_user_id)}','${escapeHtml(chat.full_name)}','${escapeHtml(chat.avatar_url)}')">
            <div class="chat-main">
              <div class="avatar-wrap">
                <div class="avatar-ring">
                  <div class="avatar">${avatar}</div>
                </div>
                <span class="online-dot ${chat.online ? "show" : ""}"></span>
              </div>

              <div class="chat-meta">
                <div class="chat-top">
                  <div class="name-line">
                    <div class="chat-name">${escapeHtml(name)}</div>
                    <div class="chat-username">${escapeHtml(chat.username || "")}</div>
                  </div>
                  <div class="chat-time">${escapeHtml(formatDate(chat.last_message_at))}</div>
                </div>

                <div class="chat-preview">${previewHtml}</div>
              </div>
            </div>

            <div class="chat-side">
              ${chat.archived ? `<span class="archived-pill">Arc</span>` : ``}
              ${chat.unread_count > 0 ? `<span class="badge">${chat.unread_count > 99 ? "99+" : chat.unread_count}</span>` : ``}
            </div>
          </div>
        `;
      }).join("");
    }

    function openChat(conversationId, userId, name, avatar) {
      const params = new URLSearchParams();
      params.set("id", conversationId);
      if (userId) params.set("user_id", userId);
      if (name) params.set("name", name);
      if (avatar) params.set("avatar", avatar);
      window.location.href = `chat-room.html?${params.toString()}`;
    }

    async function markAllRead() {
      if (!currentConversationIds.length) return;

      try {
        await client
          .from("messages")
          .update({
            is_read: true,
            read_at: new Date().toISOString(),
            is_seen: true,
            seen_at: new Date().toISOString()
          })
          .in("conversation_id", currentConversationIds)
          .neq("sender_id", currentUserId);

        showNotice("All chats marked as read.", "success");
        await loadChats();
      } catch (error) {
        showNotice(error.message || "Could not mark all as read.");
      }
    }

    function toggleMenu() {
      menu.classList.toggle("show");
    }

    function closeMenu() {
      menu.classList.remove("show");
    }

    async function subscribeRealtime() {
      if (!messagesChannel) {
        messagesChannel = client
          .channel("view-conversation-messages")
          .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "messages"
          }, async (payload) => {
            const row = payload.new || payload.old;
            if (!row?.conversation_id) return;
            if (!currentConversationIds.includes(row.conversation_id)) return;
            await loadChats();
          })
          .subscribe();
      }

      if (!membersChannel) {
        membersChannel = client
          .channel("view-conversation-members")
          .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "conversation_members"
          }, async (payload) => {
            const row = payload.new || payload.old;
            if (!row?.user_id) return;
            if (row.user_id !== currentUserId) return;
            await loadChats();
          })
          .subscribe();
      }

      if (!profilesChannel) {
        profilesChannel = client
          .channel("view-profiles-online")
          .on("postgres_changes", {
            event: "UPDATE",
            schema: "public",
            table: "profiles"
          }, async () => {
            await loadChats();
          })
          .subscribe();
      }
    }

    menuToggle.addEventListener("click", toggleMenu);

    document.addEventListener("click", (event) => {
      if (!event.target.closest("#menu") && !event.target.closest("#menuToggle")) {
        closeMenu();
      }
    });

    searchInput.addEventListener("input", renderChats);

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        currentFilter = tab.dataset.filter;
        tabs.forEach(t => t.classList.toggle("active", t === tab));
        renderChats();
      });
    });

    newChatBtn.addEventListener("click", () => {
      closeMenu();
      window.location.href = "friends.html";
    });

    refreshBtn.addEventListener("click", async () => {
      closeMenu();
      await loadChats();
      showNotice("Chats refreshed.", "success");
    });

    menuUnreadBtn.addEventListener("click", () => {
      closeMenu();
      currentFilter = "unread";
      tabs.forEach(t => t.classList.toggle("active", t.dataset.filter === "unread"));
      renderChats();
    });

    menuOnlineBtn.addEventListener("click", () => {
      closeMenu();
      currentFilter = "online";
      tabs.forEach(t => t.classList.toggle("active", t.dataset.filter === "online"));
      renderChats();
    });

    menuArchivedBtn.addEventListener("click", () => {
      closeMenu();
      currentFilter = "archived";
      tabs.forEach(t => t.classList.toggle("active", t.dataset.filter === "archived"));
      renderChats();
    });

    menuAllBtn.addEventListener("click", () => {
      closeMenu();
      currentFilter = "all";
      tabs.forEach(t => t.classList.toggle("active", t.dataset.filter === "all"));
      renderChats();
    });

    markReadBtn.addEventListener("click", async () => {
      closeMenu();
      await markAllRead();
    });

    notificationsBtn.addEventListener("click", () => {
      closeMenu();
      window.location.href = "notifications.html";
    });

    settingsBtn.addEventListener("click", () => {
      closeMenu();
      window.location.href = "settings.html";
    });

    window.openChat = openChat;

    async function init() {
      try {
        const session = await requireSession();
        if (!session?.user) return;

        currentUserId = session.user.id;
        await loadChats();
        await subscribeRealtime();
      } catch (error) {
        showNotice(error.message || "Could not load chats.");
      }
    }

    init();
  </script>
</body>
</html>
