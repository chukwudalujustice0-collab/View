<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chats | View</title>
  <meta name="theme-color" content="#07122b" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#061126;
      --bg2:#0a1835;
      --card:rgba(255,255,255,.08);
      --card2:rgba(255,255,255,.06);
      --stroke:rgba(255,255,255,.08);
      --text:#f8fbff;
      --muted:#9fb2cf;
      --primary:#2d6bff;
      --primary2:#5c8cff;
      --green:#22c55e;
      --danger:#ef4444;
      --shadow:0 18px 50px rgba(0,0,0,.28);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Inter,Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      min-height:100%;
      background:
        radial-gradient(circle at top right, rgba(45,107,255,.16), transparent 24%),
        radial-gradient(circle at top left, rgba(0,255,200,.06), transparent 18%),
        linear-gradient(180deg,#08142e 0%,#061126 55%,#050d1c 100%);
      color:var(--text);
    }

    body{
      padding-bottom:118px;
    }

    .wrap{
      width:min(100%,820px);
      margin:0 auto;
      padding:18px 16px 0;
    }

    .notice{
      display:none;
      margin-bottom:16px;
      padding:14px 16px;
      border-radius:18px;
      font-size:14px;
      line-height:1.6;
      border:1px solid transparent;
      backdrop-filter:blur(10px);
    }
    .notice.show{display:block}
    .notice.error{
      background:rgba(239,68,68,.12);
      border-color:rgba(239,68,68,.24);
      color:#ffd9d9;
    }
    .notice.success{
      background:rgba(34,197,94,.12);
      border-color:rgba(34,197,94,.24);
      color:#ddffe8;
    }
    .notice.info{
      background:rgba(45,107,255,.14);
      border-color:rgba(45,107,255,.26);
      color:#dce8ff;
    }

    .hero{
      background:
        linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.05)),
        linear-gradient(135deg, rgba(45,107,255,.16), rgba(92,140,255,.06));
      border:1px solid rgba(255,255,255,.08);
      border-radius:30px;
      padding:18px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      margin-bottom:18px;
      position:relative;
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      top:-70px;
      right:-70px;
      width:180px;
      height:180px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(92,140,255,.26), transparent 65%);
      pointer-events:none;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
      position:relative;
      z-index:1;
    }

    .brand-wrap{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .brand-logo{
      width:52px;
      height:52px;
      min-width:52px;
      border-radius:18px;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:24px;
      font-weight:900;
      box-shadow:0 12px 28px rgba(45,107,255,.30);
    }

    .brand-text h1{
      font-size:31px;
      font-weight:900;
      letter-spacing:-.03em;
      line-height:1;
      margin-bottom:5px;
    }

    .brand-text p{
      font-size:13px;
      color:var(--muted);
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-shrink:0;
    }

    .icon-btn{
      width:48px;
      height:48px;
      border:none;
      border-radius:18px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      font-size:20px;
      cursor:pointer;
      position:relative;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
    }

    .notif-dot{
      position:absolute;
      right:10px;
      top:10px;
      width:8px;
      height:8px;
      border-radius:50%;
      background:#ff4d67;
      display:none;
      box-shadow:0 0 0 4px rgba(255,77,103,.18);
    }
    .notif-dot.show{display:block}

    .search-wrap{
      display:flex;
      align-items:center;
      gap:12px;
      min-height:60px;
      padding:0 16px;
      border-radius:20px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      position:relative;
      z-index:1;
    }

    .search-wrap input{
      flex:1;
      border:none;
      outline:none;
      background:transparent;
      color:#fff;
      font-size:15px;
    }

    .search-wrap input::placeholder{
      color:#9db1d1;
    }

    .stats{
      margin-top:14px;
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      position:relative;
      z-index:1;
    }

    .stat-card{
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:14px 15px;
    }

    .stat-label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .stat-value{
      font-size:17px;
      font-weight:800;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .live-dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 0 6px rgba(34,197,94,.12);
    }

    .panel{
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      padding:18px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
    }

    .panel-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:16px;
    }

    .panel-title h2{
      font-size:24px;
      font-weight:900;
      letter-spacing:-.02em;
      margin-bottom:4px;
    }

    .panel-title p{
      color:var(--muted);
      font-size:13px;
    }

    .head-actions{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .ghost-btn,.primary-btn{
      height:44px;
      border:none;
      border-radius:999px;
      padding:0 16px;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }

    .ghost-btn{
      color:#fff;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
    }

    .primary-btn{
      color:#fff;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      box-shadow:0 12px 28px rgba(45,107,255,.28);
    }

    .chat-list{
      display:grid;
      gap:14px;
    }

    .chat-item{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      cursor:pointer;
      transition:.18s ease;
      box-shadow:0 12px 30px rgba(2,8,23,.18);
      position:relative;
      overflow:hidden;
    }

    .chat-item:hover{
      transform:translateY(-1px);
    }

    .chat-item::after{
      content:"";
      position:absolute;
      right:-20px;
      bottom:-70px;
      width:150px;
      height:150px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(45,107,255,.12), transparent 70%);
      pointer-events:none;
    }

    .avatar-wrap{
      position:relative;
      width:62px;
      height:62px;
      min-width:62px;
    }

    .avatar-btn{
      width:62px;
      height:62px;
      border:none;
      border-radius:50%;
      overflow:hidden;
      cursor:pointer;
      background:linear-gradient(135deg,var(--primary),#7da2ff);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:900;
      box-shadow:0 10px 24px rgba(45,107,255,.26);
    }

    .avatar-btn img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .online-dot{
      position:absolute;
      right:2px;
      bottom:2px;
      width:14px;
      height:14px;
      border-radius:50%;
      background:var(--green);
      border:2px solid #091530;
      display:none;
      box-shadow:0 0 0 5px rgba(34,197,94,.10);
    }
    .online-dot.show{display:block}

    .chat-main{
      min-width:0;
      flex:1;
    }

    .chat-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:6px;
    }

    .name-line{
      min-width:0;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .chat-name{
      font-size:16px;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .mini-tag{
      padding:4px 8px;
      border-radius:999px;
      font-size:10px;
      font-weight:800;
      text-transform:uppercase;
      color:#dce8ff;
      background:rgba(45,107,255,.16);
      border:1px solid rgba(45,107,255,.20);
    }

    .chat-time{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      flex-shrink:0;
    }

    .chat-bottom{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .chat-preview{
      min-width:0;
      flex:1;
      font-size:13.5px;
      color:#b6c6df;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chat-preview.typing{
      color:#82f7aa;
      font-weight:700;
    }

    .badge{
      min-width:22px;
      height:22px;
      padding:0 8px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#fff;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:900;
      box-shadow:0 10px 22px rgba(45,107,255,.25);
    }

    .empty-state{
      padding:30px 18px;
      text-align:center;
      line-height:1.8;
      color:var(--muted);
      border-radius:24px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
    }

    .empty-state strong{
      display:block;
      color:#fff;
      font-size:18px;
      margin-bottom:6px;
    }

    .fab-ai{
      position:fixed;
      right:16px;
      bottom:104px;
      width:60px;
      height:60px;
      border:none;
      border-radius:20px;
      background:linear-gradient(135deg,#05d5ff,#2d6bff 55%,#8b5cf6);
      color:#fff;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:26px;
      box-shadow:0 18px 40px rgba(45,107,255,.36);
      z-index:60;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      width:min(100%,820px);
      max-width:calc(100% - 18px);
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      padding:10px 8px calc(10px + env(safe-area-inset-bottom));
      border-radius:28px;
      background:rgba(7,18,43,.94);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 22px 56px rgba(0,0,0,.34);
      backdrop-filter:blur(18px);
      z-index:55;
    }

    .nav-btn{
      min-height:62px;
      border-radius:18px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:5px;
      color:#90a5c7;
      text-decoration:none;
      font-size:12px;
      font-weight:800;
      text-align:center;
    }

    .nav-btn.active{
      color:#fff;
      background:linear-gradient(135deg, rgba(45,107,255,.24), rgba(92,140,255,.10));
      border:1px solid rgba(45,107,255,.20);
    }

    .nav-icon{
      font-size:21px;
      line-height:1;
    }

    .sheet-backdrop{
      position:fixed;
      inset:0;
      background:rgba(3,8,20,.58);
      backdrop-filter:blur(8px);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index:200;
      padding:12px;
    }

    .sheet-backdrop.show{display:flex}

    .sheet{
      width:min(100%,700px);
      background:linear-gradient(180deg,#0a1835,#08142e);
      border-radius:30px 30px 18px 18px;
      border:1px solid rgba(255,255,255,.08);
      padding:12px 14px 16px;
      box-shadow:0 28px 70px rgba(0,0,0,.45);
    }

    .sheet-handle{
      width:54px;
      height:5px;
      border-radius:999px;
      background:rgba(255,255,255,.18);
      margin:4px auto 14px;
    }

    .sheet-head{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:16px;
    }

    .sheet-avatar{
      width:58px;
      height:58px;
      border-radius:50%;
      overflow:hidden;
      background:linear-gradient(135deg,var(--primary),#7da2ff);
      color:#fff;
      font-size:22px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .sheet-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .sheet-title{
      font-size:18px;
      font-weight:900;
      margin-bottom:4px;
    }

    .sheet-sub{
      color:var(--muted);
      font-size:13px;
    }

    .sheet-actions{
      display:grid;
      gap:10px;
    }

    .sheet-action{
      width:100%;
      min-height:54px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.06);
      color:#fff;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:0 16px;
      cursor:pointer;
      font-size:15px;
      font-weight:700;
    }

    .sheet-action.danger{
      color:#ffd8d8;
      background:rgba(239,68,68,.10);
      border-color:rgba(239,68,68,.18);
    }

    .spinner{
      width:18px;
      height:18px;
      border:2px solid rgba(255,255,255,.24);
      border-top-color:#fff;
      border-radius:50%;
      animation:spin .8s linear infinite;
      display:inline-block;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    @media (max-width:640px){
      .brand-text h1{font-size:28px}
      .panel-head{
        flex-direction:column;
        align-items:flex-start;
      }
      .head-actions{
        width:100%;
      }
      .ghost-btn,.primary-btn{
        flex:1;
      }
      .stats{
        grid-template-columns:1fr;
      }
      .chat-top{
        flex-direction:column;
        align-items:flex-start;
      }
      .chat-time{
        white-space:normal;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="notice" class="notice"></div>

    <section class="hero">
      <div class="topbar">
        <div class="brand-wrap">
          <div class="brand-logo">V</div>
          <div class="brand-text">
            <h1>Chats</h1>
            <p>Your premium conversation hub</p>
          </div>
        </div>

        <div class="top-actions">
          <a id="notificationsBtn" class="icon-btn" href="notifications.html" aria-label="Notifications" title="Notifications">
            🔔
            <span id="notifDot" class="notif-dot"></span>
          </a>
          <a id="profileBtn" class="icon-btn" href="profile.html" aria-label="Profile" title="Profile">👤</a>
        </div>
      </div>

      <div class="search-wrap">
        <span>🔎</span>
        <input id="searchInput" type="text" placeholder="Search by name, message, or group..." />
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Connection</div>
          <div class="stat-value"><span class="live-dot"></span> Realtime connected</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">Visible Chats</div>
          <div id="chatCount" class="stat-value">0 chats</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">
          <h2>All Chats</h2>
          <p>Only conversations that belong to you appear here.</p>
        </div>

        <div class="head-actions">
          <button id="refreshBtn" class="ghost-btn" type="button">Refresh</button>
          <button id="newChatBtn" class="primary-btn" type="button">New Chat</button>
        </div>
      </div>

      <div id="chatList" class="chat-list">
        <div class="empty-state"><span class="spinner"></span></div>
      </div>
    </section>
  </div>

  <a id="aiFab" class="fab-ai" href="ai-assistant.html" title="AI Assistant" aria-label="AI Assistant">✦</a>

  <nav class="bottom-nav">
    <a id="navHome" class="nav-btn" href="home.html">
      <span class="nav-icon">⌂</span>
      <span>Home</span>
    </a>

    <a id="navExplore" class="nav-btn" href="explore.html">
      <span class="nav-icon">🔎</span>
      <span>Explore</span>
    </a>

    <a id="navChats" class="nav-btn active" href="chats.html">
      <span class="nav-icon">💬</span>
      <span>Chat</span>
    </a>

    <a id="navCalls" class="nav-btn" href="calls.html">
      <span class="nav-icon">📞</span>
      <span>Call</span>
    </a>

    <a id="navGroups" class="nav-btn" href="groups.html">
      <span class="nav-icon">👥</span>
      <span>Group</span>
    </a>
  </nav>

  <div id="optionsSheetBackdrop" class="sheet-backdrop" onclick="closeOptionsSheet(event)">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>

      <div class="sheet-head">
        <div id="sheetAvatar" class="sheet-avatar">U</div>
        <div>
          <div id="sheetTitle" class="sheet-title">User</div>
          <div id="sheetSub" class="sheet-sub">Chat options</div>
        </div>
      </div>

      <div class="sheet-actions">
        <a id="sheetProfileAction" class="sheet-action" href="#">
          <span>View User Profile</span>
          <span>↗</span>
        </a>

        <button id="sheetOpenAction" class="sheet-action" type="button">
          <span>Open Chat</span>
          <span>→</span>
        </button>

        <button id="sheetDeleteAction" class="sheet-action danger" type="button">
          <span>Delete Chat</span>
          <span>🗑️</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";
    const VAPID_PUBLIC_KEY = "BCXhu5fvFT6k4ukbLKxcFybuhRom6XV3ZXv35uysrK00AaDneBctaY7WeSkEb_DJSfxJ6uCamC2RARgD-vEYbgo";

    const ROUTES = {
      login: "login.html",
      notifications: "notifications.html",
      profile: "profile.html",
      publicProfile: "public-profile.html",
      home: "home.html",
      explore: "explore.html",
      chats: "chats.html",
      chatRoom: "chat-room.html",

    const noticeBox = document.getElementById("notice");

    const refreshBtn = document.getElementById("refreshBtn");
    const newChatBtn = document.getElementById("newChatBtn");
    const notifDot = document.getElementById("notifDot");

    const optionsSheetBackdrop = document.getElementById("optionsSheetBackdrop");
    const sheetAvatar = document.getElementById("sheetAvatar");
    const sheetTitle = document.getElementById("sheetTitle");
    const sheetSub = document.getElementById("sheetSub");
    const sheetProfileAction = document.getElementById("sheetProfileAction");
    const sheetOpenAction = document.getElementById("sheetOpenAction");
    const sheetDeleteAction = document.getElementById("sheetDeleteAction");

    let currentUser = null;
    let currentUserId = "";
    let allChats = [];
    let selectedChat = null;
    let realtimeChannel = null;
    let presenceChannel = null;
    let typingChannel = null;
    let onlineUserIds = new Set();
    let typingMap = new Map();

    function showNotice(message, type = "error") {
      noticeBox.className = `notice show ${type}`;
      noticeBox.textContent = message || "";
    }

    function clearNotice() {
      noticeBox.className = "notice";
      noticeBox.textContent = "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getInitial(name) {
      const safe = String(name || "U").trim();
      return safe ? safe.charAt(0).toUpperCase() : "U";
    }

    function formatTime(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "";
      const now = new Date();
      const sameDay = d.toDateString() === now.toDateString();
      if (sameDay) {
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }
      return d.toLocaleDateString([], { day: "2-digit", month: "2-digit", year: "numeric" });
    }

    function getDisplayName(profile = {}, fallback = "User") {
      const candidates = [
        profile.full_name,
        profile.display_name,
        profile.username,
        profile.name,
        [profile.first_name, profile.last_name].filter(Boolean).join(" ").trim()
      ].filter(Boolean);

      const chosen = candidates.find(Boolean);
      return chosen ? String(chosen).trim() : fallback;
    }

    function getAvatarUrl(profile = {}) {
      return profile.avatar_url || profile.profile_picture || profile.photo_url || profile.image_url || "";
    }

    function getMessageText(message = {}) {
      return message.content || message.message || message.text || message.body || "";
    }

    function getMessageType(message = {}) {
      return message.message_type || message.type || "text";
    }

    function getConversationName(chat) {
      return chat.is_group ? (chat.group_name || "Group") : (chat.other_user_name || "User");
    }

    function getConversationAvatar(chat) {
      return chat.is_group ? (chat.group_avatar || "") : (chat.other_user_avatar || "");
    }

    function isChatOnline(chat) {
      if (chat.is_group) return false;
      return chat.other_user_id ? onlineUserIds.has(chat.other_user_id) : false;
    }

    function getPreviewText(chat) {
      const typing = typingMap.get(chat.id);
      if (typing && typing.expiresAt > Date.now()) return "Typing...";

      if (chat.lastMessage) {
        const type = getMessageType(chat.lastMessage);
        const text = getMessageText(chat.lastMessage);
        if (text) return text;
        if (type === "image") return "📷 Image";
        if (type === "video") return "🎥 Video";
        if (type === "audio") return "🎵 Audio";
        if (type === "file" || type === "document") return "📎 File";
      }

      return "Start chatting...";
    }

    function updateCount() {
      const count = allChats.length;
      chatCount.textContent = `${count} ${count === 1 ? "chat" : "chats"}`;
    }

    function renderChats() {
      const term = searchInput.value.trim().toLowerCase();

      const filtered = allChats.filter(chat => {
        const name = getConversationName(chat).toLowerCase();
        const preview = getPreviewText(chat).toLowerCase();
        return name.includes(term) || preview.includes(term);
      });

      if (!filtered.length) {
        chatList.innerHTML = `
          <div class="empty-state">
            <strong>No chats yet</strong>
            Start a conversation from Explore or Groups.
          </div>
        `;
        return;
      }

      chatList.innerHTML = filtered.map(chat => {
        const name = getConversationName(chat);
        const avatarUrl = getConversationAvatar(chat);
        const preview = getPreviewText(chat);
        const typing = preview === "Typing...";
        const online = isChatOnline(chat);
        const badge = Number(chat.unread_count || 0);
        const stamp = chat.lastMessage?.created_at || chat.updated_at || chat.created_at;
        const tag = chat.is_group
          ? `<span class="mini-tag">Group</span>`
          : (online ? `<span class="mini-tag">Online</span>` : ``);

        return `
          <div class="chat-item" onclick="openChat('${escapeHtml(chat.id)}')">
            <div class="avatar-wrap">
              <button class="avatar-btn" type="button" onclick="openOptions(event,'${escapeHtml(chat.id)}')" aria-label="Chat options">
                ${avatarUrl
                  ? `<img src="${escapeHtml(avatarUrl)}" alt="${escapeHtml(name)}">`
                  : escapeHtml(getInitial(name))}
              </button>
              <span class="online-dot ${online ? "show" : ""}"></span>
            </div>

            <div class="chat-main">
              <div class="chat-top">
                <div class="name-line">
                  <div class="chat-name">${escapeHtml(name)}</div>
                  ${tag}
                </div>
                <div class="chat-time">${escapeHtml(formatTime(stamp))}</div>
              </div>

              <div class="chat-bottom">
                <div class="chat-preview ${typing ? "typing" : ""}">${escapeHtml(preview)}</div>
                ${badge > 0 ? `<span class="badge">${badge}</span>` : ``}
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    function openChat(conversationId) {
      if (!conversationId) return;
      window.location.href = `${ROUTES.chatRoom}?id=${encodeURIComponent(conversationId)}`;
    }

    function openOptions(event, conversationId) {
      event.stopPropagation();
      const chat = allChats.find(item => item.id === conversationId);
      if (!chat) return;

      selectedChat = chat;

      const name = getConversationName(chat);
      const avatar = getConversationAvatar(chat);

      sheetAvatar.innerHTML = avatar
        ? `<img src="${escapeHtml(avatar)}" alt="${escapeHtml(name)}">`
        : escapeHtml(getInitial(name));

      sheetTitle.textContent = name;
      sheetSub.textContent = chat.is_group
        ? "Group chat options"
        : (isChatOnline(chat) ? "Online now" : "Chat options");

      if (chat.is_group) {
        sheetProfileAction.href = `${ROUTES.groups}?id=${encodeURIComponent(chat.id)}`;
        sheetProfileAction.querySelector("span").textContent = "Open Group";
      } else {
        sheetProfileAction.href = `${ROUTES.publicProfile}?id=${encodeURIComponent(chat.other_user_id || "")}`;
        sheetProfileAction.querySelector("span").textContent = "View User Profile";
      }

      sheetOpenAction.onclick = () => openChat(chat.id);
      sheetDeleteAction.onclick = () => deleteChatForMe(chat.id);

      optionsSheetBackdrop.classList.add("show");
    }

    function closeOptionsSheet(event) {
      if (event && event.target && event.target !== optionsSheetBackdrop) return;
      optionsSheetBackdrop.classList.remove("show");
      selectedChat = null;
    }

    async function getSessionWithRetry(maxWaitMs = 3000) {
      const start = Date.now();
      while (Date.now() - start < maxWaitMs) {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error) throw error;
        if (data.session?.user) return data.session;
        await new Promise(resolve => setTimeout(resolve, 200));
      }
      return null;
    }

    async function requireSession() {
      const session = await getSessionWithRetry();
      if (!session?.user) {
        window.location.href = `${ROUTES.login}?next=${encodeURIComponent(ROUTES.chats)}`;
        return null;
      }
      return session;
    }

    async function loadMyMemberships() {
      const { data, error } = await supabaseClient
        .from("conversation_members")
        .select("*")
        .eq("user_id", currentUserId);

      if (error) throw error;
      return data || [];
    }

    async function loadConversations(conversationIds) {
      if (!conversationIds.length) return [];
      const { data, error } = await supabaseClient
        .from("conversations")
        .select("*")
        .in("id", conversationIds);

      if (error) throw error;
      return data || [];
    }

    async function loadMembers(conversationIds) {
      if (!conversationIds.length) return [];
      const { data, error } = await supabaseClient
        .from("conversation_members")
        .select("*")
        .in("conversation_id", conversationIds);

      if (error) throw error;
      return data || [];
    }

    async function loadProfiles(userIds) {
      if (!userIds.length) return [];
      const { data, error } = await supabaseClient
        .from("profiles")
        .select("*")
        .in("id", userIds);

      if (error) {
        console.warn("Profiles load warning:", error.message);
        return [];
      }
      return data || [];
    }

    async function loadMessages(conversationIds) {
      if (!conversationIds.length) return [];
      const { data, error } = await supabaseClient
        .from("messages")
        .select("*")
        .in("conversation_id", conversationIds)
        .order("created_at", { ascending: false });

      if (error) throw error;
      return data || [];
    }

    async function loadUnreadNotifications() {
      try {
        const { count, error } = await supabaseClient
          .from("notifications")
          .select("*", { count: "exact", head: true })
          .eq("user_id", currentUserId)
          .eq("is_read", false);

        if (!error) notifDot.classList.toggle("show", Number(count || 0) > 0);
      } catch (err) {
        notifDot.classList.remove("show");
      }
    }

    async function loadChats() {
      clearNotice();
      chatList.innerHTML = `<div class="empty-state"><span class="spinner"></span></div>`;

      try {
        const myMemberships = await loadMyMemberships();
        const conversationIds = [...new Set(myMemberships.map(row => row.conversation_id).filter(Boolean))];

        if (!conversationIds.length) {
          allChats = [];
          updateCount();
          renderChats();
          return;
        }

        const [conversations, members, messages] = await Promise.all([
          loadConversations(conversationIds),
          loadMembers(conversationIds),
          loadMessages(conversationIds)
        ]);

        const membersByConversation = new Map();
        const latestMessageByConversation = new Map();

        for (const member of members) {
          if (!membersByConversation.has(member.conversation_id)) {
            membersByConversation.set(member.conversation_id, []);
          }
          membersByConversation.get(member.conversation_id).push(member);
        }

        for (const msg of messages) {
          if (!latestMessageByConversation.has(msg.conversation_id)) {
            latestMessageByConversation.set(msg.conversation_id, msg);
          }
        }

        const otherUserIds = [...new Set(
          members
            .map(member => member.user_id)
            .filter(userId => userId && userId !== currentUserId)
        )];

        const profiles = await loadProfiles(otherUserIds);
        const profileMap = new Map(profiles.map(profile => [profile.id, profile]));
        const conversationMap = new Map(conversations.map(conv => [conv.id, conv]));

        const built = [];

        for (const conversationId of conversationIds) {
          const conv = conversationMap.get(conversationId);
          if (!conv) continue;

          const convMembers = membersByConversation.get(conversationId) || [];
          const lastMessage = latestMessageByConversation.get(conversationId) || null;

          const isGroup = !!(conv.is_group || conv.type === "group" || convMembers.length > 2);

          if (!isGroup) {
            const otherMember = convMembers.find(member => member.user_id !== currentUserId);
            if (!otherMember) continue;

            const profile = profileMap.get(otherMember.user_id) || {};
            built.push({
              id: conversationId,
              is_group: false,
              other_user_id: otherMember.user_id,
              other_user_name: getDisplayName(profile, "User"),
              other_user_avatar: getAvatarUrl(profile),
              group_name: "",
              group_avatar: "",
              lastMessage,
              unread_count: 0,
              created_at: conv.created_at || null,
              updated_at: conv.updated_at || lastMessage?.created_at || conv.created_at || null
            });
          } else {
            built.push({
              id: conversationId,
              is_group: true,
              other_user_id: "",
              other_user_name: "",
              other_user_avatar: "",
              group_name: conv.name || conv.title || conv.group_name || `Group (${convMembers.length})`,
              group_avatar: conv.avatar_url || conv.group_avatar || "",
              lastMessage,
              unread_count: 0,
              created_at: conv.created_at || null,
              updated_at: conv.updated_at || lastMessage?.created_at || conv.created_at || null
            });
          }
        }

        built.sort((a, b) => {
          const aTime = new Date(a.lastMessage?.created_at || a.updated_at || a.created_at || 0).getTime();
          const bTime = new Date(b.lastMessage?.created_at || b.updated_at || b.created_at || 0).getTime();
          return bTime - aTime;
        });

        allChats = built;
        updateCount();
        renderChats();
      } catch (error) {
        console.error("Load chats error:", error);
        allChats = [];
        updateCount();
        showNotice(error.message || "Could not load chats.");
        chatList.innerHTML = `
          <div class="empty-state">
            <strong>Could not load chats</strong>
            Please refresh and try again.
          </div>
        `;
      }
    }

    async function deleteChatForMe(conversationId) {
      if (!conversationId) return;

      const okay = window.confirm("Delete this chat from your list?");
      if (!okay) return;

      try {
        const { error } = await supabaseClient
          .from("conversation_members")
          .delete()
          .eq("conversation_id", conversationId)
          .eq("user_id", currentUserId);

        if (error) throw error;

        closeOptionsSheet({ target: optionsSheetBackdrop });
        showNotice("Chat removed from your list.", "success");
        await loadChats();
      } catch (error) {
        console.error("Delete chat error:", error);
        showNotice(error.message || "Could not delete chat.");
      }
    }

    function base64ToUint8Array(base64String) {
      const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
      const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
      const rawData = atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
      return outputArray;
    }

    async function registerPushNotifications() {
      try {
        if (!("serviceWorker" in navigator) || !("PushManager" in window)) return;

        const registration = await navigator.serviceWorker.register(ROUTES.sw);
        let subscription = await registration.pushManager.getSubscription();

        if (!subscription) {
          subscription = await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: base64ToUint8Array(VAPID_PUBLIC_KEY)
          });
        }

        const payload = {
          user_id: currentUserId,
          endpoint: subscription.endpoint,
          subscription: subscription.toJSON(),
          updated_at: new Date().toISOString()
        };

        const { error } = await supabaseClient
          .from("push_subscriptions")
          .upsert(payload, { onConflict: "endpoint" });

        if (error) {
          console.warn("Push subscription save warning:", error.message);
        }
      } catch (error) {
        console.warn("Push registration warning:", error?.message || error);
      }
    }

    function setupPresence() {
      if (presenceChannel) return;

      presenceChannel = supabaseClient.channel("view-chats-presence", {
        config: { presence: { key: currentUserId } }
      });

      presenceChannel
        .on("presence", { event: "sync" }, () => {
          const state = presenceChannel.presenceState();
          const next = new Set();
          Object.keys(state || {}).forEach(key => next.add(key));
          onlineUserIds = next;
          renderChats();
        })
        .subscribe(async status => {
          if (status === "SUBSCRIBED") {
            await presenceChannel.track({
              user_id: currentUserId,
              online_at: new Date().toISOString(),
              page: "chats"
            });
          }
        });
    }

    function setupTypingChannel() {
      if (typingChannel) return;

      typingChannel = supabaseClient.channel("view-global-typing");

      typingChannel
        .on("broadcast", { event: "typing" }, ({ payload }) => {
          if (!payload || payload.user_id === currentUserId || !payload.conversation_id) return;

          typingMap.set(payload.conversation_id, {
            userId: payload.user_id,
            expiresAt: Date.now() + 3000
          });

          renderChats();

          setTimeout(() => {
            const current = typingMap.get(payload.conversation_id);
            if (current && current.expiresAt <= Date.now()) {
              typingMap.delete(payload.conversation_id);
              renderChats();
            }
          }, 3200);
        })
        .subscribe();
    }

    function subscribeRealtime() {
      if (realtimeChannel) return;

      realtimeChannel = supabaseClient
        .channel("view-chats-realtime")
        .on("postgres_changes", {
          event: "*",
          schema: "public",
          table: "messages"
        }, async () => {
          await loadChats();
        })
        .on("postgres_changes", {
          event: "*",
          schema: "public",
          table: "conversation_members"
        }, async () => {
          await loadChats();
        })
        .on("postgres_changes", {
          event: "*",
          schema: "public",
          table: "profiles"
        }, async () => {
          await loadChats();
        })
        .on("postgres_changes", {
          event: "*",
          schema: "public",
          table: "notifications"
        }, async () => {
          await loadUnreadNotifications();
        })
        .subscribe();
    }

    searchInput.addEventListener("input", renderChats);

    refreshBtn.addEventListener("click", async () => {
      await loadChats();
      await loadUnreadNotifications();
    });

    newChatBtn.addEventListener("click", () => {
      window.location.href = ROUTES.explore;
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeOptionsSheet({ target: optionsSheetBackdrop });
      }
    });

    window.openChat = openChat;
    window.openOptions = openOptions;
    window.closeOptionsSheet = closeOptionsSheet;

    async function init() {
      try {
        const session = await requireSession();
        if (!session?.user) return;

        currentUser = session.user;
        currentUserId = session.user.id;

        document.getElementById("notificationsBtn").href = ROUTES.notifications;
        document.getElementById("profileBtn").href = ROUTES.profile;
        document.getElementById("aiFab").href = ROUTES.ai;
        document.getElementById("navHome").href = ROUTES.home;
        document.getElementById("navExplore").href = ROUTES.explore;
        document.getElementById("navChats").href = ROUTES.chats;
        document.getElementById("navCalls").href = ROUTES.calls;
        document.getElementById("navGroups").href = ROUTES.groups;

        await loadChats();
        await loadUnreadNotifications();

        subscribeRealtime();
        setupPresence();
        setupTypingChannel();
        registerPushNotifications();
      } catch (error) {
        console.error("Init error:", error);
        showNotice(error.message || "Could not load chats.");
      }
    }

    init();
  </script>
</body>
</html>
