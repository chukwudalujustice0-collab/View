<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chats | View</title>
  <meta name="theme-color" content="#07122a" />
  <link rel="manifest" href="/manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#061126;
      --bg2:#0a1835;
      --card:rgba(255,255,255,.08);
      --stroke:rgba(255,255,255,.08);
      --text:#f8fbff;
      --muted:#9db0cf;
      --soft:#7f91af;
      --primary:#2d6bff;
      --primary2:#5c8cff;
      --green:#22c55e;
      --danger:#ef4444;
      --warning:#f59e0b;
      --shadow:0 18px 50px rgba(0,0,0,.28);
    }

    *{
      margin:0;padding:0;box-sizing:border-box;
      font-family:Inter,Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }

    html,body{
      min-height:100%;
      background:
        radial-gradient(circle at top right, rgba(45,107,255,.18), transparent 24%),
        radial-gradient(circle at top left, rgba(0,255,200,.06), transparent 18%),
        linear-gradient(180deg,#08142e 0%,#061126 55%,#050d1c 100%);
      color:var(--text);
    }

    body{padding-bottom:122px}

    .wrap{
      width:min(100%,860px);
      margin:0 auto;
      padding:18px 16px 0;
    }

    .notice{
      display:none;
      margin-bottom:16px;
      padding:14px 16px;
      border-radius:18px;
      font-size:14px;
      line-height:1.6;
      border:1px solid transparent;
      backdrop-filter:blur(10px);
    }
    .notice.show{display:block}
    .notice.error{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.24);color:#ffd9d9}
    .notice.success{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.24);color:#ddffe8}
    .notice.info{background:rgba(45,107,255,.14);border-color:rgba(45,107,255,.26);color:#dce8ff}

    .hero{
      position:relative;
      overflow:hidden;
      background:
        linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.05)),
        linear-gradient(135deg, rgba(45,107,255,.16), rgba(92,140,255,.06));
      border:1px solid rgba(255,255,255,.08);
      border-radius:30px;
      padding:18px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      margin-bottom:18px;
    }

    .hero::after{
      content:"";
      position:absolute;
      top:-70px;
      right:-70px;
      width:180px;
      height:180px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(92,140,255,.30), transparent 66%);
      pointer-events:none;
    }

    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
      position:relative;
      z-index:1;
      flex-wrap:wrap;
    }

    .top-left,.top-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .dashboard-btn,.icon-btn{
      min-height:46px;
      border:none;
      border-radius:18px;
      padding:0 16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      text-decoration:none;
      color:#fff;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }

    .dashboard-btn{
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      box-shadow:0 12px 28px rgba(45,107,255,.28);
    }

    .icon-btn{
      width:46px;
      min-width:46px;
      padding:0;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 10px 24px rgba(0,0,0,.18);
      position:relative;
      overflow:hidden;
    }

    .brand h1{
      font-size:32px;
      font-weight:900;
      line-height:1;
      letter-spacing:-.03em;
      margin-bottom:4px;
    }

    .brand p{
      color:#bfd0ea;
      font-size:13px;
    }

    .notif-dot{
      position:absolute;
      right:10px;
      top:10px;
      width:8px;
      height:8px;
      border-radius:50%;
      background:#ff4d67;
      display:none;
      box-shadow:0 0 0 4px rgba(255,77,103,.18);
    }
    .notif-dot.show{display:block}

    .profile-btn-img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      border-radius:18px;
    }

    .profile-btn-fallback{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,var(--primary),#7da2ff);
      color:#fff;
      font-size:18px;
      font-weight:900;
      border-radius:18px;
    }

    .hero-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      position:relative;
      z-index:1;
      margin-top:8px;
    }

    .hero-chip{
      min-height:36px;
      padding:0 12px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:#dce8ff;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }

    .hero-chip.active{
      background:rgba(45,107,255,.18);
      border-color:rgba(45,107,255,.20);
      color:#fff;
    }

    .card{
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      padding:18px 16px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
      margin-bottom:18px;
    }

    .search-wrap{
      display:flex;
      align-items:center;
      gap:10px;
      min-height:56px;
      padding:0 16px;
      border-radius:18px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
    }

    .search-wrap span{font-size:18px;color:#bfd0ea}
    .search-wrap input{
      flex:1;border:none;outline:none;background:transparent;
      font-size:15px;color:#fff;
    }
    .search-wrap input::placeholder{color:#9db1d1}

    .section-head{
      display:flex;align-items:center;justify-content:space-between;
      gap:12px;margin-bottom:14px;flex-wrap:wrap;
    }
    .section-head h2{
      font-size:20px;font-weight:900;letter-spacing:-.02em;
    }

    .new-chat-btn{
      border:none;border-radius:999px;padding:10px 14px;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#fff;font-size:13px;font-weight:800;cursor:pointer;
      box-shadow:0 10px 22px rgba(45,107,255,.22);
    }

    .chat-list{display:grid;gap:14px}

    .chat-item{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:14px;
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      background:rgba(255,255,255,.06);
      cursor:pointer;
      transition:.18s ease;
      position:relative;
    }
    .chat-item:hover{transform:translateY(-1px)}
    .chat-item.unread{
      border-color:rgba(45,107,255,.22);
      background:rgba(45,107,255,.09);
    }

    .chat-main{
      display:flex;align-items:center;gap:12px;min-width:0;flex:1;
    }

    .avatar-wrap{
      position:relative;
      width:58px;height:58px;min-width:58px;
    }

    .avatar{
      width:58px;height:58px;border-radius:50%;
      background:linear-gradient(135deg,var(--primary),#7da2ff);
      color:#fff;display:flex;align-items:center;justify-content:center;
      font-size:20px;font-weight:900;overflow:hidden;
      box-shadow:0 10px 24px rgba(45,107,255,.22);
      cursor:pointer;
    }
    .avatar img{width:100%;height:100%;object-fit:cover;display:block}

    .online-dot{
      position:absolute;
      right:2px;bottom:2px;width:14px;height:14px;border-radius:50%;
      background:var(--green);
      border:3px solid #08142e;
      display:none;
    }
    .online-dot.show{display:block}

    .chat-meta{min-width:0;flex:1}
    .chat-top{
      display:flex;align-items:center;justify-content:space-between;
      gap:10px;margin-bottom:5px;
    }

    .chat-name{
      font-size:15px;font-weight:900;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }

    .chat-time{
      font-size:12px;color:var(--muted);white-space:nowrap;
    }

    .chat-preview{
      font-size:13px;color:#dce8ff;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      line-height:1.5;
    }

    .chat-preview.typing{
      color:#8fd0ff;
      font-weight:800;
    }

    .chat-side{
      display:flex;flex-direction:column;align-items:flex-end;gap:8px;
    }

    .badge{
      min-width:22px;height:22px;padding:0 7px;border-radius:999px;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#fff;font-size:11px;font-weight:900;
      display:inline-flex;align-items:center;justify-content:center;
      box-shadow:0 8px 18px rgba(45,107,255,.24);
    }

    .archived-pill{
      min-height:26px;padding:0 10px;border-radius:999px;
      display:inline-flex;align-items:center;justify-content:center;
      background:rgba(245,158,11,.14);
      border:1px solid rgba(245,158,11,.18);
      color:#ffe6b8;font-size:10px;font-weight:900;
      text-transform:uppercase;
    }

    .empty-state{
      text-align:center;padding:32px 16px;color:#bfd0ea;font-size:14px;line-height:1.8;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;box-shadow:var(--shadow);
    }

    .empty-state strong{
      display:block;color:#fff;margin-bottom:6px;font-size:18px;
    }

    .bottom-nav{
      position:fixed;left:50%;bottom:14px;transform:translateX(-50%);
      width:min(760px, calc(100% - 20px));
      background:rgba(7,18,43,.94);
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      box-shadow:0 20px 50px rgba(15,23,42,.24);
      padding:10px 8px calc(10px + env(safe-area-inset-bottom));
      display:grid;grid-template-columns:repeat(5,1fr);gap:6px;z-index:50;
      backdrop-filter:blur(18px);
    }

    .nav-btn{
      text-decoration:none;color:#90a5c7;display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:4px;min-height:58px;border-radius:16px;font-size:12px;font-weight:800;text-align:center;
    }
    .nav-btn.active{
      background:linear-gradient(135deg, rgba(45,107,255,.24), rgba(92,140,255,.10));
      color:#fff;border:1px solid rgba(45,107,255,.20);
    }
    .nav-icon{font-size:20px;line-height:1}

    .fab-ai{
      position:fixed;
      right:16px;
      bottom:106px;
      width:60px;
      height:60px;
      border:none;
      border-radius:20px;
      background:linear-gradient(135deg,#05d5ff,#2d6bff 55%,#8b5cf6);
      color:#fff;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:26px;
      box-shadow:0 18px 40px rgba(45,107,255,.36);
      z-index:60;
    }

    .sheet-backdrop{
      position:fixed;inset:0;background:rgba(0,0,0,.45);
      backdrop-filter:blur(6px);display:none;z-index:90;
    }
    .sheet-backdrop.show{display:block}

    .sheet{
      position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
      width:min(420px, calc(100% - 24px));
      background:#0d1938;
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      box-shadow:0 26px 60px rgba(0,0,0,.34);
      padding:18px;
      display:none;
      z-index:100;
    }
    .sheet.show{display:block}

    .sheet-head{
      display:flex;align-items:center;gap:12px;margin-bottom:16px;
    }

    .sheet-title{
      font-size:18px;font-weight:900;margin-bottom:4px;
    }

    .sheet-sub{
      font-size:12px;color:#bfd0ea;line-height:1.6;
    }

    .sheet-actions{
      display:grid;gap:10px;
    }

    .sheet-btn{
      border:none;border-radius:16px;padding:14px 14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;font-size:14px;font-weight:800;text-align:left;cursor:pointer;
    }

    .sheet-btn.danger{
      background:rgba(239,68,68,.14);
      border-color:rgba(239,68,68,.18);
      color:#ffd9d9;
    }

    @media(max-width:640px){
      .wrap{padding:14px 12px 0}
      .brand h1{font-size:28px}
      .topbar{flex-direction:column;align-items:flex-start}
      .top-left,.top-right{width:100%}
      .top-right .icon-btn,.top-left .dashboard-btn{flex:1}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="notice" class="notice"></div>

    <section class="hero">
      <div class="topbar">
        <div class="top-left">
          <a class="dashboard-btn" href="dashboard.html">Dashboard</a>
        </div>

        <div class="brand">
          <h1>Chats</h1>
          <p>Conversation hub with realtime inbox updates</p>
        </div>

        <div class="top-right">
          <a class="icon-btn" href="notifications.html" title="Notifications" aria-label="Notifications">
            🔔
            <span id="notifDot" class="notif-dot"></span>
          </a>

          <a id="topProfileBtn" class="icon-btn" href="profile.html" title="Profile" aria-label="Profile">
            <div class="profile-btn-fallback">U</div>
          </a>

      </div>

      <div class="hero-row">
        <button class="hero-chip active" data-filter="all" type="button">All</button>
        <button class="hero-chip" data-filter="unread" type="button">Unread</button>
        <button class="hero-chip" data-filter="archived" type="button">Archived</button>
      </div>

    <section class="card">
      <div class="search-wrap">
        <span>🔍</span>

      </div>

    <section class="card">
      <div class="section-head">
        <h2>Inbox</h2>
        <button id="newChatBtn" class="new-chat-btn" type="button">New Chat</button>
      </div>

      <div id="chatList" class="chat-list"></div>
    </section>
  </div>

  <a class="fab-ai" href="ai-help.html" title="AI Help" aria-label="AI Help">✦</a>

  <div id="sheetBackdrop" class="sheet-backdrop"></div>
  <div id="actionSheet" class="sheet">
    <div class="sheet-head">
      <div id="sheetAvatar" class="avatar">U</div>
      <div>
        <div id="sheetTitle" class="sheet-title">Chat Actions</div>
        <div id="sheetSub" class="sheet-sub">Choose what to do with this conversation.</div>
      </div>
    </div>

    <div class="sheet-actions">
      <button id="sheetProfileBtn" class="sheet-btn" type="button">View Profile</button>
      <button id="sheetVoiceBtn" class="sheet-btn" type="button">Voice Call</button>
      <button id="sheetVideoBtn" class="sheet-btn" type="button">Video Call</button>
      <button id="sheetArchiveBtn" class="sheet-btn" type="button">Archive Chat</button>
      <button id="sheetDeleteBtn" class="sheet-btn danger" type="button">Delete Chat For Me</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-btn" href="home.html">
      <span class="nav-icon">⌂</span>
      <span>Home</span>
    </a>
    <a class="nav-btn" href="friends.html">
      <span class="nav-icon">👥</span>
      <span>Friends</span>
    </a>
    <a class="nav-btn active" href="chats.html">
      <span class="nav-icon">💬</span>
      <span>Chat</span>
    </a>
    <a class="nav-btn" href="calls.html">
      <span class="nav-icon">📞</span>
      <span>Call</span>
    </a>
    <a class="nav-btn" href="groups.html">
      <span class="nav-icon">👨‍👩‍👧‍👦</span>
      <span>Group</span>
    </a>
  </nav>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        flowType: "pkce"
      }
    });

    const ARCHIVE_KEY = "view_archived_chats_v1";
    const HIDE_KEY = "view_hidden_chats_v1";

    const noticeBox = document.getElementById("notice");
    const chatList = document.getElementById("chatList");
    const searchInput = document.getElementById("searchInput");
    const newChatBtn = document.getElementById("newChatBtn");
    const notifDot = document.getElementById("notifDot");
    const topProfileBtn = document.getElementById("topProfileBtn");
    const filterButtons = [...document.querySelectorAll("[data-filter]")];

    const sheetBackdrop = document.getElementById("sheetBackdrop");
    const actionSheet = document.getElementById("actionSheet");
    const sheetAvatar = document.getElementById("sheetAvatar");
    const sheetTitle = document.getElementById("sheetTitle");
    const sheetSub = document.getElementById("sheetSub");
    const sheetProfileBtn = document.getElementById("sheetProfileBtn");
    const sheetVoiceBtn = document.getElementById("sheetVoiceBtn");
    const sheetVideoBtn = document.getElementById("sheetVideoBtn");
    const sheetArchiveBtn = document.getElementById("sheetArchiveBtn");
    const sheetDeleteBtn = document.getElementById("sheetDeleteBtn");

    let currentUserId = "";
    let currentFilter = "all";
    let allChats = [];
    let chatIds = new Set();
    let messagesChannel = null;
    let membersChannel = null;
    let notificationsChannel = null;
    let typingChannel = null;
    let typingMap = new Map();
    let selectedChat = null;
    let longPressTimer = null;

    function showNotice(message, type = "error") {
      noticeBox.className = `notice show ${type}`;
      noticeBox.textContent = message;
    }

    function clearNotice() {
      noticeBox.className = "notice";
      noticeBox.textContent = "";
    }

    function getLocalMap(key) {
      try { return JSON.parse(localStorage.getItem(key) || "{}"); }
      catch { return {}; }
    }

    function setLocalMap(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function isArchived(conversationId) {
      const map = getLocalMap(ARCHIVE_KEY);
      return !!map[conversationId];
    }

    function isHidden(conversationId) {
      const map = getLocalMap(HIDE_KEY);
      return !!map[conversationId];
    }

    function archiveChat(conversationId) {
      const map = getLocalMap(ARCHIVE_KEY);
      map[conversationId] = true;
      setLocalMap(ARCHIVE_KEY, map);
    }

    function unarchiveChat(conversationId) {
      const map = getLocalMap(ARCHIVE_KEY);
      delete map[conversationId];
      setLocalMap(ARCHIVE_KEY, map);
    }

    function hideChat(conversationId) {
      const map = getLocalMap(HIDE_KEY);
      map[conversationId] = true;
      setLocalMap(HIDE_KEY, map);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function getSessionWithRetry(maxWaitMs = 3000) {
      const start = Date.now();
      while (Date.now() - start < maxWaitMs) {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error) throw error;
        if (data.session?.user) return data.session;
        await new Promise(resolve => setTimeout(resolve, 200));
      }
      return null;
    }

    async function requireSession() {
      const session = await getSessionWithRetry();
      if (!session?.user) {
        window.location.href = "login.html?next=chats.html";
        return null;
      }
      return session;
    }

    function formatDate(value) {
      if (!value) return "";
      try {
        const d = new Date(value);
        const now = new Date();
        const sameDay = d.toDateString() === now.toDateString();
        return sameDay
          ? d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
          : d.toLocaleDateString([], { day: "2-digit", month: "short" });
      } catch {
        return "";
      }
    }

    function setTopProfileImage(profile, authUser) {
      const avatarUrl =
        profile?.avatar_url ||
        authUser?.user_metadata?.avatar_url ||
        authUser?.user_metadata?.picture ||
        "";
      const fullName =
        profile?.full_name ||
        authUser?.user_metadata?.full_name ||
        authUser?.user_metadata?.name ||
        authUser?.email?.split("@")[0] ||
        "User";

      const initial = fullName.charAt(0).toUpperCase();

      if (avatarUrl) {
        topProfileBtn.innerHTML = `<img src="${escapeHtml(avatarUrl)}" alt="Profile" class="profile-btn-img">`;
      } else {
        topProfileBtn.innerHTML = `<div class="profile-btn-fallback">${escapeHtml(initial)}</div>`;
      }
    }

    async function loadTopProfile(authUser) {
      try {
        const { data } = await supabaseClient
          .from("profiles")
          .select("id,full_name,username,avatar_url")
          .eq("id", currentUserId)
          .maybeSingle();
        setTopProfileImage(data || null, authUser);
      } catch {
        setTopProfileImage(null, authUser);
      }
    }

    async function loadNotificationsBadge() {
      try {
        const { count, error } = await supabaseClient
          .from("notifications")
          .select("*", { count: "exact", head: true })
          .eq("user_id", currentUserId)
          .eq("is_read", false);

        if (!error) notifDot.classList.toggle("show", Number(count || 0) > 0);
      } catch {}
    }

    function getDisplayName(profile) {
      return profile?.full_name || profile?.username || "User";
    }

    async function loadChats() {
      clearNotice();

      const { data: memberRows, error: membersError } = await supabaseClient
        .from("conversation_members")
        .select("conversation_id")
        .eq("user_id", currentUserId);

      if (membersError) {
        showNotice(membersError.message || "Could not load conversations.");
        chatList.innerHTML = `<div class="empty-state"><strong>Could not load chats</strong>Please refresh the page.</div>`;
        return;
      }

      const conversationIds = [...new Set((memberRows || []).map(row => row.conversation_id).filter(Boolean))];
      chatIds = new Set(conversationIds);

      if (!conversationIds.length) {
        allChats = [];
        renderChats();
        return;
      }

      const { data: allMembers, error: allMembersError } = await supabaseClient
        .from("conversation_members")
        .select("conversation_id,user_id")
        .in("conversation_id", conversationIds);

      if (allMembersError) {
        showNotice(allMembersError.message || "Could not load chat members.");
        return;
      }

      const otherUserIds = [...new Set(
        (allMembers || [])
          .filter(row => row.user_id !== currentUserId)
          .map(row => row.user_id)
      )];

      let profilesMap = new Map();
      if (otherUserIds.length) {
        const { data: profiles } = await supabaseClient
          .from("profiles")
          .select("id,full_name,username,avatar_url")
          .in("id", otherUserIds);

        profilesMap = new Map((profiles || []).map(p => [p.id, p]));
      }

      const { data: messages, error: messagesError } = await supabaseClient
        .from("messages")
        .select("*")
        .in("conversation_id", conversationIds)
        .order("created_at", { ascending: false });

      if (messagesError) {
        showNotice(messagesError.message || "Could not load messages.");
        return;
      }

      const groupedLatest = new Map();
      const unreadCountMap = new Map();

      (messages || []).forEach(msg => {
        if (!groupedLatest.has(msg.conversation_id)) {
          groupedLatest.set(msg.conversation_id, msg);
        }

        const isUnread =
          msg.sender_id !== currentUserId &&
          (msg.is_read === false || msg.read_at == null);

        if (isUnread) {
          unreadCountMap.set(
            msg.conversation_id,
            (unreadCountMap.get(msg.conversation_id) || 0) + 1
          );
        }
      });

      allChats = conversationIds
        .filter(id => !isHidden(id))
        .map(conversationId => {
          const latest = groupedLatest.get(conversationId) || null;
          const otherMember = (allMembers || []).find(
            row => row.conversation_id === conversationId && row.user_id !== currentUserId
          );
          const profile = otherMember ? profilesMap.get(otherMember.user_id) : null;

          return {
            id: conversationId,
            other_user_id: otherMember?.user_id || "",
            full_name: profile?.full_name || "",
            username: profile?.username || "",
            avatar_url: profile?.avatar_url || "",
            last_message: latest?.message || "Start chatting...",
            last_message_at: latest?.created_at || "",
            unread_count: unreadCountMap.get(conversationId) || 0,
            archived: isArchived(conversationId)
          };
        })
        .sort((a, b) => new Date(b.last_message_at || 0) - new Date(a.last_message_at || 0));

      renderChats();
    }

    function renderChats() {
      const term = searchInput.value.trim().toLowerCase();

      const filtered = allChats.filter(chat => {
        if (currentFilter === "unread" && !(chat.unread_count > 0)) return false;
        if (currentFilter === "archived" && !chat.archived) return false;
        if (currentFilter === "all" && chat.archived) return false;

        const name = `${chat.full_name} ${chat.username}`.toLowerCase();
        const preview = String(typingMap.get(chat.id)?.active ? "typing..." : chat.last_message || "").toLowerCase();
        return name.includes(term) || preview.includes(term);
      });

      if (!filtered.length) {
        const label =
          currentFilter === "unread" ? "No unread chats" :
          currentFilter === "archived" ? "No archived chats" :
          "No chats found";

        chatList.innerHTML = `
          <div class="empty-state">
            <strong>${label}</strong>
            Start a new conversation from Friends or Explore.
          </div>
        `;
        return;
      }

      chatList.innerHTML = filtered.map(chat => {
        const name = getDisplayName(chat);
        const initial = name.charAt(0).toUpperCase();
        const avatar = chat.avatar_url
          ? `<img src="${escapeHtml(chat.avatar_url)}" alt="${escapeHtml(name)}">`
          : escapeHtml(initial);

        const typing = typingMap.get(chat.id);
        const previewText = typing?.active ? "typing..." : (chat.last_message || "Start chatting...");
        const previewClass = typing?.active ? "chat-preview typing" : "chat-preview";

        return `
          <div class="chat-item ${chat.unread_count > 0 ? "unread" : ""}"
               data-chat-id="${escapeHtml(chat.id)}"
               data-user-id="${escapeHtml(chat.other_user_id)}">
            <div class="chat-main" onclick="openChat('${escapeHtml(chat.id)}')">
              <div class="avatar-wrap">
                <div class="avatar" onclick="openActionSheet(event, '${escapeHtml(chat.id)}')">${avatar}</div>
                <span class="online-dot ${typing?.active ? "show" : ""}"></span>
              </div>

              <div class="chat-meta">
                <div class="chat-top">
                  <div class="chat-name">${escapeHtml(name)}</div>
                  <div class="chat-time">${escapeHtml(formatDate(chat.last_message_at))}</div>
                </div>

                <div class="${previewClass}">${escapeHtml(previewText)}</div>
              </div>
            </div>

            <div class="chat-side">
              ${chat.archived ? `<span class="archived-pill">Archived</span>` : ``}
              ${chat.unread_count > 0 ? `<span class="badge">${chat.unread_count}</span>` : ``}
            </div>
          </div>
        `;
      }).join("");

      bindLongPress();
    }

    function bindLongPress() {
      document.querySelectorAll(".chat-item").forEach(item => {
        const chatId = item.dataset.chatId;

        const start = (event) => {
          longPressTimer = setTimeout(() => {
            openActionSheet(event, chatId);
          }, 550);
        };

        const cancel = () => {
          clearTimeout(longPressTimer);
          longPressTimer = null;
        };

        item.addEventListener("touchstart", start, { passive: true });
        item.addEventListener("touchend", cancel);
        item.addEventListener("touchmove", cancel);
        item.addEventListener("mousedown", start);
        item.addEventListener("mouseup", cancel);
        item.addEventListener("mouseleave", cancel);
      });
    }

    function openChat(conversationId) {
      window.location.href = `chat-room.html?id=${encodeURIComponent(conversationId)}`;
    }

    function openActionSheet(event, conversationId) {
      if (event) event.stopPropagation();

      const chat = allChats.find(c => c.id === conversationId);
      if (!chat) return;
      selectedChat = chat;

      const name = getDisplayName(chat);
      const initial = name.charAt(0).toUpperCase();

      sheetTitle.textContent = name;
      sheetSub.textContent = chat.last_message || "Conversation options";

      if (chat.avatar_url) {
        sheetAvatar.innerHTML = `<img src="${escapeHtml(chat.avatar_url)}" alt="${escapeHtml(name)}">`;
      } else {
        sheetAvatar.textContent = initial;
      }

      sheetArchiveBtn.textContent = chat.archived ? "Unarchive Chat" : "Archive Chat";

      sheetBackdrop.classList.add("show");
      actionSheet.classList.add("show");
    }

    function closeActionSheet() {
      selectedChat = null;
      sheetBackdrop.classList.remove("show");
      actionSheet.classList.remove("show");
    }

    function openPublicProfile() {
      if (!selectedChat?.other_user_id) return;
      window.location.href = `public-profile.html?id=${encodeURIComponent(selectedChat.other_user_id)}`;
    }

    function openVoiceCall() {
      if (!selectedChat?.other_user_id) return;
      window.location.href = `call.html?user=${encodeURIComponent(selectedChat.other_user_id)}&type=voice`;
    }

    function openVideoCall() {
      if (!selectedChat?.other_user_id) return;
      window.location.href = `call.html?user=${encodeURIComponent(selectedChat.other_user_id)}&type=video`;
    }

    function toggleArchiveSelected() {
      if (!selectedChat?.id) return;
      if (selectedChat.archived) {
        unarchiveChat(selectedChat.id);
        showNotice("Chat unarchived.", "success");
      } else {
        archiveChat(selectedChat.id);
        showNotice("Chat archived.", "success");
      }
      closeActionSheet();
      loadChats();
    }

    function deleteSelectedForMe() {
      if (!selectedChat?.id) return;
      hideChat(selectedChat.id);
      showNotice("Chat removed from your inbox.", "success");
      closeActionSheet();
      loadChats();
    }

    function subscribeRealtime() {
      if (!messagesChannel) {
        messagesChannel = supabaseClient
          .channel("chats-messages-live")
          .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "messages"
          }, async (payload) => {
            const row = payload.new || payload.old;
            if (!row?.conversation_id) return;
            if (!chatIds.has(row.conversation_id)) return;
            await loadChats();
          })
          .subscribe();
      }

      if (!membersChannel) {
        membersChannel = supabaseClient
          .channel("chats-members-live")
          .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "conversation_members"
          }, async (payload) => {
            const row = payload.new || payload.old;
            if (!row?.user_id) return;
            if (row.user_id !== currentUserId) return;
            await loadChats();
          })
          .subscribe();
      }

      if (!notificationsChannel) {
        notificationsChannel = supabaseClient
          .channel("chats-notifications-live")
          .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "notifications",
            filter: `user_id=eq.${currentUserId}`
          }, async () => {
            await loadNotificationsBadge();
          })
          .subscribe();
      }

      if (!typingChannel) {
        typingChannel = supabaseClient.channel(`typing-${currentUserId}`);

        typingChannel
          .on("broadcast", { event: "typing" }, ({ payload }) => {
            if (!payload?.conversation_id) return;
            typingMap.set(payload.conversation_id, {
              active: !!payload.active,
              user_id: payload.user_id || ""
            });
            renderChats();

            if (payload.active) {
              setTimeout(() => {
                const current = typingMap.get(payload.conversation_id);
                if (current?.user_id === payload.user_id) {
                  typingMap.delete(payload.conversation_id);
                  renderChats();
                }
              }, 4000);
            }
          })
          .subscribe();
      }
    }

    searchInput.addEventListener("input", renderChats);

    filterButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        filterButtons.forEach(x => x.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        renderChats();
      });
    });

    newChatBtn.addEventListener("click", () => {
      window.location.href = "friends.html";
    });

    sheetBackdrop.addEventListener("click", closeActionSheet);
    sheetProfileBtn.addEventListener("click", openPublicProfile);
    sheetVoiceBtn.addEventListener("click", openVoiceCall);
    sheetVideoBtn.addEventListener("click", openVideoCall);
    sheetArchiveBtn.addEventListener("click", toggleArchiveSelected);
    sheetDeleteBtn.addEventListener("click", deleteSelectedForMe);

    window.openChat = openChat;
    window.openActionSheet = openActionSheet;

    async function init() {
      try {
        const session = await requireSession();
        if (!session?.user) return;

        currentUserId = session.user.id;
        await Promise.all([
          loadTopProfile(session.user),
          loadNotificationsBadge()
        ]);

        await loadChats();
        subscribeRealtime();
      } catch (error) {
        showNotice(error.message || "Could not load chats.");
      }
    }

    init();
  </script>
</body>
</html>
