<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chats | View</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial}
body{
  background:linear-gradient(180deg,#eef4ff,#f8fbff);
  color:#111827;
  min-height:100vh;
  padding-bottom:120px
}

/* HEADER */
.header{
  position:sticky;top:0;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(10px);
  padding:14px 16px;
  z-index:10;
  border-bottom:1px solid #eee;
}
.header-top{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:10px
}
.title{font-size:22px;font-weight:800;color:#1d4ed8}
.header-actions{display:flex;gap:10px}
.icon-btn{
  width:42px;height:42px;border-radius:12px;border:none;
  background:#fff;box-shadow:0 8px 20px rgba(0,0,0,.08);
  cursor:pointer;font-size:18px
}

/* SEARCH */
.search{
  display:flex;align-items:center;
  background:#fff;border-radius:14px;padding:10px 12px;
  box-shadow:0 5px 20px rgba(0,0,0,.06)
}
.search input{
  flex:1;border:none;outline:none;font-size:14px
}

/* CHAT LIST */
.wrap{padding:16px}
.chat{
  display:flex;align-items:center;justify-content:space-between;
  background:#fff;padding:12px;border-radius:16px;
  margin-bottom:12px;cursor:pointer;
  box-shadow:0 8px 20px rgba(0,0,0,.05)
}
.chat-left{display:flex;gap:12px;align-items:center}
.avatar{
  width:50px;height:50px;border-radius:50%;
  background:#dbeafe;display:flex;align-items:center;justify-content:center;
  font-weight:bold;color:#1d4ed8;position:relative;overflow:hidden
}
.avatar img{width:100%;height:100%;object-fit:cover}
.online{
  width:10px;height:10px;border-radius:50%;
  background:#22c55e;position:absolute;bottom:2px;right:2px;
  border:2px solid #fff
}
.name{font-weight:700;font-size:15px}
.preview{font-size:13px;color:#6b7280}
.time{font-size:11px;color:#9ca3af}

/* FLOAT AI */
.ai-btn{
  position:fixed;right:16px;bottom:90px;
  width:55px;height:55px;border-radius:50%;
  background:#1d4ed8;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;box-shadow:0 10px 25px rgba(0,0,0,.2);
  cursor:pointer
}

/* FOOTER */
.footer{
  position:fixed;bottom:0;left:0;width:100%;
  background:#fff;display:flex;justify-content:space-around;
  padding:10px 0;border-top:1px solid #eee
}
.footer a{
  text-decoration:none;color:#6b7280;font-size:12px;
  display:flex;flex-direction:column;align-items:center
}
.footer a.active{color:#1d4ed8}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="title">Chats</div>
    <div class="header-actions">
      <button class="icon-btn" onclick="go('notifications.html')">🔔</button>
      <button class="icon-btn" onclick="go('profile.html')">👤</button>
    </div>
  </div>

  <div class="search">
    🔍 <input id="search" placeholder="Search chats..."/>
  </div>
</div>

<div class="wrap" id="chatList"></div>

<!-- AI BUTTON -->
<div class="ai-btn" onclick="go('ai.html')">🤖</div>

<!-- FOOTER -->
<div class="footer">
  <a href="home.html">🏠 Home</a>
  <a href="explore.html">🔍 Explore</a>
  <a href="chats.html" class="active">💬 Chat</a>
  <a href="calls.html">📞 Call</a>
  <a href="groups.html">👥 Group</a>
</div>

<script>
const supabase = window.supabase.createClient(
"https://ezarjrxzkqqsbyirxttg.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

let chats=[];

function go(p){window.location.href=p}

async function loadChats(){
  const {data:userData}=await supabase.auth.getUser();
  const user=userData.user;
  if(!user){location.href="login.html";return;}

  // 🔥 ONLY LOAD MY CHATS
  const {data:members}=await supabase
    .from("conversation_members")
    .select("conversation_id")
    .eq("user_id",user.id);

  const ids=members.map(x=>x.conversation_id);

  if(!ids.length){
    document.getElementById("chatList").innerHTML="No chats yet";
    return;
  }

  const {data}=await supabase
    .from("conversations_view")
    .select("*")
    .in("id",ids)
    .order("last_message_at",{ascending:false});

  chats=data||[];
  renderChats();
}

function renderChats(){
  const list=document.getElementById("chatList");
  const term=document.getElementById("search").value.toLowerCase();

  const filtered=chats.filter(c=>
    (c.other_user_name||"").toLowerCase().includes(term)
  );

  list.innerHTML=filtered.map(c=>`
    <div class="chat" onclick="openChat('${c.id}')">

      <div class="chat-left">

        <div class="avatar" onclick="event.stopPropagation();openMenu('${c.id}','${c.other_user_id}')">
          ${c.other_user_avatar
            ? `<img src="${c.other_user_avatar}">`
            : c.other_user_name?.charAt(0) || "U"}
          <div class="online"></div>
        </div>

        <div>
          <div class="name">${c.other_user_name || "User"}</div>
          <div class="preview">${c.last_message || "Start chatting..."}</div>
        </div>

      </div>

      <div class="time">${new Date(c.last_message_at).toLocaleTimeString()}</div>

    </div>
  `).join("");
}

function openChat(id){
  location.href=`chat-room.html?id=${id}`;
}

function openMenu(id,userId){
  const action=prompt("1. View Profile\n2. Delete Chat");

  if(action=="1"){
    location.href=`public-profile.html?id=${userId}`;
  }

  if(action=="2"){
    deleteChat(id);
  }
}

async function deleteChat(id){
  if(!confirm("Delete this chat?")) return;

  await supabase.from("messages").delete().eq("conversation_id",id);
  await supabase.from("conversation_members").delete().eq("conversation_id",id);
  await supabase.from("conversations").delete().eq("id",id);

  loadChats();
}

/* REALTIME */
supabase.channel('chat-live')
.on('postgres_changes',{event:'*',schema:'public',table:'messages'},loadChats)
.subscribe();

/* SEARCH */
document.getElementById("search").oninput=renderChats;

loadChats();
</script>

</body>
</html>
