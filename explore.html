<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore | View</title>
  <meta name="theme-color" content="#0b1220" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{
      background:#0b1220;
      color:#fff;
      min-height:100vh;
      padding-bottom:108px;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:18px 16px 0;
    }

    .notice{
      display:none;
      margin-bottom:16px;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      line-height:1.5;
    }
    .notice.show{display:block}
    .notice.error{background:#3b1218;color:#fca5a5}
    .notice.success{background:#0f2d20;color:#86efac}
    .notice.info{background:#10233d;color:#93c5fd}

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:16px;
    }

    .title{
      font-size:30px;
      font-weight:800;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .icon-btn{
      width:44px;
      height:44px;
      border:none;
      border-radius:14px;
      background:#121a2b;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      text-decoration:none;
      font-size:20px;
    }

    .search-wrap{
      display:flex;
      align-items:center;
      gap:10px;
      min-height:56px;
      border-radius:24px;
      background:#121a2b;
      border:1px solid #1f2937;
      padding:0 16px;
      margin-bottom:18px;
    }

    .search-wrap input{
      flex:1;
      border:none;
      outline:none;
      background:transparent;
      color:#fff;
      font-size:15px;
    }

    .search-wrap input::placeholder{
      color:#9ca3af;
    }

    .section{
      margin-bottom:22px;
    }

    .section-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .section-head h2{
      font-size:18px;
      font-weight:800;
    }

    .section-head button{
      border:none;
      background:#121a2b;
      color:#cbd5e1;
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
    }

    .users-grid{
      display:grid;
      gap:12px;
    }

    .user-card{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:20px;
      padding:14px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
    }

    .user-main{
      display:flex;
      gap:12px;
      align-items:center;
      min-width:0;
      flex:1;
      cursor:pointer;
    }

    .avatar{
      width:56px;
      height:56px;
      border-radius:50%;
      overflow:hidden;
      background:#1d4ed8;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:800;
      flex-shrink:0;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .user-info{
      min-width:0;
      flex:1;
    }

    .user-name{
      font-size:16px;
      font-weight:800;
      margin-bottom:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .user-sub{
      font-size:13px;
      color:#9ca3af;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .badge-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .mini-badge{
      background:#121a2b;
      color:#cbd5e1;
      border:1px solid #1f2937;
      border-radius:999px;
      padding:6px 10px;
      font-size:11px;
      font-weight:700;
    }

    .user-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
      flex-shrink:0;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:82px;
    }

    .btn-primary{
      background:#1d4ed8;
      color:#fff;
    }

    .btn-secondary{
      background:#121a2b;
      color:#d1d5db;
    }

    .btn-success{
      background:#22c55e;
      color:#052e16;
    }

    .empty{
      text-align:center;
      background:#111827;
      border:1px solid #1f2937;
      border-radius:24px;
      padding:28px 18px;
      color:#9ca3af;
      line-height:1.7;
      font-size:14px;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      width:min(760px, calc(100% - 20px));
      background:#0f1724;
      border:1px solid #1f2937;
      border-radius:22px;
      box-shadow:0 16px 40px rgba(0,0,0,.25);
      padding:10px 8px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      z-index:40;
    }

    .nav-btn{
      text-decoration:none;
      color:#9ca3af;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      min-height:58px;
      border-radius:16px;
      font-size:12px;
      font-weight:700;
      position:relative;
      text-align:center;
    }

    .nav-btn.active{
      background:#111f18;
      color:#22c55e;
    }

    .nav-icon{
      font-size:20px;
      line-height:1;
    }

    @media(max-width:560px){
      .title{font-size:26px}
      .user-card{align-items:flex-start;flex-direction:column}
      .user-actions{justify-content:flex-start}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="notice" class="notice"></div>

    <div class="topbar">
      <div class="title">Discover People</div>
      <div class="top-actions">
        <a class="icon-btn" href="notifications.html" title="Notifications">🔔</a>
        <a class="icon-btn" href="profile.html" title="Profile">👤</a>
      </div>
    </div>

    <div class="search-wrap">
      <span>🔍</span>
      <input id="searchInput" type="text" placeholder="Search users..." />
    </div>

    <section class="section">
      <div class="section-head">
        <h2>Suggested Users</h2>
        <button id="reloadBtn">Reload</button>
      </div>
      <div id="usersGrid" class="users-grid"></div>
    </section>
  </div>

  <nav class="bottom-nav">
    <a class="nav-btn" href="home.html">
      <span class="nav-icon">⌂</span>
      <span>Home</span>
    </a>
    <a class="nav-btn" href="friends.html">
      <span class="nav-icon">👥</span>
      <span>Friends</span>
    </a>
    <a class="nav-btn" href="home.html">
      <span class="nav-icon">📝</span>
      <span>Posts</span>
    </a>
    <a class="nav-btn" href="updates.html">
      <span class="nav-icon">📰</span>
      <span>News</span>
    </a>
    <a class="nav-btn active" href="explore.html">
      <span class="nav-icon">🛒</span>
      <span>Market Place</span>
    </a>
  </nav>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const notice = document.getElementById("notice");
    const searchInput = document.getElementById("searchInput");
    const usersGrid = document.getElementById("usersGrid");
    const reloadBtn = document.getElementById("reloadBtn");

    let currentUser = null;
    let users = [];
    let followMap = new Map();

    function showNotice(text, type = "error") {
      notice.className = `notice show ${type}`;
      notice.textContent = text;
    }

    function clearNotice() {
      notice.className = "notice";
      notice.textContent = "";
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function getCurrentUser() {
      const { data, error } = await supabase.auth.getUser();
      if (error) throw error;
      currentUser = data.user || null;
    }

    async function loadFollowRelations() {
      if (!currentUser) {
        followMap = new Map();
        return;
      }

      const { data, error } = await supabase
        .from("followers")
        .select("following_id")
        .eq("follower_id", currentUser.id);

      if (error) throw error;

      followMap = new Map((data || []).map(row => [row.following_id, true]));
    }

    async function loadUsers() {
      clearNotice();

      const { data, error } = await supabase
        .from("profiles")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) throw error;

      const all = data || [];

      users = all.filter(user => {
        if (!currentUser) return true;
        if (user.id === currentUser.id) return false;
        return !followMap.has(user.id);
      });

      renderUsers();
    }

    function renderUsers() {
      const q = searchInput.value.trim().toLowerCase();

      const filtered = users.filter(user => {
        const name = String(user.full_name || "").toLowerCase();
        const username = String(user.username || "").toLowerCase();
        const bio = String(user.bio || "").toLowerCase();
        return !q || name.includes(q) || username.includes(q) || bio.includes(q);
      });

      if (!filtered.length) {
        usersGrid.innerHTML = `<div class="empty">No suggested users found.</div>`;
        return;
      }

      usersGrid.innerHTML = filtered.map(user => `
        <div class="user-card">
          <div class="user-main" onclick="viewProfile('${user.id}')">
            <div class="avatar">
              ${user.avatar_url
                ? `<img src="${user.avatar_url}" alt="${escapeHtml(user.full_name || user.username || "User")}">`
                : escapeHtml((user.full_name || user.username || "U").charAt(0).toUpperCase())
              }
            </div>

            <div class="user-info">
              <div class="user-name">${escapeHtml(user.full_name || user.username || "User")}</div>
              <div class="user-sub">@${escapeHtml(user.username || "viewuser")}${user.bio ? " • " + escapeHtml(user.bio) : ""}</div>

              <div class="badge-row">
                <span class="mini-badge">Suggested User</span>
                ${user.is_online ? `<span class="mini-badge">Online</span>` : ``}
              </div>
            </div>
          </div>

          <div class="user-actions">
            <button class="btn btn-secondary" onclick="viewProfile('${user.id}')">Profile</button>
            <button class="btn btn-success" onclick="followUser('${user.id}')">Follow</button>
            <button class="btn btn-primary" onclick="startChat('${user.id}')">Message</button>
          </div>
        </div>
      `).join("");
    }

    async function followUser(userId) {
      if (!currentUser) {
        showNotice("Please log in first.");
        return;
      }

      try {
        clearNotice();

        const { error } = await supabase
          .from("followers")
          .insert({
            follower_id: currentUser.id,
            following_id: userId
          });

        if (error) throw error;

        showNotice("User followed successfully.", "success");
        followMap.set(userId, true);
        users = users.filter(user => user.id !== userId);
        renderUsers();
      } catch (err) {
        showNotice(err.message || "Failed to follow user.");
      }
    }

    async function startChat(userId) {
      if (!currentUser) {
        showNotice("Please log in first.");
        return;
      }

      try {
        clearNotice();

        const { data, error } = await supabase.rpc("get_or_create_conversation", {
          other_user_id: userId
        });

        if (error) throw error;
        if (!data) throw new Error("Could not create conversation.");

        window.location.href = `chat-room.html?id=${encodeURIComponent(data)}`;
      } catch (err) {
        showNotice(err.message || "Failed to start chat.");
      }
    }

    function viewProfile(userId) {
      if (!userId) return;
      window.location.href = `profile.html?user=${encodeURIComponent(userId)}`;
    }

    searchInput.addEventListener("input", renderUsers);
    reloadBtn.addEventListener("click", async () => {
      try {
        await loadFollowRelations();
        await loadUsers();
      } catch (err) {
        showNotice(err.message || "Failed to reload users.");
      }
    });

    async function init() {
      try {
        await getCurrentUser().catch(() => {});
        await loadFollowRelations();
        await loadUsers();
      } catch (err) {
        showNotice(err.message || "Failed to load users.");
      }
    }

    window.followUser = followUser;
    window.startChat = startChat;
    window.viewProfile = viewProfile;

    init();
  </script>
</body>
</html>
