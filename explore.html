<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Explore | View</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#07122a" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#061126;
      --bg2:#0a1835;
      --card:rgba(255,255,255,.08);
      --card2:rgba(255,255,255,.05);
      --stroke:rgba(255,255,255,.08);
      --text:#f8fbff;
      --muted:#9db0cf;
      --soft:#7f91af;
      --primary:#2d6bff;
      --primary2:#5c8cff;
      --green:#22c55e;
      --danger:#ef4444;
      --warning:#f59e0b;
      --shadow:0 18px 50px rgba(0,0,0,.28);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Inter,Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      min-height:100%;
      background:
        radial-gradient(circle at top right, rgba(45,107,255,.18), transparent 24%),
        radial-gradient(circle at top left, rgba(0,255,200,.06), transparent 18%),
        linear-gradient(180deg,#08142e 0%,#061126 55%,#050d1c 100%);
      color:var(--text);
    }

    body{
      padding-bottom:120px;
    }

    .wrap{
      width:min(100%,860px);
      margin:0 auto;
      padding:18px 16px 0;
    }

    .notice{
      display:none;
      margin-bottom:16px;
      padding:14px 16px;
      border-radius:18px;
      font-size:14px;
      line-height:1.6;
      border:1px solid transparent;
      backdrop-filter:blur(10px);
    }
    .notice.show{display:block}
    .notice.error{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.24);color:#ffd9d9}
    .notice.success{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.24);color:#ddffe8}
    .notice.info{background:rgba(45,107,255,.14);border-color:rgba(45,107,255,.26);color:#dce8ff}

    .hero{
      position:relative;
      overflow:hidden;
      background:
        linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.05)),
        linear-gradient(135deg, rgba(45,107,255,.16), rgba(92,140,255,.06));
      border:1px solid rgba(255,255,255,.08);
      border-radius:30px;
      padding:18px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      margin-bottom:18px;
    }

    .hero::after{
      content:"";
      position:absolute;
      top:-70px;
      right:-70px;
      width:180px;
      height:180px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(92,140,255,.30), transparent 66%);
      pointer-events:none;
    }

    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
      position:relative;
      z-index:1;
      flex-wrap:wrap;
    }

    .top-left,.top-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .dashboard-btn,.icon-btn{
      min-height:46px;
      border:none;
      border-radius:18px;
      padding:0 16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      text-decoration:none;
      color:#fff;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }

    .dashboard-btn{
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      box-shadow:0 12px 28px rgba(45,107,255,.28);
    }

    .icon-btn{
      width:46px;
      min-width:46px;
      padding:0;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 10px 24px rgba(0,0,0,.18);
      position:relative;
      overflow:hidden;
    }

    .brand h1{
      font-size:32px;
      font-weight:900;
      line-height:1;
      letter-spacing:-.03em;
      margin-bottom:4px;
    }

    .brand p{
      color:#bfd0ea;
      font-size:13px;
    }

    .notif-dot{
      position:absolute;
      right:10px;
      top:10px;
      width:8px;
      height:8px;
      border-radius:50%;
      background:#ff4d67;
      display:none;
      box-shadow:0 0 0 4px rgba(255,77,103,.18);
    }
    .notif-dot.show{display:block}

    .profile-btn-img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      border-radius:18px;
    }

    .profile-btn-fallback{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,var(--primary),#7da2ff);
      color:#fff;
      font-size:18px;
      font-weight:900;
      border-radius:18px;
    }

    .hero-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      position:relative;
      z-index:1;
      margin-top:8px;
    }

    .hero-chip{
      min-height:36px;
      padding:0 12px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:#dce8ff;
      font-size:12px;
      font-weight:800;
    }

    .card{
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      padding:18px 16px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
      margin-bottom:18px;
    }

    .search-wrap{
      display:flex;
      align-items:center;
      gap:10px;
      min-height:56px;
      padding:0 16px;
      border-radius:18px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
    }

    .search-wrap span{
      font-size:18px;
      color:#bfd0ea;
    }

    .search-wrap input{
      flex:1;
      border:none;
      outline:none;
      background:transparent;
      font-size:15px;
      color:#fff;
    }

    .search-wrap input::placeholder{
      color:#9db1d1;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    .stat{
      border-radius:22px;
      padding:16px 14px;
      text-align:center;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 12px 30px rgba(2,8,23,.16);
    }

    .stat h3{
      font-size:24px;
      font-weight:900;
      margin-bottom:6px;
      color:#fff;
    }

    .stat p{
      font-size:12px;
      color:#bfd0ea;
      font-weight:800;
    }

    .section-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .section-head h2{
      font-size:20px;
      font-weight:900;
      letter-spacing:-.02em;
    }

    .action-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .refresh-btn{
      border:none;
      border-radius:999px;
      padding:10px 14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:#dce8ff;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }

    .filter-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .filter-btn{
      border:none;
      border-radius:999px;
      padding:10px 14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:#dce8ff;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }

    .filter-btn.active{
      background:rgba(45,107,255,.18);
      color:#fff;
      border-color:rgba(45,107,255,.20);
    }

    .users-grid{
      display:grid;
      gap:14px;
    }

    .user-card{
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      border-radius:24px;
      padding:16px;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 12px 30px rgba(2,8,23,.18);
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:center;
      transition:.18s ease;
    }

    .user-card:hover{
      transform:translateY(-1px);
    }

    .user-main{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
      cursor:pointer;
    }

    .avatar{
      width:58px;
      height:58px;
      min-width:58px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--primary),#7da2ff);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      font-weight:900;
      overflow:hidden;
      box-shadow:0 10px 24px rgba(45,107,255,.22);
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .user-meta{
      min-width:0;
      flex:1;
    }

    .user-topline{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:2px;
    }

    .user-name{
      font-size:16px;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:24px;
      padding:0 10px;
      border-radius:999px;
      background:rgba(45,107,255,.18);
      color:#dce8ff;
      font-size:10px;
      font-weight:900;
      border:1px solid rgba(45,107,255,.20);
      text-transform:uppercase;
    }

    .user-username{
      font-size:13px;
      color:#9db1d1;
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .user-bio{
      font-size:13px;
      color:#dce8ff;
      margin-top:8px;
      line-height:1.7;
    }

    .user-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:10px 14px;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      color:#fff;
    }

    .btn-follow{
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      box-shadow:0 10px 22px rgba(45,107,255,.22);
    }

    .btn-chat{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:#dce8ff;
    }

    .btn-following{
      background:rgba(34,197,94,.14);
      border:1px solid rgba(34,197,94,.18);
      color:#ddffe8;
    }

    .btn-profile{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:#dce8ff;
    }

    .btn-call{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:#dce8ff;
    }

    .empty-state{
      text-align:center;
      padding:30px 16px;
      color:#bfd0ea;
      font-size:14px;
      line-height:1.8;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      box-shadow:var(--shadow);
    }

    .loading{
      text-align:center;
      padding:24px 16px;
      color:#bfd0ea;
      font-size:14px;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      width:min(760px, calc(100% - 20px));
      background:rgba(7,18,43,.94);
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      box-shadow:0 20px 50px rgba(15,23,42,.24);
      padding:10px 8px calc(10px + env(safe-area-inset-bottom));
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      z-index:50;
      backdrop-filter:blur(18px);
    }

    .nav-btn{
      text-decoration:none;
      color:#90a5c7;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      min-height:58px;
      border-radius:16px;
      font-size:12px;
      font-weight:800;
      text-align:center;
    }

    .nav-btn.active{
      background:linear-gradient(135deg, rgba(45,107,255,.24), rgba(92,140,255,.10));
      color:#fff;
      border:1px solid rgba(45,107,255,.20);
    }

    .nav-icon{
      font-size:20px;
      line-height:1;
    }

    @media(max-width:640px){
      .wrap{padding:14px 12px 0}
      .brand h1{font-size:28px}
      .user-card{flex-direction:column;align-items:flex-start}
      .user-actions{justify-content:flex-start}
      .stats{grid-template-columns:1fr}
      .topbar{flex-direction:column;align-items:flex-start}
      .top-left,.top-right{width:100%}
      .top-right .icon-btn,.top-left .dashboard-btn{flex:1}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="notice" class="notice"></div>

    <section class="hero">
      <div class="topbar">
        <div class="top-left">
          <a class="dashboard-btn" href="dashboard.html">Dashboard</a>
        </div>

        <div class="brand">
          <h1>Explore</h1>
          <p>Suggested friends, discovery, and public profiles</p>
        </div>

        <div class="top-right">
          <a class="icon-btn" href="notifications.html" title="Notifications" aria-label="Notifications">
            🔔
            <span id="notifDot" class="notif-dot"></span>
          </a>

          <a id="topProfileBtn" class="icon-btn" href="profile.html" title="Profile" aria-label="Profile">
            <div class="profile-btn-fallback">U</div>
          </a>
        </div>
      </div>

      <div class="hero-row">
        <span class="hero-chip" id="statusChip">People discovery active</span>
        <span class="hero-chip" id="followingChip">Following: 0</span>
        <span class="hero-chip" id="suggestedChip">Suggested: 0</span>
      </div>
    </section>

    <section class="card">
      <div class="search-wrap">
        <span>🔎</span>
        <input type="text" id="searchInput" placeholder="Search username, full name, bio..." />
      </div>
    </section>

    <section class="card">
      <div class="stats">
        <div class="stat">
          <h3 id="allCount">0</h3>
          <p>All Users</p>
        </div>
        <div class="stat">
          <h3 id="suggestedCount">0</h3>
          <p>Suggested Friends</p>
        </div>
        <div class="stat">
          <h3 id="followingCount">0</h3>
          <p>Following</p>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>People</h2>
        <div class="action-row">
          <button id="refreshBtn" class="refresh-btn" type="button">Refresh</button>
        </div>
      </div>

      <div class="filter-row">
        <button class="filter-btn active" data-filter="all" type="button">All Users</button>
        <button class="filter-btn" data-filter="suggested" type="button">Suggested</button>
        <button class="filter-btn" data-filter="following" type="button">Following</button>
      </div>

      <div id="usersGrid" class="users-grid">
        <div class="loading">Loading users...</div>
      </div>
    </section>
  </div>

  <nav class="bottom-nav">
    <a class="nav-btn" href="home.html">
      <span class="nav-icon">⌂</span>
      <span>Home</span>
    </a>
    <a class="nav-btn active" href="explore.html">
      <span class="nav-icon">📰</span>
      <span>News</span>
    </a>
    <a class="nav-btn" href="video-feed.html">
      <span class="nav-icon">🎥</span>
      <span>Video</span>
    </a>
    <a class="nav-btn" href="marketplace.html">
      <span class="nav-icon">🛒</span>
      <span>Market</span>
    </a>
    <a class="nav-btn" href="more.html">
      <span class="nav-icon">☰</span>
      <span>More</span>
    </a>
  </nav>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        flowType: "pkce"
      }
    });

    const noticeBox = document.getElementById("notice");
    const usersGrid = document.getElementById("usersGrid");
    const searchInput = document.getElementById("searchInput");
    const refreshBtn = document.getElementById("refreshBtn");
    const filterButtons = document.querySelectorAll(".filter-btn");
    const allCount = document.getElementById("allCount");
    const suggestedCount = document.getElementById("suggestedCount");
    const followingCount = document.getElementById("followingCount");
    const notifDot = document.getElementById("notifDot");
    const topProfileBtn = document.getElementById("topProfileBtn");
    const followingChip = document.getElementById("followingChip");
    const suggestedChip = document.getElementById("suggestedChip");

    let currentUserId = "";
    let currentUserProfile = null;
    let allUsers = [];
    let followingIds = new Set();
    let currentFilter = "all";
    let followersChannel = null;
    let profilesChannel = null;
    let notificationsChannel = null;

    function showNotice(message, type = "error") {
      noticeBox.className = `notice show ${type}`;
      noticeBox.textContent = message;
    }

    function clearNotice() {
      noticeBox.className = "notice";
      noticeBox.textContent = "";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getDisplayName(user) {
      return user.full_name || user.username || "User";
    }

    function updateStats() {
      const suggested = allUsers.filter(u => !followingIds.has(u.id));
      allCount.textContent = allUsers.length;
      suggestedCount.textContent = suggested.length;
      followingCount.textContent = allUsers.filter(u => followingIds.has(u.id)).length;
      followingChip.textContent = `Following: ${followingCount.textContent}`;
      suggestedChip.textContent = `Suggested: ${suggestedCount.textContent}`;
    }

    async function getLoggedInUser() {
      const { data, error } = await supabaseClient.auth.getUser();
      if (error) throw error;
      return data.user || null;
    }

    async function requireUser() {
      const user = await getLoggedInUser();
      if (!user) {
        showNotice("Please log in first.");
        setTimeout(() => {
          window.location.href = "login.html?next=explore.html";
        }, 1000);
        return null;
      }
      return user;
    }

    function setTopProfileImage(profile, authUser) {
      const avatarUrl =
        profile?.avatar_url ||
        authUser?.user_metadata?.avatar_url ||
        authUser?.user_metadata?.picture ||
        "";
      const fullName =
        profile?.full_name ||
        authUser?.user_metadata?.full_name ||
        authUser?.user_metadata?.name ||
        authUser?.email?.split("@")[0] ||
        "User";

      const initial = fullName.charAt(0).toUpperCase();

      if (avatarUrl) {
        topProfileBtn.innerHTML = `<img src="${escapeHtml(avatarUrl)}" alt="Profile" class="profile-btn-img">`;
      } else {
        topProfileBtn.innerHTML = `<div class="profile-btn-fallback">${escapeHtml(initial)}</div>`;
      }
    }

    async function loadProfileForTop(authUser) {
      const { data } = await supabaseClient
        .from("profiles")
        .select("id,full_name,username,avatar_url")
        .eq("id", currentUserId)
        .maybeSingle();

      currentUserProfile = data || null;
      setTopProfileImage(currentUserProfile, authUser);
    }

    async function loadNotificationsBadge() {
      try {
        const { count, error } = await supabaseClient
          .from("notifications")
          .select("*", { count: "exact", head: true })
          .eq("user_id", currentUserId)
          .eq("is_read", false);

        if (!error) {
          notifDot.classList.toggle("show", Number(count || 0) > 0);
        }
      } catch {}
    }

    async function loadFollowing() {
      const { data, error } = await supabaseClient
        .from("followers")
        .select("following_id")
        .eq("follower_id", currentUserId);

      if (error) throw error;

      followingIds = new Set((data || []).map(row => row.following_id));
      updateStats();
    }

    async function loadUsers() {
      clearNotice();

      const { data, error } = await supabaseClient
        .from("profiles")
        .select("id, username, full_name, avatar_url, bio")
        .order("created_at", { ascending: false });

      if (error) {
        showNotice(error.message || "Could not load users.");
        usersGrid.innerHTML = `<div class="empty-state">Could not load users.</div>`;
        return;
      }

      allUsers = (data || []).filter(user => user.id !== currentUserId);
      updateStats();
      renderUsers();
    }

    function getFilteredUsers() {
      const term = searchInput.value.trim().toLowerCase();
      let source = [...allUsers];

      if (currentFilter === "suggested") {
        source = source.filter(user => !followingIds.has(user.id));
      } else if (currentFilter === "following") {
        source = source.filter(user => followingIds.has(user.id));
      }

      return source.filter(user => {
        const username = String(user.username || "").toLowerCase();
        const fullName = String(user.full_name || "").toLowerCase();
        const bio = String(user.bio || "").toLowerCase();
        return username.includes(term) || fullName.includes(term) || bio.includes(term);
      });
    }

    function renderUsers() {
      const filtered = getFilteredUsers();

      if (!filtered.length) {
        usersGrid.innerHTML = `
          <div class="empty-state">
            No users found.<br>
            Try another search or refresh your suggested friends list.
          </div>
        `;
        return;
      }

      usersGrid.innerHTML = filtered.map(user => {
        const displayName = getDisplayName(user);
        const avatar = user.avatar_url
          ? `<img src="${escapeHtml(user.avatar_url)}" alt="${escapeHtml(displayName)}">`
          : escapeHtml(displayName.charAt(0).toUpperCase());

        const isFollowing = followingIds.has(user.id);

        return `
          <div class="user-card">
            <div class="user-main" onclick="openProfile('${escapeHtml(user.id)}')">
              <div class="avatar">${avatar}</div>

              <div class="user-meta">
                <div class="user-topline">
                  <div class="user-name">${escapeHtml(displayName)}</div>
                  ${!isFollowing ? `<span class="tag">Suggested</span>` : `<span class="tag">Following</span>`}
                </div>
                <div class="user-username">@${escapeHtml(user.username || "user")}</div>
                ${user.bio ? `<div class="user-bio">${escapeHtml(user.bio)}</div>` : ``}
              </div>
            </div>

            <div class="user-actions">
              <button class="btn btn-profile" onclick="openProfileFromBtn(event, '${escapeHtml(user.id)}')">Profile</button>

              <button
                class="btn ${isFollowing ? "btn-following" : "btn-follow"}"
                onclick="toggleFollow(event, '${escapeHtml(user.id)}')"
              >
                ${isFollowing ? "Following" : "Follow"}
              </button>

              <button class="btn btn-chat" onclick="startChat(event, '${escapeHtml(user.id)}')">Message</button>
              <button class="btn btn-call" onclick="startCall(event, '${escapeHtml(user.id)}')">Call</button>
            </div>
          </div>
        `;
      }).join("");
    }

    async function toggleFollow(event, userId) {
      event.stopPropagation();

      try {
        clearNotice();

        const user = await requireUser();
        if (!user) return;

        currentUserId = user.id;

        if (followingIds.has(userId)) {
          const { error } = await supabaseClient
            .from("followers")
            .delete()
            .eq("follower_id", currentUserId)
            .eq("following_id", userId);

          if (error) throw error;

          followingIds.delete(userId);
          showNotice("Unfollowed successfully.", "success");
        } else {
          const { error } = await supabaseClient
            .from("followers")
            .insert({
              follower_id: currentUserId,
              following_id: userId
            });

          if (error) throw error;

          followingIds.add(userId);
          showNotice("Followed successfully.", "success");
        }

        updateStats();
        renderUsers();
      } catch (error) {
        showNotice(error.message || "Could not update follow.");
      }
    }

    async function startChat(event, userId) {
      event.stopPropagation();

      try {
        clearNotice();

        const user = await getLoggedInUser();
        if (!user) {
          showNotice("User not authenticated");
          setTimeout(() => {
            window.location.href = "login.html?next=explore.html";
          }, 1000);
          return;
        }

        const meUserId = user.id;

        if (!meUserId) {
          showNotice("Current user ID is missing");
          return;
        }

        if (!userId) {
          showNotice("Target user ID is missing");
          return;
        }

        if (meUserId === userId) {
          showNotice("You cannot chat with yourself");
          return;
        }

        const { data, error } = await supabaseClient.rpc("get_or_create_conversation", {
          me_user_id: meUserId,
          other_user_id: userId
        });

        if (error) throw error;
        if (!data) {
          showNotice("Conversation not created");
          return;
        }

        window.location.href = `chat-room.html?id=${encodeURIComponent(data)}`;
      } catch (err) {
        showNotice(err.message || "Could not start chat.");
      }
    }

    function startCall(event, userId) {
      event.stopPropagation();
      window.location.href = `call.html?user=${encodeURIComponent(userId)}&type=voice`;
    }

    function openProfile(userId) {
      window.location.href = `public-profile.html?id=${encodeURIComponent(userId)}`;
    }

    function openProfileFromBtn(event, userId) {
      event.stopPropagation();
      openProfile(userId);
    }

    function subscribeRealtime() {
      if (!followersChannel) {
        followersChannel = supabaseClient
          .channel("explore-followers-live")
          .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "followers"
          }, async () => {
            if (!currentUserId) return;
            await loadFollowing();
            renderUsers();
          })
          .subscribe();
      }

      if (!profilesChannel) {
        profilesChannel = supabaseClient
          .channel("explore-profiles-live")
          .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "profiles"
          }, async () => {
            if (!currentUserId) return;
            await loadUsers();
          })
          .subscribe();
      }

      if (!notificationsChannel) {
        notificationsChannel = supabaseClient
          .channel("explore-notifications-live")
          .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "notifications",
            filter: `user_id=eq.${currentUserId}`
          }, async () => {
            await loadNotificationsBadge();
          })
          .subscribe();
      }
    }

    async function init() {
      try {
        clearNotice();

        const user = await requireUser();
        if (!user) return;

        currentUserId = user.id;

        await Promise.all([
          loadProfileForTop(user),
          loadFollowing(),
          loadUsers(),
          loadNotificationsBadge()
        ]);

        subscribeRealtime();
      } catch (error) {
        showNotice(error.message || "Could not load explore.");
      }
    }

    searchInput.addEventListener("input", renderUsers);
    refreshBtn.addEventListener("click", init);

    filterButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        filterButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        renderUsers();
      });
    });

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (!session?.user) {
        showNotice("You have been logged out.");
        setTimeout(() => {
          window.location.href = "login.html?next=explore.html";
        }, 1000);
      }
    });

    window.toggleFollow = toggleFollow;
    window.startChat = startChat;
    window.startCall = startCall;
    window.openProfile = openProfile;
    window.openProfileFromBtn = openProfileFromBtn;

    init();
  </script>
</body>
</html>
