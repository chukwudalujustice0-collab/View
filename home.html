<!DOCTYPE html>
<html lang="en" class="auth-loading">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Home | View</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0d2d86" />

  <script>document.documentElement.classList.add("auth-loading");</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/push-helper.js"></script>

  <style>
    html.auth-loading,
    html.auth-loading body{
      visibility:hidden;
      opacity:0;
    }

    :root{
      --bg:#0a2b84;
      --bg2:#0b2f91;
      --bg3:#08246f;
      --panel:rgba(255,255,255,.07);
      --panel-2:rgba(255,255,255,.10);
      --line:rgba(255,255,255,.11);
      --line-2:rgba(255,255,255,.16);
      --text:#ffffff;
      --muted:#d7e5ff;
      --soft:#afc6ff;
      --accent:#ff4f67;
      --accent-2:#ff6a7e;
      --blue:#4f93ff;
      --blue-2:#77afff;
      --ok:#22c55e;
      --safe-top:env(safe-area-inset-top, 0px);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
      --radius:18px;
      --radius-sm:14px;
      --radius-xs:12px;
      --shadow:0 8px 20px rgba(0,0,0,.18);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      margin:0;
      padding:0;
      font-family:Inter, Arial, sans-serif;
    }

    html,body{
      min-height:100%;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.07), transparent 18%),
        radial-gradient(circle at bottom right, rgba(255,82,102,.10), transparent 20%),
        linear-gradient(180deg,#11378f 0%, #0b2f8f 35%, #092a85 100%);
      color:var(--text);
    }

    body{
      overflow-x:hidden;
      padding-bottom:88px;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button,
    input,
    textarea{
      outline:none;
      border:none;
      background:none;
      color:inherit;
    }

    button{
      cursor:pointer;
    }

    .app{
      width:min(100%, 720px);
      margin:0 auto;
      position:relative;
    }

    .notice{
      position:sticky;
      top:calc(var(--safe-top) + 8px);
      z-index:90;
      display:none;
      margin:8px 10px 0;
      padding:10px 12px;
      border-radius:14px;
      font-size:12px;
      line-height:1.45;
      backdrop-filter:blur(8px);
      border:1px solid transparent;
    }

    .notice.show{display:block}
    .notice.error{background:rgba(239,68,68,.16); border-color:rgba(239,68,68,.22); color:#ffe2e5}
    .notice.success{background:rgba(34,197,94,.16); border-color:rgba(34,197,94,.22); color:#e5ffed}
    .notice.info{background:rgba(59,130,246,.16); border-color:rgba(59,130,246,.22); color:#e8f1ff}

    .topbar{
      position:sticky;
      top:0;
      z-index:70;
      padding:calc(10px + var(--safe-top)) 12px 10px;
      background:
        linear-gradient(180deg, rgba(10,43,132,.98), rgba(10,43,132,.94));
      backdrop-filter:blur(12px);
    }

    .topbar-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      flex:1;
    }

    .brand-avatar{
      position:relative;
      width:46px;
      height:46px;
      min-width:46px;
      border-radius:50%;
      overflow:hidden;
      border:2px solid rgba(255,255,255,.25);
      background:linear-gradient(135deg, rgba(255,255,255,.20), rgba(255,255,255,.06));
    }

    .brand-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .brand-avatar .fallback{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      font-weight:900;
      color:#fff;
      background:linear-gradient(135deg,#5a99ff,#ff5f78);
    }

    .online-dot{
      position:absolute;
      right:0;
      bottom:0;
      width:14px;
      height:14px;
      border-radius:50%;
      background:#53df6d;
      border:2px solid #0d2d86;
    }

    .brand-title{
      font-size:18px;
      font-weight:1000;
      letter-spacing:-.04em;
      display:flex;
      align-items:flex-end;
      gap:2px;
      line-height:1;
    }

    .brand-title .main{
      font-size:20px;
      font-weight:1000;
    }

    .brand-title .dot{
      color:var(--accent);
      font-size:22px;
      line-height:.8;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-shrink:0;
    }

    .icon-link{
      position:relative;
      width:38px;
      height:38px;
      min-width:38px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      color:#fff;
      font-size:20px;
    }

    .badge{
      position:absolute;
      top:-2px;
      right:-1px;
      min-width:18px;
      height:18px;
      padding:0 5px;
      display:none;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      background:var(--accent);
      color:#fff;
      font-size:10px;
      font-weight:900;
      border:2px solid #0c2b84;
    }

    .badge.show{display:flex}

    .composer-shell{
      display:flex;
      align-items:center;
      gap:10px;
      min-height:48px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(255,255,255,.09);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
    }

    .search-ico{
      font-size:19px;
      color:#fff;
      opacity:.95;
      flex-shrink:0;
    }

    .composer-input{
      flex:1;
      min-width:0;
      font-size:13px;
      font-weight:700;
      color:#fff;
      background:transparent;
    }

    .composer-input::placeholder{
      color:#edf4ff;
      opacity:.9;
    }

    .composer-plus{
      width:34px;
      height:34px;
      min-width:34px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg,#61a2ff,#4a86f7);
      color:#fff;
      font-size:24px;
      font-weight:700;
      box-shadow:0 6px 14px rgba(61,125,255,.25);
    }

    .page{
      padding:8px 0 0;
    }

    .stories-strip{
      display:flex;
      gap:8px;
      overflow-x:auto;
      scrollbar-width:none;
      padding:0 10px 10px;
    }

    .stories-strip::-webkit-scrollbar{display:none}

    .story-card{
      position:relative;
      flex:0 0 120px;
      width:120px;
      height:118px;
      border-radius:18px;
      overflow:hidden;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
    }

    .story-card img,
    .story-card video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#16357f;
    }

    .story-gradient{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.02), rgba(0,0,0,.45));
    }

    .story-create{
      background:
        radial-gradient(circle at top left, rgba(128,198,255,.35), transparent 38%),
        radial-gradient(circle at bottom center, rgba(255,80,110,.28), transparent 42%),
        linear-gradient(180deg,#2f6dff 0%,#2455d6 45%,#fa4967 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:12px;
    }

    .story-create-inner{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      width:100%;
      height:100%;
    }

    .story-create-plus{
      width:48px;
      height:48px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.95);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:32px;
      line-height:1;
      color:#fff;
    }

    .story-create-text{
      font-size:13px;
      font-weight:900;
      line-height:1.2;
      text-shadow:0 2px 8px rgba(0,0,0,.18);
    }

    .story-avatar{
      position:absolute;
      left:8px;
      top:8px;
      width:26px;
      height:26px;
      border-radius:50%;
      overflow:hidden;
      border:2px solid rgba(255,255,255,.95);
      background:#2549b8;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:900;
    }

    .story-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .story-badge{
      position:absolute;
      left:8px;
      bottom:8px;
      right:8px;
      z-index:2;
      font-size:11px;
      font-weight:800;
      line-height:1.2;
      color:#fff;
      text-shadow:0 2px 8px rgba(0,0,0,.38);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .trending-strip{
      display:flex;
      gap:8px;
      overflow-x:auto;
      scrollbar-width:none;
      padding:0 10px 12px;
    }

    .trending-strip::-webkit-scrollbar{display:none}

    .trending-card{
      position:relative;
      flex:0 0 150px;
      width:150px;
      height:130px;
      border-radius:18px;
      overflow:hidden;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
    }

    .trending-card img,
    .trending-card video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#16357f;
    }

    .trending-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.05), rgba(0,0,0,.58));
    }

    .trending-meta{
      position:absolute;
      left:10px;
      right:10px;
      bottom:10px;
      z-index:2;
    }

    .trending-title{
      font-size:12px;
      font-weight:900;
      line-height:1.25;
      color:#fff;
      margin-bottom:4px;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
      text-shadow:0 2px 8px rgba(0,0,0,.35);
    }

    .trending-sub{
      font-size:10px;
      font-weight:800;
      color:#eaf2ff;
      opacity:.95;
    }

    .popular-wrap{
      padding:0 10px 12px;
    }

    .popular-card{
      position:relative;
      border-radius:18px;
      overflow:hidden;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
    }

    .popular-card img,
    .popular-card video{
      width:100%;
      max-height:320px;
      object-fit:cover;
      display:block;
      background:#16357f;
    }

    .popular-body{
      padding:12px;
    }

    .popular-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .popular-user{
      display:flex;
      gap:10px;
      align-items:flex-start;
      min-width:0;
      flex:1;
    }

    .popular-avatar{
      width:42px;
      height:42px;
      min-width:42px;
      border-radius:50%;
      overflow:hidden;
      background:linear-gradient(135deg,#568eff,#fd5874);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:15px;
      font-weight:900;
      color:#fff;
      border:1px solid rgba(255,255,255,.16);
    }

    .popular-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .popular-name{
      font-size:14px;
      font-weight:1000;
      color:#fff;
      line-height:1.2;
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
    }

    .popular-time{
      font-size:11px;
      color:var(--muted);
      margin-top:3px;
    }

    .popular-text{
      font-size:13px;
      line-height:1.5;
      color:#fff;
      margin-bottom:10px;
      white-space:pre-wrap;
    }

    .popular-stats{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      font-size:12px;
      color:#edf4ff;
    }

    .inline-comments{
      display:none;
      padding:10px 12px 12px;
      border-top:1px solid var(--line);
      gap:10px;
      flex-direction:column;
    }

    .inline-comments.show{
      display:flex;
    }

    .inline-comment-list{
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:220px;
      overflow:auto;
    }

    .inline-comment-item{
      font-size:12px;
      line-height:1.45;
      color:#eef4ff;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:9px 10px;
    }

    .inline-comment-item strong{
      color:#fff;
    }

    .inline-comment-form{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .inline-comment-input{
      flex:1;
      min-height:40px;
      border-radius:999px;
      padding:0 12px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      color:#fff;
      font-size:12px;
    }

    .inline-comment-input::placeholder{
      color:#eaf2ff;
      opacity:.86;
    }

    .inline-comment-send{
      min-width:72px;
      height:40px;
      border-radius:999px;
      background:linear-gradient(180deg,#5ea2ff,#4a86f7);
      color:#fff;
      font-size:12px;
      font-weight:900;
      box-shadow:0 6px 14px rgba(74,134,247,.22);
    }

    .feed{
      display:block;
    }

    .feed-skeleton{
      padding:10px 12px 18px;
      border-top:1px solid var(--line);
    }

    .skeleton-line,
    .skeleton-block,
    .skeleton-circle{
      background:linear-gradient(90deg, rgba(255,255,255,.08), rgba(255,255,255,.16), rgba(255,255,255,.08));
      background-size:200% 100%;
      animation:shimmer 1.2s linear infinite;
    }

    .skeleton-head{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }

    .skeleton-circle{
      width:42px;
      height:42px;
      border-radius:50%;
      flex-shrink:0;
    }

    .skeleton-meta{
      flex:1;
      min-width:0;
    }

    .skeleton-line{
      height:11px;
      border-radius:999px;
      margin-bottom:8px;
    }

    .skeleton-line.short{width:35%}
    .skeleton-line.mid{width:58%}
    .skeleton-block{
      width:100%;
      height:210px;
      border-radius:16px;
    }

    @keyframes shimmer{
      0%{background-position:200% 0}
      100%{background-position:-200% 0}
    }

    .post{
      position:relative;
      padding:12px 12px 0;
      border-top:1px solid var(--line);
    }

    .post:first-child{
      border-top:1px solid var(--line);
    }

    .post-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .post-user{
      display:flex;
      gap:10px;
      align-items:flex-start;
      min-width:0;
      flex:1;
    }

    .post-avatar{
      width:44px;
      height:44px;
      min-width:44px;
      border-radius:50%;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.16);
      background:linear-gradient(135deg,#568eff,#fd5874);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:15px;
      font-weight:900;
      color:#fff;
    }

    .post-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .post-meta{
      min-width:0;
      flex:1;
    }

    .post-name-row{
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
      margin-bottom:2px;
    }

    .post-name{
      font-size:14px;
      font-weight:1000;
      color:#fff;
      line-height:1.2;
      word-break:break-word;
    }

    .verify{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:20px;
      height:20px;
      border-radius:50%;
      background:#2d8cff;
      color:#fff;
      font-size:12px;
      font-weight:900;
      box-shadow:0 4px 10px rgba(45,140,255,.28);
    }

    .post-sub{
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
      font-size:11px;
      color:var(--muted);
      line-height:1.3;
    }

    .post-actions-top{
      display:flex;
      align-items:center;
      gap:8px;
      flex-shrink:0;
    }

    .follow-btn{
      min-height:28px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(255,255,255,.09);
      border:1px solid rgba(255,255,255,.14);
      color:#fff;
      font-size:11px;
      font-weight:900;
    }

    .menu-btn{
      width:32px;
      height:32px;
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      color:#edf4ff;
    }

    .menu-wrap{
      position:relative;
    }

    .menu-popup{
      position:absolute;
      right:0;
      top:36px;
      min-width:150px;
      border-radius:14px;
      overflow:hidden;
      background:#11337f;
      border:1px solid rgba(255,255,255,.11);
      display:none;
      z-index:10;
      box-shadow:0 14px 28px rgba(0,0,0,.26);
    }

    .menu-popup.show{display:block}

    .menu-popup button{
      width:100%;
      padding:11px 12px;
      text-align:left;
      font-size:12px;
      font-weight:700;
      color:#fff;
      border-top:1px solid rgba(255,255,255,.06);
    }

    .menu-popup button:first-child{
      border-top:none;
    }

    .post-text{
      font-size:13px;
      line-height:1.52;
      color:#fff;
      white-space:pre-wrap;
      margin-bottom:10px;
    }

    .see-more{
      display:inline-flex;
      margin-left:6px;
      color:#eef4ff;
      opacity:.9;
      font-weight:800;
      font-size:13px;
    }

    .media-shell{
      position:relative;
      margin-left:-12px;
      margin-right:-12px;
      margin-bottom:8px;
    }

    .media-track{
      display:flex;
      overflow-x:auto;
      scroll-snap-type:x mandatory;
      scrollbar-width:none;
      gap:2px;
    }

    .media-track::-webkit-scrollbar{display:none}

    .media-item{
      position:relative;
      flex:0 0 100%;
      width:100%;
      scroll-snap-align:start;
      background:#081b56;
    }

    .media-item img,
    .media-item video{
      width:100%;
      display:block;
      object-fit:cover;
      background:#081b56;
    }

    .media-item.video img,
    .media-item.video video{
      height:min(78vh, 680px);
    }

    .media-item.image img{
      max-height:min(72vh, 680px);
      min-height:260px;
    }

    .caption-overlay{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      padding:14px 12px 12px;
      background:linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.60));
      pointer-events:none;
    }

    .caption-overlay-text{
      font-size:12px;
      line-height:1.5;
      font-weight:700;
      color:#fff;
      text-shadow:0 2px 10px rgba(0,0,0,.34);
      white-space:pre-wrap;
      word-break:break-word;
    }

    .post-stats{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-size:12px;
      color:#edf4ff;
      padding:6px 0 10px;
    }

    .post-stats-left,
    .post-stats-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      min-width:0;
    }

    .stat-chip{
      display:flex;
      align-items:center;
      gap:5px;
      white-space:nowrap;
    }

    .reactions-row{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
      margin:0 -12px;
    }

    .reaction-btn{
      min-height:42px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      font-size:12px;
      font-weight:800;
      color:#eef4ff;
    }

    .reaction-btn.active{
      color:#8dc0ff;
    }

    .quick-comments{
      display:flex;
      gap:8px;
      overflow-x:auto;
      scrollbar-width:none;
      padding:10px 0 12px;
    }

    .quick-comments::-webkit-scrollbar{display:none}

    .quick-chip{

    function showNotice(message, type = "info", duration = 2600) {

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    const memoryCache = new Map();

    function setCache(key, value, ttl = 90000, persist = false) {
      const record = {
        expires: Date.now() + ttl,
        value
      };

      memoryCache.set(key, record);

      if (!persist) return;

      try {
        localStorage.setItem(key, JSON.stringify(record));
      } catch {}
    }

    function getCache(key) {
      const inMemory = memoryCache.get(key);
      if (inMemory && inMemory.expires > Date.now()) {
        return inMemory.value ?? null;
      }

      try {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed?.expires || Date.now() > parsed.expires) {
          localStorage.removeItem(key);
          return null;
        }
        memoryCache.set(key, parsed);
        return parsed.value ?? null;
      } catch {
        return null;
      }
    }

    function formatTime(value) {
      if (!value) return "Now";
      const d = new Date(value);
      const diff = Date.now() - d.getTime();
      const mins = Math.floor(diff / 60000);
      const hrs = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);

      if (mins < 1) return "Now";
      if (mins < 60) return `${mins}m`;
      if (hrs < 24) return `${hrs}h`;
      if (days < 7) return `${days}d`;
      return d.toLocaleDateString([], { day:"numeric", month:"short" });
    }

    function formatCompact(num) {
      const n = Number(num || 0);
      if (n >= 1000000) return (n / 1000000).toFixed(n >= 10000000 ? 0 : 1).replace(".0","") + "M";
      if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(".0","") + "K";
      return String(n);
    }

    function isVideoFile(fileOrUrl) {
      const s = typeof fileOrUrl === "string" ? fileOrUrl : (fileOrUrl?.type || "");
      return /video/i.test(s) || /\.(mp4|mov|m4v|webm|ogg)(\?.*)?$/i.test(String(fileOrUrl || ""));
    }

    function isImageFile(fileOrUrl) {
      const s = typeof fileOrUrl === "string" ? fileOrUrl : (fileOrUrl?.type || "");
      return /image/i.test(s) || /\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?.*)?$/i.test(String(fileOrUrl || ""));
    }

    async function fetchPostsPage(offset = 0, limit = pageSize) {
      let result = null;

      try {
        const { data, error } = await window.supabaseClient
          .from("posts")
          .select(`
            id,
            user_id,
            content,
            media_url,
            media_type,
            created_at,

              full_name,
              username,
              avatar_url,
              is_verified
            )
          `)
          .order("created_at", { ascending:false })
          .range(offset, offset + limit - 1);

        if (!error) result = data || [];
      } catch {}

      if (result) return result;

      const { data, error } = await window.supabaseClient
        .from("posts")
        .select(`
          id,
          user_id,
          content,
          media_url,
          media_type,
          created_at,
          profiles:profiles!posts_user_id_fkey (
            full_name,
            username,
            avatar_url
          )
        `)
        .order("created_at", { ascending:false })

      if (error) throw error;
      return data || [];
    }

    function parseMediaList(post) {
      const raw = post?.media_url;
      const fallbackType = String(post?.media_type || "").toLowerCase().trim();
      let items = [];

      if (Array.isArray(raw)) {
        items = raw;
      } else if (typeof raw === "string" && raw.trim()) {
        const trimmed = raw.trim();
        if ((trimmed.startsWith("[") && trimmed.endsWith("]")) || (trimmed.startsWith("{") && trimmed.endsWith("}"))) {
          try {
            const parsed = JSON.parse(trimmed);
            if (Array.isArray(parsed)) items = parsed;
            else if (Array.isArray(parsed?.items)) items = parsed.items;
            else if (typeof parsed?.url === "string") items = [parsed];
          } catch {
            items = [trimmed];
          }
        } else {
          items = [trimmed];
        }
      }

      return items
        .map((item) => {
          if (!item) return null;

          if (typeof item === "string") {
            return {
              url: item,
              type: isVideoFile(item) ? "video" : "image"
            };
          }

          const url = item.url || item.src || item.media_url || item.path || "";
          const type = item.type || item.media_type || (isVideoFile(url) ? "video" : (fallbackType || "image"));
          return url ? { url, type: type === "video" ? "video" : "image" } : null;
        })
        .filter(Boolean);
    }

    async function loadStories() {
      const cached = getCache(cacheKeys.stories);
      if (Array.isArray(cached)) renderStories(cached);

      const tables = ["statuses", "status", "stories"];
      let finalRows = [];

      for (const table of tables) {
        try {
          let data = null;
          try {
            const r = await window.supabaseClient
              .from(table)
              .select(`
                id,
                user_id,
                content,
                media_url,
                created_at,
                expires_at,
                profiles:profiles!${table}_user_id_fkey (
                  full_name,
                  username,
                  avatar_url
                )
              `)
              .order("created_at", { ascending:false })
              .limit(40);
            if (!r.error) data = r.data || [];
          } catch {}

          if (!data) {
            const r2 = await window.supabaseClient
              .from(table)
              .select("*")
              .order("created_at", { ascending:false })
              .limit(40);
            if (r2.error) continue;
            data = r2.data || [];
          }

          const active = data.filter(item => {
            if (!item?.expires_at) return true;
            return new Date(item.expires_at).getTime() > Date.now();
          });

          const latestByUser = [];
          const seen = new Set();

          for (const item of active) {
            if (!item?.user_id || seen.has(item.user_id)) continue;
            seen.add(item.user_id);
            latestByUser.push(item);
          }

          finalRows = latestByUser.slice(0, 12);
          break;
        } catch {}
      }

      setCache(cacheKeys.stories, finalRows, 60000);
      renderStories(finalRows);
    }

    async function fetchTrendingFromPage() {
      try {
        const response = await fetch("trendings.html", { cache:"no-store" });
        if (!response.ok) throw new Error("No trending page");
        const html = await response.text();
        const doc = new DOMParser().parseFromString(html, "text/html");
        const found = [];

        const explicit = doc.querySelectorAll("[data-trending-item]");
        explicit.forEach((node) => {
          const title = node.getAttribute("data-title") || node.querySelector("[data-title], .title, h3, h4")?.textContent?.trim() || "Trending";
          const src = node.getAttribute("data-image") || node.getAttribute("data-src") || node.querySelector("img,video")?.getAttribute("src") || "";
          const id = node.getAttribute("data-id") || "";
          if (src) found.push({ id, title, src });
        });

        if (!found.length) {
          doc.querySelectorAll("img, video").forEach((node, index) => {
            if (found.length >= 8) return;
            const parentText = node.closest("a, article, div")?.textContent?.trim() || "Trending";
            const src = node.getAttribute("src") || "";
            if (src) found.push({
              id: String(index + 1),
              title: parentText.slice(0, 32) || "Trending",
              src
            });
          });
        }

        return found.slice(0, 8);
      } catch {
        return [];
      }
    }

    function mergeTrendingIntoStories(stories = []) {
      const cachedTrending = getCache(cacheKeys.trending) || [];
      if (!cachedTrending.length) return stories;

      const extra = cachedTrending.slice(0, 2).map((item, i) => ({
        id: `trend-${i}`,
        user_id: `trend-${i}`,

        media_url: item.src || "",
        profiles: {
          full_name: item.title || "Trending",
          username: "Trending",
          avatar_url: ""
        }
      }));

      return [...stories, ...extra];
    }

    async function hydrateMetrics(postIds = []) {
      const ids = postIds.filter(Boolean);
      if (!ids.length) return;

      const localMetricMap = new Map();

      try {
        const { data } = await window.supabaseClient
          .from("post_likes")
          .select("post_id,user_id")
          .in("post_id", ids);

        (data || []).forEach((row) => {
          if (!localMetricMap.has(row.post_id)) {
            localMetricMap.set(row.post_id, { likes:0, likedByMe:false, comments:0, shares:0, views:0 });
          }
          const m = localMetricMap.get(row.post_id);
          m.likes += 1;
          if (row.user_id === currentUserId) m.likedByMe = true;
        });
      } catch {}

      try {
        const { data } = await window.supabaseClient
          .from("comments")
          .select("post_id,id,user_id,content,created_at")
          .in("post_id", ids)
          .order("created_at", { ascending:false });

        (data || []).forEach((row) => {
          if (!localMetricMap.has(row.post_id)) {
            localMetricMap.set(row.post_id, { likes:0, likedByMe:false, comments:0, shares:0, views:0 });
          }
          const m = localMetricMap.get(row.post_id);
          m.comments += 1;
          if (!commentsPreviewMap.has(row.post_id)) {
            commentsPreviewMap.set(row.post_id, row);
          }
        });
      } catch {}

      try {
        const { data } = await window.supabaseClient
          .from("post_shares")
          .select("post_id")
          .in("post_id", ids);

        (data || []).forEach((row) => {
          if (!localMetricMap.has(row.post_id)) {
            localMetricMap.set(row.post_id, { likes:0, likedByMe:false, comments:0, shares:0, views:0 });
          }
          const m = localMetricMap.get(row.post_id);
          m.shares += 1;
        });
      } catch {}

      try {
        const { data } = await window.supabaseClient
          .from("post_views")
          .select("post_id")
          .in("post_id", ids);

        (data || []).forEach((row) => {
          if (!localMetricMap.has(row.post_id)) {
            localMetricMap.set(row.post_id, { likes:0, likedByMe:false, comments:0, shares:0, views:0 });
          }
          const m = localMetricMap.get(row.post_id);
          m.views += 1;
        });
      } catch {}

      ids.forEach((id) => {
        postMetrics.set(id, localMetricMap.get(id) || { likes:0, likedByMe:false, comments:0, shares:0, views:0 });
      });
    }

    function renderFeed() {

        feedEl.innerHTML = `<div class="empty"><strong>No posts yet</strong>Start posting on View.</div>`;

    function bindMediaTracks() {
      document.querySelectorAll(".media-track").forEach((track) => {
        if (track.dataset.bound === "1") return;
        track.dataset.bound = "1";

        track.addEventListener("scroll", () => {
          const postId = track.dataset.postId || "";
          const dotsWrap = document.getElementById(`dots-${postId}`);
          if (!dotsWrap) return;
          const dots = [...dotsWrap.querySelectorAll(".media-dot")];
          if (!dots.length) return;
          const index = Math.round(track.scrollLeft / track.clientWidth);
          dots.forEach((dot, i) => dot.classList.toggle("active", i === index));
        }, { passive:true });
      });
    }

    function setupVideoAutoplay() {
      if (videoObserver) videoObserver.disconnect();

      const videos = document.querySelectorAll(".post-video");
      videoObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          const video = entry.target;
          const postId = video.dataset.postId || "";
          const shouldMute = mutedVideos.has(postId);

          if (shouldMute) video.muted = true;
          if (!shouldMute) video.muted = false;

          if (entry.isIntersecting && entry.intersectionRatio >= 0.65) {
            document.querySelectorAll(".post-video").forEach((v) => {
              if (v !== video) v.pause();
            });
            video.play().catch(() => {});
            trackView(postId);
          } else {
            video.pause();
          }
        });
      }, { threshold:[0.2,0.4,0.65,0.85] });

      videos.forEach((video) => videoObserver.observe(video));
    }

    function attachVideoGestures() {
      document.querySelectorAll(".post-video").forEach((video) => {
        if (video.dataset.gestureBound === "1") return;
        video.dataset.gestureBound = "1";

        let lastTap = 0;
        video.addEventListener("touchend", () => {
          const now = Date.now();
          if (now - lastTap < 280) {
            const postId = video.dataset.postId || "";
            window.location.href = `video-feed.html?post=${encodeURIComponent(postId)}`;
          }
          lastTap = now;
        }, { passive:true });

        video.addEventListener("dblclick", () => {
          const postId = video.dataset.postId || "";
          window.location.href = `video-feed.html?post=${encodeURIComponent(postId)}`;
        });
      });
    }

    async function loadMorePosts(reset = false) {
      if (isLoadingPosts || !hasMorePosts) return;
      isLoadingPosts = true;

      try {
        const offset = reset ? 0 : loadedCount;
        const rows = await fetchPostsPage(offset, pageSize);

        if (reset) {
          posts = [];
          commentsPreviewMap = new Map();
          postMetrics = new Map();
        }

        if (!rows.length) {
          hasMorePosts = false;
          if (!posts.length) renderFeed();
          return;
        }

        await hydrateMetrics(rows.map((p) => p.id));

        posts = reset ? rows : [...posts, ...rows];
        loadedCount = posts.length;
        if (rows.length < pageSize) hasMorePosts = false;

        setCache(cacheKeys.feed, posts.slice(0, 12), 90000);
        renderFeed();
      } catch (error) {
        if (!posts.length) {
          feedEl.innerHTML = `<div class="empty"><strong>Could not load feed</strong>${escapeHtml(error.message || "Please refresh.")}</div>`;
        }
      } finally {
        isLoadingPosts = false;
      }
    }

    function setupInfiniteScroll() {
      if (feedObserver) feedObserver.disconnect();
      feedObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) loadMorePosts(false);
        });
      }, { rootMargin:"300px 0px 300px 0px" });

      feedObserver.observe(loadSentinel);
    }

        showNotice(error.message || "Could not add comment.", "error");
      }
    }

    function toggleCaption(postId) {
      if (captionExpanded.has(postId)) captionExpanded.delete(postId);
      else captionExpanded.add(postId);
      renderFeed();
    }

    function getCaptionSuggestionPool() {
      const mediaCount = selectedFiles.length;
      const base = [
        "Fresh update on View ✨",
        "New drop 🚀",
        "My day in photos 📸",
        "Who else loves this? 😍",
        "Quick update for everyone 👋"
      ];
      if (mediaCount >= 2) {
        base.unshift("Swipe to see more ➡️", "Little photo dump 📷");
      }
      if (selectedFiles.some(isVideoFile)) {
        base.unshift("Watch till the end 🎬", "New video on View 🔥");
      }
      return base.slice(0, 6);
    }

    function renderCaptionSuggestions() {
      const list = getCaptionSuggestionPool();
      captionSuggestions.innerHTML = list.map((text) => `
        <button class="caption-chip" type="button" onclick="applyCaptionSuggestion(${JSON.stringify(text)})">${escapeHtml(text)}</button>
      `).join("");
    }

    function openComposer() {
      composerSheet.classList.add("show");
      composerBackdrop.classList.add("show");
      composerSheet.setAttribute("aria-hidden", "false");
      renderCaptionSuggestions();
    }

    function closeComposer() {
      composerSheet.classList.remove("show");
      composerBackdrop.classList.remove("show");
      composerSheet.setAttribute("aria-hidden", "true");
    }

    function updateMediaPreview() {
      if (!selectedFiles.length) {
        mediaPreviewStrip.classList.remove("show");
        mediaPreviewStrip.innerHTML = "";
        renderCaptionSuggestions();
        return;
      }

      mediaPreviewStrip.classList.add("show");
      mediaPreviewStrip.innerHTML = selectedFiles.map((file, index) => {
        const url = URL.createObjectURL(file);
        return `
          <div class="media-preview-card">
            ${isVideoFile(file)
              ? `<video src="${url}" muted playsinline preload="metadata"></video>`
              : `<img src="${url}" alt="Preview">`
            }
            <button class="remove-media" type="button" onclick="removeSelectedFile(${index})">✕</button>
          </div>
        `;
      }).join("");

      renderCaptionSuggestions();
    }

    function addSelectedFiles(fileList) {
      const incoming = Array.from(fileList || []).filter((file) => isImageFile(file) || isVideoFile(file));
      if (!incoming.length) return;
      selectedFiles = [...selectedFiles, ...incoming].slice(0, 10);
      updateMediaPreview();
    }

    function removeSelectedFile(index) {
      selectedFiles.splice(index, 1);
      updateMediaPreview();
    }

    async function uploadMediaFiles(files, userId) {
      if (!files.length) return [];
      const buckets = ["post-media", "posts", "media", "uploads"];
      const uploaded = [];

      for (const file of files) {
        let done = false;
        const ext = (file.name.split(".").pop() || "bin").replace(/[^a-zA-Z0-9]/g, "");
        const path = `${userId}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;

        for (const bucket of buckets) {
          try {
            const { error } = await window.supabaseClient.storage.from(bucket).upload(path, file, {
              cacheControl:"1200",
              upsert:false
            });

            if (!error) {
              const { data } = window.supabaseClient.storage.from(bucket).getPublicUrl(path);
              uploaded.push({
                url: data?.publicUrl || "",
                type: isVideoFile(file) ? "video" : "image"
              });
              done = true;
              break;
            }
          } catch {}
        }

        if (!done) {
          throw new Error("Media upload failed. Make sure your post-media bucket exists.");
        }
      }

      return uploaded;
    }

    async function publishPost() {
      const text = composerText.value.trim();
      if (!text && !selectedFiles.length) {
        showNotice("Write something or add media first.", "info");
        return;
      }

      publishPostBtn.disabled = true;
      publishPostBtn.textContent = "Posting...";

      try {
        const mediaItems = await uploadMediaFiles(selectedFiles, currentUserId);
        const payload = {
          user_id: currentUserId,
          content: text,
          media_url: mediaItems.length ? JSON.stringify(mediaItems) : "",
          media_type: mediaItems.length > 1 ? "gallery" : (mediaItems[0]?.type || "")
        };

        const { error } = await window.supabaseClient
          .from("posts")
          .insert(payload);

        if (error) throw error;

        composerText.value = "";
        selectedFiles = [];
        cameraInput.value = "";
        galleryInput.value = "";
        updateMediaPreview();
        closeComposer();
        showNotice("Post published.", "success");

        await loadInitialFeed();
      } catch (error) {
        showNotice(error.message || "Could not publish post.", "error");
      } finally {
        publishPostBtn.disabled = false;
        publishPostBtn.textContent = "Post now";
      }
    }

    function setupSpeech() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        micBtn.addEventListener("click", () => showNotice("Voice input is not supported on this device.", "info"));
        return;
      }

      speechRecognition = new SR();
      speechRecognition.lang = "en-US";
      speechRecognition.continuous = false;
      speechRecognition.interimResults = true;

      let base = "";

      micBtn.addEventListener("click", () => {
        try {
          base = composerText.value ? composerText.value + " " : "";
          speechRecognition.start();
          micBtn.style.background = "rgba(255,255,255,.14)";
        } catch {
          showNotice("Could not start voice input.", "error");
        }
      });

      speechRecognition.onresult = (event) => {
        let finalText = "";
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0]?.transcript || "";
          if (event.results[i].isFinal) finalText += transcript + " ";
          else interim += transcript;
        }
        composerText.value = `${base}${finalText}${interim}`.trim();
      };

      speechRecognition.onerror = () => {
        micBtn.style.background = "";
        showNotice("Voice input failed.", "error");
      };

      speechRecognition.onend = () => {
        micBtn.style.background = "";
      };
    }

    function openCreatePage() {
      try {
        sessionStorage.setItem("view_create_draft", JSON.stringify({
          content: composerText.value.trim(),
          created_at: new Date().toISOString()
        }));
      } catch {}
      location.href = "create-post.html";
    }

    function toggleMute(postId) {
      if (mutedVideos.has(postId)) mutedVideos.delete(postId);
      else mutedVideos.add(postId);

      document.querySelectorAll(`.post-video[data-post-id="${CSS.escape(postId)}"]`).forEach((video) => {
        video.muted = mutedVideos.has(postId);
      });

      renderFeed();
    }

    async function trackView(postId) {
      if (!postId || sessionStorage.getItem(`viewed_${postId}`)) return;
      sessionStorage.setItem(`viewed_${postId}`, "1");

      try {
        await window.supabaseClient.from("post_views").insert({
          post_id: postId,
          user_id: currentUserId
        });
        const metric = postMetrics.get(postId);
        if (metric) {
          metric.views += 1;
          postMetrics.set(postId, metric);
        }
      } catch {}
    }

    function attachGlobalEvents() {
      document.addEventListener("click", (event) => {
        if (!event.target.closest(".menu-wrap")) closeMenus();
      });

      openComposerBtn.addEventListener("click", openComposer);
      bottomCreateBtn.addEventListener("click", openComposer);
      closeComposerBtn.addEventListener("click", closeComposer);
      composerBackdrop.addEventListener("click", closeComposer);
      publishPostBtn.addEventListener("click", publishPost);
      openCreatePageBtn.addEventListener("click", openCreatePage);

      cameraInput.addEventListener("change", () => addSelectedFiles(cameraInput.files));
      galleryInput.addEventListener("change", () => addSelectedFiles(galleryInput.files));
    }

    function subscribeRealtime() {
      realtimeChannels.forEach((channel) => {
        try { window.supabaseClient.removeChannel(channel); } catch {}
      });
      realtimeChannels = [];

      const channels = [
        { name:"home-posts", table:"posts", fn:() => loadInitialFeed() },
        { name:"home-likes", table:"post_likes", fn:async () => { await hydrateMetrics(posts.map(p => p.id)); renderFeed(); } },
        { name:"home-comments", table:"comments", fn:async () => { commentsPreviewMap = new Map(); await hydrateMetrics(posts.map(p => p.id)); renderFeed(); } },
        { name:"home-shares", table:"post_shares", fn:async () => { await hydrateMetrics(posts.map(p => p.id)); renderFeed(); } },
        { name:"home-status", table:"statuses", fn:() => loadStories() },
        { name:"home-notifications", table:"notifications", fn:() => loadBadges() }
      ];

      channels.forEach((item) => {
        const ch = window.supabaseClient
          .channel(item.name)
          .on("postgres_changes", { event:"*", schema:"public", table:item.table }, item.fn)
          .subscribe();
        realtimeChannels.push(ch);
      });
    }

    async function bootstrapTrendingToStories() {
      const currentStories = getCache(cacheKeys.stories) || [];
      const trending = await fetchTrendingFromPage();
      if (trending.length) setCache(cacheKeys.trending, trending, 60000);

      const merged = mergeTrendingIntoStories(currentStories);
      if (merged.length) renderStories(merged.slice(0, 12));
    }

    (async function init() {
      try {
        const user = await getSessionOrRedirect();
        if (!user) return;

        attachGlobalEvents();
        setupSpeech();
        setupInfiniteScroll();
        await Promise.all([
          loadFollowing(),
          loadBadges(),
          loadStories()
        ]);

        await bootstrapTrendingToStories();
        await loadInitialFeed();
        subscribeRealtime();

        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("/service-worker.js").catch(() => {});
        }
      } catch (error) {
        showNotice(error.message || "Could not load home.", "error", 3600);
      }
    })();

    window.followUser = followUser;
    window.toggleMenu = toggleMenu;
    window.copyPostLink = copyPostLink;
    window.openProfile = openProfile;
    window.reportPost = reportPost;
    window.toggleLike = toggleLike;
    window.openComments = openComments;
    window.sharePost = sharePost;
    window.quickComment = quickComment;
    window.toggleCaption = toggleCaption;
    window.applyCaptionSuggestion = function(text) {
      composerText.value = text || "";
      composerText.focus();
    };
    window.removeSelectedFile = removeSelectedFile;
    window.toggleMute = toggleMute;
  </script>
</body>
</html>
