<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Home | View</title>
  <meta name="theme-color" content="#0b5ed7" />
  <style>
    :root{
      --primary:#0b5ed7;
      --primary-dark:#083b8a;
      --bg:#f5f8ff;
      --card:#ffffff;
      --text:#1f1f1f;
      --soft:#6b7280;
      --border:#e5e7eb;
      --danger:#dc2626;
      --success:#16a34a;
      --shadow:0 10px 30px rgba(0,0,0,.06);
      --radius:18px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding-bottom:92px;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    button,input,textarea{
      font:inherit;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
      padding:14px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .topbar-left,
    .topbar-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .brand-mark{
      width:42px;
      height:42px;
      border-radius:14px;
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;
      display:grid;
      place-items:center;
      font-size:20px;
      font-weight:700;
    }

    .brand-text h1{
      font-size:22px;
      color:var(--primary);
      line-height:1;
      margin-bottom:2px;
    }

    .brand-text p{
      font-size:12px;
      color:var(--soft);
    }

    .icon-btn,
    .primary-btn,
    .outline-btn,
    .mini-btn{
      border:none;
      border-radius:12px;
      min-height:42px;
      padding:0 14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .icon-btn{
      width:42px;
      padding:0;
      background:#fff;
      border:1px solid var(--border);
    }

    .primary-btn{
      background:var(--primary);
      color:#fff;
      font-weight:700;
    }

    .primary-btn:hover{
      background:var(--primary-dark);
    }

    .outline-btn,
    .mini-btn{
      background:#fff;
      color:var(--primary);
      border:1px solid var(--border);
      font-weight:700;
    }

    .mini-btn{
      min-height:36px;
      padding:0 12px;
      border-radius:999px;
      font-size:12px;
    }

    .container{
      max-width:760px;
      margin:0 auto;
      padding:18px 16px 0;
      display:grid;
      gap:18px;
    }

    .composer-card,
    .post-card,
    .modal-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .composer-card{
      padding:18px;
    }

    .composer-top{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .avatar{
      width:48px;
      height:48px;
      border-radius:50%;
      background:linear-gradient(135deg,#dbeafe,#f8fbff);
      border:1px solid rgba(11,94,215,.12);
      display:grid;
      place-items:center;
      color:var(--primary);
      font-weight:700;
      overflow:hidden;
      flex-shrink:0;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .composer-input{
      flex:1;
      min-height:48px;
      border:1px solid var(--border);
      border-radius:14px;
      background:#f8fbff;
      padding:0 14px;
      display:flex;
      align-items:center;
      color:var(--soft);
      font-size:14px;
      cursor:pointer;
    }

    .composer-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .post-card{
      overflow:hidden;
    }

    .post-head{
      padding:16px 16px 10px;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }

    .post-user{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .post-user-meta h3{
      font-size:15px;
      margin-bottom:2px;
      word-break:break-word;
    }

    .post-user-meta p{
      font-size:12px;
      color:var(--soft);
      word-break:break-word;
    }

    .post-content{
      padding:0 16px 14px;
      font-size:14px;
      line-height:1.7;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .post-media{
      margin:0 16px 14px;
      min-height:180px;
      border-radius:16px;
      background:linear-gradient(135deg, rgba(11,94,215,.14), rgba(255,255,255,.2)), linear-gradient(135deg,#dbeafe,#f8fbff);
      border:1px solid rgba(11,94,215,.12);
      display:grid;
      place-items:center;
      color:var(--soft);
      font-weight:700;
      padding:14px;
      text-align:center;
      overflow:hidden;
    }

    .post-media img,
    .post-media video{
      width:100%;
      max-height:420px;
      object-fit:cover;
      display:block;
      border-radius:14px;
    }

    .post-tags{
      padding:0 16px 12px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .tag{
      min-height:30px;
      padding:0 10px;
      border-radius:999px;
      background:#f8fbff;
      border:1px solid rgba(11,94,215,.12);
      color:var(--primary);
      font-size:12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
    }

    .post-stats{
      padding:0 16px 10px;
      color:var(--soft);
      font-size:12px;
      display:flex;
      gap:14px;
      flex-wrap:wrap;
    }

    .post-actions{
      padding:12px 16px 16px;
      border-top:1px solid var(--border);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .action-btn.active{
      background:rgba(11,94,215,.08);
      border-color:rgba(11,94,215,.18);
    }

    .notice{
      display:none;
      padding:12px 14px;
      border-radius:14px;
      font-size:13px;
      line-height:1.5;
    }

    .notice.error{
      display:block;
      background:#fff5f5;
      color:var(--danger);
      border:1px solid #fecaca;
    }

    .notice.success{
      display:block;
      background:#f0fdf4;
      color:var(--success);
      border:1px solid #bbf7d0;
    }

    .empty-state{
      background:#fff;
      border:1px dashed rgba(11,94,215,.18);
      border-radius:16px;
      padding:28px 18px;
      text-align:center;
    }

    .empty-state h3{
      font-size:18px;
      margin-bottom:6px;
    }

    .empty-state p{
      color:var(--soft);
      font-size:14px;
      line-height:1.6;
      margin-bottom:14px;
    }

    .bottom-nav{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      background:#fff;
      border-top:1px solid var(--border);
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      padding:8px 10px calc(8px + env(safe-area-inset-bottom));
      z-index:60;
    }

    .bottom-link{
      min-height:54px;
      border-radius:12px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      font-size:11px;
      color:var(--soft);
    }

    .bottom-link.active{
      color:var(--primary);
      background:rgba(11,94,215,.08);
      font-weight:700;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.35);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index:100;
    }

    .modal.show{
      display:flex;
    }

    .modal-card{
      width:min(760px,100%);
      max-height:85vh;
      border-bottom-left-radius:0;
      border-bottom-right-radius:0;
      padding:18px;
      display:grid;
      gap:14px;
    }

    .modal-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .modal-head h3{
      font-size:18px;
    }

    .comment-list{
      display:grid;
      gap:12px;
      overflow:auto;
      max-height:46vh;
      padding-right:4px;
    }

    .comment-card{
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      background:#fff;
    }

    .comment-card h4{
      font-size:14px;
      margin-bottom:4px;
    }

    .comment-card p{
      font-size:13px;
      line-height:1.6;
    }

    .comment-card span{
      display:block;
      margin-top:6px;
      color:var(--soft);
      font-size:11px;
    }

    .comment-form{
      display:grid;
      gap:10px;
    }

    .comment-form textarea{
      width:100%;
      min-height:90px;
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px 14px;
      resize:vertical;
    }

    @media(max-width:640px){
      .container{
        padding:14px 12px 0;
      }

      .topbar-right .outline-btn{
        display:none;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand">
        <div class="brand-mark">V</div>
        <div class="brand-text">
          <h1>View</h1>
          <p>Your world, your view</p>
        </div>
      </div>
    </div>

    <div class="topbar-right">
      <button class="outline-btn" onclick="window.location.href='saved-posts.html'">Saved</button>
      <button class="primary-btn" onclick="window.location.href='create-post.html'">Create</button>
    </div>
  </header>

  <main class="container">
    <section class="composer-card">
      <div class="composer-top">
        <div class="avatar" id="composerAvatar">V</div>
        <div class="composer-input" onclick="window.location.href='create-post.html'">
          What do you want to share today?
        </div>
      </div>

      <div class="composer-actions">
        <button class="mini-btn" onclick="window.location.href='create-post.html'">Text</button>
        <button class="mini-btn" onclick="window.location.href='create-post.html'">Photo</button>
        <button class="mini-btn" onclick="window.location.href='create-post.html'">Video</button>
      </div>
    </section>

    <div id="feedNotice" class="notice"></div>

    <section id="feedContainer"></section>
  </main>

  <div id="commentsModal" class="modal">
    <div class="modal-card">
      <div class="modal-head">
        <h3>Comments</h3>
        <button class="outline-btn" id="closeCommentsBtn">Close</button>
      </div>

      <div id="commentList" class="comment-list"></div>

      <form id="commentForm" class="comment-form">
        <textarea id="commentInput" placeholder="Write a comment..."></textarea>
        <button type="submit" class="primary-btn" id="commentSubmitBtn">Post Comment</button>
      </form>

      <div id="commentNotice" class="notice"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="home.html" class="bottom-link active"><span>🏠</span><span>Home</span></a>
    <a href="explore.html" class="bottom-link"><span>🔍</span><span>Explore</span></a>
    <a href="create-post.html" class="bottom-link"><span>➕</span><span>Create</span></a>
    <a href="messages.html" class="bottom-link"><span>💬</span><span>Chat</span></a>
    <a href="profile.html" class="bottom-link"><span>👤</span><span>Profile</span></a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const feedContainer = document.getElementById("feedContainer");
    const feedNotice = document.getElementById("feedNotice");
    const composerAvatar = document.getElementById("composerAvatar");
    const commentsModal = document.getElementById("commentsModal");
    const closeCommentsBtn = document.getElementById("closeCommentsBtn");
    const commentList = document.getElementById("commentList");
    const commentForm = document.getElementById("commentForm");
    const commentInput = document.getElementById("commentInput");
    const commentSubmitBtn = document.getElementById("commentSubmitBtn");
    const commentNotice = document.getElementById("commentNotice");

    const state = {
      currentUserId: null,
      currentCommentsPostId: null,
      posts: [],
      likesMap: new Map(),
      savedMap: new Map(),
      commentCountMap: new Map(),
      profilesMap: new Map()
    };

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showNotice(message, type = "error") {
      feedNotice.className = "notice " + type;
      feedNotice.textContent = message;
    }

    function showCommentNotice(message, type = "error") {
      commentNotice.className = "notice " + type;
      commentNotice.textContent = message;
    }

    function clearCommentNotice() {
      commentNotice.className = "notice";
      commentNotice.textContent = "";
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (isNaN(date.getTime())) return "";
      return date.toLocaleString();
    }

    function buildTags(post) {
      const tags = [];
      if (post.media_type) tags.push(`<span class="tag">${escapeHtml(post.media_type)}</span>`);
      if (post.location) tags.push(`<span class="tag">${escapeHtml(post.location)}</span>`);
      if (post.visibility) tags.push(`<span class="tag">${escapeHtml(post.visibility)}</span>`);
      return tags.join("");
    }

    function buildMedia(post) {
      if (!post.media_url) return "";

      if (post.media_type === "image") {
        return `<div class="post-media"><img src="${escapeHtml(post.media_url)}" alt="Post image"></div>`;
      }

      if (post.media_type === "video") {
        return `<div class="post-media"><video controls src="${escapeHtml(post.media_url)}"></video></div>`;
      }

      return `<div class="post-media">Media attached</div>`;
    }

    function renderEmpty() {
      feedContainer.innerHTML = `
        <div class="empty-state">
          <h3>No posts yet</h3>
          <p>Your feed is empty for now. Create your first post and it will appear here.</p>
          <button class="primary-btn" onclick="window.location.href='create-post.html'">Create Post</button>
        </div>
      `;
    }

    async function getSessionUser() {
      const { data } = await supabaseClient.auth.getSession();
      return data?.session?.user || null;
    }

    async function loadComposerProfile() {
      const user = await getSessionUser();
      state.currentUserId = user?.id || null;
      if (!state.currentUserId) return;

      const { data: profile } = await supabaseClient
        .from("profiles")
        .select("full_name, username, avatar_url")
        .eq("id", state.currentUserId)
        .maybeSingle();

      if (!profile) return;

      if (profile.avatar_url) {
        composerAvatar.innerHTML = `<img src="${escapeHtml(profile.avatar_url)}" alt="Avatar">`;
      } else {
        const seed = profile.full_name || profile.username || "V";
        composerAvatar.textContent = seed.charAt(0).toUpperCase();
      }
    }

    async function loadFeed() {
      const { data, error } = await supabaseClient
        .from("posts")
        .select("id,user_id,content,media_url,media_type,location,visibility,status,created_at,published_at")
        .eq("status", "published")
        .order("published_at", { ascending: false });

      if (error) throw error;

      state.posts = data || [];

      if (!state.posts.length) {
        renderEmpty();
        return;
      }

      await Promise.all([
        hydrateProfiles(),
        hydrateLikes(),
        hydrateSaved(),
        hydrateCommentCounts()
      ]);

      renderPosts();
    }

    async function hydrateProfiles() {
      const ids = [...new Set(state.posts.map(post => post.user_id).filter(Boolean))];
      if (!ids.length) return;

      const { data, error } = await supabaseClient
        .from("profiles")
        .select("id,full_name,username,avatar_url")
        .in("id", ids);

      if (error) throw error;

      state.profilesMap = new Map((data || []).map(item => [item.id, item]));
    }

    async function hydrateLikes() {
      const ids = state.posts.map(post => post.id);
      if (!ids.length) return;

      const { data, error } = await supabaseClient
        .from("post_likes")
        .select("post_id,user_id")
        .in("post_id", ids);

      if (error) throw error;

      state.likesMap = new Map();
      ids.forEach(id => state.likesMap.set(id, { count: 0, liked: false }));

      (data || []).forEach(row => {
        const current = state.likesMap.get(row.post_id) || { count: 0, liked: false };
        current.count += 1;
        if (row.user_id === state.currentUserId) current.liked = true;
        state.likesMap.set(row.post_id, current);
      });
    }

    async function hydrateSaved() {
      if (!state.currentUserId) return;

      const ids = state.posts.map(post => post.id);
      if (!ids.length) return;

      const { data, error } = await supabaseClient
        .from("saved_posts")
        .select("post_id")
        .eq("user_id", state.currentUserId)
        .in("post_id", ids);

      if (error) throw error;

      state.savedMap = new Map();
      ids.forEach(id => state.savedMap.set(id, false));
      (data || []).forEach(row => state.savedMap.set(row.post_id, true));
    }

    async function hydrateCommentCounts() {
      const ids = state.posts.map(post => post.id);
      if (!ids.length) return;

      const { data, error } = await supabaseClient
        .from("comments")
        .select("post_id")
        .in("post_id", ids);

      if (error) throw error;

      state.commentCountMap = new Map();
      ids.forEach(id => state.commentCountMap.set(id, 0));
      (data || []).forEach(row => {
        state.commentCountMap.set(row.post_id, (state.commentCountMap.get(row.post_id) || 0) + 1);
      });
    }

    function renderPosts() {
      feedContainer.innerHTML = state.posts.map(post => {
        const profile = state.profilesMap.get(post.user_id) || {};
        const displayName = profile.full_name || profile.username || "View User";
        const username = profile.username ? "@" + profile.username : "@view_user";
        const avatarLetter = displayName.charAt(0).toUpperCase();
        const likeState = state.likesMap.get(post.id) || { count: 0, liked: false };
        const saved = state.savedMap.get(post.id) || false;
        const comments = state.commentCountMap.get(post.id) || 0;

        return `
          <article class="post-card" data-post-id="${escapeHtml(post.id)}">
            <div class="post-head">
              <div class="post-user">
                <div class="avatar">
                  ${profile.avatar_url ? `<img src="${escapeHtml(profile.avatar_url)}" alt="Avatar">` : avatarLetter}
                </div>
                <div class="post-user-meta">
                  <h3>${escapeHtml(displayName)}</h3>
                  <p>${escapeHtml(username)} • ${escapeHtml(formatDate(post.published_at || post.created_at))}</p>
                </div>
              </div>
            </div>

            <div class="post-content">${escapeHtml(post.content || "")}</div>

            ${buildMedia(post)}

            <div class="post-tags">${buildTags(post)}</div>

            <div class="post-stats">
              <span id="likes-count-${escapeHtml(post.id)}">${likeState.count} likes</span>
              <span id="comments-count-${escapeHtml(post.id)}">${comments} comments</span>
            </div>

            <div class="post-actions">
              <button class="mini-btn action-btn ${likeState.liked ? "active" : ""}" onclick="toggleLike('${escapeHtml(post.id)}')">
                ${likeState.liked ? "Liked" : "Like"}
              </button>
              <button class="mini-btn action-btn" onclick="openComments('${escapeHtml(post.id)}')">Comment</button>
              <button class="mini-btn action-btn ${saved ? "active" : ""}" onclick="toggleSave('${escapeHtml(post.id)}')">
                ${saved ? "Saved" : "Save"}
              </button>
              <button class="mini-btn action-btn" onclick="sharePost('${escapeHtml(post.id)}')">Share</button>
            </div>
          </article>
        `;
      }).join("");
    }

    async function toggleLike(postId) {
      const stateItem = state.likesMap.get(postId) || { count: 0, liked: false };

      if (!state.currentUserId) {
        showNotice("Login first to like posts.");
        return;
      }

      try {
        if (stateItem.liked) {
          const { error } = await supabaseClient
            .from("post_likes")
            .delete()
            .eq("post_id", postId)
            .eq("user_id", state.currentUserId);

          if (error) throw error;
          stateItem.liked = false;
          stateItem.count = Math.max(0, stateItem.count - 1);
        } else {
          const { error } = await supabaseClient
            .from("post_likes")
            .insert({ post_id: postId, user_id: state.currentUserId });

          if (error) throw error;
          stateItem.liked = true;
          stateItem.count += 1;
        }

        state.likesMap.set(postId, stateItem);
        renderPosts();
      } catch (error) {
        console.error(error);
        showNotice(error.message || "Could not update like.");
      }
    }

    async function toggleSave(postId) {
      if (!state.currentUserId) {
        showNotice("Login first to save posts.");
        return;
      }

      const saved = state.savedMap.get(postId) || false;

      try {
        if (saved) {
          const { error } = await supabaseClient
            .from("saved_posts")
            .delete()
            .eq("post_id", postId)
            .eq("user_id", state.currentUserId);

          if (error) throw error;
          state.savedMap.set(postId, false);
        } else {
          const { error } = await supabaseClient
            .from("saved_posts")
            .insert({ post_id: postId, user_id: state.currentUserId });

          if (error) throw error;
          state.savedMap.set(postId, true);
        }

        renderPosts();
      } catch (error) {
        console.error(error);
        showNotice(error.message || "Could not update saved post.");
      }
    }

    async function loadComments(postId) {
      const { data, error } = await supabaseClient
        .from("comments")
        .select("id,user_id,content,created_at")
        .eq("post_id", postId)
        .order("created_at", { ascending: false });

      if (error) throw error;

      const userIds = [...new Set((data || []).map(item => item.user_id).filter(Boolean))];
      let commentProfiles = [];

      if (userIds.length) {
        const { data: profilesData, error: profilesError } = await supabaseClient
          .from("profiles")
          .select("id,full_name,username")
          .in("id", userIds);

        if (profilesError) throw profilesError;
        commentProfiles = profilesData || [];
      }

      const profileMap = new Map(commentProfiles.map(item => [item.id, item]));

      if (!data || !data.length) {
        commentList.innerHTML = `
          <div class="empty-state">
            <h3>No comments yet</h3>
            <p>Be the first to comment on this post.</p>
          </div>
        `;
        return;
      }

      commentList.innerHTML = data.map(item => {
        const profile = profileMap.get(item.user_id) || {};
        const name = profile.full_name || profile.username || "View User";
        return `
          <div class="comment-card">
            <h4>${escapeHtml(name)}</h4>
            <p>${escapeHtml(item.content || "")}</p>
            <span>${escapeHtml(formatDate(item.created_at))}</span>
          </div>
        `;
      }).join("");
    }

    async function openComments(postId) {
      state.currentCommentsPostId = postId;
      clearCommentNotice();
      commentInput.value = "";
      commentsModal.classList.add("show");
      await loadComments(postId);
    }

    function closeComments() {
      commentsModal.classList.remove("show");
      state.currentCommentsPostId = null;
    }

    async function submitComment(event) {
      event.preventDefault();
      clearCommentNotice();

      if (!state.currentUserId) {
        showCommentNotice("Login first to comment.");
        return;
      }

      const content = commentInput.value.trim();
      if (!content) {
        showCommentNotice("Write a comment first.");
        return;
      }

      commentSubmitBtn.disabled = true;
      commentSubmitBtn.textContent = "Posting...";

      try {
        const { error } = await supabaseClient
          .from("comments")
          .insert({
            post_id: state.currentCommentsPostId,
            user_id: state.currentUserId,
            content
          });

        if (error) throw error;

        const currentCount = state.commentCountMap.get(state.currentCommentsPostId) || 0;
        state.commentCountMap.set(state.currentCommentsPostId, currentCount + 1);

        commentInput.value = "";
        await loadComments(state.currentCommentsPostId);
        renderPosts();
        showCommentNotice("Comment posted.", "success");
      } catch (error) {
        console.error(error);
        showCommentNotice(error.message || "Could not post comment.");
      } finally {
        commentSubmitBtn.disabled = false;
        commentSubmitBtn.textContent = "Post Comment";
      }
    }

    function sharePost(postId) {
      const shareUrl = window.location.origin + "/home.html#post-" + postId;

      if (navigator.share) {
        navigator.share({
          title: "View Post",
          text: "Check out this post on View",
          url: shareUrl
        }).catch(() => {});
        return;
      }

      navigator.clipboard.writeText(shareUrl)
        .then(() => showNotice("Post link copied.", "success"))
        .catch(() => showNotice("Could not copy post link."));
    }

    closeCommentsBtn.addEventListener("click", closeComments);
    commentsModal.addEventListener("click", (event) => {
      if (event.target === commentsModal) closeComments();
    });
    commentForm.addEventListener("submit", submitComment);

    window.toggleLike = toggleLike;
    window.toggleSave = toggleSave;
    window.openComments = openComments;
    window.sharePost = sharePost;

    async function init() {
      await loadComposerProfile();
      await loadFeed();
    }

    init();
  </script>
</body>
</html>
