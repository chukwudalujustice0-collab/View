<!-- ONLY SCRIPT SECTION CHANGED — UI REMAINS SAME -->
<script>
const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_KEY";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const feed = document.getElementById("feed");

let currentUserId = "";
let currentUserName = "User";

// ================= SESSION =================
async function requireSession() {
  const { data } = await supabaseClient.auth.getSession();
  if (!data.session) {
    window.location.href = "login.html";
    return null;
  }
  return data.session;
}

// ================= LOAD HOME =================
async function loadHome() {
  const session = await requireSession();
  if (!session) return;

  const user = session.user;
  currentUserId = user.id;

  // 🔥 GET CURRENT USER PROFILE
  const { data: me } = await supabaseClient
    .from("profiles")
    .select("username, full_name")
    .eq("id", user.id)
    .single();

  currentUserName =
    me?.username ||
    me?.full_name ||
    "User";

  // ================= FETCH POSTS WITH USERS =================
  const { data, error } = await supabaseClient
    .from("posts")
    .select(`
      id,
      content,
      media_url,
      created_at,
      user_id,
      profiles:profiles!posts_user_id_fkey (
        id,
        username,
        full_name,
        avatar_url
      )
    `)
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    feed.innerHTML = "Error loading posts";
    return;
  }

  renderFeed(data);
}

// ================= RENDER =================
function renderFeed(posts) {
  if (!posts.length) {
    feed.innerHTML = "No posts yet";
    return;
  }

  feed.innerHTML = posts.map(post => {
    const profile = post.profiles || {};

    const name =
      profile.username ||
      profile.full_name ||
      "User";

    const avatar =
      profile.avatar_url ||
      name.charAt(0).toUpperCase();

    return `
      <div class="post">
        <div class="post-head">
          <a href="profile.html?user=${post.user_id}" class="post-user">
            <div class="avatar">
              ${
                profile.avatar_url
                ? `<img src="${profile.avatar_url}">`
                : avatar
              }
            </div>

            <div>
              <div class="post-name">${name}</div>
              <div class="post-sub">${new Date(post.created_at).toLocaleString()}</div>
            </div>
          </a>
        </div>

        <div class="post-content">${post.content || ""}</div>

        ${
          post.media_url
          ? `<img src="${post.media_url}" class="post-image">`
          : ""
        }
      </div>
    `;
  }).join("");
}

// ================= REALTIME =================
function realtime() {
  supabaseClient
    .channel("posts-live")
    .on("postgres_changes", {
      event: "INSERT",
      schema: "public",
      table: "posts"
    }, () => {
      loadHome(); // reload instantly
    })
    .subscribe();
}

// ================= START =================
loadHome();
realtime();
</script>
