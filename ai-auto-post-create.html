<!DOCTYPE html>
<html lang="en" class="auth-loading">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Create Automation | View</title>
  <meta name="theme-color" content="#08145c" />

  <script>
    document.documentElement.classList.add("auth-loading");
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/auth-guard.js"></script>

  <style>
    html.auth-loading,
    html.auth-loading body{
      visibility:hidden;
      opacity:0;
    }

    :root{
      --bg:#08145c;
      --bg2:#0b1b78;
      --bg3:#061041;
      --line:rgba(255,255,255,.14);
      --line-2:rgba(255,255,255,.22);
      --text:#ffffff;
      --muted:rgba(255,255,255,.74);
      --muted-2:rgba(255,255,255,.56);
      --red:#ff3b57;
      --red-2:#ff4d6a;
      --pill:rgba(255,255,255,.05);
      --nav:rgba(6,16,65,.96);
      --max:760px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 58%,var(--bg3) 100%);
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button,
    input,
    select,
    textarea{
      font:inherit;
    }

    input,
    select,
    textarea{
      appearance:none;
      -webkit-appearance:none;
      border:none;
      outline:none;
      background:transparent;
      color:var(--text);
      width:100%;
      padding:0;
    }

    select option{
      color:#111827;
    }

    .app{
      width:min(100%, var(--max));
      margin:0 auto;
      padding:14px 14px 104px;
    }

    .topbar{
      display:flex;
      align-items:center;
      gap:10px;
      padding:6px 0 10px;
    }

    .back{
      width:36px;
      height:36px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      font-size:18px;
      flex:0 0 auto;
    }

    .title-wrap{
      min-width:0;
      flex:1;
    }

    .title-wrap .eyebrow{
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.18em;
      color:var(--muted-2);
    }

    .title-wrap h1{
      margin:2px 0 0;
      font-size:20px;
      line-height:1.1;
    }

    .form{
      margin-top:12px;
    }

    .field{
      padding:12px 0;
      border-bottom:1px solid var(--line);
    }

    .field.grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .field.grid-3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:14px;
    }

    .subfield{
      min-width:0;
    }

    .label{
      display:block;
      margin-bottom:8px;
      font-size:11px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted-2);
    }

    .input,
    .select,
    .textarea{
      min-height:22px;
      font-size:14px;
      line-height:1.45;
    }

    .textarea{
      resize:none;
      min-height:90px;
    }

    .switch-line{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }

    .switch-line .text{
      min-width:0;
      flex:1;
    }

    .switch-line .title{
      font-size:13px;
      font-weight:700;
      line-height:1.3;
    }

    .switch{
      position:relative;
      width:58px;
      height:32px;
      flex:0 0 auto;
    }

    .switch input{
      position:absolute;
      opacity:0;
      pointer-events:none;
    }

    .switch span{
      position:absolute;
      inset:0;
      border-radius:999px;
      background:rgba(255,255,255,.12);
      border:1px solid var(--line);
      cursor:pointer;
      transition:.2s ease;
    }

    .switch span::after{
      content:"";
      position:absolute;
      top:3px;
      left:3px;
      width:24px;
      height:24px;
      border-radius:50%;
      background:#fff;
      transition:.2s ease;
    }

    .switch input:checked + span{
      background:linear-gradient(180deg,var(--red-2) 0%, var(--red) 100%);
      border-color:transparent;
    }

    .switch input:checked + span::after{
      transform:translateX(26px);
    }

    .choice-row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:2px;
    }

    .chip{
      position:relative;
      display:inline-flex;
    }

    .chip input{
      position:absolute;
      opacity:0;
      pointer-events:none;
    }

    .chip span{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 18px;
      border-radius:999px;
      border:1px solid var(--line-2);
      background:var(--pill);
      color:var(--muted);
      cursor:pointer;
      font-size:12px;
      white-space:nowrap;
      transition:.18s ease;
    }

    .chip input:checked + span{
      background:linear-gradient(180deg,var(--red-2) 0%, var(--red) 100%);
      border-color:transparent;
      color:#fff;
      box-shadow:0 8px 20px rgba(255,59,87,.20);
    }

    .hidden{
      display:none !important;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:18px;
    }

    .btn{
      height:46px;
      border:none;
      border-radius:999px;
      cursor:pointer;
      font-size:13px;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .btn.secondary{
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid var(--line);
    }

    .btn.primary{
      background:linear-gradient(180deg,var(--red-2) 0%, var(--red) 100%);
      color:#fff;
      box-shadow:0 10px 24px rgba(255,59,87,.22);
    }

    .status{
      margin-top:12px;
      min-height:20px;
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
    }

    .status.error{
      color:#ffd7dd;
    }

    .status.success{
      color:#d9ffeb;
    }

    .nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:0;
      width:min(100%, var(--max));
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:4px;
      background:var(--nav);
      backdrop-filter:blur(14px);
      border-top:1px solid var(--line);
      padding:8px 10px calc(8px + env(safe-area-inset-bottom));
      z-index:50;
    }

    .nav a{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      font-size:10px;
      color:var(--muted);
      padding:6px 2px;
      border-radius:10px;
      min-width:0;
    }

    .nav a.active{
      color:#fff;
      background:rgba(255,255,255,.07);
    }

    .nav .icon{
      font-size:15px;
      line-height:1;
    }

    @media (max-width:640px){
      .field.grid-2,
      .field.grid-3{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

    <form class="form" id="autoPostForm">

        <label class="label" for="caption_style">Caption style</label>
        <select class="select" id="caption_style" name="caption_style">
          <option value="professional">Professional</option>
          <option value="promotional">Promotional</option>
          <option value="motivational">Motivational</option>
          <option value="friendly">Friendly</option>

      </div>

      <div class="field" id="visualStyleWrap">
        <label class="label" for="visual_style">Visual style</label>
        <select class="select" id="visual_style" name="visual_style">
          <option value="clean">Clean</option>
          <option value="premium">Premium</option>

          <option value="brand">Brand-focused</option>

      </div>

      <div class="field">

          <option value="weekly_day">A particular day of the week</option>
          <option value="weekly">Weekly</option>

      <div id="multiTimeWrap" class="field grid-3 hidden">
        <div class="subfield">

          <input class="input" id="post_time_1" name="post_time_1" type="time" value="09:00" />
        </div>
        <div class="subfield">
          <label class="label" for="post_time_2">Second time</label>
          <input class="input" id="post_time_2" name="post_time_2" type="time" value="13:00" />
        </div>
        <div class="subfield" id="postTime3Wrap">

        </div>
      </div>

      <div id="dayOfWeekWrap" class="field hidden">
        <label class="label" for="day_of_week">Day of the week</label>
        <select class="select" id="day_of_week" name="day_of_week">
          <option value="monday">Monday</option>
          <option value="tuesday">Tuesday</option>
          <option value="wednesday">Wednesday</option>
          <option value="thursday">Thursday</option>
          <option value="friday">Friday</option>
          <option value="saturday">Saturday</option>
          <option value="sunday">Sunday</option>
        </select>
      </div>

      <div id="dayOfMonthWrap" class="field hidden">
        <label class="label" for="day_of_month">Day of month</label>
        <select class="select" id="day_of_month" name="day_of_month"></select>
      </div>

      <div class="field">
        <span class="label">Post destinations</span>
        <div class="choice-row">
          <label class="chip"><input type="checkbox" name="platforms" value="view" checked /><span>View</span></label>
          <label class="chip"><input type="checkbox" name="platforms" value="facebook" /><span>Facebook</span></label>
          <label class="chip"><input type="checkbox" name="platforms" value="instagram" /><span>Instagram</span></label>
          <label class="chip"><input type="checkbox" name="platforms" value="x" /><span>X</span></label>
          <label class="chip"><input type="checkbox" name="platforms" value="youtube" /><span>YouTube</span></label>
          <label class="chip"><input type="checkbox" name="platforms" value="tiktok" /><span>TikTok</span></label>
          <label class="chip"><input type="checkbox" name="platforms" value="telegram" /><span>Telegram</span></label>
          <label class="chip"><input type="checkbox" name="platforms" value="linkedin" /><span>LinkedIn</span></label>
        </div>
      </div>

      <div class="field">
        <div class="switch-line">
          <div class="text">
            <div class="title">Auto post immediately after generation</div>
          </div>
          <label class="switch">
            <input id="auto_post" name="auto_post" type="checkbox" checked />
            <span></span>
          </label>
        </div>
      </div>

      <div class="field">
        <div class="switch-line">
          <div class="text">
            <div class="title">Rule active</div>
          </div>
          <label class="switch">
            <input id="is_active" name="is_active" type="checkbox" checked />
            <span></span>

      <div class="actions">

        <button class="btn primary" type="submit">Save rule</button>
      </div>

      <div class="status" id="formStatus"></div>
    </form>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

    const supabaseClient = window.supabase?.createClient
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true,
            flowType: "pkce"
          }
        })
      : null;

    const frequencySelect = document.getElementById("frequency");
    const contentTypeSelect = document.getElementById("content_type");
    const singleTimeWrap = document.getElementById("singleTimeWrap");
    const multiTimeWrap = document.getElementById("multiTimeWrap");
    const postTime3Wrap = document.getElementById("postTime3Wrap");
    const dayOfWeekWrap = document.getElementById("dayOfWeekWrap");
    const dayOfMonthWrap = document.getElementById("dayOfMonthWrap");
    const dayOfMonthSelect = document.getElementById("day_of_month");
    const captionStyleWrap = document.getElementById("captionStyleWrap");
    const visualStyleWrap = document.getElementById("visualStyleWrap");

    async function ensureAuth() {
      if (typeof window.protectPage === "function") {
        await window.protectPage("ai-auto-post-create.html");
      } else if (supabaseClient) {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) {
          location.href = `login.html?next=${encodeURIComponent("ai-auto-post-create.html")}`;
          return;
        }
      }
      document.documentElement.classList.remove("auth-loading");
    }

    function sortTimes(times) {
      return [...times]
        .filter(Boolean)
        .sort((a, b) => a.localeCompare(b));
    }

    function platformsLabel(platforms) {
      return platforms.length ? platforms.join(", ") : "view";
    }

    function mapContentType(rawType) {
      const value = String(rawType || "").trim();

      if (value === "text_only") {
        return { content_type: "text", content_mode: "text_only" };
      }
      if (value === "image_only") {
        return { content_type: "image", content_mode: "image_only" };
      }
      if (value === "image_with_caption") {
        return { content_type: "image", content_mode: "image_with_caption" };
      }
      if (value === "video_only") {
        return { content_type: "video", content_mode: "video_only" };
      }
      if (value === "video_with_caption") {
        return { content_type: "video", content_mode: "video_with_caption" };
      }

      return { content_type: "text", content_mode: "text_only" };
    }

    function applyContentTypeVisibility() {
      const selected = String(contentTypeSelect.value || "text_only");
      const needsCaption = selected === "text_only" || selected === "image_with_caption" || selected === "video_with_caption";
      const needsVisual = selected === "image_only" || selected === "image_with_caption" || selected === "video_only" || selected === "video_with_caption";

      captionStyleWrap.classList.toggle("hidden", !needsCaption);
      visualStyleWrap.classList.toggle("hidden", !needsVisual);
    }

    function fillDayOfMonthOptions() {
      dayOfMonthSelect.innerHTML = Array.from({ length: 31 }, (_, i) => {
        const day = i + 1;
        return `<option value="${day}">${day}</option>`;
      }).join("");
    }

    function applyScheduleVisibility() {
      const value = frequencySelect.value;

      singleTimeWrap.classList.add("hidden");
      multiTimeWrap.classList.add("hidden");
      postTime3Wrap.classList.remove("hidden");
      dayOfWeekWrap.classList.add("hidden");
      dayOfMonthWrap.classList.add("hidden");

      if (value === "three_times_daily") {
        multiTimeWrap.classList.remove("hidden");
        postTime3Wrap.classList.remove("hidden");
      } else if (value === "twice_daily") {
        multiTimeWrap.classList.remove("hidden");
        postTime3Wrap.classList.add("hidden");
      } else if (value === "weekly_day") {
        singleTimeWrap.classList.remove("hidden");
        dayOfWeekWrap.classList.remove("hidden");
      } else if (value === "monthly") {
        singleTimeWrap.classList.remove("hidden");
        dayOfMonthWrap.classList.remove("hidden");
      } else {
        singleTimeWrap.classList.remove("hidden");
      }
    }

    function buildSchedulePayload(formData) {
      const frequency = String(formData.get("frequency") || "daily");
      const baseTime = String(formData.get("post_time") || "09:00");
      const time1 = String(formData.get("post_time_1") || "09:00");
      const time2 = String(formData.get("post_time_2") || "13:00");
      const time3 = String(formData.get("post_time_3") || "18:00");
      const dayOfWeek = String(formData.get("day_of_week") || "monday");
      const dayOfMonth = Number(formData.get("day_of_month") || 1);

      let schedule_times = [];
      let schedule_day_of_week = null;
      let schedule_day_of_month = null;

      if (frequency === "three_times_daily") {
        schedule_times = sortTimes([time1, time2, time3]);
      } else if (frequency === "twice_daily") {
        schedule_times = sortTimes([time1, time2]);
      } else {
        schedule_times = [baseTime];
      }

      if (frequency === "weekly_day") {
        schedule_day_of_week = dayOfWeek;
      }

      if (frequency === "monthly") {
        schedule_day_of_month = dayOfMonth;
      }

      return {
        frequency,
        post_time: schedule_times[0] || "09:00",
        schedule_times,
        schedule_day_of_week,
        schedule_day_of_month
      };
    }

    function nextWeekdayDate(targetWeekday) {
      const map = {
        sunday: 0,
        monday: 1,
        tuesday: 2,
        wednesday: 3,
        thursday: 4,
        friday: 5,
        saturday: 6
      };

      const target = map[targetWeekday] ?? 1;
      const now = new Date();
      const date = new Date(now);
      const diff = (target - date.getDay() + 7) % 7;
      date.setDate(date.getDate() + diff);
      return date;
    }

    function computeNextRunISO(schedule) {
      const now = new Date();
      const firstTime = schedule.schedule_times?.[0] || schedule.post_time || "09:00";
      const [hours, minutes] = String(firstTime).split(":").map(Number);

      const next = new Date();
      next.setSeconds(0, 0);
      next.setHours(Number.isFinite(hours) ? hours : 9, Number.isFinite(minutes) ? minutes : 0, 0, 0);

      if (schedule.frequency === "weekly_day") {
        const weekdayDate = nextWeekdayDate(schedule.schedule_day_of_week || "monday");
        next.setFullYear(weekdayDate.getFullYear(), weekdayDate.getMonth(), weekdayDate.getDate());
        if (next <= now) next.setDate(next.getDate() + 7);
        return next.toISOString();
      }

      if (schedule.frequency === "weekly") {
        if (next <= now) next.setDate(next.getDate() + 7);
        return next.toISOString();
      }

      if (schedule.frequency === "biweekly") {
        if (next <= now) next.setDate(next.getDate() + 14);
        return next.toISOString();
      }

      if (schedule.frequency === "monthly") {
        const day = Math.max(1, Math.min(31, Number(schedule.schedule_day_of_month || 1)));
        next.setDate(day);
        if (next <= now) {
          next.setMonth(next.getMonth() + 1);
          next.setDate(day);
        }
        return next.toISOString();
      }

      if (schedule.frequency === "every_2_days") {
        if (next <= now) next.setDate(next.getDate() + 2);
        return next.toISOString();
      }

      if (schedule.frequency === "three_times_daily" || schedule.frequency === "twice_daily" || schedule.frequency === "daily") {
        if (next <= now) next.setDate(next.getDate() + 1);
        return next.toISOString();
      }

      if (next <= now) next.setDate(next.getDate() + 1);
      return next.toISOString();
    }

    async function maybeLoadTemplate() {
      const templateId = new URLSearchParams(location.search).get("template_id");
      if (!templateId) return;

      try {
        const currentUser = window.currentUser || (await supabaseClient.auth.getUser()).data.user;
        if (!currentUser) return;

        const { data, error } = await supabaseClient
          .from("auto_post_templates")
          .select("*")
          .eq("id", templateId)
          .eq("user_id", currentUser.id)
          .single();

        if (error || !data) return;

        document.getElementById("title").value = data.title || "";
        document.getElementById("topic").value = data.prompt_template || "";
        document.getElementById("caption_style").value = data.caption_style || "professional";
        document.getElementById("visual_style").value = data.visual_style || "clean";

        if (data.content_mode) {
          contentTypeSelect.value = data.content_mode;
        } else if (data.content_type === "text") {
          contentTypeSelect.value = "text_only";
        } else if (data.content_type === "image") {
          contentTypeSelect.value = "image_with_caption";
        } else if (data.content_type === "video") {
          contentTypeSelect.value = "video_with_caption";
        }

        applyContentTypeVisibility();
      } catch (error) {
        console.error(error);
      }
    }

    async function handleSubmit(e) {
      e.preventDefault();

      const status = document.getElementById("formStatus");
      status.className = "status";
      status.textContent = "Saving rule...";

      try {
        const form = e.target;

        if (!(form instanceof HTMLFormElement)) {
          throw new Error("Form not found.");
        }

        const formData = new FormData(form);
        const currentUser = window.currentUser || (await supabaseClient.auth.getUser()).data.user;

        if (!currentUser) {
          location.href = `login.html?next=${encodeURIComponent("ai-auto-post-create.html")}`;
          return;
        }

        const title = String(formData.get("title") || "").trim();
        const topic = String(formData.get("topic") || "").trim();
        const contentTypeRaw = String(formData.get("content_type") || "text_only");
        const mappedType = mapContentType(contentTypeRaw);
        const captionStyle = String(formData.get("caption_style") || "professional");
        const visualStyle = String(formData.get("visual_style") || "clean");
        const autoPost = formData.get("auto_post") === "on";
        const isActive = formData.get("is_active") === "on";
        const platforms = formData.getAll("platforms").map(String);

        if (!title || !topic) {
          status.className = "status error";
          status.textContent = "Title and prompt are required.";
          return;
        }

        if (!platforms.length) {
          status.className = "status error";
          status.textContent = "Choose at least one destination.";
          return;
        }

        const schedule = buildSchedulePayload(formData);

        const payload = {
          user_id: currentUser.id,
          title,
          topic,
          prompt_template: topic,
          content_type: mappedType.content_type,
          content_mode: mappedType.content_mode,
          caption_style: captionStyle,
          visual_style: visualStyle,
          frequency: schedule.frequency,
          post_time: schedule.post_time,
          schedule_times: schedule.schedule_times,
          schedule_day_of_week: schedule.schedule_day_of_week,
          schedule_day_of_month: schedule.schedule_day_of_month,
          auto_post: autoPost,
          is_active: isActive,
          selected_platforms: platforms,
          platforms_label: platformsLabel(platforms),
          next_run_at: computeNextRunISO(schedule),
          updated_at: new Date().toISOString()
        };

        const { data, error } = await supabaseClient
          .from("auto_post_rules")
          .insert(payload)
          .select("id")
          .single();

        if (error) throw error;

        status.className = "status success";
        status.textContent = "Automation saved successfully.";

        setTimeout(() => {
          location.href = `ai-auto-post-rule-details.html?id=${encodeURIComponent(data.id)}`;
        }, 350);
      } catch (error) {
        console.error(error);
        status.className = "status error";
        status.textContent = error?.message || "Unable to save rule right now.";
      }
    }

    (async function init() {
      try {
        fillDayOfMonthOptions();
        applyScheduleVisibility();
        applyContentTypeVisibility();

        await ensureAuth();
        await maybeLoadTemplate();

        frequencySelect.addEventListener("change", applyScheduleVisibility);
        contentTypeSelect.addEventListener("change", applyContentTypeVisibility);

        const form = document.getElementById("autoPostForm");
        if (form) {
          form.addEventListener("submit", handleSubmit);
        }
      } catch (error) {
        console.error(error);
        document.documentElement.classList.remove("auth-loading");
      }
    })();
  </script>
</body>
</html>
