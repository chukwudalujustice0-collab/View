<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LinkedIn Connection | View</title>
  <meta name="theme-color" content="#08111f" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#08111f;color:#f4f7ff}
    .page{max-width:860px;margin:0 auto;padding:24px 16px}
    .hero,.card{background:#101b31;border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:18px;box-shadow:0 14px 40px rgba(0,0,0,.28)}
    .hero{margin-bottom:16px}
    .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
    .btn{min-height:48px;padding:0 16px;border:none;border-radius:16px;cursor:pointer;font-weight:800}
    .btn-primary{background:linear-gradient(180deg,#0a66c2,#004182);color:#fff}
    .btn-secondary{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.08)}
    .notice{display:none;margin-bottom:16px;padding:14px;border-radius:16px}
    .notice.show{display:block}
    .notice.success{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.24)}
    .notice.error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.24)}
    .notice.warn{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.24)}
  </style>
</head>
<body>
  <div class="page">
    <div id="notice" class="notice"></div>

    <section class="hero">
      <h1>Connect LinkedIn</h1>
      <p>Connect LinkedIn to save the account in View and prepare for LinkedIn posting.</p>
      <div class="actions">
        <button id="connectBtn" class="btn btn-primary" type="button">Connect LinkedIn</button>
        <a class="btn btn-secondary" href="connected-accounts.html" style="text-decoration:none;display:inline-flex;align-items:center;">All accounts</a>
      </div>
    </section>
  </div>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";
    const FN_BASE = `${SUPABASE_URL}/functions/v1`;
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const notice = document.getElementById("notice");
    const connectBtn = document.getElementById("connectBtn");

    function showNotice(message, type = "warn") {
      notice.className = `notice show ${type}`;
      notice.textContent = message;
    }

    async function getSessionOrWarn() {
      const { data, error } = await supabase.auth.getSession();
      if (error) throw error;
      const session = data?.session || null;
      if (!session?.access_token) {
        showNotice("You are not signed in. Please login first.", "warn");
        return null;
      }
      return session;
    }

    async function connectLinkedIn() {
      try {
        connectBtn.disabled = true;
        const session = await getSessionOrWarn();
        if (!session) return;

        const res = await fetch(
          `${FN_BASE}/linkedin-start?final_redirect=${encodeURIComponent(`${window.location.origin}/connected-accounts.html`)}`,
          {
            method: "GET",
            headers: {
              Authorization: `Bearer ${session.access_token}`
            }
          }
        );

        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data?.error || `LinkedIn start failed (${res.status})`);
        if (!data?.auth_url) throw new Error("linkedin-start did not return auth_url");

        window.location.href = data.auth_url;
      } catch (err) {
        showNotice(err.message || "Failed to start LinkedIn login.", "error");
      } finally {
        connectBtn.disabled = false;
      }
    }

    function readQueryMessage() {
      const params = new URLSearchParams(window.location.search);
      const status = params.get("status");
      const provider = params.get("provider");
      const message = params.get("message");

      if (provider !== "linkedin") return;
      if (status === "success") showNotice(message || "LinkedIn connected successfully.", "success");
      if (status === "error") showNotice(message || "LinkedIn connection failed.", "error");
    }

    connectBtn.addEventListener("click", connectLinkedIn);
    readQueryMessage();
  </script>
</body>
</html>
