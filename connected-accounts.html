<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connected Accounts | View</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;font-family:Arial,sans-serif}
    body{margin:0;background:#f4f7fc;color:#111827;padding:24px 16px 40px}
    .wrap{max-width:560px;margin:0 auto}
    .notice{display:none;padding:12px 14px;border-radius:14px;margin-bottom:16px;font-size:14px;line-height:1.5}
    .notice.show{display:block}
    .notice.error{background:#fee2e2;color:#b91c1c}
    .notice.success{background:#dcfce7;color:#15803d}
    .notice.info{background:#dbeafe;color:#1d4ed8}
    .card{background:#fff;border-radius:24px;padding:24px 20px;box-shadow:0 10px 30px rgba(15,23,42,.08)}
    .head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    .head h2{margin:0;font-size:22px;font-weight:800}
    .status{display:inline-flex;align-items:center;justify-content:center;min-height:36px;padding:0 14px;border-radius:999px;font-size:13px;font-weight:700;background:#fee2e2;color:#b91c1c}
    .status.connected{background:#dcfce7;color:#15803d}
    .desc,.meta,.small{line-height:1.6}
    .desc{margin:0 0 18px;color:#4b5563}
    .meta{margin:0 0 20px;color:#374151}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    button{border:none;border-radius:14px;min-height:54px;font-size:18px;font-weight:800;cursor:pointer}
    .connect{background:#1d4ed8;color:#fff}
    .disconnect{background:#fee2e2;color:#b91c1c}
    .small{margin-top:16px;font-size:13px;color:#6b7280}
  </style>
</head>
<body>
  <div class="wrap">
    <div id="notice" class="notice"></div>

    <div class="card">
      <div class="head">
        <h2>Facebook</h2>
        <div id="status" class="status">Not connected</div>
      </div>

      <p class="desc">Connect your Facebook Page for cross-posting.</p>
      <p id="meta" class="meta">No Facebook Page connected yet.</p>

      <div class="btns">
        <button class="connect" onclick="connectFacebook()">Connect Facebook</button>
        <button class="disconnect" onclick="disconnectFacebook()">Disconnect</button>
      </div>

      <div class="small">This stores the first Page returned by Facebook as the default publish target.</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";
    const APP_ID = "921040053900296";
    const VERCEL_BASE_URL = "https://view-psi-lac.vercel.app";
    const REDIRECT_URI = "https://view-psi-lac.vercel.app/connected-accounts.html";
    const API_URL = `${VERCEL_BASE_URL}/api/facebook-connect`;

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });

    function showNotice(message, type = "error") {
      const box = document.getElementById("notice");
      box.className = `notice show ${type}`;
      box.textContent = message;
    }

    function setStatusConnected(name, handle = "") {
      document.getElementById("status").textContent = "Connected";
      document.getElementById("status").classList.add("connected");
      document.getElementById("meta").textContent = handle ? `Connected as ${name} (${handle})` : `Connected as ${name}`;
    }

    function setStatusDisconnected() {
      document.getElementById("status").textContent = "Not connected";
      document.getElementById("status").classList.remove("connected");
      document.getElementById("meta").textContent = "No Facebook Page connected yet.";
    }

    async function getSession() {
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) throw error;
      if (!data.session?.user) {
        window.location.href = "login.html?next=connected-accounts.html";
        return null;
      }
      return data.session;
    }

    function connectFacebook() {
      const oauthUrl =
        "https://www.facebook.com/v20.0/dialog/oauth" +
        `?client_id=${encodeURIComponent(APP_ID)}` +
        `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}` +
        `&state=${encodeURIComponent("view_facebook_connect")}` +
        `&response_type=code` +
        `&scope=${encodeURIComponent("public_profile,pages_show_list,pages_manage_posts")}`;

      window.location.href = oauthUrl;
    }

    async function saveConnectionToSupabase(payload) {
      const session = await getSession();
      if (!session) return false;

      const user = session.user;
      const fbUser = payload.facebook_user || {};
      const pages = Array.isArray(payload.facebook_pages) ? payload.facebook_pages : [];
      const firstPage = pages[0] || null;

      if (!firstPage?.id || !firstPage?.access_token) {
        showNotice("Facebook connected, but no publishable Page was returned.", "error");
        return false;
      }

      const row = {
        user_id: user.id,
        platform: "facebook",
        account_name: firstPage.name || fbUser.name || "Facebook",
        account_handle: firstPage.id || fbUser.id || "",
        status: "connected",
        external_user_id: fbUser.id || null,
        external_page_id: firstPage.id,
        page_id: firstPage.id,
        page_name: firstPage.name || null,
        access_token: payload.access_token || null,
        page_token: firstPage.access_token,
        updated_at: new Date().toISOString()
      };

      const { error } = await supabaseClient
        .from("connected_accounts")
        .upsert(row, { onConflict: "user_id,platform" });

      if (error) {
        showNotice(error.message || "Could not save Facebook connection.", "error");
        return false;
      }

      setStatusConnected(row.account_name, row.account_handle);
      showNotice("Facebook connected successfully.", "success");
      return true;
    }

    async function handleRedirect() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      if (!code) return;

      try {
        showNotice("Completing Facebook connection...", "info");
        const res = await fetch(`${API_URL}?code=${encodeURIComponent(code)}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`);
        const data = await res.json();

        if (!res.ok || data.error) {
          showNotice(data.error || "Facebook connection failed.", "error");
          return;
        }

        await saveConnectionToSupabase(data);
        window.history.replaceState({}, document.title, window.location.pathname);
      } catch (e) {
        showNotice(e.message || "Facebook connection failed.", "error");
      }
    }

    async function loadConnectedAccount() {
      const session = await getSession();
      if (!session) return;

      const { data } = await supabaseClient
        .from("connected_accounts")
        .select("account_name, account_handle, status")
        .eq("user_id", session.user.id)
        .eq("platform", "facebook")
        .maybeSingle();

      if (data && data.status === "connected") {
        setStatusConnected(data.account_name || "Facebook", data.account_handle || "");
      } else {
        setStatusDisconnected();
      }
    }

    async function disconnectFacebook() {
      const session = await getSession();
      if (!session) return;

      const { error } = await supabaseClient
        .from("connected_accounts")
        .update({
          status: "disconnected",
          external_page_id: null,
          page_id: null,
          page_name: null,
          access_token: null,
          page_token: null,
          updated_at: new Date().toISOString()
        })
        .eq("user_id", session.user.id)
        .eq("platform", "facebook");

      if (error) {
        showNotice(error.message || "Could not disconnect Facebook.", "error");
        return;
      }

      setStatusDisconnected();
      showNotice("Facebook disconnected.", "success");
    }

    window.onload = async function () {
      await handleRedirect();
      await loadConnectedAccount();
    };
  </script>
</body>
</html>
