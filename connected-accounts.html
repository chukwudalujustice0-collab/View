<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connected Accounts | View</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f7fc;
      color: #111827;
      padding: 24px 16px 40px;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .back {
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      font-size: 20px;
      cursor: pointer;
    }

    .topbar h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 800;
    }

    .notice {
      display: none;
      padding: 12px 14px;
      border-radius: 14px;
      margin-bottom: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .notice.show {
      display: block;
    }

    .notice.error {
      background: #fee2e2;
      color: #b91c1c;
    }

    .notice.success {
      background: #dcfce7;
      color: #15803d;
    }

    .notice.info {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .head h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      background: #fee2e2;
      color: #b91c1c;
    }

    .status.connected {
      background: #dcfce7;
      color: #15803d;
    }

    .desc {
      margin: 0 0 18px;
      font-size: 15px;
      color: #4b5563;
      line-height: 1.6;
    }

    .meta {
      margin: 0 0 20px;
      font-size: 15px;
      color: #374151;
      line-height: 1.6;
    }

    .btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button.action-btn {
      border: none;
      border-radius: 14px;
      min-height: 54px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .connect {
      background: #1d4ed8;
      color: #fff;
    }

    .disconnect {
      background: #fee2e2;
      color: #b91c1c;
    }

    .small {
      margin-top: 16px;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }

    @media (max-width: 520px) {
      .btns {
        grid-template-columns: 1fr;
      }

      .topbar h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button class="back" onclick="window.location.href='settings.html'">←</button>
      <h1>Connected Accounts</h1>
    </div>

    <div id="notice" class="notice"></div>

    <div class="card">
      <div class="head">
        <h2>Facebook</h2>
        <div id="status" class="status">Not connected</div>
      </div>

      <p class="desc">Connect your Facebook account for cross-posting.</p>
      <p id="meta" class="meta">No Facebook account connected yet.</p>

      <div class="btns">
        <button class="action-btn connect" onclick="connectFacebook()">Connect Facebook</button>
        <button class="action-btn disconnect" onclick="disconnectFacebook()">Disconnect</button>
      </div>

      <div class="small">
        Test with the same Facebook account that is already an admin on your Meta app.
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

    const APP_ID = "921040053900296";
    const VERCEL_BASE_URL = "https://view-psi-lac.vercel.app";
    const REDIRECT_URI = "https://view-psi-lac.vercel.app/connected-accounts.html";
    const API_URL = `${VERCEL_BASE_URL}/api/facebook-connect`;

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    function showNotice(message, type = "error") {
      const box = document.getElementById("notice");
      box.className = `notice show ${type}`;
      box.textContent = message;
    }

    function clearNotice() {
      const box = document.getElementById("notice");
      box.className = "notice";
      box.textContent = "";
    }

    function setStatusConnected(name, handle = "") {
      const status = document.getElementById("status");
      const meta = document.getElementById("meta");

      status.textContent = "Connected";
      status.classList.add("connected");
      meta.textContent = handle ? `Connected as ${name} (${handle})` : `Connected as ${name}`;
    }

    function setStatusDisconnected() {
      const status = document.getElementById("status");
      const meta = document.getElementById("meta");

      status.textContent = "Not connected";
      status.classList.remove("connected");
      meta.textContent = "No Facebook account connected yet.";
    }

    async function getSessionWithRetry(maxWaitMs = 3000) {
      const start = Date.now();

      while (Date.now() - start < maxWaitMs) {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error) throw error;
        if (data.session?.user) return data.session;
        await new Promise(resolve => setTimeout(resolve, 200));
      }

      return null;
    }

    async function requireSession() {
      const session = await getSessionWithRetry();
      if (!session?.user) {
        showNotice("Login to your app first before connecting Facebook.", "error");
        return null;
      }
      return session;
    }

    function connectFacebook() {
      clearNotice();

      const oauthUrl =
        "https://www.facebook.com/v20.0/dialog/oauth" +
        `?client_id=${encodeURIComponent(APP_ID)}` +
        `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}` +
        `&state=${encodeURIComponent("view_facebook_connect")}` +
        `&response_type=code` +
        `&scope=${encodeURIComponent("public_profile")}`;

      window.location.href = oauthUrl;
    }

    async function saveConnectionToSupabase(payload) {
      const session = await requireSession();
      if (!session) return false;

      const user = session.user;
      const facebookUser = payload.facebook_user || {};
      const facebookPages = Array.isArray(payload.facebook_pages) ? payload.facebook_pages : [];
      const firstPage = facebookPages[0] || null;

      const row = {
        user_id: user.id,
        platform: "facebook",
        account_name: firstPage?.name || facebookUser.name || "Facebook",
        account_handle: firstPage?.id || facebookUser.id || "",
        status: "connected",
        external_user_id: facebookUser.id || null,
        external_page_id: firstPage?.id || null,
        access_token: firstPage?.access_token || payload.access_token || null,
        updated_at: new Date().toISOString()
      };

      const { error } = await supabaseClient
        .from("connected_accounts")
        .upsert(row, { onConflict: "user_id,platform" });

      if (error) {
        showNotice(error.message || "Could not save Facebook connection.", "error");
        return false;
      }

      setStatusConnected(row.account_name, row.account_handle);
      showNotice("Facebook connected successfully.", "success");
      return true;
    }

    async function handleFacebookRedirect() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");

      if (!code) return;

      clearNotice();
      showNotice("Completing Facebook connection...", "info");

      try {
        const response = await fetch(
          `${API_URL}?code=${encodeURIComponent(code)}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`
        );

        const result = await response.json();

        if (!response.ok || result.error) {
          showNotice(
            typeof result.error === "string"
              ? result.error
              : JSON.stringify(result.error || result),
            "error"
          );
          return;
        }

        await saveConnectionToSupabase(result);

        window.history.replaceState({}, document.title, window.location.pathname);
      } catch (error) {
        showNotice(error.message || "Facebook connection failed.", "error");
      }
    }

    async function loadSavedConnection() {
      try {
        const session = await requireSession();
        if (!session) {
          setStatusDisconnected();
          return;
        }

        const user = session.user;
        const { data, error } = await supabaseClient
          .from("connected_accounts")
          .select("account_name, account_handle, status")
          .eq("user_id", user.id)
          .eq("platform", "facebook")
          .maybeSingle();

        if (error || !data || data.status !== "connected") {
          setStatusDisconnected();
          return;
        }

        setStatusConnected(data.account_name || "Facebook", data.account_handle || "");
      } catch (error) {
        showNotice(error.message || "Could not load connected account.", "error");
        setStatusDisconnected();
      }
    }

    async function disconnectFacebook() {
      try {
        const session = await requireSession();
        if (!session) return;

        const user = session.user;
        const { error } = await supabaseClient
          .from("connected_accounts")
          .update({
            status: "disconnected",
            account_name: "",
            account_handle: "",
            access_token: null,
            external_user_id: null,
            external_page_id: null,
            updated_at: new Date().toISOString()
          })
          .eq("user_id", user.id)
          .eq("platform", "facebook");

        if (error) {
          showNotice(error.message || "Could not disconnect Facebook.", "error");
          return;
        }

        setStatusDisconnected();
        showNotice("Facebook disconnected.", "success");
      } catch (error) {
        showNotice(error.message || "Could not disconnect Facebook.", "error");
      }
    }

    window.onload = async function () {
      await handleFacebookRedirect();
      await loadSavedConnection();
    };
  </script>
</body>
</html>
