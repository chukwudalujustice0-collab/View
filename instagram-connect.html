<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Instagram Connect | View</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#08111f;
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .card{
      width:min(100%,420px);
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:20px;
      padding:24px;
    }
    h1{
      margin:0 0 10px;
      font-size:26px;
    }
    p{
      margin:0 0 18px;
      color:#c7d2fe;
      line-height:1.6;
    }
    .btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:14px 16px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(135deg,#fcb045,#f77737,#e1306c,#7c3aed);
    }
    .note{
      margin-top:14px;
      font-size:14px;
      color:#c7d2fe;
      white-space:pre-wrap;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Instagram Connect</h1>
    <p>Tap the button below to test the connection route.</p>

    <button class="btn" onclick="startInstagramConnect()">Connect Instagram</button>

    <div id="note" class="note">Ready.</div>
  </div>

  <script>
    function startInstagramConnect() {
      var note = document.getElementById("note");
      note.textContent = "Button clicked.";

      var finalRedirect = window.location.origin + window.location.pathname;
      var url = new URL("https://ezarjrxzkqqsbyirxttg.supabase.co/functions/v1/instagram-start");

      url.searchParams.set("final_redirect", finalRedirect);
      url.searchParams.set("user_id", "test-user");

      note.textContent = "Redirecting to: " + url.toString();

      setTimeout(function () {
        window.location.href = url.toString();
      }, 300);
    }

    window.startInstagramConnect = startInstagramConnect;
  </script>
</body>
</html>
