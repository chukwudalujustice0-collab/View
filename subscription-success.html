<!DOCTYPE html>
<html lang="en" class="auth-loading">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Subscription Success | View</title>
  <meta name="theme-color" content="#0b1454" />

  <style>
    html.auth-loading, html.auth-loading body{visibility:hidden;}
    :root{
      --bg:#07103a;
      --bg2:#0b1454;
      --card:rgba(255,255,255,.08);
      --card2:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.09);
      --text:#f5f7ff;
      --muted:#b8c3ff;
      --red:#ff4d67;
      --blue:#4f7cff;
      --green:#1bc47d;
      --shadow:0 16px 40px rgba(0,0,0,.28);
      --safe-top:env(safe-area-inset-top);
      --safe-bottom:env(safe-area-inset-bottom);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(255,77,103,.16), transparent 20%),
        radial-gradient(circle at top left, rgba(79,124,255,.22), transparent 22%),
        linear-gradient(180deg,var(--bg2),#060d2f 42%, #040922 100%);
      min-height:100vh;
    }
    a{text-decoration:none;color:inherit}
    .app{
      width:min(100%,430px);
      margin:0 auto;
      min-height:100vh;
      padding:calc(10px + var(--safe-top)) 14px calc(18px + var(--safe-bottom));
      display:flex;
      flex-direction:column;
    }
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;
    }
    .back-btn,.icon-btn{
      width:40px;height:40px;border-radius:12px;border:1px solid var(--line);
      background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;
      box-shadow:var(--shadow)
    }
    .brand{
      display:flex;align-items:center;gap:10px;flex:1;justify-content:center;min-width:0;
    }
    .brand img{width:32px;height:32px;border-radius:10px;object-fit:cover}
    .brand h1{margin:0;font-size:15px;line-height:1.1}
    .brand p{margin:2px 0 0;font-size:11px;color:var(--muted)}
    .card{
      border:1px solid var(--line);
      background:var(--card);
      border-radius:24px;
      padding:16px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }
    .hero{
      text-align:center;
      margin-top:16px;
      background:linear-gradient(135deg, rgba(27,196,125,.18), rgba(79,124,255,.20), rgba(255,77,103,.16));
    }
    .check{
      width:72px;height:72px;border-radius:24px;margin:0 auto 12px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(27,196,125,.14);
      border:1px solid rgba(27,196,125,.26);
      font-size:34px;
    }
    .hero h2{margin:0;font-size:22px;line-height:1.15}
    .hero p{margin:8px 0 0;font-size:12px;color:var(--muted);line-height:1.55}
    .plan-box{
      margin-top:14px;
      padding:12px;
      border-radius:18px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      text-align:left;
    }
    .plan-box .top{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    .plan-box strong{font-size:14px}
    .badge{
      padding:5px 9px;border-radius:999px;font-size:10px;font-weight:800;
      background:rgba(27,196,125,.12);color:#c8ffe5;border:1px solid rgba(27,196,125,.24);
    }
    .meta{
      margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px;
    }
    .mini{
      padding:10px;border-radius:16px;background:var(--card2);border:1px solid var(--line);
    }
    .mini span{display:block;font-size:10px;color:var(--muted)}
    .mini strong{display:block;margin-top:4px;font-size:13px}
    .actions{margin-top:14px;display:grid;gap:10px}
    .btn{
      width:100%;border:none;border-radius:16px;padding:14px 12px;font-weight:800;font-size:13px;
      color:white;background:linear-gradient(135deg, var(--red), #ff7d78 58%, var(--blue));
      box-shadow:var(--shadow);
      text-align:center;display:block;
    }
    .btn.secondary{
      background:var(--card2);
      border:1px solid var(--line);
      color:#eef2ff;
      box-shadow:none;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    document.documentElement.classList.add("auth-loading");

    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_REAL_ANON_KEY";

    window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        flowType: "pkce"
      }
    });

    async function protectPage(nextPage) {
      try {
        const { data } = await supabaseClient.auth.getSession();
        const user = data?.session?.user;
        if (!user) {
          location.replace(`login.html?next=${encodeURIComponent(nextPage || "home.html")}`);
          return null;
        }
        document.documentElement.classList.remove("auth-loading");
        return user;
      } catch {
        location.replace("login.html");
        return null;
      }
    }

    function getFrom() {
      const from = new URLSearchParams(location.search).get("from");
      if (from === "wallet") return "wallet";
      if (from === "profile") return "profile";
      return "settings";
    }

    function getBackHref() {
      const from = getFrom();
      if (from === "wallet") return "wallet.html";
      if (from === "profile") return "profile.html";
      return "settings.html";
    }

    const USD_RATE = 1500;

    function ngnToUsd(ngn){
      return (Number(ngn || 0) / USD_RATE).toFixed(2);
    }

    function ngn(v){
      return new Intl.NumberFormat("en-NG", { style:"currency", currency:"NGN" }).format(Number(v || 0));
    }

    function fmtDate(v){
      if(!v) return "—";
      return new Date(v).toLocaleString("en-NG", {
        day:"numeric", month:"short", year:"numeric"
      });
    }
  </script>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <a id="backBtn" class="back-btn" href="settings.html" aria-label="Back">←</a>
      <div class="brand">
        <img src="icons/view-logo.png" alt="View logo" />
        <div>
          <h1>Subscription</h1>
          <p>Activated successfully</p>
        </div>
      </div>
      <a id="doneBtnTop" class="icon-btn" href="settings.html" aria-label="Done">✓</a>
    </div>

    <section class="card hero">
      <div class="check">✓</div>
      <h2>Subscription Activated</h2>
      <p>Your plan is now active and ready to use across View.</p>

      <div class="plan-box">
        <div class="top">
          <strong id="planName">Loading...</strong>
          <span class="badge">Active</span>
        </div>

        <div class="meta">
          <div class="mini">
            <span>Price</span>
            <strong id="planPrice">$0.00</strong>
          </div>
          <div class="mini">
            <span>Expires</span>
            <strong id="planExpiry">—</strong>
          </div>
        </div>
      </div>

      <div class="actions">
        <a id="manageBtn" class="btn" href="subscription.html?from=settings">View Subscription</a>
        <a id="historyBtn" class="btn secondary" href="subscription-history.html?from=settings">Payment History</a>
      </div>
    </section>
  </main>

  <script>
    (async () => {
      const user = await protectPage("home.html");
      if (!user) return;

      const from = getFrom();
      const backHref = getBackHref();

      document.getElementById("backBtn").href = backHref;
      document.getElementById("doneBtnTop").href = backHref;
      document.getElementById("manageBtn").href = `subscription.html?from=${encodeURIComponent(from)}`;
      document.getElementById("historyBtn").href = `subscription-history.html?from=${encodeURIComponent(from)}`;

      try {
        const { data: sub, error } = await supabaseClient
          .from("user_subscriptions")
          .select("*")
          .eq("user_id", user.id)
          .eq("status", "active")
          .order("created_at", { ascending: false })
          .limit(1)
          .maybeSingle();

        if (error) throw error;

        if (!sub) {
          document.getElementById("planName").textContent = "No active plan";
          document.getElementById("planPrice").textContent = "$0.00";
          document.getElementById("planExpiry").textContent = "—";
          return;
        }

        const planName = sub.plan_name || sub.name || "Subscription";
        const amountNgn = Number(sub.amount || 0);

        document.getElementById("planName").textContent = planName;
        document.getElementById("planPrice").textContent = `$${ngnToUsd(amountNgn)} · ${ngn(amountNgn)}`;
        document.getElementById("planExpiry").textContent = fmtDate(sub.end_date);
      } catch (err) {
        console.error(err);
        document.getElementById("planName").textContent = "Plan loaded with limited info";
      }
    })();
  </script>
</body>
</html>
