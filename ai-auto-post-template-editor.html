<!DOCTYPE html>
<html lang="en" class="auth-loading">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Template Editor | View</title>
  <meta name="theme-color" content="#08145c" />
  <script>document.documentElement.classList.add("auth-loading");</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/auth-guard.js"></script>
  <style>
    html.auth-loading,html.auth-loading body{visibility:hidden;opacity:0}
    :root{
      --bg:#08145c;--bg2:#0b1b78;--bg3:#061041;--line:rgba(255,255,255,.15);
      --text:#fff;--muted:rgba(255,255,255,.73);--muted2:rgba(255,255,255,.55);--red:#ff3b57;--max:760px
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--text);background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 58%,var(--bg3) 100%);min-height:100vh}
    a{color:inherit;text-decoration:none} button,input,select,textarea{font:inherit}
    .app{width:min(100%,var(--max));margin:0 auto;padding:14px 14px 100px}
    .topbar{display:flex;align-items:center;gap:10px;padding:6px 0 10px}
    .back{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);background:rgba(255,255,255,.05);font-size:18px;flex:0 0 auto}
    .head{min-width:0;flex:1}.head .eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted2)}
    .head h1{margin:2px 0 0;font-size:20px;line-height:1.1}
    .form{margin-top:8px}
    .field{padding:12px 0;border-bottom:1px solid var(--line)}
    .label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);margin-bottom:7px;font-weight:700}
    .input,.select,.textarea{width:100%;border:none;outline:none;background:transparent;color:#fff;padding:0;min-height:22px;font-size:14px}
    .select{appearance:none}.select option{color:#111}
    .textarea{resize:none;min-height:90px;line-height:1.55}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
    .btn{height:44px;border:none;border-radius:999px;cursor:pointer;font-size:13px;font-weight:700}
    .btn.secondary{background:rgba(255,255,255,.08);color:#fff;border:1px solid var(--line)}
    .btn.primary{background:var(--red);color:#fff}
    .status{margin-top:12px;min-height:18px;font-size:12px;color:var(--muted)}
    .status.error{color:#ffd5dc}.status.success{color:#d9ffeb}
    .nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(100%,var(--max));display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:rgba(6,16,65,.95);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:8px 10px calc(8px + env(safe-area-inset-bottom))}
    .nav a{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10px;color:var(--muted);padding:6px 2px;border-radius:10px}
    .nav a.active{color:#fff;background:rgba(255,255,255,.07)}
    .nav .icon{font-size:15px;line-height:1}
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <a class="back" href="ai-auto-post-templates.html">‹</a>
      <div class="head">
        <div class="eyebrow">View • Auto Content Agent</div>
        <h1 id="pageTitle">New Template</h1>
      </div>
    </header>

    <form class="form" id="templateForm">
      <div class="field">
        <label class="label" for="title">Template title</label>
        <input class="input" id="title" name="title" type="text" placeholder="Motivational business post" required />
      </div>

      <div class="field">
        <label class="label" for="content_type">Content type</label>
        <select class="select" id="content_type" name="content_type">
          <option value="text">Text</option>
          <option value="image">Image</option>
          <option value="video">Video</option>
        </select>
      </div>

      <div class="field">
        <label class="label" for="category">Category</label>
        <input class="input" id="category" name="category" type="text" placeholder="Business / Fashion / Church / Logistics" />
      </div>

      <div class="field">
        <label class="label" for="caption_style">Caption style</label>
        <select class="select" id="caption_style" name="caption_style">
          <option value="professional">Professional</option>
          <option value="promotional">Promotional</option>
          <option value="motivational">Motivational</option>
          <option value="friendly">Friendly</option>
          <option value="educational">Educational</option>
        </select>
      </div>

      <div class="field">
        <label class="label" for="visual_style">Visual style</label>
        <select class="select" id="visual_style" name="visual_style">
          <option value="clean">Clean</option>
          <option value="premium">Premium</option>
          <option value="realistic">Realistic</option>
          <option value="brand">Brand</option>
        </select>
      </div>

      <div class="field">
        <label class="label" for="prompt_template">Template prompt</label>
        <textarea class="textarea" id="prompt_template" name="prompt_template" placeholder="Write the reusable AI prompt here..." required></textarea>
      </div>

      <div class="actions">
        <a class="btn secondary" href="ai-auto-post-templates.html" style="display:flex;align-items:center;justify-content:center;">Cancel</a>
        <button class="btn primary" type="submit">Save template</button>
      </div>

      <div class="status" id="formStatus"></div>
    </form>
  </main>

  <nav class="nav">
    <a href="ai-auto-post.html"><span class="icon">⌂</span><span>Home</span></a>
    <a href="ai-auto-post-create.html"><span class="icon">＋</span><span>Create</span></a>
    <a href="ai-auto-post-rules.html"><span class="icon">≣</span><span>Rules</span></a>
    <a href="ai-auto-post-templates.html" class="active"><span class="icon">✦</span><span>Templates</span></a>
    <a href="dashboard.html"><span class="icon">◉</span><span>Dashboard</span></a>
  </nav>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";
    const supabaseClient = window.supabase?.createClient
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:true, flowType:"pkce" } })
      : null;

    const templateId = new URLSearchParams(location.search).get("id");

    async function ensureAuth(){
      if (typeof window.protectPage === "function") await window.protectPage("ai-auto-post-template-editor.html");
      else if (supabaseClient) {
        const { data:{ session } } = await supabaseClient.auth.getSession();
        if (!session) {
          location.href = `login.html?next=${encodeURIComponent(location.pathname + location.search)}`;
          return;
        }
      }
      document.documentElement.classList.remove("auth-loading");
    }

    async function loadTemplate(){
      if (!templateId) return;

      try{
        document.getElementById("pageTitle").textContent = "Edit Template";
        const currentUser = window.currentUser || (await supabaseClient.auth.getUser()).data.user;
        const { data, error } = await supabaseClient
          .from("auto_post_templates")
          .select("*")
          .eq("id", templateId)
          .eq("user_id", currentUser.id)
          .single();

        if (error) throw error;

        document.getElementById("title").value = data.title || "";
        document.getElementById("content_type").value = data.content_type || "text";
        document.getElementById("category").value = data.category || "";
        document.getElementById("caption_style").value = data.caption_style || "professional";
        document.getElementById("visual_style").value = data.visual_style || "clean";
        document.getElementById("prompt_template").value = data.prompt_template || "";
      }catch(error){
        console.error(error);
      }
    }

    document.getElementById("templateForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const status = document.getElementById("formStatus");
      status.className = "status";
      status.textContent = "Saving template...";

      try{
        const currentUser = window.currentUser || (await supabaseClient.auth.getUser()).data.user;
        const payload = {
          user_id: currentUser.id,
          title: document.getElementById("title").value.trim(),
          content_type: document.getElementById("content_type").value,
          category: document.getElementById("category").value.trim(),
          caption_style: document.getElementById("caption_style").value,
          visual_style: document.getElementById("visual_style").value,
          prompt_template: document.getElementById("prompt_template").value.trim(),
          updated_at: new Date().toISOString()
        };

        if (!payload.title || !payload.prompt_template) {
          status.className = "status error";
          status.textContent = "Title and prompt are required.";
          return;
        }

        let error;
        if (templateId) {
          ({ error } = await supabaseClient.from("auto_post_templates").update(payload).eq("id", templateId));
        } else {
          ({ error } = await supabaseClient.from("auto_post_templates").insert(payload));
        }

        if (error) throw error;

        status.className = "status success";
        status.textContent = "Template saved successfully.";
        setTimeout(() => { location.href = "ai-auto-post-templates.html"; }, 350);
      }catch(error){
        console.error(error);
        status.className = "status error";
        status.textContent = error?.message || "Unable to save template.";
      }
    });

    (async function init(){
      try{
        await ensureAuth();
        await loadTemplate();
      }catch(error){
        console.error(error);
        document.documentElement.classList.remove("auth-loading");
      }
    })();
  </script>
</body>
</html>
