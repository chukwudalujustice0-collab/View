<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Video Feed | View</title>
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#000;
      --panel:rgba(0,0,0,.46);
      --panel-soft:rgba(255,255,255,.12);
      --line:rgba(255,255,255,.12);
      --text:#fff;
      --muted:rgba(255,255,255,.82);
      --muted-2:rgba(255,255,255,.64);
      --primary:#ff2f73;
      --blue:#22d3ee;
      --shadow:0 12px 30px rgba(0,0,0,.28);
      --safe-top:env(safe-area-inset-top);
      --safe-bottom:env(safe-area-inset-bottom);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      color:var(--text);
    }

    body{
      position:relative;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button{
      border:none;
      outline:none;
      background:none;
      color:inherit;
      font:inherit;
      cursor:pointer;
    }

    .notice{
      display:none;
      position:fixed;
      top:calc(var(--safe-top) + 12px);
      left:50%;
      transform:translateX(-50%);
      width:min(92%,540px);
      z-index:120;
      padding:13px 14px;
      border-radius:16px;
      font-size:14px;
      line-height:1.5;
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
    }
    .notice.show{display:block}
    .notice.error{background:rgba(127,29,29,.92);color:#fecaca;border:1px solid rgba(255,255,255,.08)}
    .notice.success{background:rgba(5,46,22,.92);color:#d1fae5;border:1px solid rgba(255,255,255,.08)}
    .notice.info{background:rgba(12,20,36,.94);color:#dbeafe;border:1px solid rgba(255,255,255,.08)}

    .feed-shell{
      position:relative;
      width:100%;
      height:100vh;
      overflow-y:auto;
      scroll-snap-type:y mandatory;
      background:#000;
    }

    .feed-shell::-webkit-scrollbar{
      display:none;
    }

    .video-slide{
      position:relative;
      width:100%;
      height:100vh;
      scroll-snap-align:start;
      overflow:hidden;
      background:#000;
    }

    .video-media{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      background:#000;
      z-index:1;
    }

    .video-placeholder{
      position:absolute;
      inset:0;
      z-index:1;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at top, rgba(34,211,238,.16), transparent 28%),
        linear-gradient(180deg,#111827,#020617);
      color:#fff;
      text-align:center;
      padding:24px;
      line-height:1.6;
      font-weight:700;
      font-size:18px;
    }

    .overlay-top{
      position:absolute;
      top:0;
      left:0;
      right:0;
      z-index:20;
      padding:calc(var(--safe-top) + 8px) 12px 12px;
      background:linear-gradient(180deg, rgba(0,0,0,.54), rgba(0,0,0,0));
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .top-left,
    .top-right{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .icon-btn{
      width:42px;
      height:42px;
      min-width:42px;
      border-radius:14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
      font-size:18px;
    }

    .feed-tabs{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:24px;
      margin-top:10px;
      padding:0 8px;
    }

    .feed-tab{
      position:relative;
      color:rgba(255,255,255,.72);
      font-size:18px;
      font-weight:700;
      padding:10px 0;
      white-space:nowrap;
    }

    .feed-tab.active{
      color:#fff;
      font-weight:800;
    }

    .feed-tab.active::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:0;
      transform:translateX(-50%);
      width:42px;
      height:4px;
      border-radius:999px;
      background:#fff;
    }

    .right-rail{
      position:absolute;
      right:10px;
      bottom:112px;
      z-index:20;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
    }

    .creator-mini{
      position:relative;
      width:52px;
      height:52px;
      border-radius:50%;
      overflow:hidden;
      border:2px solid rgba(255,255,255,.9);
      box-shadow:var(--shadow);
      background:#1d4ed8;
    }

    .creator-mini img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .follow-mini{
      position:absolute;
      left:50%;
      bottom:-8px;
      transform:translateX(-50%);
      width:24px;
      height:24px;
      border-radius:50%;
      background:var(--primary);
      display:grid;
      place-items:center;
      color:#fff;
      font-size:18px;
      font-weight:900;
      border:2px solid #000;
      box-shadow:var(--shadow);
    }

    .rail-action{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      width:64px;
    }

    .rail-circle{
      width:50px;
      height:50px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
      font-size:22px;
    }

    .rail-count{
      font-size:12px;
      font-weight:700;
      color:#fff;
      text-shadow:0 2px 10px rgba(0,0,0,.45);
    }

    .bottom-caption{
      position:absolute;
      left:0;
      right:0;
      bottom:86px;
      z-index:20;
      padding:0 88px 0 14px;
    }

    .caption-card{
      border-radius:18px;
      padding:0;
      background:transparent;
    }

    .author-row{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }

    .author-name{
      font-size:16px;
      font-weight:800;
      text-shadow:0 2px 10px rgba(0,0,0,.45);
    }

    .follow-btn{
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      background:#fff;
      color:#111827;
      font-size:13px;
      font-weight:800;
    }

    .follow-btn.following{
      background:rgba(255,255,255,.16);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
    }

    .post-title{
      font-size:14px;
      font-weight:800;
      margin-bottom:6px;
      text-shadow:0 2px 10px rgba(0,0,0,.45);
    }

    .post-caption{
      font-size:14px;
      line-height:1.55;
      color:#fff;
      text-shadow:0 2px 10px rgba(0,0,0,.45);
      margin-bottom:10px;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .sound-row{
      display:flex;
      align-items:center;
      gap:8px;
      min-height:36px;
      width:max-content;
      max-width:100%;
      padding:0 12px;
      border-radius:999px;
      background:rgba(0,0,0,.34);
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter:blur(12px);
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .search-bar{
      position:absolute;
      left:12px;
      right:12px;
      bottom:16px;
      z-index:20;
      height:48px;
      border-radius:14px;
      background:rgba(17,24,39,.88);
      border:1px solid rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:0 14px;
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
    }

    .search-bar-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      flex:1;
      color:#fff;
      font-size:12px;
      font-weight:700;
    }

    .search-text{
      min-width:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      color:#fff;
    }

    .center-play{
      position:absolute;
      inset:0;
      z-index:8;
      display:grid;
      place-items:center;
      pointer-events:none;
    }

    .play-badge{
      width:74px;
      height:74px;
      border-radius:50%;
      display:none;
      place-items:center;
      background:rgba(0,0,0,.42);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(12px);
      font-size:32px;
      color:#fff;
    }

    .play-badge.show{
      display:grid;
    }

    .volume-chip{
      position:absolute;
      top:118px;
      right:12px;
      z-index:21;
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(0,0,0,.34);
      border:1px solid rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-size:12px;
      font-weight:700;
      color:#fff;
      backdrop-filter:blur(12px);
    }

    .bottom-nav{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:30;
      background:rgba(0,0,0,.92);
      backdrop-filter:blur(18px);
      border-top:1px solid rgba(255,255,255,.08);
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:4px;
      padding:8px 8px calc(8px + var(--safe-bottom));
    }

    .bottom-link{
      min-height:58px;
      border-radius:14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      font-size:11px;
      font-weight:700;
      color:var(--muted-2);
    }

    .bottom-link.active{
      color:#fff;
      background:rgba(255,255,255,.08);
    }

    .modal-backdrop{
      position:fixed;
      inset:0;
      z-index:110;
      background:rgba(0,0,0,.52);
      backdrop-filter:blur(10px);
      display:none;
      align-items:flex-end;
      justify-content:center;
      padding:12px;
    }

    .modal-backdrop.show{
      display:flex;
    }

    .sheet{
      width:min(100%,520px);
      border-radius:26px 26px 18px 18px;
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .sheet-handle{
      width:54px;
      height:5px;
      border-radius:999px;
      background:rgba(255,255,255,.16);
      margin:10px auto 4px;
    }

    .sheet-head{
      padding:14px 16px 10px;
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .sheet-head h3{
      font-size:18px;
      margin-bottom:4px;
    }

    .sheet-head p{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .sheet-actions{
      padding:12px;
      display:grid;
      gap:10px;
    }

    .sheet-btn{
      min-height:52px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      font-size:14px;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:0 14px;
      cursor:pointer;
    }

    @media (max-width:560px){
      .feed-tabs{
        gap:18px;
      }

      .feed-tab{
        font-size:16px;
      }

      .bottom-caption{
        padding-right:82px;
      }

      .author-name{
        font-size:15px;
      }
    }
  </style>
</head>
<body>
  <div id="notice" class="notice"></div>

  <main id="feedShell" class="feed-shell"></main>

  <div id="bottomNav" class="bottom-nav">
    <a href="home.html" class="bottom-link">
      <span>🏠</span>
      <span>Home</span>
    </a>
    <a href="friends.html" class="bottom-link">
      <span>👥</span>
      <span>Friends</span>
    </a>
    <a href="create-post.html" class="bottom-link">
      <span>➕</span>
      <span>Create</span>
    </a>
    <a href="chats.html" class="bottom-link">
      <span>💬</span>
      <span>Inbox</span>
    </a>
    <a href="profile.html" class="bottom-link">
      <span>👤</span>
      <span>Profile</span>
    </a>
  </div>

  <div id="actionSheetBackdrop" class="modal-backdrop">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <h3>Video options</h3>
        <p>Manage this video and explore more actions.</p>
      </div>
      <div class="sheet-actions">
        <button id="sheetProfileBtn" class="sheet-btn">Open creator profile <span>↗</span></button>
        <button id="sheetCommentsBtn" class="sheet-btn">Open comments <span>💬</span></button>
        <button id="sheetCopyBtn" class="sheet-btn">Copy link <span>🔗</span></button>
        <button id="sheetShareBtn" class="sheet-btn">Share video <span>↗</span></button>
        <button id="sheetReportBtn" class="sheet-btn">Report post <span>⚑</span></button>
        <button id="sheetCloseBtn" class="sheet-btn">Close <span>✕</span></button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInR5cCI6IkpXVCJ9";
  </script>
  <script>
    const REAL_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, REAL_SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const noticeBox = document.getElementById("notice");
    const feedShell = document.getElementById("feedShell");
    const actionSheetBackdrop = document.getElementById("actionSheetBackdrop");

    const sheetProfileBtn = document.getElementById("sheetProfileBtn");
    const sheetCommentsBtn = document.getElementById("sheetCommentsBtn");
    const sheetCopyBtn = document.getElementById("sheetCopyBtn");
    const sheetShareBtn = document.getElementById("sheetShareBtn");
    const sheetReportBtn = document.getElementById("sheetReportBtn");
    const sheetCloseBtn = document.getElementById("sheetCloseBtn");

    const state = {
      user: null,
      posts: [],
      followingSet: new Set(),
      savedSet: new Set(JSON.parse(localStorage.getItem("view_saved_video_posts") || "[]")),
      likesMap: JSON.parse(localStorage.getItem("view_video_likes") || "{}"),
      activeVideoId: null,
      currentActionPost: null,
      observer: null,
      postsChannel: null,
      followersChannel: null,
      activeTab: "for_you"
    };

    function showNotice(message, type = "info") {
      noticeBox.className = `notice show ${type}`;
      noticeBox.textContent = message;
      clearTimeout(showNotice._t);
      showNotice._t = setTimeout(() => {
        noticeBox.className = "notice";
        noticeBox.textContent = "";
      }, 2200);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatCompact(num) {
      const n = Number(num || 0);
      if (n >= 1000000) return (n / 1000000).toFixed(n >= 10000000 ? 0 : 1).replace(".0","") + "M";
      if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(".0","") + "K";
      return String(n);
    }

    function getDisplayName(post) {
      return post.full_name || post.username || "User";
    }

    function getAvatar(post) {
      return post.avatar_url || "";
    }

    function getPostUrl(postId) {
      return `${location.origin}${location.pathname}?post=${encodeURIComponent(postId)}`;
    }

    function buildProfileUrl(userId) {
      return userId ? `public-profile.html?id=${encodeURIComponent(userId)}` : "public-profile.html";
    }

    function isVideoUrl(url) {
      return /\.(mp4|webm|ogg|mov|m4v)(\?.*)?$/i.test(url || "");
    }

    function normalizePosts(rows) {
      return (rows || []).map(post => ({
        ...post,
        full_name: post.profiles?.full_name || "",
        username: post.profiles?.username || "",
        avatar_url: post.profiles?.avatar_url || "",
        title: post.title || "",
        caption: post.content || "",
        sound_name: post.sound_name || "Original sound",
        likes_count: Number(post.likes_count || 0),
        comments_count: Number(post.comments_count || 0),
        shares_count: Number(post.shares_count || 0),
        saves_count: Number(post.saves_count || 0)
      }));
    }

    async function getSessionUser() {
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) throw error;
      state.user = data.session?.user || null;
      return state.user;
    }

    async function loadFollowing() {
      if (!state.user) {
        state.followingSet = new Set();
        return;
      }

      const { data, error } = await supabaseClient
        .from("followers")
        .select("following_id")
        .eq("follower_id", state.user.id);

      if (!error) {
        state.followingSet = new Set((data || []).map(row => row.following_id));
      }
    }

    function filteredPosts() {
      if (state.activeTab === "following" && state.user) {
        return state.posts.filter(post => state.followingSet.has(post.user_id));
      }
      return state.posts;
    }

    async function loadFeed() {
      const { data, error } = await supabaseClient
        .from("posts")
        .select(`
          id,
          user_id,
          title,
          content,
          media_url,
          media_type,
          hashtags,
          created_at,
          profiles:profiles!posts_user_id_fkey (
            full_name,
            username,
            avatar_url
          )
        `)
        .in("media_type", ["video", "reel"])
        .not("media_url", "is", null)
        .order("created_at", { ascending: false });

      if (error) {
        showNotice(error.message || "Could not load videos.", "error");
        state.posts = [];
        renderFeed();
        return;
      }

      state.posts = normalizePosts((data || []).filter(post => post.media_url && isVideoUrl(post.media_url)));
      renderFeed();
      setTimeout(setupIntersectionPlayback, 120);
    }

    function activeLiked(postId) {
      return !!state.likesMap[postId];
    }

    function activeSaved(postId) {
      return state.savedSet.has(postId);
    }

    function renderFeed() {
      const posts = filteredPosts();

      if (!posts.length) {
        feedShell.innerHTML = `
          <section class="video-slide">
            ${renderTopChrome()}
            <div class="video-placeholder">No videos yet.<br/>Upload reels or video posts to see them here.</div>
          </section>
        `;
        return;
      }

      feedShell.innerHTML = posts.map((post, index) => {
        const displayName = getDisplayName(post);
        const avatarUrl = getAvatar(post);
        const liked = activeLiked(post.id);
        const saved = activeSaved(post.id);
        const following = state.followingSet.has(post.user_id);
        const tagSearch = post.title || post.caption || "Explore this video";

        return `
          <section class="video-slide" data-post-id="${escapeHtml(post.id)}">
            ${index === 0 ? renderTopChrome() : ""}

            <video
              class="video-media"
              src="${escapeHtml(post.media_url)}"
              playsinline
              preload="metadata"
              loop
              controlslist="nodownload noplaybackrate"
              webkit-playsinline
            ></video>

            <div class="center-play">
              <div class="play-badge">▶</div>
            </div>

            <div class="volume-chip">
              <span>🔊</span>
              <span>Volume On</span>
            </div>

            <div class="right-rail">
              <button class="creator-mini creator-profile-btn" data-user-id="${escapeHtml(post.user_id)}" title="Open profile">
                ${avatarUrl ? `<img src="${escapeHtml(avatarUrl)}" alt="${escapeHtml(displayName)}" />` : ""}
                <span class="follow-mini follow-mini-btn" data-user-id="${escapeHtml(post.user_id)}">${following ? "✓" : "+"}</span>
              </button>

              <div class="rail-action">
                <button class="rail-circle like-btn" data-post-id="${escapeHtml(post.id)}" title="Like">${liked ? "❤️" : "🤍"}</button>
                <div class="rail-count like-count">${formatCompact(post.likes_count + (liked ? 1 : 0))}</div>
              </div>

              <div class="rail-action">
                <button class="rail-circle comment-btn" data-post-id="${escapeHtml(post.id)}" title="Comments">💬</button>
                <div class="rail-count">${formatCompact(post.comments_count)}</div>
              </div>

              <div class="rail-action">
                <button class="rail-circle save-btn" data-post-id="${escapeHtml(post.id)}" title="Save">${saved ? "🔖" : "📑"}</button>
                <div class="rail-count">${saved ? "Saved" : formatCompact(post.saves_count)}</div>
              </div>

              <div class="rail-action">
                <button class="rail-circle share-btn" data-post-id="${escapeHtml(post.id)}" title="Share">↗</button>
                <div class="rail-count">${formatCompact(post.shares_count)}</div>
              </div>

              <div class="rail-action">
                <button class="rail-circle more-btn" data-post-id="${escapeHtml(post.id)}" title="More">⋯</button>
                <div class="rail-count">More</div>
              </div>
            </div>

            <div class="bottom-caption">
              <div class="caption-card">
                <div class="author-row">
                  <a class="author-name" href="${buildProfileUrl(post.user_id)}">@${escapeHtml(post.username || displayName)}</a>
                  <button class="follow-btn ${following ? "following" : ""}" data-user-id="${escapeHtml(post.user_id)}">
                    ${following ? "Following" : "Follow"}
                  </button>
                </div>

                ${post.title ? `<div class="post-title">${escapeHtml(post.title)}</div>` : ""}
                <div class="post-caption">${escapeHtml(post.caption || "")}</div>

                <div class="sound-row">
                  <span>♫</span>
                  <span>${escapeHtml(post.sound_name || "Original sound")}</span>
                </div>
              </div>

              <button class="search-bar search-btn" data-post-id="${escapeHtml(post.id)}">
                <div class="search-bar-left">
                  <span>🔎</span>
                  <span class="search-text">Search · ${escapeHtml(tagSearch)}</span>
                </div>
                <span>›</span>
              </button>
            </div>
          </section>
        `;
      }).join("");

      bindFeedActions();
    }

    function renderTopChrome() {
      return `
        <div class="overlay-top">
          <div class="topbar">
            <div class="top-left">
              <button class="icon-btn" onclick="location.href='home.html'" title="Home">🏠</button>
            </div>

            <div class="top-right">
              <button class="icon-btn" onclick="location.href='notifications.html'" title="Notifications">🔔</button>
              <button class="icon-btn" onclick="location.href='explore.html'" title="Search">🔎</button>
            </div>
          </div>

          <div class="feed-tabs">
            <button class="feed-tab ${state.activeTab === "stem" ? "active" : ""}" data-tab="stem">STEM</button>
            <button class="feed-tab ${state.activeTab === "explore" ? "active" : ""}" data-tab="explore">Explore</button>
            <button class="feed-tab ${state.activeTab === "following" ? "active" : ""}" data-tab="following">Following</button>
            <button class="feed-tab ${state.activeTab === "for_you" ? "active" : ""}" data-tab="for_you">For You</button>
          </div>
        </div>
      `;
    }

    function bindFeedActions() {
      document.querySelectorAll(".feed-tab").forEach(btn => {
        btn.addEventListener("click", () => {
          const tab = btn.dataset.tab;
          if (tab === "stem") {
            showNotice("STEM feed can be connected later. Showing current video feed.", "info");
            return;
          }
          if (tab === "explore") {
            location.href = "explore.html";
            return;
          }
          state.activeTab = tab;
          renderFeed();
          setTimeout(setupIntersectionPlayback, 120);
        });
      });

      document.querySelectorAll(".creator-profile-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const userId = btn.dataset.userId;
          location.href = buildProfileUrl(userId);
        });
      });

      document.querySelectorAll(".comment-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          location.href = `comments.html?post=${encodeURIComponent(btn.dataset.postId)}`;
        });
      });

      document.querySelectorAll(".share-btn").forEach(btn => {
        btn.addEventListener("click", () => sharePost(btn.dataset.postId));
      });

      document.querySelectorAll(".search-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          location.href = `explore.html?focus=search&post=${encodeURIComponent(btn.dataset.postId)}`;
        });
      });

      document.querySelectorAll(".more-btn").forEach(btn => {
        btn.addEventListener("click", () => openActionSheet(btn.dataset.postId));
      });

      document.querySelectorAll(".like-btn").forEach(btn => {
        btn.addEventListener("click", () => toggleLike(btn.dataset.postId));
      });

      document.querySelectorAll(".save-btn").forEach(btn => {
        btn.addEventListener("click", () => toggleSave(btn.dataset.postId));
      });

      document.querySelectorAll(".follow-btn, .follow-mini-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          toggleFollow(btn.dataset.userId);
        });
      });

      document.querySelectorAll(".video-slide").forEach(slide => {
        const video = slide.querySelector(".video-media");
        const playBadge = slide.querySelector(".play-badge");

        slide.addEventListener("click", async (event) => {
          if (event.target.closest(".right-rail") || event.target.closest(".bottom-caption") || event.target.closest(".overlay-top")) return;
          if (!video) return;

          if (video.paused) {
            await playVideo(video);
            playBadge.classList.remove("show");
          } else {
            video.pause();
            playBadge.classList.add("show");
          }
        });

        video.addEventListener("pause", () => playBadge.classList.add("show"));
        video.addEventListener("play", () => playBadge.classList.remove("show"));
      });
    }

    async function playVideo(video) {
      try {
        video.muted = false;
        video.volume = 1;
        await video.play();
      } catch (error) {
        video.muted = true;
        try {
          await video.play();
          showNotice("Tap again if your device blocks sound autoplay.", "info");
        } catch {}
      }
    }

    function setupIntersectionPlayback() {
      if (state.observer) state.observer.disconnect();

      const videos = document.querySelectorAll(".video-media");

      state.observer = new IntersectionObserver((entries) => {
        entries.forEach(async entry => {
          const video = entry.target;
          const slide = video.closest(".video-slide");
          const postId = slide?.dataset.postId || null;

          if (entry.isIntersecting && entry.intersectionRatio >= 0.75) {
            state.activeVideoId = postId;
            document.querySelectorAll(".video-media").forEach(v => {
              if (v !== video) v.pause();
            });
            await playVideo(video);
          } else {
            video.pause();
          }
        });
      }, { threshold: [0.4, 0.75, 1] });

      videos.forEach(video => state.observer.observe(video));
    }

    async function toggleFollow(userId) {
      if (!state.user) {
        showNotice("Please log in to follow users.", "info");
        location.href = "login.html?next=video-feed.html";
        return;
      }

      if (!userId || userId === state.user.id) {
        showNotice("You cannot follow yourself.", "info");
        return;
      }

      try {
        if (state.followingSet.has(userId)) {
          const { error } = await supabaseClient
            .from("followers")
            .delete()
            .eq("follower_id", state.user.id)
            .eq("following_id", userId);

          if (error) throw error;
          state.followingSet.delete(userId);
          showNotice("Unfollowed.", "success");
        } else {
          const { error } = await supabaseClient
            .from("followers")
            .insert({
              follower_id: state.user.id,
              following_id: userId
            });

          if (error) throw error;
          state.followingSet.add(userId);
          showNotice("Followed.", "success");
        }

        renderFeed();
        setTimeout(setupIntersectionPlayback, 120);
      } catch (error) {
        showNotice(error.message || "Could not update follow.", "error");
      }
    }

    function toggleLike(postId) {
      state.likesMap[postId] = !state.likesMap[postId];
      localStorage.setItem("view_video_likes", JSON.stringify(state.likesMap));
      renderFeed();
      setTimeout(setupIntersectionPlayback, 120);
    }

    function toggleSave(postId) {
      if (state.savedSet.has(postId)) {
        state.savedSet.delete(postId);
        showNotice("Removed from saved.", "success");
      } else {
        state.savedSet.add(postId);
        showNotice("Saved.", "success");
      }

      localStorage.setItem("view_saved_video_posts", JSON.stringify(Array.from(state.savedSet)));
      renderFeed();
      setTimeout(setupIntersectionPlayback, 120);
    }

    async function sharePost(postId) {
      const post = state.posts.find(p => p.id === postId);
      if (!post) return;

      const shareUrl = getPostUrl(postId);
      const shareText = post.title || post.caption || "Watch this video on View";

      try {
        if (navigator.share) {
          await navigator.share({
            title: "View Video",
            text: shareText,
            url: shareUrl
          });
          return;
        }
      } catch (error) {
        if (error && error.name === "AbortError") return;
      }

      try {
        await navigator.clipboard.writeText(shareUrl);
        showNotice("Video link copied.", "success");
      } catch {
        showNotice("Could not share right now.", "error");
      }
    }

    function openActionSheet(postId) {
      const post = state.posts.find(p => p.id === postId);
      if (!post) return;
      state.currentActionPost = post;
      actionSheetBackdrop.classList.add("show");
    }

    function closeActionSheet() {
      actionSheetBackdrop.classList.remove("show");
    }

    sheetProfileBtn.addEventListener("click", () => {
      if (!state.currentActionPost) return;
      location.href = buildProfileUrl(state.currentActionPost.user_id);
    });

    sheetCommentsBtn.addEventListener("click", () => {
      if (!state.currentActionPost) return;
      location.href = `comments.html?post=${encodeURIComponent(state.currentActionPost.id)}`;
    });

    sheetCopyBtn.addEventListener("click", async () => {
      if (!state.currentActionPost) return;
      try {
        await navigator.clipboard.writeText(getPostUrl(state.currentActionPost.id));
        showNotice("Link copied.", "success");
      } catch {
        showNotice("Could not copy link.", "error");
      }
      closeActionSheet();
    });

    sheetShareBtn.addEventListener("click", async () => {
      if (!state.currentActionPost) return;
      await sharePost(state.currentActionPost.id);
      closeActionSheet();
    });

    sheetReportBtn.addEventListener("click", () => {
      showNotice("Post reported.", "success");
      closeActionSheet();
    });

    sheetCloseBtn.addEventListener("click", closeActionSheet);
    actionSheetBackdrop.addEventListener("click", (e) => {
      if (e.target === actionSheetBackdrop) closeActionSheet();
    });

    function subscribeRealtime() {
      if (!state.postsChannel) {
        state.postsChannel = supabaseClient
          .channel("video-feed-posts")
          .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "posts"
          }, async () => {
            await loadFeed();
          })
          .subscribe();
      }

      if (!state.followersChannel) {
        state.followersChannel = supabaseClient
          .channel("video-feed-followers")
          .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "followers"
          }, async () => {
            await loadFollowing();
            renderFeed();
            setTimeout(setupIntersectionPlayback, 120);
          })
          .subscribe();
      }
    }

    async function init() {
      try {
        await getSessionUser();
        await loadFollowing();
        await loadFeed();
        subscribeRealtime();

        const params = new URLSearchParams(location.search);
        const targetPostId = params.get("post");
        if (targetPostId) {
          setTimeout(() => {
            const target = document.querySelector(`[data-post-id="${CSS.escape(targetPostId)}"]`);
            if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
          }, 400);
        }
      } catch (error) {
        showNotice(error.message || "Could not load video feed.", "error");
      }
    }

    init();
  </script>
</body>
</html>
