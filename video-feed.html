<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Video Feed | View</title>
  <meta name="theme-color" content="#05093c" />
  <link rel="manifest" href="/manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#05093c;
      --bg2:#07115f;
      --bg3:#081a8f;
      --panel:rgba(7,17,95,.46);
      --panel-soft:rgba(255,255,255,.12);
      --line:rgba(255,255,255,.12);
      --text:#fff;
      --muted:rgba(255,255,255,.82);
      --muted-2:rgba(255,255,255,.64);
      --primary:#ff2f57;
      --blue:#2f7bff;
      --blue2:#5ba0ff;
      --red:#ff2f57;
      --red2:#ff5a74;
      --shadow:0 12px 30px rgba(0,0,0,.28);
      --safe-top:env(safe-area-inset-top);
      --safe-bottom:env(safe-area-inset-bottom);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      color:var(--text);
    }

    body{ position:relative; }

    a{
      color:inherit;
      text-decoration:none;
    }

    button{
      border:none;
      outline:none;
      background:none;
      color:inherit;
      font:inherit;
      cursor:pointer;
    }

    .notice{
      display:none;
      position:fixed;
      top:calc(var(--safe-top) + 12px);
      left:50%;
      transform:translateX(-50%);
      width:min(92%,540px);
      z-index:130;
      padding:13px 14px;
      border-radius:16px;
      font-size:14px;
      line-height:1.5;
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
    }
    .notice.show{display:block}
    .notice.error{background:rgba(127,29,29,.92);color:#fecaca;border:1px solid rgba(255,255,255,.08)}
    .notice.success{background:rgba(5,46,22,.92);color:#d1fae5;border:1px solid rgba(255,255,255,.08)}
    .notice.info{background:rgba(7,17,95,.94);color:#dbeafe;border:1px solid rgba(255,255,255,.08)}

    .feed-shell{
      position:relative;
      width:100%;
      height:100vh;
      overflow-y:auto;
      scroll-snap-type:y mandatory;
      background:#000;
    }

    .feed-shell::-webkit-scrollbar{ display:none; }

    .video-slide{
      position:relative;
      width:100%;
      height:100vh;
      scroll-snap-align:start;
      overflow:hidden;
      background:#000;
    }

    .video-media{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      background:#000;
      z-index:1;
    }

    .video-placeholder{
      position:absolute;
      inset:0;
      z-index:1;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at top, rgba(47,123,255,.20), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,47,87,.16), transparent 22%),
        linear-gradient(180deg,#081a8f,#07115f 55%, #05093c);
      color:#fff;
      text-align:center;
      padding:24px;
      line-height:1.6;
      font-weight:700;
      font-size:18px;
    }

    .overlay-top{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:25;
      padding:calc(var(--safe-top) + 8px) 12px 12px;
      background:linear-gradient(180deg, rgba(0,0,0,.54), rgba(0,0,0,0));
      pointer-events:none;
    }

    .overlay-top .topbar,
    .overlay-top .feed-tabs{
      pointer-events:auto;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .top-right{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .brand-wrap{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
      padding-left:2px;
    }

    .brand-logo{
      width:46px;
      height:46px;
      min-width:46px;
      border-radius:16px;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:linear-gradient(135deg,#5b8cff,#1e3a8a);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      font-size:30px;
      font-weight:900;
      color:#fff;
    }

    .brand-logo img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .brand-copy{
      min-width:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .brand-title{
      display:flex;
      align-items:flex-end;
      gap:8px;
      flex-wrap:wrap;
      font-size:17px;
      font-weight:900;
      color:#fff;
      line-height:1;
      white-space:nowrap;
    }

    .brand-view{
      font-size:22px;
      font-weight:900;
      letter-spacing:-.02em;
    }

    .brand-dot{
      color:#ff2f57;
      font-size:14px;
      line-height:1;
      margin-left:2px;
    }

    .brand-by{
      font-size:13px;
      font-weight:800;
      color:#fff;
      opacity:.95;
    }

    .brand-underline{
      width:148px;
      max-width:100%;
      height:5px;
      border-radius:999px;
      margin-top:8px;
      background:linear-gradient(135deg,var(--red),var(--red2));
      box-shadow:0 6px 18px rgba(255,47,87,.28);
    }

    .icon-btn{
      width:42px;
      height:42px;
      min-width:42px;
      border-radius:14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
      font-size:18px;
    }

    .profile-chip{
      width:48px;
      height:48px;
      min-width:48px;
      border-radius:50%;
      overflow:hidden;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,var(--blue),var(--red));
      border:2px solid rgba(255,255,255,.2);
      box-shadow:var(--shadow);
      font-size:22px;
      font-weight:900;
      color:#fff;
    }

    .profile-chip img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .feed-tabs{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:24px;
      margin-top:10px;
      padding:0 8px;
    }

    .feed-tab{
      position:relative;
      color:rgba(255,255,255,.72);
      font-size:18px;
      font-weight:700;
      padding:10px 0;
      white-space:nowrap;
    }

    .feed-tab.active{
      color:#fff;
      font-weight:800;
    }

    .feed-tab.active::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:0;
      transform:translateX(-50%);
      width:42px;
      height:4px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--blue),var(--red));
    }

    .right-rail{
      position:absolute;
      right:10px;
      bottom:122px;
      z-index:20;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
    }

    .creator-mini{
      position:relative;
      width:52px;
      height:52px;
      border-radius:50%;
      overflow:hidden;
      border:2px solid rgba(255,255,255,.9);
      box-shadow:var(--shadow);
      background:linear-gradient(135deg,var(--blue),var(--red));
      display:grid;
      place-items:center;
      font-weight:800;
      font-size:20px;
    }

    .creator-mini img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .follow-mini{
      position:absolute;
      left:50%;
      bottom:-8px;
      transform:translateX(-50%);
      width:24px;
      height:24px;
      border-radius:50%;
      background:var(--primary);
      display:grid;
      place-items:center;
      color:#fff;
      font-size:18px;
      font-weight:900;
      border:2px solid #000;
      box-shadow:var(--shadow);
      z-index:3;
    }

    .rail-action{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      width:64px;
    }

    .rail-circle{
      width:50px;
      height:50px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
      font-size:22px;
    }

    .rail-count{
      font-size:12px;
      font-weight:700;
      color:#fff;
      text-shadow:0 2px 10px rgba(0,0,0,.45);
      text-align:center;
    }

    .bottom-caption{
      position:absolute;
      left:0;
      right:0;
      bottom:96px;
      z-index:20;
      padding:0 88px 0 14px;
    }

    .author-row{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }

    .author-name{
      font-size:16px;
      font-weight:800;
      text-shadow:0 2px 10px rgba(0,0,0,.45);
    }

    .follow-btn{
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      background:#fff;
      color:#111827;
      font-size:13px;
      font-weight:800;
    }

    .follow-btn.following{
      background:rgba(255,255,255,.16);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
    }

    .post-title{
      font-size:14px;
      font-weight:800;
      margin-bottom:6px;
      text-shadow:0 2px 10px rgba(0,0,0,.45);
    }

    .post-caption{
      font-size:14px;
      line-height:1.55;
      color:#fff;
      text-shadow:0 2px 10px rgba(0,0,0,.45);
      margin-bottom:10px;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .sound-row{
      display:flex;
      align-items:center;
      gap:8px;
      min-height:36px;
      width:max-content;
      max-width:100%;
      padding:0 12px;
      border-radius:999px;
      background:rgba(0,0,0,.34);
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter:blur(12px);
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .search-bar{
      position:absolute;
      left:12px;
      right:12px;
      bottom:16px;
      z-index:20;
      height:48px;
      border-radius:14px;
      background:rgba(7,17,95,.88);
      border:1px solid rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:0 14px;
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
    }

    .search-bar-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      flex:1;
      color:#fff;
      font-size:12px;
      font-weight:700;
    }

    .search-text{
      min-width:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      color:#fff;
    }

    .center-play{
      position:absolute;
      inset:0;
      z-index:8;
      display:grid;
      place-items:center;
      pointer-events:none;
    }

    .play-badge{
      width:74px;
      height:74px;
      border-radius:50%;
      display:none;
      place-items:center;
      background:rgba(0,0,0,.42);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(12px);
      font-size:32px;
      color:#fff;
    }

    .play-badge.show{
      display:grid;
    }

    .volume-chip{
      position:absolute;
      top:118px;
      right:12px;
      z-index:21;
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(0,0,0,.34);
      border:1px solid rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-size:12px;
      font-weight:700;
      color:#fff;
      backdrop-filter:blur(12px);
    }

    .bottom-nav{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:30;
      background:rgba(5,9,60,.96);
      backdrop-filter:blur(18px);
      border-top:1px solid rgba(255,255,255,.08);
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:0;
      padding:8px 4px calc(8px + var(--safe-bottom));
    }

    .bottom-link{
      min-height:64px;
      border-radius:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      font-size:11px;
      font-weight:700;
      color:var(--muted-2);
    }

    .bottom-link.active{
      color:#fff;
    }

    .create-link{
      position:relative;
    }

    .create-link span:first-child{
      width:42px;
      height:42px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,var(--red),var(--red2));
      color:#fff;
      font-size:22px;
      box-shadow:0 8px 24px rgba(255,47,87,.35);
      margin-bottom:2px;
    }

    .modal-backdrop{
      position:fixed;
      inset:0;
      z-index:110;
      background:rgba(0,0,0,.52);
      backdrop-filter:blur(10px);
      display:none;
      align-items:flex-end;
      justify-content:center;
      padding:12px;
    }

    .modal-backdrop.show{
      display:flex;
    }

    .sheet{
      width:min(100%,520px);
      border-radius:26px 26px 18px 18px;
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      overflow:hidden;
      max-height:min(84vh,720px);
      display:flex;
      flex-direction:column;
    }

    .sheet-handle{
      width:54px;
      height:5px;
      border-radius:999px;
      background:rgba(255,255,255,.16);
      margin:10px auto 4px;
    }

    .sheet-head{
      padding:14px 16px 10px;
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .sheet-head h3{
      font-size:18px;
      margin-bottom:4px;
    }

    .sheet-head p{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .sheet-actions{
      padding:12px;
      display:grid;
      gap:10px;
    }

    .sheet-btn{
      min-height:52px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      font-size:14px;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:0 14px;
      cursor:pointer;
    }

    .comments-sheet{
      width:min(100%,620px);
      border-radius:26px 26px 18px 18px;
      background:#0f172a;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      overflow:hidden;
      max-height:min(88vh,760px);
      display:flex;
      flex-direction:column;
    }

    .comments-head{
      padding:14px 16px 10px;
      border-bottom:1px solid rgba(255,255,255,.06);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .comments-meta h3{
      font-size:18px;
      margin-bottom:4px;
    }

    .comments-meta p{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .comments-list{
      padding:12px;
      overflow:auto;
      display:grid;
      gap:10px;
      min-height:180px;
      max-height:52vh;
    }

    .comment-item{
      padding:12px;
      border-radius:16px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
    }

    .comment-top{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
    }

    .comment-avatar{
      width:38px;
      height:38px;
      min-width:38px;
      border-radius:50%;
      overflow:hidden;
      background:linear-gradient(135deg,var(--blue),var(--red));
      display:grid;
      place-items:center;
      font-size:14px;
      font-weight:800;
    }

    .comment-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .comment-name{
      font-size:13px;
      font-weight:800;
      color:#fff;
    }

    .comment-time{
      font-size:11px;
      color:var(--muted-2);
      margin-top:2px;
    }

    .comment-text{
      font-size:13px;
      line-height:1.55;
      color:#fff;
      word-break:break-word;
      white-space:pre-wrap;
    }

    .comments-empty{
      padding:24px 14px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    .comments-compose{
      padding:12px;
      border-top:1px solid rgba(255,255,255,.06);
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      background:rgba(255,255,255,.02);
    }

    .comments-input{
      min-height:48px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      padding:0 14px;
      outline:none;
    }

    .comments-input::placeholder{
      color:#a9bce0;
    }

    .comments-send{
      min-width:92px;
      min-height:48px;
      border-radius:14px;
      background:linear-gradient(135deg,var(--blue),var(--red));
      color:#fff;
      font-weight:800;
      padding:0 16px;
    }

    @media (max-width:560px){
      .feed-tabs{ gap:18px; }
      .feed-tab{ font-size:16px; }
      .bottom-caption{ padding-right:82px; }
      .author-name{ font-size:15px; }
      .comments-compose{ grid-template-columns:1fr; }
      .comments-send{ width:100%; }
    }
  </style>
</head>
<body>
  <div id="notice" class="notice"></div>
  <div class="overlay-top" id="fixedTopChrome"></div>
  <main id="feedShell" class="feed-shell"></main>

  <div id="bottomNav" class="bottom-nav">
    <a href="home.html" class="bottom-link"><span>🏠</span><span>Home</span></a>
    <a href="explore.html" class="bottom-link"><span>🧭</span><span>Explore</span></a>
    <button id="openCreateMenuBtn" class="bottom-link create-link" type="button"><span>➕</span><span>Create</span></button>
    <a href="chats.html" class="bottom-link"><span>💬</span><span>Chat</span></a>
    <a href="video-feed.html" class="bottom-link active"><span>🎬</span><span>Video</span></a>
    <a href="profile.html" class="bottom-link"><span>👤</span><span>Profile</span></a>
  </div>

  <div id="createMenuBackdrop" class="modal-backdrop">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <h3>Create</h3>
        <p>Choose what you want to create.</p>
      </div>
      <div class="sheet-actions">
        <button class="sheet-btn" onclick="location.href='create-post.html'">Create Post <span>📝</span></button>
        <button class="sheet-btn" onclick="location.href='go-live.html'">Go Live <span>🔴</span></button>
        <button class="sheet-btn" onclick="location.href='create-status.html'">Create Story <span>📸</span></button>
        <button class="sheet-btn" onclick="location.href='create-reel.html'">Create Reels <span>🎬</span></button>
        <button id="createMenuCloseBtn" class="sheet-btn">Close <span>✕</span></button>
      </div>
    </div>
  </div>

  <div id="actionSheetBackdrop" class="modal-backdrop">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <h3>Video options</h3>
        <p>Manage this video and explore more actions.</p>
      </div>
      <div class="sheet-actions">
        <button id="sheetProfileBtn" class="sheet-btn">Open creator profile <span>↗</span></button>
        <button id="sheetCommentsBtn" class="sheet-btn">Open comments <span>💬</span></button>
        <button id="sheetFriendShareBtn" class="sheet-btn">Share to friends <span>👥</span></button>
        <button id="sheetCopyBtn" class="sheet-btn">Copy video link <span>🔗</span></button>
        <button id="sheetShareBtn" class="sheet-btn">Share to apps <span>📲</span></button>
        <button id="sheetReportBtn" class="sheet-btn">Report post <span>⚑</span></button>
        <button id="sheetCloseBtn" class="sheet-btn">Close <span>✕</span></button>
      </div>
    </div>
  </div>

  <div id="commentsBackdrop" class="modal-backdrop">
    <div class="comments-sheet">
      <div class="sheet-handle"></div>
      <div class="comments-head">
        <div class="comments-meta">
          <h3>Comments</h3>
          <p id="commentsSubtitle">Join the conversation</p>
        </div>
        <button id="commentsCloseBtn" class="icon-btn" type="button">✕</button>
      </div>
      <div id="commentsList" class="comments-list"></div>
      <div class="comments-compose">
        <input id="commentsInput" class="comments-input" type="text" placeholder="Write a comment..." />
        <button id="commentsSendBtn" class="comments-send" type="button">Send</button>
      </div>
    </div>
  </div>

  <script>

    function showNotice(message, type = "info") {
      noticeBox.className = `notice show ${type}`;
      noticeBox.textContent = message;
      clearTimeout(showNotice._t);
      showNotice._t = setTimeout(() => {
        noticeBox.className = "notice";
        noticeBox.textContent = "";
      }, 2200);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatCompact(num) {
      const n = Number(num || 0);
      if (n >= 1000000) return (n / 1000000).toFixed(n >= 10000000 ? 0 : 1).replace(".0","") + "M";
      if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(".0","") + "K";
      return String(n);
    }

    function getInitial(value) {
      return String(value || "U").trim().charAt(0).toUpperCase() || "U";
    }

    function timeAgo(value) {
      if (!value) return "Just now";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "Just now";
      const diff = Math.floor((Date.now() - date.getTime()) / 1000);
      if (diff < 60) return "Just now";
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    function looksLikeVideoByUrl(value) {
      const v = String(value || "").toLowerCase();
      return v.includes(".mp4") || v.includes(".webm") || v.includes(".ogg") || v.includes(".mov") || v.includes(".m4v") || v.includes(".3gp") || v.includes(".mkv");
    }

    function looksLikeVideoByType(value) {
      return String(value || "").toLowerCase().startsWith("video/");
    }

    function normalizeMediaUrl(post) {
      const mediaUrl = String(post.media_url || "").trim();
      const mediaPath = String(post.media_path || "").trim();
      if (mediaUrl) return mediaUrl;
      if (mediaPath && /^https?:\/\//i.test(mediaPath)) return mediaPath;
      return "";
    }

    function getDisplayName(post) {
      return post.full_name || post.username || "User";
    }

    function getAvatar(post) {
      return post.avatar_url || "";
    }

    function getPostUrl(postId) {
      return `${location.origin}${location.pathname}?post=${encodeURIComponent(postId)}`;
    }

    function buildProfileUrl(userId) {
      if (!userId) return "public-profile.html";
      if (state.user && userId === state.user.id) return "profile.html";
      return `public-profile.html?id=${encodeURIComponent(userId)}`;
    }

    function isVideoPost(post) {
      const mediaType = String(post.media_type || "");
      const mediaUrl = String(post.media_url || "");
      const mediaPath = String(post.media_path || "");
      const mediaName = String(post.media_name || "");
      return looksLikeVideoByType(mediaType) || looksLikeVideoByUrl(mediaUrl) || looksLikeVideoByUrl(mediaPath) || looksLikeVideoByUrl(mediaName);
    }

    function normalizePosts(rows) {
      return (rows || []).map(post => ({
        ...post,
        media_url: normalizeMediaUrl(post),
        full_name: post.profiles?.full_name || "",
        username: post.profiles?.username || "",
        avatar_url: post.profiles?.avatar_url || "",
        title: post.title || "",
        caption: post.content || "",
        sound_name: post.sound_name || "Original sound",
        likes_count: Number(post.likes_count || 0),
        comments_count: Number(post.comments_count || 0),
        shares_count: Number(post.shares_count || 0)
      })).filter(post => isVideoPost(post) && !!post.media_url);
    }

    async function getSessionUser() {
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) throw error;
      state.user = data.session?.user || null;

      if (state.user) {
        const { data: profileData } = await supabaseClient
          .from("profiles")
          .select("id,username,full_name,avatar_url")
          .eq("id", state.user.id)
          .maybeSingle();

        state.userProfile = profileData || null;
      } else {
        state.userProfile = null;
      }

      return state.user;
    }

    async function loadFollowing() {
      if (!state.user) {
        state.followingSet = new Set();
        return;
      }

      const { data } = await supabaseClient
        .from("followers")
        .select("following_id")
        .eq("follower_id", state.user.id);

      state.followingSet = new Set((data || []).map(row => row.following_id));
    }

    function filteredPosts() {
      if (state.activeTab === "following") {
        if (!state.user) return [];
        return state.posts.filter(post => state.followingSet.has(post.user_id));
      }

      if (state.activeTab === "stem") {
        return state.posts.filter(post => {
          const text = `${post.title || ""} ${post.caption || ""} ${Array.isArray(post.hashtags) ? post.hashtags.join(" ") : ""}`.toLowerCase();
          return text.includes("stem") || text.includes("science") || text.includes("tech") || text.includes("engineering") || text.includes("math");
        });
      }

      if (state.activeTab === "explore") {
        return state.posts.filter(post => post.visibility !== "private");
      }

      return state.posts;
    }

    async function loadFeed() {
      const { data, error } = await supabaseClient
        .from("posts")
        .select(`
          id,user_id,content,media_url,media_type,cover_url,hashtags,status,published_at,created_at,updated_at,title,visibility,media_name,media_path,likes_count,comments_count,shares_count,
          profiles:profiles!posts_user_id_fkey (username,full_name,avatar_url)
        `)
        .in("status", ["published", "active", "queued"])
        .order("published_at", { ascending: false, nullsFirst: false })
        .order("created_at", { ascending: false });

      if (error) {
        showNotice(error.message || "Could not load videos.", "error");
        state.posts = [];
        renderFeed();
        return;
      }

      state.posts = normalizePosts(data || []);
      renderFeed();
      setTimeout(setupIntersectionPlayback, 120);
    }

    function activeLiked(postId) {
      return !!state.likesMap[postId];
    }

    function activeSaved(postId) {
      return state.savedSet.has(postId);
    }

    function renderAvatar(post) {
      const displayName = getDisplayName(post);
      const avatarUrl = getAvatar(post);
      if (avatarUrl) return `<img src="${escapeHtml(avatarUrl)}" alt="${escapeHtml(displayName)}" />`;
      return `<span>${escapeHtml(getInitial(displayName))}</span>`;
    }

    function renderCurrentUserAvatar() {
      const avatar = state.userProfile?.avatar_url || "";
      const name = state.userProfile?.full_name || state.userProfile?.username || state.user?.email || "V";
      if (avatar) return `<img src="${escapeHtml(avatar)}" alt="${escapeHtml(name)}" />`;
      return `<span>${escapeHtml(getInitial(name || "V"))}</span>`;
    }

    function renderTopChrome() {
      fixedTopChrome.innerHTML = `
        <div class="topbar">
          <div class="brand-wrap">
            <a href="home.html" class="brand-logo" aria-label="View Home">
              <img src="icons/view-logo.png" alt="View logo" onerror="this.parentNode.textContent='V'" />
            </a>

                <span class="brand-dot">•</span>

              </div>

          <div class="top-right">

            <button class="icon-btn" onclick="location.href='chats.html'" title="Chat">💬</button>
            <a href="profile.html" class="profile-chip" title="Profile">${renderCurrentUserAvatar()}</a>
          </div>
        </div>

        <div class="feed-tabs">
          <button class="feed-tab ${state.activeTab === "stem" ? "active" : ""}" data-tab="stem">STEM</button>
          <button class="feed-tab ${state.activeTab === "explore" ? "active" : ""}" data-tab="explore">Explore</button>
          <button class="feed-tab ${state.activeTab === "following" ? "active" : ""}" data-tab="following">Following</button>
          <button class="feed-tab ${state.activeTab === "for_you" ? "active" : ""}" data-tab="for_you">For You</button>
        </div>
      `;

      document.querySelectorAll(".feed-tab").forEach(btn => {
        btn.addEventListener("click", () => {
          state.activeTab = btn.dataset.tab;
          renderFeed();
          setTimeout(setupIntersectionPlayback, 120);
        });
      });
    }

    function renderFeed() {
      renderTopChrome();
      const posts = filteredPosts();

      if (!posts.length) {
        feedShell.innerHTML = `<section class="video-slide"><div class="video-placeholder">No videos found in this feed yet.</div></section>`;
        return;
      }

      feedShell.innerHTML = posts.map((post) => {
        const displayName = getDisplayName(post);
        const liked = activeLiked(post.id);
        const saved = activeSaved(post.id);
        const following = state.followingSet.has(post.user_id);
        const tagSearch = post.title || post.caption || "Explore this video";

        return `
          <section class="video-slide" data-post-id="${escapeHtml(post.id)}">
            <video class="video-media" src="${escapeHtml(post.media_url)}" poster="${escapeHtml(post.cover_url || "")}" playsinline preload="metadata" loop controlslist="nodownload noplaybackrate" webkit-playsinline></video>

            <div class="center-play"><div class="play-badge">▶</div></div>

            <div class="volume-chip"><span>🔊</span><span>Volume On</span></div>

            <div class="right-rail">
              <button class="creator-mini creator-profile-btn" data-user-id="${escapeHtml(post.user_id)}" title="Open profile">
                ${renderAvatar(post)}
                <span class="follow-mini follow-mini-btn" data-user-id="${escapeHtml(post.user_id)}">${following ? "✓" : "+"}</span>
              </button>

              <div class="rail-action">
                <button class="rail-circle like-btn" data-post-id="${escapeHtml(post.id)}" title="Like">${liked ? "❤️" : "🤍"}</button>
                <div class="rail-count like-count">${formatCompact(post.likes_count)}</div>
              </div>

              <div class="rail-action">
                <button class="rail-circle comment-btn" data-post-id="${escapeHtml(post.id)}" title="Comments">💬</button>

              </div>

              <div class="rail-action">
                <button class="rail-circle save-btn" data-post-id="${escapeHtml(post.id)}" title="Save">${saved ? "🔖" : "📑"}</button>
                <div class="rail-count">${saved ? "Saved" : "Save"}</div>
              </div>

              <div class="rail-action">
                <button class="rail-circle share-btn" data-post-id="${escapeHtml(post.id)}" title="Share">↗</button>
                <div class="rail-count">${formatCompact(post.shares_count)}</div>
              </div>

              <div class="rail-action">
                <button class="rail-circle more-btn" data-post-id="${escapeHtml(post.id)}" title="More">⋯</button>
                <div class="rail-count">More</div>
              </div>
            </div>

            <div class="bottom-caption">
              <div class="author-row">
                <a class="author-name" href="${buildProfileUrl(post.user_id)}">@${escapeHtml(post.username || displayName)}</a>
                <button class="follow-btn ${following ? "following" : ""}" data-user-id="${escapeHtml(post.user_id)}">
                  ${following ? "Following" : "Follow"}
                </button>
              </div>

              ${post.title ? `<div class="post-title">${escapeHtml(post.title)}</div>` : ""}
              <div class="post-caption">${escapeHtml(post.caption || "")}</div>

              <div class="sound-row">
                <span>♫</span>
                <span>${escapeHtml(post.sound_name || "Original sound")}</span>
              </div>

              <button class="search-bar search-btn" data-post-id="${escapeHtml(post.id)}">
                <div class="search-bar-left">
                  <span>🔎</span>
                  <span class="search-text">Search · ${escapeHtml(tagSearch)}</span>
                </div>
                <span>›</span>
              </button>
            </div>
          </section>
        `;
      }).join("");

      bindFeedActions();
    }

    function bindFeedActions() {
      document.querySelectorAll(".creator-profile-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          location.href = buildProfileUrl(btn.dataset.userId);
        });
      });

      document.querySelectorAll(".comment-btn").forEach(btn => {
        btn.addEventListener("click", () => openComments(btn.dataset.postId));
      });

      document.querySelectorAll(".share-btn").forEach(btn => {
        btn.addEventListener("click", () => sharePost(btn.dataset.postId));
      });

      document.querySelectorAll(".search-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          state.activeTab = "explore";
          renderFeed();
          setTimeout(setupIntersectionPlayback, 120);
        });
      });

      document.querySelectorAll(".more-btn").forEach(btn => {
        btn.addEventListener("click", () => openActionSheet(btn.dataset.postId));
      });

      document.querySelectorAll(".like-btn").forEach(btn => {
        btn.addEventListener("click", () => toggleLike(btn.dataset.postId));
      });

      document.querySelectorAll(".share-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    openActionSheet(btn.dataset.postId);
  });
});

      document.querySelectorAll(".follow-btn, .follow-mini-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          toggleFollow(btn.dataset.userId);
        });
      });

      document.querySelectorAll(".video-slide").forEach(slide => {
        const video = slide.querySelector(".video-media");
        const playBadge = slide.querySelector(".play-badge");

        slide.addEventListener("click", async (event) => {
          if (event.target.closest(".right-rail") || event.target.closest(".bottom-caption") || event.target.closest(".overlay-top")) return;
          if (!video) return;

          if (video.paused) {
            await playVideo(video);
            playBadge.classList.remove("show");
          } else {
            video.pause();
            playBadge.classList.add("show");
          }
        });

        video.addEventListener("pause", () => playBadge.classList.add("show"));
        video.addEventListener("play", () => playBadge.classList.remove("show"));
        video.addEventListener("error", () => showNotice("A video could not be loaded.", "error"));
      });
    }

    async function playVideo(video) {
      try {
        video.muted = false;
        video.volume = 1;
        await video.play();
      } catch {
        video.muted = true;
        try {
          await video.play();
          showNotice("Tap again if your device blocks sound autoplay.", "info");
        } catch {}
      }
    }

    function setupIntersectionPlayback() {
      if (state.observer) state.observer.disconnect();
      const videos = document.querySelectorAll(".video-media");

      state.observer = new IntersectionObserver((entries) => {
        entries.forEach(async entry => {
          const video = entry.target;
          const slide = video.closest(".video-slide");
          state.activeVideoId = slide?.dataset.postId || null;

          if (entry.isIntersecting && entry.intersectionRatio >= 0.75) {
            document.querySelectorAll(".video-media").forEach(v => { if (v !== video) v.pause(); });
            await playVideo(video);
          } else {
            video.pause();
          }
        });
      }, { threshold: [0.4, 0.75, 1] });

      videos.forEach(video => state.observer.observe(video));
    }

    async function toggleFollow(userId) {
      if (!state.user) {
        showNotice("Please log in to follow users.", "info");
        location.href = "login.html?next=video-feed.html";
        return;
      }

      if (!userId || userId === state.user.id) {
        showNotice("You cannot follow yourself.", "info");
        return;
      }

      try {
        if (state.followingSet.has(userId)) {
          const { error } = await supabaseClient.from("followers").delete().eq("follower_id", state.user.id).eq("following_id", userId);
          if (error) throw error;
          state.followingSet.delete(userId);
          showNotice("Unfollowed.", "success");
        } else {
          const { error } = await supabaseClient.from("followers").insert({ follower_id: state.user.id, following_id: userId });
          if (error) throw error;
          state.followingSet.add(userId);
          showNotice("Followed.", "success");
        }

        renderFeed();
        setTimeout(setupIntersectionPlayback, 120);
      } catch (error) {
        showNotice(error.message || "Could not update follow.", "error");
      }
    }

    function toggleLike(postId) {
      const post = state.posts.find(p => p.id === postId);
      if (!post) return;

      const wasLiked = !!state.likesMap[postId];
      state.likesMap[postId] = !wasLiked;
      post.likes_count = Math.max(0, Number(post.likes_count || 0) + (wasLiked ? -1 : 1));

      localStorage.setItem("view_video_likes", JSON.stringify(state.likesMap));
      renderFeed();
      setTimeout(setupIntersectionPlayback, 120);
    }

    function toggleSave(postId) {
      if (state.savedSet.has(postId)) {
        state.savedSet.delete(postId);
        showNotice("Removed from saved.", "success");
      } else {
        state.savedSet.add(postId);
        showNotice("Saved.", "success");
      }

      localStorage.setItem("view_saved_video_posts", JSON.stringify(Array.from(state.savedSet)));
      renderFeed();
      setTimeout(setupIntersectionPlayback, 120);
    }

    async function sharePost(postId) {
  const post = state.posts.find(p => p.id === postId);
  if (!post) return;

  const shareUrl = getPostUrl(postId);
  const shareText = post.title || post.caption || "Watch this video on View";

  try {
    if (navigator.share) {
      await navigator.share({
        title: "View Video",
        text: shareText,
        url: shareUrl
      });

      post.shares_count = Number(post.shares_count || 0) + 1;
      renderFeed();
      setTimeout(setupIntersectionPlayback, 120);
      showNotice("Sharing opened.", "success");
      return;
    }

    showNotice("Choose Share to friends or Copy link from the options.", "info");
    openActionSheet(postId);
  } catch (error) {
    if (error && error.name === "AbortError") return;
    showNotice("Could not open external share.", "error");
  }
}

    function shareToFriends(postId) {
      location.href = `chats.html?share_post=${encodeURIComponent(postId)}&share_link=${encodeURIComponent(getPostUrl(postId))}`;
    }

    function openCreateMenu() {
      createMenuBackdrop.classList.add("show");
    }

    function closeCreateMenu() {
      createMenuBackdrop.classList.remove("show");
    }

    function openActionSheet(postId) {
      const post = state.posts.find(p => p.id === postId);
      if (!post) return;
      state.currentActionPost = post;
      actionSheetBackdrop.classList.add("show");
    }

    function closeActionSheet() {
      actionSheetBackdrop.classList.remove("show");
    }

    async function openComments(postId) {
      state.currentCommentPost = state.posts.find(p => p.id === postId) || null;
      if (!state.currentCommentPost) return;

      commentsSubtitle.textContent = state.currentCommentPost.title || state.currentCommentPost.caption || "Join the conversation";
      commentsList.innerHTML = `<div class="comments-empty">Loading comments...</div>`;
      commentsBackdrop.classList.add("show");
      commentsInput.value = "";

      try {
        await loadComments(postId);
      } catch (error) {
        commentsList.innerHTML = `<div class="comments-empty">Could not load comments.</div>`;
        showNotice(error.message || "Could not load comments.", "error");
      }
    }

    function closeComments() {
      commentsBackdrop.classList.remove("show");
      state.currentCommentPost = null;
    }

    async function loadCommentProfiles(userIds) {
      const uniqueIds = Array.from(new Set((userIds || []).filter(Boolean)));
      const missing = uniqueIds.filter(id => !state.commentProfileMap[id]);
      if (!missing.length) return;

      const { data } = await supabaseClient.from("profiles").select("id,full_name,username,avatar_url").in("id", missing);
      (data || []).forEach(profile => { state.commentProfileMap[profile.id] = profile; });
    }

    function renderCommentAvatar(profile) {
      if (profile?.avatar_url) return `<img src="${escapeHtml(profile.avatar_url)}" alt="${escapeHtml(profile.full_name || profile.username || "User")}" />`;
      return `<span>${escapeHtml(getInitial(profile?.full_name || profile?.username || "U"))}</span>`;
    }

    async function loadComments(postId) {
      const { data, error } = await supabaseClient
        .from("comments")
        .select("id,post_id,user_id,content,created_at")
        .eq("post_id", postId)
        .order("created_at", { ascending: false });

      if (error) throw error;

      const comments = data || [];
      await loadCommentProfiles(comments.map(item => item.user_id));

      if (!comments.length) {
        commentsList.innerHTML = `<div class="comments-empty">No comments yet. Be the first to comment.</div>`;
        return;
      }

      commentsList.innerHTML = comments.map(comment => {
        const profile = state.commentProfileMap[comment.user_id] || {};
        const name = profile.full_name || profile.username || "User";
        return `
          <div class="comment-item">
            <div class="comment-top">
              <div class="comment-avatar">${renderCommentAvatar(profile)}</div>
              <div>
                <div class="comment-name">${escapeHtml(name)}</div>
                <div class="comment-time">${escapeHtml(timeAgo(comment.created_at))}</div>
              </div>
            </div>
            <div class="comment-text">${escapeHtml(comment.content || "")}</div>
          </div>
        `;
      }).join("");
    }

    async function submitComment() {
      const post = state.currentCommentPost;
      if (!post) return;

      if (!state.user) {
        showNotice("Please log in to comment.", "info");
        location.href = "login.html?next=video-feed.html";
        return;
      }

      const content = commentsInput.value.trim();
      if (!content) {
        showNotice("Write a comment first.", "info");
        return;
      }

      try {
        const { error } = await supabaseClient.from("comments").insert({
          post_id: post.id,
          user_id: state.user.id,
          content
        });

        if (error) throw error;

        post.comments_count = Number(post.comments_count || 0) + 1;
        commentsInput.value = "";
        await loadComments(post.id);
        renderFeed();
        setTimeout(setupIntersectionPlayback, 120);
        showNotice("Comment added.", "success");
      } catch (error) {
        showNotice(error.message || "Could not add comment.", "error");
      }
    }

    openCreateMenuBtn?.addEventListener("click", openCreateMenu);
    createMenuCloseBtn?.addEventListener("click", closeCreateMenu);
    createMenuBackdrop?.addEventListener("click", (e) => {
      if (e.target === createMenuBackdrop) closeCreateMenu();
    });

    sheetProfileBtn.addEventListener("click", () => {
      if (!state.currentActionPost) return;
      location.href = buildProfileUrl(state.currentActionPost.user_id);
    });

    sheetCommentsBtn.addEventListener("click", () => {
      if (!state.currentActionPost) return;
      closeActionSheet();
      openComments(state.currentActionPost.id);
    });

    sheetShareBtn.addEventListener("click", async () => {
  if (!state.currentActionPost) return;

  const postId = state.currentActionPost.id;
  closeActionSheet();
  await sharePost(postId);
});

    sheetCopyBtn.addEventListener("click", async () => {
      if (!state.currentActionPost) return;
      try {
        await navigator.clipboard.writeText(getPostUrl(state.currentActionPost.id));
        showNotice("Link copied.", "success");
      } catch {
        showNotice("Could not copy link.", "error");
      }
      closeActionSheet();
    });

    sheetShareBtn.addEventListener("click", async () => {
      if (!state.currentActionPost) return;
      await sharePost(state.currentActionPost.id);
      closeActionSheet();
    });

    sheetReportBtn.addEventListener("click", () => {
      showNotice("Post reported.", "success");
      closeActionSheet();
    });

    sheetCloseBtn.addEventListener("click", closeActionSheet);
    actionSheetBackdrop.addEventListener("click", (e) => {
      if (e.target === actionSheetBackdrop) closeActionSheet();
    });

    commentsCloseBtn.addEventListener("click", closeComments);
    commentsBackdrop.addEventListener("click", (e) => {
      if (e.target === commentsBackdrop) closeComments();
    });
    commentsSendBtn.addEventListener("click", submitComment);
    commentsInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        submitComment();
      }
    });

    async function init() {
      try {
        await getSessionUser();
        await loadFollowing();
        await loadFeed();

        const params = new URLSearchParams(location.search);
        const targetPostId = params.get("post");
        if (targetPostId) {
          setTimeout(() => {
            const safeId = (window.CSS && CSS.escape) ? CSS.escape(targetPostId) : targetPostId.replace(/"/g, '\\"');
            const target = document.querySelector(`[data-post-id="${safeId}"]`);
            if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
          }, 400);
        }
      } catch (error) {
        showNotice(error.message || "Could not load video feed.", "error");
      }
    }

    init();
  </script>
</body>
</html>
