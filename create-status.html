<!DOCTYPE html>
<html lang="en" class="auth-loading">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Create Status | View</title>
  <meta name="theme-color" content="#0b1454" />

  <style>
    html.auth-loading, html.auth-loading body{visibility:hidden}

    :root{
      --bg:#08114c;
      --bg2:#0b1454;
      --bg3:#0a1b6f;
      --text:#ffffff;
      --muted:rgba(255,255,255,.72);
      --line:rgba(255,255,255,.14);
      --panel:rgba(8,17,76,.86);
      --panel2:rgba(11,20,84,.92);
      --primary:#2563eb;
      --primary2:#4f46e5;
      --red:#ef4444;
      --red2:#ff5f7a;
      --green:#10b981;
      --shadow:0 16px 40px rgba(0,0,0,.22);
      --safe-top:env(safe-area-inset-top);
      --safe-bottom:env(safe-area-inset-bottom);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      min-height:100%;
      background:#0b1454;
      color:var(--text);
      overflow:hidden;
    }

    body{
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.22), transparent 22%),
        radial-gradient(circle at top right, rgba(255,95,122,.16), transparent 18%),
        linear-gradient(180deg,#08114c 0%, #0b1454 55%, #0a1b6f 100%);
    }

    a{color:inherit;text-decoration:none}
    button,input,textarea,select{font:inherit;color:inherit}
    button{border:none;background:none;cursor:pointer}
    img,video,audio{display:block;max-width:100%}

    .app{
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .notice{
      position:absolute;
      top:calc(var(--safe-top) + 74px);
      left:14px;
      right:14px;
      z-index:90;
      display:none;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      line-height:1.5;
      box-shadow:var(--shadow);
      white-space:pre-wrap;
      backdrop-filter:blur(10px);
    }
    .notice.show{display:block}
    .notice.error{background:rgba(127,29,29,.94);border:1px solid rgba(254,202,202,.35);color:#fff}
    .notice.success{background:rgba(6,95,70,.94);border:1px solid rgba(167,243,208,.35);color:#fff}
    .notice.info{background:rgba(30,64,175,.94);border:1px solid rgba(191,219,254,.35);color:#fff}

    .topbar{
      position:relative;
      z-index:40;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:calc(12px + var(--safe-top)) 14px 10px;
    }

    .top-left,.top-right{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .icon-btn{
      width:46px;
      height:46px;
      min-width:46px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.28);
      border:1px solid rgba(255,255,255,.14);
      color:#fff;
      box-shadow:var(--shadow);
      font-size:20px;
      backdrop-filter:blur(10px);
    }

    .icon-btn.active{
      background:linear-gradient(135deg,var(--primary),var(--primary2),var(--red2));
      border-color:transparent;
    }

    .preview-stage{
      position:relative;
      flex:1;
      overflow:hidden;
    }

    .preview-bg{
      position:absolute;
      inset:0;
      background:linear-gradient(135deg,#2563eb,#4f46e5,#ff5f7a);
      transition:.2s ease;
    }

    .media-layer,
    .audio-layer{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:#000;
      overflow:hidden;
      pointer-events:none;
      user-select:none;
      -webkit-user-select:none;
    }

    .media-layer.show,
    .audio-layer.show{
      display:flex;
    }

    .media-image{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%) scale(1);
      width:100%;
      height:100%;
      object-fit:contain;
      pointer-events:none;
      user-select:none;
      -webkit-user-select:none;
    }

    .media-video{
      width:100%;
      height:100%;
      object-fit:contain;
      background:#000;
      pointer-events:none;
    }

    .audio-card{
      width:min(88vw,420px);
      border-radius:26px;
      padding:22px 18px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:var(--shadow);
      text-align:center;
      backdrop-filter:blur(12px);
      pointer-events:auto;
    }

    .audio-icon{
      width:84px;
      height:84px;
      margin:0 auto 16px;
      border-radius:24px;
      background:linear-gradient(135deg,var(--primary),var(--primary2),var(--red2));
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:38px;
      box-shadow:var(--shadow);
    }

    .audio-title{
      font-size:22px;
      font-weight:800;
      margin-bottom:8px;
      color:#fff;
    }

    .audio-sub{
      font-size:14px;
      line-height:1.5;
      color:var(--muted);
      margin-bottom:14px;
      word-break:break-word;
    }

    .audio-player{
      width:100%;
      pointer-events:auto;
    }

    .stage-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.2));
      pointer-events:none;
    }

    .editor-center{
      position:absolute;
      inset:0;
      z-index:5;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:110px 22px 165px;
      text-align:center;
      pointer-events:none;
    }

    .status-input{
      width:100%;
      max-width:92%;
      min-height:120px;
      border:none;
      outline:none;
      resize:none;
      background:transparent;
      color:#fff;
      font-size:34px;
      font-weight:700;
      line-height:1.35;
      text-align:center;
      white-space:pre-wrap;
      word-break:break-word;
      overflow:hidden;
      text-shadow:0 10px 24px rgba(0,0,0,.22);
      pointer-events:auto;
    }

    .status-input.left{text-align:left}
    .status-input.right{text-align:right}
    .status-input.light-shadow{text-shadow:0 6px 16px rgba(0,0,0,.14)}
    .status-input.no-shadow{text-shadow:none}

    .caption-box{
      position:absolute;
      left:14px;
      right:14px;
      bottom:132px;
      z-index:12;
      display:none;
      padding:12px 14px;
      border-radius:18px;
      background:rgba(0,0,0,.34);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(10px);
      color:#fff;
      font-size:14px;
      line-height:1.5;
      white-space:pre-wrap;
      word-break:break-word;
      pointer-events:none;
    }
    .caption-box.show{display:block}

    .tools-top{
      position:absolute;
      top:calc(var(--safe-top) + 70px);
      left:14px;
      right:14px;
      z-index:30;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      pointer-events:none;
    }

    .tools-left,
    .tools-right{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      pointer-events:auto;
    }

    .mini-tool{
      width:42px;
      height:42px;
      min-width:42px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.28);
      border:1px solid rgba(255,255,255,.14);
      color:#fff;
      font-size:18px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }

    .mini-tool.active{
      background:linear-gradient(135deg,var(--primary),var(--primary2),var(--red2));
      border-color:transparent;
    }

    .mini-panel{
      position:absolute;
      left:14px;
      right:14px;
      bottom:138px;
      z-index:35;
      display:none;
      padding:14px;
      border-radius:22px;
      background:rgba(9,20,78,.94);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
    }

    .mini-panel.show{display:block}

    .panel-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .panel-col{
      display:grid;
      gap:10px;
    }

    .panel-label{
      font-size:12px;
      font-weight:700;
      color:var(--muted);
    }

    .panel-scroll{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .swatch{
      width:36px;
      height:36px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.86);
      box-shadow:0 0 0 1px rgba(255,255,255,.12);
    }

    .swatch.active{
      box-shadow:0 0 0 3px rgba(147,197,253,.28);
    }

    .bg-swatch{
      min-width:60px;
      height:42px;
      border-radius:14px;
      border:2px solid transparent;
      box-shadow:var(--shadow);
    }

    .bg-swatch.active{
      border-color:#fff;
    }

    .option-btn{
      min-height:42px;
      padding:0 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:13px;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .option-btn.active{
      background:linear-gradient(135deg,var(--primary),var(--primary2),var(--red2));
      border-color:transparent;
    }

    .emoji-grid{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      max-height:180px;
      overflow:auto;
    }

    .emoji-btn{
      width:40px;
      height:40px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
    }

    .field{
      width:100%;
      min-height:46px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.08);
      color:#fff;
      outline:none;
    }

    .field::placeholder{color:rgba(255,255,255,.58)}

    .slider{
      width:100%;
      accent-color:#93c5fd;
    }

    .bottom-actions{
      position:absolute;
      left:14px;
      right:14px;
      bottom:80px;
      z-index:32;
      display:flex;
      justify-content:center;
      pointer-events:none;
    }

    .bottom-actions-inner{
      display:flex;
      gap:10px;
      padding:8px 10px;
      border-radius:18px;
      background:rgba(0,0,0,.28);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      pointer-events:auto;
    }

    .small-btn{
      min-height:40px;
      padding:0 16px;
      border-radius:12px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      font-size:13px;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .small-btn.primary{
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      border-color:transparent;
    }

    .type-switch{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      z-index:34;
      padding:12px 12px calc(12px + var(--safe-bottom));
      background:rgba(7,10,22,.88);
      border-top:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(16px);
    }

    .switch-row{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      width:min(100%,620px);
      margin:0 auto;
    }

    .switch-btn{
      min-height:52px;
      border-radius:18px;
      color:#fff;
      font-size:13px;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:0 8px;
      background:transparent;
      border:1px solid transparent;
    }

    .switch-btn.active{
      background:rgba(255,255,255,.12);
      border-color:rgba(255,255,255,.14);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
    }

    @media (max-width:640px){
      .status-input{font-size:28px}
      .tools-top{top:calc(var(--safe-top) + 68px)}
      .switch-row{gap:6px}
      .switch-btn{font-size:12px;min-height:48px}
      .bottom-actions{bottom:72px}
    }
  </style>

  <script>
    document.documentElement.classList.add("auth-loading");
  </script>

    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";

    window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        flowType: "pkce"
      }
    });

    async function protectPage(nextPage) {
      try {
        const { data } = await supabaseClient.auth.getSession();
        const user = data?.session?.user;
        if (!user) {
          location.replace(`login.html?next=${encodeURIComponent(nextPage || "status.html")}`);
          return null;
        }
        document.documentElement.classList.remove("auth-loading");
        return user;
      } catch (e) {
        document.documentElement.classList.remove("auth-loading");
        location.replace("login.html");
        return null;
      }
    }

</head>
<body>
  <div class="app">
    <div id="notice" class="notice"></div>

    <header class="topbar">
      <div class="top-left">
        <a class="icon-btn" href="status.html" aria-label="Back">✕</a>
      </div>

      <div class="top-right">
        <button id="textStyleTool" class="icon-btn" type="button" aria-label="Text style">Aa</button>
        <button id="bgTool" class="icon-btn" type="button" aria-label="Background">🎨</button>
      </div>
    </header>

    <div class="preview-stage">
      <div id="previewBg" class="preview-bg"></div>

      <div id="mediaLayer" class="media-layer">
        <img id="previewImage" class="media-image" alt="Preview image" />
        <video id="previewVideo" class="media-video" muted playsinline preload="metadata"></video>
      </div>

      <div id="audioLayer" class="audio-layer">
        <div class="audio-card">
          <div id="audioIcon" class="audio-icon">🎤</div>
          <div id="audioTitle" class="audio-title">Voice Status</div>
          <div id="audioSub" class="audio-sub">No audio selected yet.</div>
          <audio id="audioPlayer" class="audio-player" controls preload="metadata"></audio>
        </div>
      </div>

      <div class="stage-overlay"></div>

      <div class="tools-top">
        <div class="tools-left">
          <button id="emojiTool" class="mini-tool" type="button" aria-label="Emoji">😀</button>
          <button id="textColorTool" class="mini-tool" type="button" aria-label="Text color">🌈</button>
          <button id="musicTool" class="mini-tool" type="button" aria-label="Music">🎵</button>
        </div>

        <div class="tools-right">
          <button id="cameraTool" class="mini-tool" type="button" aria-label="Camera">📷</button>
          <button id="uploadTool" class="mini-tool" type="button" aria-label="Upload">🖼️</button>
          <button id="voiceTool" class="mini-tool" type="button" aria-label="Record voice">🎤</button>
        </div>
      </div>

      <div class="editor-center">
        <textarea id="statusInput" class="status-input" placeholder="Type a status"></textarea>
      </div>

      <div id="captionBox" class="caption-box"></div>

      <div id="emojiPanel" class="mini-panel">
        <div id="emojiGrid" class="emoji-grid"></div>
      </div>

      <div id="bgPanel" class="mini-panel">
        <div class="panel-col">
          <div class="panel-label">Background</div>
          <div id="bgSwatches" class="panel-scroll"></div>
        </div>
      </div>

      <div id="textColorPanel" class="mini-panel">
        <div class="panel-col">
          <div class="panel-label">Text color</div>
          <div id="textSwatches" class="panel-scroll"></div>
        </div>
      </div>

      <div id="textStylePanel" class="mini-panel">
        <div class="panel-col">
          <div class="panel-row">
            <button id="fontSizeTool" class="option-btn" type="button">A+</button>
            <button id="fontWeightTool" class="option-btn" type="button">Bold</button>
            <button id="shadowTool" class="option-btn" type="button">Shadow</button>
            <button id="alignTool" class="option-btn" type="button">Align</button>
          </div>
        </div>
      </div>

      <div id="mediaPanel" class="mini-panel">
        <div class="panel-col">
          <div class="panel-label">Media</div>
          <input id="mediaInput" class="field" type="file" accept="image/*,video/*" />
          <input id="cameraInput" class="field" type="file" accept="image/*,video/*" capture="environment" style="display:none" />
          <div class="panel-row">
            <button id="fitTool" class="option-btn active" type="button">Fit</button>
            <button id="fillTool" class="option-btn" type="button">Fill</button>
            <button id="squareTool" class="option-btn" type="button">Square</button>
          </div>
          <div class="panel-row">
            <div class="panel-label">Zoom</div>
            <input id="zoomSlider" class="slider" type="range" min="1" max="2.5" step="0.05" value="1" />
          </div>
        </div>
      </div>

      <div id="audioPanel" class="mini-panel">
        <div class="panel-col">
          <div class="panel-label">Audio / Music</div>
          <input id="audioInput" class="field" type="file" accept="audio/*" />
          <textarea id="captionInput" class="field" placeholder="Add caption..."></textarea>
        </div>
      </div>

      <div id="voicePanel" class="mini-panel">
        <div class="panel-col">
          <div class="panel-label">Voice Record</div>
          <div class="panel-row">
            <button id="startRecordBtn" class="option-btn" type="button">Start</button>
            <button id="stopRecordBtn" class="option-btn" type="button">Stop</button>
            <button id="discardRecordBtn" class="option-btn" type="button">Discard</button>
          </div>
          <div id="recordStatus" class="panel-label">Recorder idle.</div>
        </div>
      </div>

      <div id="videoTrimPanel" class="mini-panel">
        <div class="panel-col">
          <div class="panel-label">Video Trim</div>
          <div class="panel-row">
            <div class="panel-label">Start</div>
            <input id="trimStart" class="slider" type="range" min="0" max="60" step="1" value="0" />
          </div>
          <div class="panel-row">
            <div class="panel-label">End</div>
            <input id="trimEnd" class="slider" type="range" min="1" max="60" step="1" value="60" />
          </div>
          <div class="panel-row">
            <div id="trimLabel" class="option-btn active" style="pointer-events:none">0s - 60s</div>
            <button id="muteVideoTool" class="option-btn" type="button">Mute</button>
          </div>
        </div>
      </div>

      <div class="bottom-actions">
        <div class="bottom-actions-inner">
          <button id="clearBtn" class="small-btn" type="button">Clear</button>
          <button id="publishBtn" class="small-btn primary" type="button">Post</button>
        </div>
      </div>

      <div class="type-switch">
        <div class="switch-row">
          <button class="switch-btn" data-type="video" type="button">Video</button>
          <button class="switch-btn" data-type="image" type="button">Photo</button>
          <button class="switch-btn active" data-type="text" type="button">Text</button>
          <button class="switch-btn" data-type="voice" type="button">Voice</button>
          <button class="switch-btn" data-type="music" type="button">Music</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STATUS_BUCKET = "status-media";

    const EMOJIS = ["😀","😂","😍","🥰","😎","🔥","✨","❤️","💙","💯","🎉","🙏","😊","😇","🤍","💫","🌟","🥳","😌","📢","📸","🎥","🛍️","🚀","🙌","🌈","🎶","✍️","😜","🤩","🎤","🎵","💃","🕺","📍","🫶"];
    const BG_PRESETS = [

      "linear-gradient(135deg,#2563eb,#4f46e5,#ff5f7a)",
      "linear-gradient(135deg,#0f172a,#334155,#64748b)",

      "linear-gradient(135deg,#ef4444,#f97316,#f59e0b)",
      "linear-gradient(135deg,#7c3aed,#a855f7,#ec4899)",

    const TEXT_COLORS = ["#ffffff","#111827","#fef08a","#fca5a5","#bfdbfe","#86efac","#fbcfe8","#e5e7eb"];

    const noticeBox = document.getElementById("notice");
    const statusInput = document.getElementById("statusInput");
    const captionInput = document.getElementById("captionInput");
    const captionBox = document.getElementById("captionBox");

    const previewBg = document.getElementById("previewBg");
    const mediaLayer = document.getElementById("mediaLayer");
    const previewImage = document.getElementById("previewImage");
    const previewVideo = document.getElementById("previewVideo");
    const audioLayer = document.getElementById("audioLayer");
    const audioIcon = document.getElementById("audioIcon");
    const audioTitle = document.getElementById("audioTitle");
    const audioSub = document.getElementById("audioSub");
    const audioPlayer = document.getElementById("audioPlayer");

    const textStyleTool = document.getElementById("textStyleTool");
    const bgTool = document.getElementById("bgTool");
    const emojiTool = document.getElementById("emojiTool");
    const textColorTool = document.getElementById("textColorTool");
    const musicTool = document.getElementById("musicTool");
    const cameraTool = document.getElementById("cameraTool");
    const uploadTool = document.getElementById("uploadTool");
    const voiceTool = document.getElementById("voiceTool");

    const emojiPanel = document.getElementById("emojiPanel");
    const emojiGrid = document.getElementById("emojiGrid");
    const bgPanel = document.getElementById("bgPanel");
    const bgSwatches = document.getElementById("bgSwatches");
    const textColorPanel = document.getElementById("textColorPanel");
    const textSwatches = document.getElementById("textSwatches");
    const textStylePanel = document.getElementById("textStylePanel");
    const mediaPanel = document.getElementById("mediaPanel");
    const audioPanel = document.getElementById("audioPanel");
    const voicePanel = document.getElementById("voicePanel");
    const videoTrimPanel = document.getElementById("videoTrimPanel");

    const mediaInput = document.getElementById("mediaInput");
    const cameraInput = document.getElementById("cameraInput");
    const audioInput = document.getElementById("audioInput");
    const zoomSlider = document.getElementById("zoomSlider");
    const fitTool = document.getElementById("fitTool");
    const fillTool = document.getElementById("fillTool");
    const squareTool = document.getElementById("squareTool");
    const fontSizeTool = document.getElementById("fontSizeTool");
    const fontWeightTool = document.getElementById("fontWeightTool");
    const shadowTool = document.getElementById("shadowTool");
    const alignTool = document.getElementById("alignTool");
    const trimStart = document.getElementById("trimStart");
    const trimEnd = document.getElementById("trimEnd");
    const trimLabel = document.getElementById("trimLabel");
    const muteVideoTool = document.getElementById("muteVideoTool");

    const startRecordBtn = document.getElementById("startRecordBtn");
    const stopRecordBtn = document.getElementById("stopRecordBtn");
    const discardRecordBtn = document.getElementById("discardRecordBtn");
    const recordStatus = document.getElementById("recordStatus");

    const clearBtn = document.getElementById("clearBtn");
    const publishBtn = document.getElementById("publishBtn");
    const switchButtons = Array.from(document.querySelectorAll("[data-type]"));

    let currentUser = null;
    let statusType = "text";
    let selectedFile = null;
    let selectedObjectUrl = "";
    let currentBg = BG_PRESETS[0];
    let currentTextColor = "rgba(255,255,255,.32)";
    let currentFontSize = 34;
    let currentFontWeight = 700;
    let currentAlignIndex = 0;
    let currentShadowMode = 0;
    let currentImageFit = "contain";
    let currentZoom = 1;
    let trimStartSeconds = 0;
    let trimEndSeconds = 60;
    let videoMuted = true;
    let mediaRecorder = null;
    let recordChunks = [];

    function showNotice(message, type = "info", duration = 3200){
      noticeBox.className = `notice show ${type}`;
      noticeBox.textContent = message || "";
      clearTimeout(showNotice._timer);
      if(duration > 0){
        showNotice._timer = setTimeout(() => {
          noticeBox.className = "notice";
          noticeBox.textContent = "";
        }, duration);
      }
    }

function readFileAsDataUrl(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result || "");
    reader.onerror = () => reject(new Error("Could not read selected file."));
    reader.readAsDataURL(file);
  });
}

    function closePanels(){
      [emojiPanel,bgPanel,textColorPanel,textStylePanel,mediaPanel,audioPanel,voicePanel,videoTrimPanel].forEach(p => p.classList.remove("show"));
      [emojiTool,bgTool,textColorTool,textStyleTool,musicTool,uploadTool,voiceTool].forEach(b => b.classList.remove("active"));
    }

    function togglePanel(name){
      const map = {
        emoji:[emojiPanel, emojiTool],
        bg:[bgPanel, bgTool],
        textColor:[textColorPanel, textColorTool],
        textStyle:[textStylePanel, textStyleTool],
        media:[mediaPanel, uploadTool],
        music:[audioPanel, musicTool],
        voice:[voicePanel, voiceTool],
        trim:[videoTrimPanel, uploadTool]
      };

      const target = map[name];
      if(!target) return;

      const [panel, btn] = target;
      const open = panel.classList.contains("show");
      closePanels();
      if(!open){
        panel.classList.add("show");
        btn.classList.add("active");
      }
    }

    function renderEmojiPanel(){
      emojiGrid.innerHTML = EMOJIS.map(emoji => `<button class="emoji-btn" type="button" data-emoji="${emoji}">${emoji}</button>`).join("");
      emojiGrid.querySelectorAll("[data-emoji]").forEach(btn => {
        btn.addEventListener("click", () => {
          const emoji = btn.getAttribute("data-emoji");
          const start = statusInput.selectionStart ?? statusInput.value.length;
          const end = statusInput.selectionEnd ?? statusInput.value.length;
          const value = statusInput.value;
          statusInput.value = value.slice(0, start) + emoji + value.slice(end);
          statusInput.focus();
          const pos = start + emoji.length;
          statusInput.setSelectionRange(pos, pos);
          renderPreview();
        });
      });
    }

    function renderBgSwatches(){
      bgSwatches.innerHTML = BG_PRESETS.map((bg, i) => `
        <button class="bg-swatch ${bg === currentBg ? "active" : ""}" type="button" data-bg-index="${i}" style="background:${bg}"></button>
      `).join("");

      bgSwatches.querySelectorAll("[data-bg-index]").forEach(btn => {
        btn.addEventListener("click", () => {
          currentBg = BG_PRESETS[Number(btn.getAttribute("data-bg-index"))];
          renderBgSwatches();
          renderPreview();
        });
      });
    }

    function renderTextSwatches(){
      textSwatches.innerHTML = TEXT_COLORS.map(color => `
        <button class="swatch ${color === currentTextColor ? "active" : ""}" type="button" data-color="${color}" style="background:${color}"></button>
      `).join("");

      textSwatches.querySelectorAll("[data-color]").forEach(btn => {
        btn.addEventListener("click", () => {
          currentTextColor = btn.getAttribute("data-color");
          renderTextSwatches();
          renderPreview();
        });
      });
    }

    function resetSelectedFile(){
      selectedFile = null;
      if(selectedObjectUrl){
        URL.revokeObjectURL(selectedObjectUrl);
        selectedObjectUrl = "";
      }

      mediaInput.value = "";
      cameraInput.value = "";
      audioInput.value = "";
      previewImage.removeAttribute("src");
      previewVideo.pause();
      previewVideo.removeAttribute("src");
      audioPlayer.pause();
      audioPlayer.removeAttribute("src");
      audioSub.textContent = "No audio selected yet.";
    }

    function setSwitchActive(){
      switchButtons.forEach(btn => {
        btn.classList.toggle("active", btn.getAttribute("data-type") === statusType);
      });
    }

    function updateModeUi(){
      setSwitchActive();
      closePanels();

      const isText = statusType === "text";
      const isImage = statusType === "image";
      const isVideo = statusType === "video";
      const isVoice = statusType === "voice";
      const isMusic = statusType === "music";

      statusInput.placeholder =
        isText ? "Type a status" :
        isImage ? "Add a photo caption" :
        isVideo ? "Add a video caption" :
        isVoice ? "Add a voice caption" :
        "Add a music caption";

      cameraTool.style.display = isImage || isVideo ? "flex" : "none";
      voiceTool.style.display = isVoice ? "flex" : "none";

      if(isVoice){
        audioIcon.textContent = "🎤";
        audioTitle.textContent = "Voice Status";
      } else if(isMusic){
        audioIcon.textContent = "🎵";
        audioTitle.textContent = "Music Status";
      } else {
        audioIcon.textContent = "🎤";
        audioTitle.textContent = "Voice Status";
      }

      renderPreview();
    }

    function setStatusType(type){
      if(statusType !== type){
        resetSelectedFile();
      }
      statusType = type;
      updateModeUi();
    }

    function renderPreview(){
      previewBg.style.background = currentBg;

      mediaLayer.classList.toggle("show", statusType === "image" || statusType === "video");
      audioLayer.classList.toggle("show", statusType === "voice" || statusType === "music");

      previewImage.style.display = "none";
      previewVideo.style.display = "none";

      const alignClass = currentAlignIndex === 0 ? "" : currentAlignIndex === 1 ? "left" : "right";
      statusInput.className = `status-input ${alignClass} ${currentShadowMode === 1 ? "light-shadow" : currentShadowMode === 2 ? "no-shadow" : ""}`;
      statusInput.style.fontSize = `${currentFontSize}px`;
      statusInput.style.fontWeight = String(currentFontWeight);
      statusInput.style.color = currentTextColor;

      const caption = statusInput.value.trim();
      if((statusType === "image" || statusType === "video" || statusType === "voice" || statusType === "music") && caption){
        captionBox.textContent = caption;
        captionBox.classList.add("show");
      } else {
        captionBox.classList.remove("show");
      }

      if(statusType === "text"){
        return;
      }

      if(statusType === "image" && selectedObjectUrl){
        previewImage.style.display = "block";
        previewImage.src = selectedObjectUrl;
        previewImage.style.objectFit = currentImageFit === "square" ? "cover" : currentImageFit;
        previewImage.style.transform = `translate(-50%,-50%) scale(${currentZoom})`;
        return;
      }

      if(statusType === "video" && selectedObjectUrl){
        previewVideo.style.display = "block";
        previewVideo.src = selectedObjectUrl;
        previewVideo.muted = videoMuted;
        return;
      }

      if((statusType === "voice" || statusType === "music") && selectedObjectUrl){
        audioPlayer.src = selectedObjectUrl;
      }
    }

    async function initUser(){
      currentUser = await protectPage("status.html");
      return !!currentUser;
    }

    function validateForm(){
      const text = statusInput.value.trim();

      if(statusType === "text" && !text){
        throw new Error("Write your status first.");
      }

      if((statusType === "image" || statusType === "video" || statusType === "voice" || statusType === "music") && !selectedFile){
        throw new Error(`Choose or record a ${statusType} file first.`);
      }

      if(statusType === "video" && trimEndSeconds <= trimStartSeconds){
        throw new Error("Video trim end must be greater than start.");
      }

      return text;
    }

    async function uploadMediaIfNeeded(){
      if(!selectedFile){
        return {
          media_url:null,
          media_path:null,
          thumbnail_url:null,
          media_type:null,
          audio_url:null,
          audio_path:null,
          audio_type:null,
          music_url:null,
          music_path:null,
          music_name:null
        };
      }

      const safeName = selectedFile.name.replace(/[^\w.\-]+/g, "_");
      const filePath = `${currentUser.id}/${Date.now()}-${safeName}`;

      const { data: uploadData, error: uploadError } = await supabaseClient.storage
        .from(STATUS_BUCKET)
        .upload(filePath, selectedFile, {
          upsert:false,
          contentType:selectedFile.type || "application/octet-stream"
        });

      if(uploadError) throw uploadError;

      const { data: publicUrlData } = supabaseClient.storage
        .from(STATUS_BUCKET)
        .getPublicUrl(uploadData.path);

      const url = publicUrlData?.publicUrl || null;

      if(statusType === "image" || statusType === "video"){
        return {
          media_url:url,
          media_path:uploadData.path,
          thumbnail_url:statusType === "image" ? url : null,
          media_type:selectedFile.type || null,
          audio_url:null,
          audio_path:null,
          audio_type:null,
          music_url:null,
          music_path:null,
          music_name:null
        };
      }

      if(statusType === "voice"){
        return {
          media_url:null,
          media_path:null,
          thumbnail_url:null,
          media_type:null,
          audio_url:url,
          audio_path:uploadData.path,
          audio_type:selectedFile.type || null,
          music_url:null,
          music_path:null,
          music_name:null
        };
      }

      if(statusType === "music"){
        return {
          media_url:null,
          media_path:null,
          thumbnail_url:null,
          media_type:null,
          audio_url:null,
          audio_path:null,
          audio_type:null,
          music_url:url,
          music_path:uploadData.path,
          music_name:selectedFile.name || null
        };
      }

      return {
        media_url:null,
        media_path:null,
        thumbnail_url:null,
        media_type:null,
        audio_url:null,
        audio_path:null,
        audio_type:null,
        music_url:null,
        music_path:null,
        music_name:null
      };
    }

    async function publishStatus(){
      publishBtn.disabled = true;

      try{
        const text = validateForm();
        showNotice("Publishing status...", "info", 0);

        const uploadPayload = await uploadMediaIfNeeded();
        const now = new Date();
        const expiresAt = new Date(now.getTime() + 24 * 60 * 60 * 1000);

        const payload = {
          user_id: currentUser.id,
          status_type: statusType,
          text_content: statusType === "text" ? (text || null) : null,
          content: text || null,
          caption: statusType === "text" ? null : (text || null),
          privacy: "public",
          allow_replies: true,
          duration_hours: 24,
          viewers_count: 0,
          bg_style: statusType === "text" ? currentBg : null,
          created_at: now.toISOString(),
          updated_at: now.toISOString(),
          expires_at: expiresAt.toISOString(),
          ...uploadPayload
        };

        const { data, error } = await supabaseClient
          .from("statuses")
          .insert(payload)
          .select("id")
          .single();

        if(error) throw error;

        showNotice("Status posted successfully.", "success");
        setTimeout(() => {
          window.location.href = data?.id ? `status-viewer.html?id=${encodeURIComponent(data.id)}` : "status.html";
        }, 700);
      }catch(error){
        console.error(error);
        showNotice(error.message || "Could not publish status.", "error", 5000);
      }finally{
        publishBtn.disabled = false;
      }
    }

    function clearAll(){
      statusInput.value = "";
      captionInput.value = "";
      currentBg = BG_PRESETS[0];
      currentTextColor = "rgba(255,255,255,.32)";
      currentFontSize = 34;
      currentFontWeight = 700;
      currentAlignIndex = 0;
      currentShadowMode = 0;
      currentImageFit = "contain";
      currentZoom = 1;
      trimStartSeconds = 0;
      trimEndSeconds = 60;
      trimStart.value = 0;
      trimEnd.value = 60;
      videoMuted = true;
      recordStatus.textContent = "Recorder idle.";
      if(mediaRecorder && mediaRecorder.state !== "inactive"){
        mediaRecorder.stop();
      }
      resetSelectedFile();
      setStatusType("text");
      renderBgSwatches();
      renderTextSwatches();
      renderTrimLabel();
      renderPreview();
      showNotice("Cleared.", "info");
    }

    function renderTrimLabel(){
      trimLabel.textContent = `${trimStartSeconds}s - ${trimEndSeconds}s`;
    }

    async function startVoiceRecording(){
      try{
        if(!navigator.mediaDevices?.getUserMedia){
          throw new Error("Voice recording is not supported on this device.");
        }

        const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
        recordChunks = [];
        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.ondataavailable = (event) => {
          if(event.data && event.data.size > 0) recordChunks.push(event.data);
        };

        mediaRecorder.onstop = () => {
          stream.getTracks().forEach(track => track.stop());

          if(!recordChunks.length){
            recordStatus.textContent = "No voice recorded.";
            return;
          }

          const mimeType = mediaRecorder.mimeType || "audio/webm";
          const blob = new Blob(recordChunks, { type:mimeType });
          const ext = mimeType.includes("ogg") ? "ogg" : mimeType.includes("mp4") ? "m4a" : "webm";
          const file = new File([blob], `voice-status-${Date.now()}.${ext}`, { type:mimeType });

          resetSelectedFile();
          selectedFile = file;
          readFileAsDataUrl(file)
  .then((dataUrl) => {
    selectedObjectUrl = dataUrl;
    audioSub.textContent = file.name;
    recordStatus.textContent = "Voice recorded.";
    renderPreview();
  })
  .catch((error) => {
    console.error(error);
    showNotice(error.message || "Could not preview recorded voice.", "error");
  });
          audioSub.textContent = file.name;
          recordStatus.textContent = "Voice recorded.";
          renderPreview();
        };

        mediaRecorder.start();
        recordStatus.textContent = "Recording...";
      }catch(error){
        console.error(error);
        showNotice(error.message || "Could not start recording.", "error");
      }
    }

    function stopVoiceRecording(){
      try{
        if(mediaRecorder && mediaRecorder.state !== "inactive"){
          mediaRecorder.stop();
        }
      }catch(error){
        console.error(error);
      }
    }

    function bindEvents(){
      switchButtons.forEach(btn => {
        btn.addEventListener("click", () => setStatusType(btn.getAttribute("data-type")));
      });

      textStyleTool.addEventListener("click", () => togglePanel("textStyle"));
      bgTool.addEventListener("click", () => togglePanel("bg"));
      emojiTool.addEventListener("click", () => togglePanel("emoji"));
      textColorTool.addEventListener("click", () => togglePanel("textColor"));

      musicTool.addEventListener("click", () => {
        setStatusType("music");
        togglePanel("music");
      });

      uploadTool.addEventListener("click", () => {
        if(statusType === "music"){
          togglePanel("music");
          audioInput.click();
          return;
        }

        if(statusType === "video"){
          togglePanel("trim");
        } else {
          togglePanel("media");
        }
        mediaInput.click();
      });

      cameraTool.addEventListener("click", () => {
        if(statusType !== "image" && statusType !== "video"){
          showNotice("Camera works with Photo or Video mode.", "info");
          return;
        }
        cameraInput.accept = statusType === "video" ? "video/*" : "image/*";
        cameraInput.click();
      });

      voiceTool.addEventListener("click", () => {
        setStatusType("voice");
        togglePanel("voice");
      });

      statusInput.addEventListener("input", renderPreview);

      captionInput.addEventListener("input", () => {
        if(statusType === "voice" || statusType === "music"){
          statusInput.value = captionInput.value;
          renderPreview();
        }
      });

      mediaInput.addEventListener("change", async () => {
  const file = mediaInput.files?.[0] || null;
  if(!file) return;

  if(statusType === "image" && !file.type.startsWith("image/")){
    showNotice("Choose an image file.", "error");
    mediaInput.value = "";
    return;
  }

  if(statusType === "video" && !file.type.startsWith("video/")){
    showNotice("Choose a video file.", "error");
    mediaInput.value = "";
    return;
  }

  try{
    resetSelectedFile();
    selectedFile = file;
    selectedObjectUrl = await readFileAsDataUrl(file);

    if(statusType === "video"){
      previewVideo.onloadedmetadata = () => {
        const max = Math.min(Math.floor(previewVideo.duration || 60), 60);
        trimStart.max = String(Math.max(0, max - 1));
        trimEnd.max = String(max);
        trimEnd.value = String(max);
        trimStart.value = "0";
        trimStartSeconds = 0;
        trimEndSeconds = max;
        renderTrimLabel();
      };
    }

    renderPreview();
  }catch(error){
    console.error(error);
    showNotice(error.message || "Could not preview selected media.", "error");
  }
});

      cameraInput.addEventListener("change", () => {
        const file = cameraInput.files?.[0] || null;
        if(!file) return;

        resetSelectedFile();
        selectedFile = file;
        selectedObjectUrl = URL.createObjectURL(file);

        if(statusType === "video"){
          previewVideo.onloadedmetadata = () => {
            const max = Math.min(Math.floor(previewVideo.duration || 60), 60);
            trimStart.max = String(Math.max(0, max - 1));
            trimEnd.max = String(max);
            trimEnd.value = String(max);
            trimStart.value = "0";
            trimStartSeconds = 0;
            trimEndSeconds = max;
            renderTrimLabel();
          };
        }

        renderPreview();
      });

      audioInput.addEventListener("change", async () => {
  const file = audioInput.files?.[0] || null;
  if(!file) return;

  if(!file.type.startsWith("audio/")){
    showNotice("Choose an audio file.", "error");
    audioInput.value = "";
    return;
  }

  try{
    resetSelectedFile();
    selectedFile = file;
    selectedObjectUrl = await readFileAsDataUrl(file);
    audioSub.textContent = file.name;
    renderPreview();
  }catch(error){
    console.error(error);
    showNotice(error.message || "Could not preview selected audio.", "error");
  }
});

      zoomSlider.addEventListener("input", () => {
        currentZoom = Number(zoomSlider.value);
        renderPreview();
      });

      fitTool.addEventListener("click", () => {
        currentImageFit = "contain";
        fitTool.classList.add("active");
        fillTool.classList.remove("active");
        squareTool.classList.remove("active");
        renderPreview();
      });

      fillTool.addEventListener("click", () => {
        currentImageFit = "cover";
        fillTool.classList.add("active");
        fitTool.classList.remove("active");
        squareTool.classList.remove("active");
        renderPreview();
      });

      squareTool.addEventListener("click", () => {
        currentImageFit = "square";
        squareTool.classList.add("active");
        fitTool.classList.remove("active");
        fillTool.classList.remove("active");
        renderPreview();
      });

      fontSizeTool.addEventListener("click", () => {
        currentFontSize = currentFontSize >= 44 ? 24 : currentFontSize + 4;
        renderPreview();
      });

      fontWeightTool.addEventListener("click", () => {
        currentFontWeight = currentFontWeight >= 900 ? 500 : currentFontWeight + 100;
        renderPreview();
      });

      shadowTool.addEventListener("click", () => {
        currentShadowMode = (currentShadowMode + 1) % 3;
        renderPreview();
      });

      alignTool.addEventListener("click", () => {
        currentAlignIndex = (currentAlignIndex + 1) % 3;
        renderPreview();
      });

      trimStart.addEventListener("input", () => {
        trimStartSeconds = Number(trimStart.value);
        if(trimStartSeconds >= trimEndSeconds){
          trimEndSeconds = trimStartSeconds + 1;
          trimEnd.value = String(trimEndSeconds);
        }
        renderTrimLabel();
        if(previewVideo.src){
          previewVideo.currentTime = trimStartSeconds;
        }
      });

      trimEnd.addEventListener("input", () => {
        trimEndSeconds = Number(trimEnd.value);
        if(trimEndSeconds <= trimStartSeconds){
          trimStartSeconds = Math.max(0, trimEndSeconds - 1);
          trimStart.value = String(trimStartSeconds);
        }
        renderTrimLabel();
      });

      muteVideoTool.addEventListener("click", () => {
        videoMuted = !videoMuted;
        muteVideoTool.classList.toggle("active", !videoMuted);
        muteVideoTool.textContent = videoMuted ? "Mute" : "Sound";
        renderPreview();
      });

      startRecordBtn.addEventListener("click", startVoiceRecording);
      stopRecordBtn.addEventListener("click", stopVoiceRecording);

      discardRecordBtn.addEventListener("click", () => {
        if(mediaRecorder && mediaRecorder.state !== "inactive"){
          mediaRecorder.stop();
        }
        resetSelectedFile();
        recordStatus.textContent = "Recording discarded.";
        renderPreview();
      });

      clearBtn.addEventListener("click", clearAll);
      publishBtn.addEventListener("click", publishStatus);

      previewVideo.addEventListener("timeupdate", () => {
        if(statusType === "video" && previewVideo.currentTime >= trimEndSeconds){
          previewVideo.pause();
        }
      });
    }

    async function init(){
      try{
        const ready = await initUser();
        if(!ready) return;
        renderEmojiPanel();
        renderBgSwatches();
        renderTextSwatches();
        renderTrimLabel();
        bindEvents();
        setStatusType("text");
        renderPreview();
      }catch(error){
        console.error(error);
        showNotice(error.message || "Could not load page.", "error", 5000);
      }
    }

    window.addEventListener("beforeunload", () => {
      if(selectedObjectUrl) URL.revokeObjectURL(selectedObjectUrl);
    });

    init();
  </script>
</body>
