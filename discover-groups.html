<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Discover Groups | View</title>
  <meta name="theme-color" content="#0a1028" />
  <link rel="manifest" href="/manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg1:#081a8f;
      --bg2:#07115f;
      --bg3:#05093c;
      --blue:#2f7bff;
      --blue2:#5ba0ff;
      --red:#ff2f57;
      --red2:#ff5a74;
      --text:#fff;
      --muted:#d4dcff;
      --line:rgba(255,255,255,.10);
      --shadow:0 18px 42px rgba(0,0,0,.28);
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Inter,Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      min-height:100%;
      background:
        radial-gradient(circle at 12% 10%, rgba(47,123,255,.22), transparent 18%),
        radial-gradient(circle at 88% 10%, rgba(255,47,87,.18), transparent 14%),
        linear-gradient(180deg,var(--bg1),var(--bg2),var(--bg3));
      color:var(--text);
    }

    body{overflow-x:hidden}
    button,input{font:inherit}
    a{text-decoration:none;color:inherit}

    .page{
      width:min(100%,980px);
      margin:0 auto;
      padding:calc(12px + var(--safe-top)) 14px calc(20px + var(--safe-bottom));
    }

    .notice{
      display:none;
      margin-bottom:12px;
      padding:12px 14px;
      border-radius:14px;
      font-size:12px;
      line-height:1.5;
      border:1px solid transparent;
      background:rgba(255,255,255,.05);
    }
    .notice.show{display:block}
    .notice.error{background:rgba(239,68,68,.10);border-color:rgba(239,68,68,.22);color:#ffd7df}
    .notice.success{background:rgba(25,195,125,.10);border-color:rgba(25,195,125,.22);color:#dcffe7}
    .notice.info{background:rgba(47,123,255,.10);border-color:rgba(47,123,255,.22);color:#dcebff}

    .topbar{
      display:grid;
      grid-template-columns:48px 1fr auto;
      gap:10px;
      align-items:center;
      margin-bottom:14px;
    }

    .icon-btn{
      width:46px;
      height:46px;
      min-width:46px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .title{
      font-size:18px;
      font-weight:900;
    }

    .subtitle{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }

    .hero,.panel{
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:14px;
      margin-bottom:14px;
    }

    .search-box{
      min-height:52px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:0 14px;
      border-radius:18px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
    }

    .search-box input{
      flex:1;
      min-width:0;
      border:none;
      outline:none;
      background:transparent;
      color:#fff;
    }

    .search-box input::placeholder{
      color:#a9bce0;
    }

    .tabs{
      display:flex;
      gap:8px;
      overflow:auto hidden;
      scrollbar-width:none;
      margin-top:12px;
    }

    .tabs::-webkit-scrollbar{display:none}

    .tab{
      min-height:36px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:#fff;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      white-space:nowrap;
    }

    .tab.active{
      background:linear-gradient(135deg,var(--blue),var(--red));
      border-color:transparent;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .card{
      border:1px solid var(--line);
      border-radius:22px;
      overflow:hidden;
      background:rgba(255,255,255,.05);
    }

    .cover{
      height:120px;
      background:linear-gradient(135deg,var(--blue),var(--red));
      position:relative;
    }

    .cover img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .badge{
      position:absolute;
      top:10px;
      right:10px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(0,0,0,.24);
      font-size:10px;
      font-weight:900;
    }

    .body{
      padding:12px;
      display:grid;
      gap:8px;
    }

    .name{
      font-size:14px;
      font-weight:900;
    }

    .desc{
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
      min-height:36px;
    }

    .chip-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .chip{
      min-height:26px;
      padding:0 10px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:800;
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
    }

    .btn-row{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
    }

    .btn{
      min-height:38px;
      border:none;
      border-radius:12px;
      color:#fff;
      font-weight:900;
      cursor:pointer;
    }

    .btn.blue{background:linear-gradient(135deg,var(--blue),var(--blue2))}
    .btn.red{background:linear-gradient(135deg,var(--red),var(--red2))}
    .btn.soft{background:rgba(255,255,255,.08);border:1px solid var(--line)}

    .empty{
      padding:26px 14px;
      text-align:center;
      font-size:13px;
      color:var(--muted);
      border:1px dashed rgba(255,255,255,.18);
      border-radius:18px;
      background:rgba(255,255,255,.03);
    }

    @media (max-width:720px){
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="notice" class="notice"></div>

    <header class="topbar">
      <button class="icon-btn" onclick="window.location.href='groups.html'">←</button>
      <div>
        <div class="title">Discover Groups</div>
        <div class="subtitle">Explore premium groups by category and interest</div>
      </div>
      <button class="icon-btn" id="refreshBtn">↻</button>
    </header>

    <section class="hero">
      <div class="search-box">
        <span>⌕</span>
        <input id="searchInput" type="text" placeholder="Search discover groups..." />
      </div>

      <div class="tabs">
        <button class="tab active" data-cat="all">All</button>
        <button class="tab" data-cat="Business">Business</button>
        <button class="tab" data-cat="Technology">Technology</button>
        <button class="tab" data-cat="Entertainment">Entertainment</button>
        <button class="tab" data-cat="Community">Community</button>
        <button class="tab" data-cat="Education">Education</button>
      </div>
    </section>

    <section class="panel">
      <div class="grid" id="discoverGrid"></div>
    </section>
  </div>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInR5cCI6IkpXVCJ9";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth:{
        persistSession:true,
        autoRefreshToken:true,
        detectSessionInUrl:true,
        flowType:"pkce"
      }
    });

    const notice = document.getElementById("notice");
    const discoverGrid = document.getElementById("discoverGrid");
    const searchInput = document.getElementById("searchInput");
    const tabs = [...document.querySelectorAll(".tab")];

    let currentUser = null;
    let groups = [];
    let memberships = [];
    let activeCategory = "all";

    function showNotice(message, type="info"){
      notice.className = `notice show ${type}`;
      notice.textContent = message || "";
      clearTimeout(showNotice._timer);
      showNotice._timer = setTimeout(() => {
        notice.className = "notice";
        notice.textContent = "";
      }, 2500);
    }

    async function requireUser(){
      const { data, error } = await supabase.auth.getUser();
      if(error) throw error;
      if(!data?.user){
        location.href = "login.html?next=discover-groups.html";
        return null;
      }
      currentUser = data.user;
      return currentUser;
    }

    function render(){
      tabs.forEach(t => t.classList.toggle("active", t.dataset.cat === activeCategory));

      const search = searchInput.value.trim().toLowerCase();
      const memberIds = new Set(memberships.map(m => m.group_id));

      let filtered = groups.filter(g => !memberIds.has(g.id));

      if(activeCategory !== "all"){
        filtered = filtered.filter(g => (g.category || "") === activeCategory);
      }

      if(search){
        filtered = filtered.filter(g =>
          (g.name || "").toLowerCase().includes(search) ||
          (g.description || "").toLowerCase().includes(search) ||
          (g.category || "").toLowerCase().includes(search)
        );
      }

      if(!filtered.length){
        discoverGrid.innerHTML = `<div class="empty">No groups found.</div>`;
        return;
      }

      discoverGrid.innerHTML = filtered.map(g => `
        <div class="card">
          <div class="cover">
            ${g.cover_url || g.group_image ? `<img src="${g.cover_url || g.group_image}" alt="${g.name}">` : ``}
            <div class="badge">${g.privacy || "public"}</div>
          </div>
          <div class="body">
            <div class="name">${g.name || "Untitled Group"}</div>
            <div class="desc">${g.description || "No description yet."}</div>
            <div class="chip-row">
              <span class="chip">${g.category || "General"}</span>
            </div>
            <div class="btn-row">
              <button class="btn blue" onclick="openGroup('${g.id}')">Open</button>
              <button class="btn red" onclick="joinGroup('${g.id}')">Join</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    async function loadData(){
      const [{ data: groupsData, error: groupsError }, { data: membersData, error: membersError }] = await Promise.all([
        supabase.from("groups").select("*").order("created_at", { ascending:false }),
        supabase.from("group_members").select("group_id,user_id").eq("user_id", currentUser.id)
      ]);

      if(groupsError) throw groupsError;
      if(membersError) throw membersError;

      groups = groupsData || [];
      memberships = membersData || [];
      render();
    }

    async function joinGroup(groupId){
      try{
        const { error } = await supabase.from("group_members").insert({
          group_id: groupId,
          user_id: currentUser.id,
          role: "member"
        });

        if(error) throw error;

        showNotice("Joined group successfully.", "success");
        await loadData();
      }catch(error){
        showNotice(error.message || "Could not join group.", "error");
      }
    }

    function openGroup(groupId){
      location.href = `group-view.html?id=${groupId}`;
    }

    searchInput.addEventListener("input", render);

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        activeCategory = tab.dataset.cat;
        render();
      });
    });

    document.getElementById("refreshBtn").addEventListener("click", async () => {
      try{
        await loadData();
        showNotice("Discover refreshed.", "success");
      }catch(error){
        showNotice(error.message || "Could not refresh discover page.", "error");
      }
    });

    window.joinGroup = joinGroup;
    window.openGroup = openGroup;

    (async function init(){
      try{
        await requireUser();
        await loadData();
      }catch(error){
        showNotice(error.message || "Could not load discover groups.", "error");
      }
    })();
  </script>
</body>
</html>
