<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Publish Dashboard | View</title>
  <meta name="theme-color" content="#ffffff" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#f6f8fc;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --card:#ffffff;
      --primary:#2563eb;
      --success:#10b981;
      --warning:#f59e0b;
      --danger:#ef4444;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --safe-bottom:env(safe-area-inset-bottom);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      min-height:100%;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.05), transparent 22%),
        radial-gradient(circle at bottom right, rgba(79,70,229,.06), transparent 20%),
        linear-gradient(180deg,#fbfcff 0%, #f5f7fb 100%);
      color:var(--text);
    }

    body{
      padding:16px 14px 110px;
    }

    button{
      border:none;
      background:none;
      cursor:pointer;
      font:inherit;
      color:inherit;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .wrap{
      width:min(100%, 980px);
      margin:0 auto;
    }

    .notice{
      display:none;
      margin-bottom:14px;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      line-height:1.55;
      box-shadow:var(--shadow);
    }
    .notice.show{display:block}
    .notice.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
    .notice.success{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
    .notice.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .top-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
    }

    .icon-btn{
      width:46px;
      height:46px;
      min-width:46px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#fff;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      font-size:18px;
      color:#111827;
    }

    .title-box{
      min-width:0;
      flex:1;
    }

    .title{
      font-size:22px;
      font-weight:800;
      margin-bottom:3px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .sub{
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .tool-btn{
      min-height:42px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      box-shadow:var(--shadow);
      color:#111827;
      font-size:13px;
      font-weight:700;
    }

    .section{
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.7);
      border-radius:22px;
      box-shadow:var(--shadow);
      overflow:hidden;
      margin-bottom:14px;
    }

    .section-body{
      padding:14px;
      display:grid;
      gap:14px;
    }

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
    }

    .summary-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
    }

    .summary-label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .summary-value{
      font-size:24px;
      font-weight:800;
    }

    .posts{
      display:grid;
      gap:12px;
    }

    .post-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      display:grid;
      gap:12px;
    }

    .post-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }

    .post-main{
      min-width:0;
      flex:1;
    }

    .post-title{
      font-size:14px;
      font-weight:800;
      margin-bottom:6px;
    }

    .post-text{
      font-size:14px;
      line-height:1.55;
      color:#111827;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .post-meta{
      color:var(--muted);
      font-size:12px;
      margin-top:8px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .pill{
      min-height:28px;
      padding:0 10px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:800;
      border:1px solid transparent;
      white-space:nowrap;
    }

    .queued{background:#fff7ed;color:#9a3412;border-color:#fed7aa}
    .processing{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
    .success{background:#ecfdf5;color:#065f46;border-color:#a7f3d0}
    .failed{background:#fef2f2;color:#991b1b;border-color:#fecaca}
    .retrying{background:#fffbeb;color:#92400e;border-color:#fde68a}
    .partial{background:#f5f3ff;color:#6d28d9;border-color:#ddd6fe}
    .defaultpill{background:#f3f4f6;color:#374151;border-color:#e5e7eb}

    .platform-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }

    .platform-card{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fafbff;
      padding:12px;
      display:grid;
      gap:8px;
    }

    .platform-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .platform-name{
      font-size:13px;
      font-weight:800;
      text-transform:capitalize;
    }

    .platform-small{
      font-size:11px;
      color:var(--muted);
      line-height:1.45;
      word-break:break-word;
    }

    .platform-error{
      font-size:12px;
      color:#b91c1c;
      line-height:1.45;
      word-break:break-word;
    }

    .platform-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .mini-btn{
      min-height:34px;
      padding:0 10px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#fff;
      font-size:12px;
      font-weight:700;
    }

    .empty{
      background:#fff;
      border:1px dashed var(--line);
      border-radius:18px;
      padding:28px 16px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:12px;
      width:min(760px, calc(100% - 20px));
      background:rgba(255,255,255,.92);
      border:1px solid rgba(229,231,235,.9);
      border-radius:20px;
      padding:8px 6px calc(8px + var(--safe-bottom));
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      box-shadow:var(--shadow);
      z-index:40;
    }

    .nav-btn{
      min-height:56px;
      border-radius:14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      font-size:11px;
      font-weight:700;
      color:var(--muted);
      text-decoration:none;
    }

    .nav-btn.active{
      background:#eef4ff;
      color:#1d4ed8;
    }

    @media (max-width:820px){
      .summary-grid{grid-template-columns:repeat(2,1fr)}
      .platform-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="notice" class="notice"></div>

    <header class="topbar">
      <div class="top-left">
        <button class="icon-btn" onclick="history.back()">←</button>
        <div class="title-box">
          <div class="title">Publish Dashboard</div>
          <div class="sub">Live delivery tracking</div>
        </div>
      </div>
      <button class="icon-btn" id="refreshBtn">↻</button>
    </header>

    <div class="toolbar">
      <button class="tool-btn" id="runWorkerBtn">Run Delivery</button>
      <button class="tool-btn" id="toggleAutoBtn">Auto Refresh: On</button>
    </div>

    <section class="section">
      <div class="section-body">
        <div class="summary-grid">
          <div class="summary-card">
            <div class="summary-label">Posts</div>
            <div class="summary-value" id="postsCount">0</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">Queued</div>
            <div class="summary-value" id="queuedCount">0</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">Success</div>
            <div class="summary-value" id="successCount">0</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">Failed</div>
            <div class="summary-value" id="failedCount">0</div>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-body">
        <div id="postsWrap" class="posts"></div>
      </div>
    </section>
  </div>

  <nav class="bottom-nav">
    <a class="nav-btn" href="home.html"><span>🏠</span><span>Home</span></a>
    <a class="nav-btn" href="explore.html"><span>🔎</span><span>Explore</span></a>
    <a class="nav-btn" href="create-post.html"><span>➕</span><span>Create</span></a>
    <a class="nav-btn active" href="publish-dashboard.html"><span>📊</span><span>Publish</span></a>
    <a class="nav-btn" href="settings.html"><span>⚙️</span><span>Settings</span></a>
  </nav>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";
    const WORKER_URL = "https://view-psi-lac.vercel.app/api/process-publish-jobs";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        flowType: "pkce"
      }
    });

    const noticeBox = document.getElementById("notice");
    const refreshBtn = document.getElementById("refreshBtn");
    const runWorkerBtn = document.getElementById("runWorkerBtn");
    const toggleAutoBtn = document.getElementById("toggleAutoBtn");
    const postsWrap = document.getElementById("postsWrap");
    const postsCount = document.getElementById("postsCount");
    const queuedCount = document.getElementById("queuedCount");
    const successCount = document.getElementById("successCount");
    const failedCount = document.getElementById("failedCount");

    let currentUser = null;
    let autoRefreshOn = true;
    let autoRefreshTimer = null;

    function showNotice(message, type = "info") {
      noticeBox.className = `notice show ${type}`;
      noticeBox.textContent = message || "";
      clearTimeout(showNotice._timer);
      showNotice._timer = setTimeout(() => {
        noticeBox.className = "notice";
        noticeBox.textContent = "";
      }, 2800);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      if (!value) return "—";
      try {
        return new Date(value).toLocaleString();
      } catch {
        return value;
      }
    }

    function getPillClass(status) {
      switch ((status || "").toLowerCase()) {
        case "queued": return "queued";
        case "processing": return "processing";
        case "success": return "success";
        case "failed": return "failed";
        case "retrying": return "retrying";
        case "partial": return "partial";
        default: return "defaultpill";
      }
    }

    async function requireUser() {
      const { data, error } = await supabaseClient.auth.getUser();
      if (error) throw error;
      if (!data?.user) {
        window.location.href = "login.html?next=publish-dashboard.html";
        return null;
      }
      currentUser = data.user;
      return currentUser;
    }

    async function loadDashboard() {
      const user = currentUser || await requireUser();
      if (!user) return;

      const { data: posts, error: postsError } = await supabaseClient
        .from("posts")
        .select("id, content, media_url, media_type, selected_platforms, publish_status, created_at")
        .eq("user_id", user.id)
        .order("created_at", { ascending: false })
        .limit(50);

      if (postsError) throw postsError;

      const postIds = (posts || []).map(post => post.id);

      let jobs = [];
      let logs = [];

      if (postIds.length) {
        const { data: jobsData, error: jobsError } = await supabaseClient
          .from("post_publish_jobs")
          .select("id, post_id, platform, status, attempts, last_error, platform_post_id, delivered_at, next_retry_at, created_at, updated_at")
          .in("post_id", postIds)
          .order("created_at", { ascending: false });

        if (jobsError) throw jobsError;
        jobs = jobsData || [];

        const { data: logsData, error: logsError } = await supabaseClient
          .from("post_publish_logs")
          .select("id, post_id, job_id, platform, status, attempts, error_message, platform_post_id, created_at")
          .in("post_id", postIds)
          .order("created_at", { ascending: false });

        if (logsError) throw logsError;
        logs = logsData || [];
      }

      renderDashboard(posts || [], jobs, logs);
    }

    function renderDashboard(posts, jobs, logs) {
      postsCount.textContent = String(posts.length);
      queuedCount.textContent = String(jobs.filter(j => ["queued", "retrying", "processing"].includes(j.status)).length);
      successCount.textContent = String(jobs.filter(j => j.status === "success").length);
      failedCount.textContent = String(jobs.filter(j => j.status === "failed").length);

      if (!posts.length) {
        postsWrap.innerHTML = `<div class="empty">No posts yet.</div>`;
        return;
      }

      const jobsByPost = {};
      const logsByJob = {};

      jobs.forEach(job => {
        if (!jobsByPost[job.post_id]) jobsByPost[job.post_id] = [];
        jobsByPost[job.post_id].push(job);
      });

      logs.forEach(log => {
        if (!logsByJob[log.job_id]) logsByJob[log.job_id] = [];
        logsByJob[log.job_id].push(log);
      });

      postsWrap.innerHTML = posts.map(post => {
        const postJobs = jobsByPost[post.id] || [];
        const selectedPlatforms = Array.isArray(post.selected_platforms) ? post.selected_platforms : [];

        const platformCards = selectedPlatforms.map(platform => {
          const job = postJobs.find(j => j.platform === platform);
          const latestLog = job ? (logsByJob[job.id] || [])[0] : null;
          const status = job?.status || (platform === "view" ? "success" : "queued");

          return `
            <div class="platform-card">
              <div class="platform-head">
                <div class="platform-name">${platform}</div>
                <span class="pill ${getPillClass(status)}">${status}</span>
              </div>

              <div class="platform-small">Attempts: ${job?.attempts ?? latestLog?.attempts ?? 0}</div>
              ${job?.platform_post_id ? `<div class="platform-small">Platform ID: ${escapeHtml(job.platform_post_id)}</div>` : ``}
              ${job?.delivered_at ? `<div class="platform-small">Delivered: ${formatDate(job.delivered_at)}</div>` : ``}
              ${job?.next_retry_at ? `<div class="platform-small">Next retry: ${formatDate(job.next_retry_at)}</div>` : ``}
              ${job?.last_error ? `<div class="platform-error">${escapeHtml(job.last_error)}</div>` : ``}
              ${latestLog?.error_message ? `<div class="platform-error">${escapeHtml(latestLog.error_message)}</div>` : ``}

              <div class="platform-actions">
                ${job?.status === "failed" ? `<button class="mini-btn" onclick="retryJob('${job.id}')">Retry</button>` : ``}
                ${job?.status === "retrying" ? `<button class="mini-btn" onclick="retryJob('${job.id}')">Run Now</button>` : ``}
              </div>
            </div>
          `;
        }).join("");

        return `
          <div class="post-card">
            <div class="post-top">
              <div class="post-main">
                <div class="post-title">Post</div>
                <div class="post-text">${escapeHtml(post.content || "") || "—"}</div>
                <div class="post-meta">
                  <span>${formatDate(post.created_at)}</span>
                  <span class="pill ${getPillClass(post.publish_status)}">${post.publish_status || "queued"}</span>
                  ${post.media_url ? `<span class="pill defaultpill">${escapeHtml(post.media_type || "media")}</span>` : ``}
                </div>
              </div>
            </div>

            <div class="platform-grid">
              ${platformCards || `<div class="empty">No delivery jobs.</div>`}
            </div>
          </div>
        `;
      }).join("");
    }

    async function runWorker() {
      runWorkerBtn.disabled = true;
      try {
        const response = await fetch(WORKER_URL, { method: "GET" });
        const data = await response.json();
        if (!response.ok) throw new Error(data?.error || "Worker failed.");
        showNotice(`Processed ${data?.processed ?? 0} job(s).`, "success");
        await loadDashboard();
      } catch (error) {
        showNotice(error.message || "Could not run delivery.", "error");
      } finally {
        runWorkerBtn.disabled = false;
      }
    }

    async function retryJob(jobId) {
      try {
        const { error } = await supabaseClient
          .from("post_publish_jobs")
          .update({
            status: "queued",
            attempts: 0,
            last_error: null,
            next_retry_at: null,
            updated_at: new Date().toISOString()
          })
          .eq("id", jobId);

        if (error) throw error;

        showNotice("Job re-queued.", "success");
        await loadDashboard();
      } catch (error) {
        showNotice(error.message || "Could not retry job.", "error");
      }
    }

    function setAutoRefresh(on) {
      autoRefreshOn = on;
      toggleAutoBtn.textContent = `Auto Refresh: ${on ? "On" : "Off"}`;

      if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
      }

      if (on) {
        autoRefreshTimer = setInterval(() => {
          loadDashboard().catch(() => {});
        }, 15000);
      }
    }

    function bindActions() {
      refreshBtn.addEventListener("click", async () => {
        try {
          await loadDashboard();
          showNotice("Dashboard updated.", "success");
        } catch (error) {
          showNotice(error.message || "Could not refresh.", "error");
        }
      });

      runWorkerBtn.addEventListener("click", runWorker);

      toggleAutoBtn.addEventListener("click", () => {
        setAutoRefresh(!autoRefreshOn);
      });
    }

    async function init() {
      try {
        const user = await requireUser();
        if (!user) return;
        bindActions();
        setAutoRefresh(true);
        await loadDashboard();
      } catch (error) {
        showNotice(error.message || "Could not load dashboard.", "error");
      }
    }

    window.retryJob = retryJob;
    init();
  </script>
</body>
  </html>
