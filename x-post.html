<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post to X | View</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    textarea {
      width: 100%;
      height: 120px;
      border-radius: 12px;
      border: none;
      padding: 12px;
      font-size: 14px;
      outline: none;
      margin-top: 10px;
    }

    .btn {
      margin-top: 15px;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }

    .btn-primary {
      background: #10b981;
      color: white;
    }

    .btn-secondary {
      background: #334155;
      color: white;
    }

    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
    }

    .success {
      background: rgba(16,185,129,0.2);
      color: #10b981;
    }

    .error {
      background: rgba(239,68,68,0.2);
      color: #ef4444;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>Post to X</h2>

    <textarea id="postText" placeholder="Write something..."></textarea>

    <button class="btn btn-primary" onclick="postToX()">Post to X</button>
    <button class="btn btn-secondary" onclick="checkConnection()">Check Connection</button>

    <div id="status"></div>
  </div>
</div>

<script>
  // ✅ YOUR SUPABASE CONFIG
  const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const X_POST_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co/functions/v1/x-post";

  function showStatus(msg, type = "success") {
    const el = document.getElementById("status");
    el.className = "status " + type;
    el.innerHTML = msg;
  }

  // ✅ CHECK CONNECTION
  async function checkConnection() {
    const { data, error } = await supabase.auth.getSession();

    if (!data?.session) {
      showStatus("❌ Not logged in", "error");
      return;
    }

    showStatus("✅ Logged in as user", "success");
  }

  // ✅ MAIN POST FUNCTION
  async function postToX() {
    try {
      const text = document.getElementById("postText").value.trim();

      if (!text) {
        showStatus("Enter text first", "error");
        return;
      }

      // 🔥 GET USER SESSION
      const { data, error } = await supabase.auth.getSession();

      if (error || !data?.session) {
        showStatus("User not logged in", "error");
        return;
      }

      const jwt = data.session.access_token;

      // 🔥 SEND REQUEST WITH AUTH HEADER (CRITICAL FIX)
      const res = await fetch(X_POST_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${jwt}`
        },
        body: JSON.stringify({
          text: text
        })
      });

      const json = await res.json();

      if (!res.ok) {
        throw new Error(json.error || "Failed to post");
      }

      showStatus("✅ Posted successfully to X");

    } catch (err) {
      console.error(err);
      showStatus("❌ " + err.message, "error");
    }
  }
</script>

</body>
</html>
