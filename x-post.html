<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Post to X | View</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#06101f;
      --bg2:#0c1930;
      --card:rgba(255,255,255,.08);
      --card2:rgba(255,255,255,.05);
      --line:rgba(255,255,255,.12);
      --text:#f8fbff;
      --muted:#9fb1ca;
      --primary:#1d9bf0;
      --primary2:#4f46e5;
      --success:#19c37d;
      --danger:#ef4444;
      --warning:#f59e0b;
      --shadow:0 20px 60px rgba(0,0,0,.35);
      --safe-bottom:env(safe-area-inset-bottom);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{
      min-height:100%;
      font-family:Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(29,155,240,.14), transparent 24%),
        radial-gradient(circle at bottom left, rgba(79,70,229,.14), transparent 24%),
        linear-gradient(180deg,var(--bg),var(--bg2));
    }
    body{padding:16px 12px calc(110px + var(--safe-bottom))}
    .wrap{width:min(100%,780px);margin:0 auto}
    .card{
      border:1px solid var(--line);
      background:var(--card);
      backdrop-filter:blur(14px);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:20px;
      margin-bottom:18px;
    }
    h1{font-size:1.2rem;margin-bottom:6px}
    .muted{color:var(--muted);line-height:1.5}
    .status{
      display:flex;gap:12px;align-items:flex-start;
      border:1px solid var(--line);background:var(--card2);
      border-radius:18px;padding:14px;margin:14px 0;
    }
    .dot{
      width:12px;height:12px;border-radius:50%;margin-top:4px;
      background:var(--warning);box-shadow:0 0 0 5px rgba(245,158,11,.14);flex:none;
    }
    .dot.good{background:var(--success);box-shadow:0 0 0 5px rgba(25,195,125,.16)}
    .dot.bad{background:var(--danger);box-shadow:0 0 0 5px rgba(239,68,68,.16)}
    .account{
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      border-radius:18px;
      padding:14px;
      margin-bottom:14px;
    }
    .account-title{font-weight:700;margin-bottom:6px}
    textarea{
      width:100%;min-height:180px;resize:vertical;border:none;outline:none;
      border-radius:20px;border:1px solid var(--line);background:rgba(255,255,255,.06);
      color:var(--text);padding:16px;font-size:1rem;line-height:1.6;
    }
    .row{display:flex;justify-content:space-between;gap:12px;align-items:center;margin:10px 0 8px}
    .count{font-size:.85rem;color:var(--muted);font-weight:700}
    .hint{margin-top:8px;color:var(--muted);font-size:.84rem;line-height:1.5}
    .btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:14px}
    button{
      min-height:54px;border:none;border-radius:18px;cursor:pointer;
      font-size:.96rem;font-weight:800;color:#fff;
    }
    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary2))}
    .btn-secondary{background:rgba(255,255,255,.06);border:1px solid var(--line)}
    .btn-success{background:linear-gradient(135deg,#16a34a,#19c37d)}
    .feedback{
      display:none;margin-top:16px;padding:15px 16px;border-radius:18px;
      border:1px solid var(--line);line-height:1.6;font-size:.94rem;word-break:break-word;
    }
    .feedback.success{display:block;color:#e1fff2;background:rgba(25,195,125,.10);border-color:rgba(25,195,125,.26)}
    .feedback.error{display:block;color:#ffe1e1;background:rgba(239,68,68,.10);border-color:rgba(239,68,68,.26)}
    .feedback.info{display:block;color:#ddebff;background:rgba(29,155,240,.10);border-color:rgba(29,155,240,.26)}
    .result{
      margin-top:12px;padding:12px;border-radius:14px;background:rgba(0,0,0,.20);
      border:1px solid var(--line);font-family:monospace;font-size:.82rem;
      white-space:pre-wrap;word-break:break-word;max-height:320px;overflow:auto;
    }
    .loading{display:none;align-items:center;gap:10px;margin-top:14px;color:var(--muted);font-size:.92rem}
    .spinner{
      width:18px;height:18px;border-radius:50%;
      border:2px solid rgba(255,255,255,.18);border-top-color:#fff;
      animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    @media (max-width:560px){
      .btns{grid-template-columns:1fr}
      textarea{min-height:150px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>View × X Post</h1>
      <div class="muted">Post to X and see the exact response from your backend and X API.</div>

      <div class="status">
        <div class="dot" id="statusDot"></div>
        <div id="statusText">Loading page state...</div>
      </div>

      <div class="account">
        <div class="account-title" id="accountName">Connected X account</div>
        <div class="muted" id="accountHandle">@username</div>
      </div>

      <div class="row">
        <label for="postText">Post text</label>
        <div class="count" id="charCount">0 / 280</div>
      </div>

      <textarea id="postText" maxlength="280" placeholder="Write something to post on X..."></textarea>
      <div class="hint">The exact result from your function or X API will appear below.</div>

      <div class="btns">
        <button class="btn-primary" id="postBtn" type="button">Post to X</button>
        <button class="btn-secondary" id="checkBtn" type="button">Check Connection</button>
        <button class="btn-success" id="demoBtn" type="button">Use Demo Text</button>
      </div>

      <div class="loading" id="loadingBox">
        <div class="spinner"></div>
        <span id="loadingText">Working...</span>
      </div>

      <div class="feedback" id="feedbackBox"></div>
    </div>

    <div class="card">
      <h1>Diagnostics</h1>
      <div class="muted" id="diagSession">Checking session...</div>
      <div class="muted" id="diagAccount" style="margin-top:8px;">Checking connected X account...</div>
      <div class="result" id="lastResponse">No response yet.</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";
    const X_POST_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co/functions/v1/x-post";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const accountName = document.getElementById("accountName");
    const accountHandle = document.getElementById("accountHandle");
    const postText = document.getElementById("postText");
    const charCount = document.getElementById("charCount");
    const loadingBox = document.getElementById("loadingBox");
    const loadingText = document.getElementById("loadingText");
    const feedbackBox = document.getElementById("feedbackBox");
    const lastResponse = document.getElementById("lastResponse");
    const diagSession = document.getElementById("diagSession");
    const diagAccount = document.getElementById("diagAccount");

    function setStatus(type, text) {
      statusText.textContent = text;
      statusDot.className = "dot";
      if (type === "good") statusDot.classList.add("good");
      if (type === "bad") statusDot.classList.add("bad");
    }

    function showFeedback(type, html) {
      feedbackBox.className = "feedback " + type;
      feedbackBox.innerHTML = html;
    }

    function hideFeedback() {
      feedbackBox.className = "feedback";
      feedbackBox.innerHTML = "";
    }

    function setLoading(on, text = "Working...") {
      loadingBox.style.display = on ? "flex" : "none";
      loadingText.textContent = text;
      document.getElementById("postBtn").disabled = on;
      document.getElementById("checkBtn").disabled = on;
      document.getElementById("demoBtn").disabled = on;
    }

    function setLastResponse(value) {
      try {
        lastResponse.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
      } catch (e) {
        lastResponse.textContent = String(value);
      }
    }

    function updateCount() {
      charCount.textContent = `${postText.value.length} / 280`;
    }

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function getSession() {
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) throw error;
      return data.session || null;
    }

    async function getUser() {
      const { data, error } = await supabaseClient.auth.getUser();
      if (error) throw error;
      return data.user || null;
    }

    async function getConnectedAccount(userId) {
      const { data, error } = await supabaseClient
        .from("connected_accounts")
        .select("*")
        .eq("user_id", userId)
        .eq("platform", "x")
        .maybeSingle();

      if (error) throw error;
      return data;
    }

    async function checkConnection() {
      hideFeedback();
      setLoading(true, "Checking connection...");

      try {
        const session = await getSession();
        const user = await getUser();

        if (!session || !user) {
          setStatus("bad", "No active View session.");
          diagSession.textContent = "No active session found.";
          diagAccount.textContent = "Cannot check X account without login.";
          setLastResponse("No active session.");
          return;
        }

        diagSession.textContent = `Logged in as: ${user.email || user.id}`;

        const account = await getConnectedAccount(user.id);

        if (!account) {
          setStatus("bad", "No connected X account found.");
          diagAccount.textContent = "No X row found in connected_accounts.";
          setLastResponse("No connected X account.");
          showFeedback("error", "Your X account is not connected yet.");
          return;
        }

        accountName.textContent = account.account_name || "Connected X account";
        accountHandle.textContent = account.account_handle ? `@${account.account_handle}` : "Handle not available";
        diagAccount.textContent = `Connected handle: ${account.account_handle || "unknown"} | Status: ${account.status || "connected"}`;
        setStatus("good", "X account ready.");
        setLastResponse(account);
        showFeedback("success", "X account connected and ready for posting.");
      } catch (err) {
        setStatus("bad", "Connection check failed.");
        showFeedback("error", `Connection check failed: ${escapeHtml(err.message || "Unknown error")}`);
        setLastResponse(err.message || "Unknown error");
      } finally {
        setLoading(false);
      }
    }

    async function postToX() {
      hideFeedback();
      setLoading(true, "Posting to X...");

      try {
        const text = postText.value.trim();
        if (!text) {
          showFeedback("error", "Please enter text before posting.");
          setLastResponse("Post blocked: empty text.");
          return;
        }

        const session = await getSession();
        if (!session) {
          setStatus("bad", "No active View session.");
          showFeedback("error", "Please log in again.");
          setLastResponse("No session returned.");
          return;
        }

        const res = await fetch(X_POST_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${session.access_token}`
          },
          body: JSON.stringify({ text })
        });

        const raw = await res.text();
        let json;
        try {
          json = raw ? JSON.parse(raw) : {};
        } catch {
          json = { raw };
        }

        setLastResponse({
          http_status: res.status,
          response: json
        });

        if (!res.ok) {
          const mainMessage = json?.error || "Post failed";
          const xDetails = json?.x_response
            ? `<div class="result">${escapeHtml(JSON.stringify(json.x_response, null, 2))}</div>`
            : "";
          showFeedback("error", `<strong>Post failed:</strong> ${escapeHtml(mainMessage)}${xDetails}`);
          return;
        }

        const tweetId = json?.x_response?.data?.id || json?.data?.id || null;
        const tweetText = json?.x_response?.data?.text || json?.data?.text || text;

        showFeedback(
          "success",
          `<strong>Posted successfully.</strong><br><br>
          ${tweetId ? `Tweet ID: ${escapeHtml(tweetId)}<br>` : ""}
          Text: ${escapeHtml(tweetText)}`
        );

        postText.value = "";
        updateCount();
      } catch (err) {
        showFeedback("error", `Request failed: ${escapeHtml(err.message || "Unknown error")}`);
        setLastResponse(err.message || "Unknown error");
      } finally {
        setLoading(false);
      }
    }

    document.getElementById("postBtn").addEventListener("click", postToX);
    document.getElementById("checkBtn").addEventListener("click", checkConnection);
    document.getElementById("demoBtn").addEventListener("click", () => {
      postText.value = "Hello from View app 🚀";
      updateCount();
      showFeedback("info", "Demo text inserted.");
      setLastResponse("Demo text inserted.");
    });

    window.addEventListener("load", async () => {
      updateCount();
      await checkConnection();
    });

    postText.addEventListener("input", updateCount);
  </script>
</body>
</html>
