<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post to X</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      padding: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .primary { background: #10b981; color: white; }
    .secondary { background: #334155; color: white; }

    #status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
      background: #111827;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Post to X</h2>

  <textarea id="postText">Ceetice</textarea>

  <button id="postBtn" class="primary">Post to X</button>
  <button id="checkBtn" class="secondary">Check Connection</button>

  <div id="status">Ready...</div>
</div>

<script>
console.log("JS LOADED");

// ✅ SUPABASE
const supabase = supabase.createClient(
  "https://ezarjrxzkqqsbyirxttg.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI"
);

const statusBox = document.getElementById("status");

function show(msg) {
  console.log(msg);
  statusBox.innerText = msg;
}

// ✅ CHECK CONNECTION
async function checkConnection() {
  show("Checking session...");

  const { data, error } = await supabase.auth.getSession();

  if (error) {
    show("Error: " + error.message);
    return;
  }

  if (!data.session) {
    show("❌ Not logged in");
    return;
  }

  show("✅ Logged in");
}

// ✅ POST TO X
async function postToX() {
  show("Posting...");

  try {
    const text = document.getElementById("postText").value.trim();

    if (!text) {
      show("Enter text");
      return;
    }

    const { data } = await supabase.auth.getSession();

    if (!data.session) {
      show("User not logged in");
      return;
    }

    const jwt = data.session.access_token;

    console.log("JWT:", jwt);

    const res = await fetch(
      "https://ezarjrxzkqqsbyirxttg.supabase.co/functions/v1/x-post",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + jwt
        },
        body: JSON.stringify({ text })
      }
    );

    console.log("Response status:", res.status);

    const result = await res.json();

    console.log("Response:", result);

    if (!res.ok) {
      show("❌ " + JSON.stringify(result));
      return;
    }

    show("✅ Posted successfully");

  } catch (err) {
    console.error(err);
    show("❌ " + err.message);
  }
}

// ✅ ATTACH BUTTON EVENTS (THIS FIXES SILENT ISSUE)
document.getElementById("postBtn").addEventListener("click", postToX);
document.getElementById("checkBtn").addEventListener("click", checkConnection);

</script>

</body>
</html>
