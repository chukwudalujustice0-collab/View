<!DOCTYPE html>
<html lang="en" class="auth-loading">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Status Viewer | View</title>
  <meta name="theme-color" content="#08114c" />

  <style>
    html.auth-loading, html.auth-loading body{
      visibility:hidden;
    }

    :root{
      --bg:#050816;
      --bg2:#08114c;
      --panel:rgba(255,255,255,.08);
      --line:rgba(255,255,255,.14);
      --text:#ffffff;
      --muted:#dbe4ff;
      --blue:#2563eb;
      --blue2:#4f46e5;
      --red:#ff5f7a;
      --green:#10b981;
      --safe-top:env(safe-area-inset-top);
      --safe-bottom:env(safe-area-inset-bottom);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      -webkit-user-select:none;
    }

    html,body{
      min-height:100%;
      background:#000;
      color:var(--text);
      overflow:hidden;
    }

    body{
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.24), transparent 22%),
        radial-gradient(circle at top right, rgba(255,95,122,.16), transparent 18%),
        linear-gradient(180deg,#030712 0%, #08114c 40%, #020617 100%);
    }

    button,input,audio{
      font:inherit;
      color:inherit;
    }

    button{
      border:none;
      background:none;
      cursor:pointer;
    }

    .viewer{
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .top{
      position:absolute;
      top:0;
      left:0;
      right:0;
      z-index:20;
      padding:calc(var(--safe-top) + 10px) 12px 12px;
      background:linear-gradient(180deg, rgba(0,0,0,.38), rgba(0,0,0,0));
    }

    .bars{
      display:grid;
      grid-template-columns:repeat(20, minmax(0,1fr));
      gap:4px;
      margin-bottom:12px;
    }

    .bar{
      height:4px;
      border-radius:999px;
      background:rgba(255,255,255,.24);
      overflow:hidden;
    }

    .bar-fill{
      height:100%;
      width:0%;
      background:#fff;
      border-radius:999px;
    }

    .head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .head-left{
      min-width:0;
      flex:1;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .avatar{
      width:46px;
      height:46px;
      min-width:46px;
      border-radius:50%;
      overflow:hidden;
      border:2px solid rgba(255,255,255,.95);
      background:linear-gradient(135deg,var(--blue),var(--blue2),var(--red));
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:18px;
      color:#fff;
      text-decoration:none;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .meta{
      min-width:0;
      flex:1;
    }

    .name{
      font-size:15px;
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .sub{
      margin-top:3px;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .head-right{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .icon-btn{
      width:40px;
      height:40px;
      min-width:40px;
      border-radius:999px;
      background:rgba(0,0,0,.28);
      border:1px solid rgba(255,255,255,.12);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      color:#fff;
      backdrop-filter:blur(8px);
    }

    .stage{
      position:relative;
      flex:1;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
    }

    .content{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:#000;
    }

    .content img,
    .content video{
      width:100%;
      height:100%;
      object-fit:contain;
      background:#000;
    }

    .text-status{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:28px;
      font-size:28px;
      font-weight:800;
      line-height:1.35;
      white-space:pre-wrap;
      word-break:break-word;
      color:#fff;
      background:linear-gradient(135deg,var(--blue),var(--blue2),var(--red));
    }

    .audio-status{
      width:min(88vw,420px);
      margin:auto;
      border-radius:24px;
      padding:22px 18px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.14);
      text-align:center;
      backdrop-filter:blur(12px);
      box-shadow:0 16px 40px rgba(0,0,0,.24);
    }

    .audio-status-icon{
      width:84px;
      height:84px;
      margin:0 auto 16px;
      border-radius:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:38px;
      background:linear-gradient(135deg,#2563eb,#4f46e5,#ff5f7a);
    }

    .audio-status-title{
      font-size:22px;
      font-weight:800;
      margin-bottom:8px;
    }

    .audio-status-sub{
      font-size:14px;
      line-height:1.5;
      color:var(--muted);
      margin-bottom:14px;
      word-break:break-word;
      white-space:pre-wrap;
    }

    .audio-status audio{
      width:100%;
    }

    .caption{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      z-index:15;
      padding:22px 14px calc(var(--safe-bottom) + 14px);
      background:linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.62));
      display:none;
    }

    .caption.show{
      display:block;
    }

    .caption-text{
      max-width:100%;
      color:#fff;
      font-size:14px;
      line-height:1.5;
      white-space:pre-wrap;
      word-break:break-word;
      text-align:left;
    }

    .tap-zone{
      position:absolute;
      top:0;
      bottom:0;
      width:35%;
      z-index:12;
    }

    .tap-left{left:0}
    .tap-right{right:0}

    .center-zone{
      position:absolute;
      top:0;
      bottom:0;
      left:35%;
      right:35%;
      z-index:12;
    }

    .notice{
      position:absolute;
      left:12px;
      right:12px;
      bottom:calc(var(--safe-bottom) + 10px);
      z-index:30;
      display:none;
      padding:12px 14px;
      border-radius:14px;
      font-size:13px;
      line-height:1.5;
      background:rgba(17,24,39,.88);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(10px);
      white-space:pre-wrap;
    }

    .notice.show{
  display:block;
}

.reply-sheet{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  z-index:40;
  padding:12px 12px calc(var(--safe-bottom) + 12px);
  transform:translateY(110%);
  transition:.22s ease;
  pointer-events:none;
}

.reply-sheet.show{
  transform:translateY(0);
  pointer-events:auto;
}

.reply-sheet-inner{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:8px;
  align-items:center;
  padding:10px;
  border-radius:18px;
  background:rgba(17,24,39,.92);
  border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(12px);
  box-shadow:0 16px 40px rgba(0,0,0,.24);
}

.reply-input{
  min-height:44px;
  border:none;
  outline:none;
  border-radius:12px;
  padding:0 14px;
  background:rgba(255,255,255,.08);
  color:#fff;
}

.reply-input::placeholder{
  color:rgba(255,255,255,.58);
}

.reply-send-btn,
.reply-close-btn{
  min-width:44px;
  height:44px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

.reply-send-btn{
  padding:0 14px;
  background:linear-gradient(135deg,var(--blue),var(--blue2),var(--red));
  color:#fff;
}

.reply-close-btn{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  color:#fff;
}
  </style>

  <script>
    const noticeBox = document.getElementById("notice");
    const bars = document.getElementById("bars");
    const content = document.getElementById("content");
    const captionBox = document.getElementById("captionBox");
    const captionText = document.getElementById("captionText");
    const profileLink = document.getElementById("profileLink");
    const avatarImage = document.getElementById("avatarImage");
    const avatarFallback = document.getElementById("avatarFallback");
    const displayName = document.getElementById("displayName");
    const displaySub = document.getElementById("displaySub");
    const pauseBtn = document.getElementById("pauseBtn");
const closeBtn = document.getElementById("closeBtn");
const tapLeft = document.getElementById("tapLeft");
const tapRight = document.getElementById("tapRight");
const holdZone = document.getElementById("holdZone");
const replySheet = document.getElementById("replySheet");
const replyInput = document.getElementById("replyInput");
const replySendBtn = document.getElementById("replySendBtn");
const replyCloseBtn = document.getElementById("replyCloseBtn"); document.getElementById("holdZone");

    let currentUser = null;
    let currentStatusId = "";
    let currentOwnerId = "";
    let allStatuses = [];
    let currentIndex = 0;
    let currentProgress = 0;
    let currentDurationMs = 30000;
    let progressTimer = null;
    let isPaused = false;
    let activeVideo = null;
    let ownerProfile = null;
let swipeStartY = 0;
let swipeStartX = 0;

    function showNotice(message, duration = 3000) {
      noticeBox.textContent = message || "";
      noticeBox.classList.add("show");
      clearTimeout(showNotice._timer);
      showNotice._timer = setTimeout(() => {
        noticeBox.classList.remove("show");
      }, duration);
    }

    function getQueryId() {
  const url = new URL(window.location.href);
  return url.searchParams.get("id") || "";
}

function openReplySheet() {
  const item = allStatuses[currentIndex];
  if (!item) return;

  if (item.user_id === currentUser.id) {
    showNotice("You cannot reply to your own status.");
    return;
  }

  if (item.allow_replies === false) {
    showNotice("Replies are disabled for this status.");
    return;
  }

  replySheet.classList.add("show");
  setPaused(true);
  setTimeout(() => replyInput.focus(), 80);
}

function closeReplySheet() {
  replySheet.classList.remove("show");
  replyInput.value = "";
  setPaused(false);
}

function sendReplyToChat() {
  const item = allStatuses[currentIndex];
  const message = replyInput.value.trim();

  if (!item) return;
  if (!message) {
    showNotice("Type a reply first.");
    return;
  }

  window.location.href =
    `chat-room.html?user=${encodeURIComponent(item.user_id)}` +
    `&from_status=${encodeURIComponent(item.id)}` +
    `&message=${encodeURIComponent(message)}`;
}

    function getInitial(name = "V") {
      return String(name).trim().charAt(0).toUpperCase() || "V";
    }

    function timeAgo(value) {
      if (!value) return "Just now";
      const date = new Date(value);
      const diff = Math.floor((Date.now() - date.getTime()) / 1000);
      if (diff < 60) return "Just now";
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    function clearProgressTimer() {
      if (progressTimer) {
        clearInterval(progressTimer);
        progressTimer = null;
      }
    }

    function setPaused(state) {
      isPaused = !!state;
      pauseBtn.textContent = isPaused ? "▶" : "⏸";

      if (activeVideo) {
        if (isPaused) activeVideo.pause();
        else activeVideo.play().catch(() => {});
      }

      const audio = document.getElementById("activeAudio");
      if (audio) {
        if (isPaused) audio.pause();
        else audio.play().catch(() => {});
      }
    }

    function getStatusKind(row) {
      const type = String(row?.status_type || row?.media_type || "").toLowerCase();
      const mediaUrl = String(row?.media_url || "").toLowerCase();
      const audioUrl = String(row?.audio_url || "").toLowerCase();
      const musicUrl = String(row?.music_url || "").toLowerCase();

      if (type.includes("voice") || audioUrl) return "voice";
      if (type.includes("music") || musicUrl) return "music";
      if (type.includes("video") || /\.(mp4|webm|mov|m4v)(\?|$)/.test(mediaUrl)) return "video";
      if (type.includes("image") || /\.(jpg|jpeg|png|gif|webp)(\?|$)/.test(mediaUrl)) return "image";
      return "text";
    }

    function renderBars() {
      bars.innerHTML = allStatuses.map((_, index) => `
        <div class="bar">
          <div class="bar-fill" id="barFill${index}" style="width:${index < currentIndex ? "100%" : index === currentIndex ? currentProgress + "%" : "0%"}"></div>
        </div>
      `).join("");
    }

    function updateCurrentBar() {
      const currentBar = document.getElementById(`barFill${currentIndex}`);
      if (currentBar) currentBar.style.width = `${Math.max(0, Math.min(100, currentProgress))}%`;
    }

    async function markView(statusId) {
      if (!statusId || !currentUser) return;

      try {
        const { data: existing } = await supabaseClient
          .from("status_views")
          .select("id")
          .eq("status_id", statusId)
          .eq("viewer_id", currentUser.id)
          .maybeSingle();

        if (existing?.id) return;

        await supabaseClient
          .from("status_views")
          .insert({
            status_id: statusId,
            viewer_id: currentUser.id,
            viewed_at: new Date().toISOString()
          });
      } catch (_) {}
    }

    async function loadOwnerProfile(userId) {
      const { data } = await supabaseClient
        .from("profiles")
        .select("id,full_name,username,avatar_url,avatar_path")
        .eq("id", userId)
        .maybeSingle();

      ownerProfile = data || null;

      const name = data?.full_name || data?.username || "User";
      displayName.textContent = name;
      displaySub.textContent = `${timeAgo(allStatuses[currentIndex]?.created_at)} • ${currentIndex + 1}/${allStatuses.length}`;
      profileLink.href = `public-profile.html?id=${encodeURIComponent(userId)}`;

      const avatar = data?.avatar_url || data?.avatar_path || "";
      if (avatar) {
        avatarImage.src = avatar;
        avatarImage.style.display = "block";
        avatarFallback.style.display = "none";
      } else {
        avatarImage.style.display = "none";
        avatarFallback.style.display = "block";
        avatarFallback.textContent = getInitial(name);
      }
    }

    function startTimerForCurrentStatus() {
      clearProgressTimer();
      currentProgress = 0;
      updateCurrentBar();

      const item = allStatuses[currentIndex];
      if (!item) return;

      const kind = getStatusKind(item);
      currentDurationMs = kind === "video" ? 60000 : (kind === "voice" || kind === "music" ? 30000 : 30000);

      if (kind === "video" && activeVideo) {
        const startVideoProgress = () => {
          clearProgressTimer();
          progressTimer = setInterval(async () => {
            if (isPaused || !activeVideo) return;

            const duration = Number.isFinite(activeVideo.duration) && activeVideo.duration > 0
              ? Math.min(activeVideo.duration * 1000, 60000)
              : 60000;

            currentDurationMs = duration;
            currentProgress = (activeVideo.currentTime * 1000 / currentDurationMs) * 100;
            updateCurrentBar();

            if (activeVideo.ended || currentProgress >= 100) {
              await nextStatus();
            }
          }, 90);
        };

        activeVideo.onloadedmetadata = () => {
          if (Number.isFinite(activeVideo.duration) && activeVideo.duration > 0) {
            currentDurationMs = Math.min(activeVideo.duration * 1000, 60000);
          }
          if (!isPaused) activeVideo.play().catch(() => {});
          startVideoProgress();
        };

        if (activeVideo.readyState >= 1) {
          if (Number.isFinite(activeVideo.duration) && activeVideo.duration > 0) {
            currentDurationMs = Math.min(activeVideo.duration * 1000, 60000);
          }
          if (!isPaused) activeVideo.play().catch(() => {});
          startVideoProgress();
        }

        return;
      }

      if (kind === "voice" || kind === "music") {
        const audio = document.getElementById("activeAudio");
        if (audio) {
          audio.play().catch(() => {});
          audio.onended = async () => {
            await nextStatus();
          };

          progressTimer = setInterval(async () => {
            if (isPaused) return;

            const duration = Number.isFinite(audio.duration) && audio.duration > 0
              ? Math.min(audio.duration * 1000, 30000)
              : 30000;

            currentDurationMs = duration;
            currentProgress = (audio.currentTime * 1000 / currentDurationMs) * 100;
            updateCurrentBar();

            if (currentProgress >= 100) {
              await nextStatus();
            }
          }, 90);

          return;
        }
      }

      progressTimer = setInterval(async () => {
        if (isPaused) return;
        currentProgress += 100 / (currentDurationMs / 90);
        updateCurrentBar();

        if (currentProgress >= 100) {
          await nextStatus();
        }
      }, 90);
    }

    async function renderCurrentStatus() {
      const item = allStatuses[currentIndex];
      if (!item) {
        showNotice("Status not found.");
        setTimeout(() => {
          window.location.href = "status.html";
        }, 600);
        return;
      }

      clearProgressTimer();
      activeVideo = null;
      content.innerHTML = "";
      captionBox.classList.remove("show");
      captionText.textContent = "";

      await markView(item.id);
      await loadOwnerProfile(item.user_id);
      renderBars();

      

      const kind = getStatusKind(item);
      const caption = item.caption || item.content || item.text_content || "";

      if (kind === "image" && item.media_url) {
        const img = document.createElement("img");
        img.src = item.media_url;
        img.alt = "Status image";
        content.appendChild(img);

        if (caption.trim()) {
          captionText.textContent = caption;
          captionBox.classList.add("show");
        }

      } else if (kind === "video" && item.media_url) {
        const video = document.createElement("video");
        video.src = item.media_url;
        video.playsInline = true;
        video.preload = "auto";
        video.autoplay = true;
        video.controls = false;
        content.appendChild(video);
        activeVideo = video;

        if (caption.trim()) {
          captionText.textContent = caption;
          captionBox.classList.add("show");
        }

      } else if (kind === "voice" && item.audio_url) {
        content.innerHTML = `
          <div class="audio-status">
            <div class="audio-status-icon">🎤</div>
            <div class="audio-status-title">Voice Status</div>
            <div class="audio-status-sub">${caption ? caption.replace(/</g, "&lt;") : "Tap play to listen"}</div>
            <audio id="activeAudio" controls autoplay playsinline src="${item.audio_url}"></audio>
          </div>
        `;

      } else if (kind === "music" && item.music_url) {
        content.innerHTML = `
          <div class="audio-status">
            <div class="audio-status-icon">🎵</div>
            <div class="audio-status-title">${(item.music_name || "Music Status").replace(/</g, "&lt;")}</div>
            <div class="audio-status-sub">${caption ? caption.replace(/</g, "&lt;") : "Tap play to listen"}</div>
            <audio id="activeAudio" controls autoplay playsinline src="${item.music_url}"></audio>
          </div>
        `;

      } else {
        const textBlock = document.createElement("div");
        textBlock.className = "text-status";
        textBlock.textContent = item.text_content || item.content || "Status";
        content.appendChild(textBlock);
      }

      startTimerForCurrentStatus();
    }

    async function nextStatus() {
  closeReplySheet();
  clearProgressTimer();

      if (currentIndex < allStatuses.length - 1) {
        currentIndex += 1;
        await renderCurrentStatus();
        return;
      }

      window.location.href = "status.html";
    }

    async function prevStatus() {
  closeReplySheet();
  clearProgressTimer();

      if (currentIndex > 0) {
        currentIndex -= 1;
        await renderCurrentStatus();
        return;
      }

      await renderCurrentStatus();
    }

    async function loadStatuses() {
      currentStatusId = getQueryId();
      if (!currentStatusId) {
        throw new Error("Missing status id.");
      }

      const { data: row, error } = await supabaseClient
        .from("statuses")
        .select("id,user_id,created_at,expires_at")
        .eq("id", currentStatusId)
        .maybeSingle();

      if (error) throw error;
      if (!row) throw new Error("Status not found.");

      currentOwnerId = row.user_id;

      const { data: ownerStatuses, error: listError } = await supabaseClient
        .from("statuses")
        .select("id,user_id,status_type,media_type,text_content,content,caption,media_url,media_path,thumbnail_url,audio_url,audio_path,audio_type,music_url,music_path,music_name,allow_replies,created_at,expires_at")
        .eq("user_id", currentOwnerId)
        .gt("expires_at", new Date().toISOString())
        .order("created_at", { ascending: true });

      if (listError) throw listError;

      allStatuses = ownerStatuses || [];
      currentIndex = Math.max(0, allStatuses.findIndex(item => item.id === currentStatusId));
    }

    function bindEvents() {
      closeBtn.addEventListener("click", () => {
        window.location.href = "status.html";
      });

      pauseBtn.addEventListener("click", () => {
        setPaused(!isPaused);
      });

      replyCloseBtn.addEventListener("click", closeReplySheet);

replySendBtn.addEventListener("click", sendReplyToChat);

replyInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    sendReplyToChat();
  }
});

      tapLeft.addEventListener("click", prevStatus);
      tapRight.addEventListener("click", nextStatus);

      const pauseStart = (e) => {
        e.preventDefault();
        setPaused(true);
      };

      const pauseEnd = (e) => {
        e.preventDefault();
        setPaused(false);
      };

      holdZone.addEventListener("pointerdown", pauseStart);
holdZone.addEventListener("pointerup", pauseEnd);
holdZone.addEventListener("pointerleave", pauseEnd);
holdZone.addEventListener("pointercancel", pauseEnd);

holdZone.addEventListener("touchstart", (e) => {
  const touch = e.touches[0];
  swipeStartY = touch.clientY;
  swipeStartX = touch.clientX;
}, { passive:true });

holdZone.addEventListener("touchend", (e) => {
  const touch = e.changedTouches[0];
  const deltaY = swipeStartY - touch.clientY;
  const deltaX = Math.abs(swipeStartX - touch.clientX);

  if (deltaY > 70 && deltaX < 80) {
    openReplySheet();
  }
}, { passive:true });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) setPaused(true);
      });
    }

    async function init() {
      try {
        currentUser = await protectPage("status.html");
        if (!currentUser) return;

        bindEvents();
        await loadStatuses();
        await renderCurrentStatus();
      } catch (error) {
        console.error(error);
        showNotice(error.message || "Could not load status.");
        setTimeout(() => {
          window.location.href = "status.html";
        }, 1000);
      }
    }

    window.addEventListener("beforeunload", () => {
      clearProgressTimer();
      if (activeVideo) activeVideo.pause();
      const audio = document.getElementById("activeAudio");
      if (audio) audio.pause();
    });

    init();
  </script>
</body>
</html>
