<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Group Chat | View</title>
  <meta name="theme-color" content="#0a1028" />
  <link rel="manifest" href="/manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg1:#081a8f;
      --bg2:#07115f;
      --bg3:#05093c;
      --blue:#2f7bff;
      --blue2:#5ba0ff;
      --red:#ff2f57;
      --red2:#ff5a74;
      --text:#fff;
      --muted:#d4dcff;
      --line:rgba(255,255,255,.10);
      --shadow:0 18px 42px rgba(0,0,0,.28);
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Inter,Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      min-height:100%;
      background:
        radial-gradient(circle at 12% 10%, rgba(47,123,255,.22), transparent 18%),
        radial-gradient(circle at 88% 10%, rgba(255,47,87,.18), transparent 14%),
        linear-gradient(180deg,var(--bg1),var(--bg2),var(--bg3));
      color:var(--text);
    }

    body{overflow:hidden}
    a{text-decoration:none;color:inherit}
    button,input{font:inherit}
    img{display:block;max-width:100%}

    .page{
      width:min(100%,980px);
      height:100dvh;
      margin:0 auto;
      padding:calc(12px + var(--safe-top)) 14px calc(12px + var(--safe-bottom));
      display:grid;
      grid-template-rows:auto auto 1fr auto;
      gap:12px;
    }

    .notice{
      display:none;
      padding:12px 14px;
      border-radius:14px;
      font-size:12px;
      line-height:1.5;
      border:1px solid transparent;
      background:rgba(255,255,255,.05);
    }
    .notice.show{display:block}
    .notice.error{background:rgba(239,68,68,.10);border-color:rgba(239,68,68,.22);color:#ffd7df}
    .notice.success{background:rgba(25,195,125,.10);border-color:rgba(25,195,125,.22);color:#dcffe7}
    .notice.info{background:rgba(47,123,255,.10);border-color:rgba(47,123,255,.22);color:#dcebff}

    .topbar{
      display:grid;
      grid-template-columns:48px 1fr auto;
      gap:10px;
      align-items:center;
    }

    .icon-btn{
      width:46px;
      height:46px;
      min-width:46px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .group-mini{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .group-avatar{
      width:46px;
      height:46px;
      border-radius:16px;
      overflow:hidden;
      background:linear-gradient(135deg,var(--blue),var(--red));
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      font-size:18px;
      flex-shrink:0;
    }

    .group-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .title{
      font-size:16px;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .subtitle{
      font-size:11px;
      color:var(--muted);
      margin-top:4px;
    }

    .top-actions{
      display:flex;
      gap:8px;
    }

    .chat-shell{
      min-height:0;
      display:grid;
      grid-template-columns:280px 1fr;
      gap:12px;
    }

    .side,.chat-card{
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .side{
      padding:14px;
      display:grid;
      grid-template-rows:auto auto 1fr;
      gap:12px;
    }

    .card-title{
      font-size:14px;
      font-weight:900;
    }

    .card-sub{
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }

    .member-strip{
      display:grid;
      gap:10px;
      overflow:auto;
    }

    .member-item{
      display:grid;
      grid-template-columns:42px 1fr;
      gap:10px;
      align-items:center;
      padding:10px;
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(255,255,255,.04);
    }

    .member-avatar{
      width:42px;
      height:42px;
      border-radius:14px;
      background:linear-gradient(135deg,var(--blue2),var(--red2));
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      overflow:hidden;
    }

    .member-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .member-name{
      font-size:12px;
      font-weight:900;
    }

    .member-role{
      font-size:10px;
      color:var(--muted);
      margin-top:3px;
    }

    .chat-card{
      display:grid;
      grid-template-rows:auto 1fr auto;
      min-height:0;
    }

    .chat-head{
      padding:14px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .chat-messages{
      padding:14px;
      overflow:auto;
      display:grid;
      gap:12px;
      align-content:start;
    }

    .msg-row{
      display:flex;
      gap:10px;
      align-items:flex-end;
    }

    .msg-row.me{
      justify-content:flex-end;
    }

    .msg-bubble{
      max-width:min(78%,560px);
      padding:12px 14px;
      border-radius:18px;
      background:rgba(255,255,255,.07);
      border:1px solid var(--line);
    }

    .msg-row.me .msg-bubble{
      background:linear-gradient(135deg,var(--blue),var(--red));
      border-color:transparent;
    }

    .msg-name{
      font-size:11px;
      font-weight:900;
      margin-bottom:5px;
      opacity:.95;
    }

    .msg-text{
      font-size:13px;
      line-height:1.55;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .msg-time{
      font-size:10px;
      color:#dbe7ff;
      margin-top:6px;
      opacity:.85;
    }

    .composer{
      padding:12px;
      border-top:1px solid var(--line);
      display:grid;
      grid-template-columns:auto 1fr auto auto;
      gap:8px;
      align-items:center;
    }

    .composer-input{
      min-height:48px;
      border:none;
      outline:none;
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      border-radius:16px;
      color:#fff;
      padding:0 14px;
    }

    .composer-input::placeholder{
      color:#a6b9de;
    }

    .send-btn,.mini-btn{
      min-height:46px;
      border:none;
      border-radius:14px;
      color:#fff;
      font-weight:900;
      cursor:pointer;
      padding:0 14px;
    }

    .send-btn{
      background:linear-gradient(135deg,var(--blue),var(--red));
    }

    .mini-btn{
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
    }

    @media (max-width:820px){
      .chat-shell{grid-template-columns:1fr}
      .side{display:none}
    }

    @media (max-width:560px){
      .composer{grid-template-columns:auto 1fr auto}
      .send-btn{grid-column:1/-1}
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="notice" class="notice"></div>

    <header class="topbar">
      <button class="icon-btn" onclick="history.back()">←</button>

      <div class="group-mini">
        <div class="group-avatar" id="groupAvatar">G</div>
        <div style="min-width:0">
          <div class="title" id="groupTitle">Group Chat</div>
          <div class="subtitle">Realtime conversation for members</div>
        </div>
      </div>

      <div class="top-actions">
        <button class="icon-btn" id="refreshBtn">↻</button>
        <button class="icon-btn" id="membersBtn">👥</button>
      </div>
    </header>

    <div class="chat-shell">
      <aside class="side">
        <div>
          <div class="card-title">Members</div>
          <div class="card-sub">Quick member view linked to the members page.</div>
        </div>

        <button class="mini-btn" type="button" id="openMembersBtn">Open Members</button>

        <div class="member-strip" id="memberStrip"></div>
      </aside>

      <section class="chat-card">
        <div class="chat-head">
          <div>
            <div class="card-title">Group Messages</div>
            <div class="card-sub" id="messageCountText">0 messages</div>
          </div>
          <button class="mini-btn" type="button" id="openGroupBtn">Group Page</button>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="composer">
          <button class="mini-btn" type="button">＋</button>
          <input id="messageInput" class="composer-input" type="text" placeholder="Write a message..." />
          <button class="mini-btn" type="button">🎤</button>
          <button id="sendBtn" class="send-btn" type="button">Send</button>
        </div>
      </section>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInR5cCI6IkpXVCJ9";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth:{
        persistSession:true,
        autoRefreshToken:true,
        detectSessionInUrl:true,
        flowType:"pkce"
      }
    });

    const groupId = new URLSearchParams(location.search).get("id");
    const notice = document.getElementById("notice");
    const chatMessages = document.getElementById("chatMessages");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const messageCountText = document.getElementById("messageCountText");
    const memberStrip = document.getElementById("memberStrip");
    const groupTitle = document.getElementById("groupTitle");
    const groupAvatar = document.getElementById("groupAvatar");

    let currentUser = null;
    let profileMap = {};

    function showNotice(message, type="info"){
      notice.className = `notice show ${type}`;
      notice.textContent = message || "";
      clearTimeout(showNotice._timer);
      showNotice._timer = setTimeout(() => {
        notice.className = "notice";
        notice.textContent = "";
      }, 2500);
    }

    function initials(name){
      const parts = String(name || "U").trim().split(/\s+/).filter(Boolean);
      if(!parts.length) return "U";
      if(parts.length === 1) return parts[0][0].toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    function timeAgo(value){
      if(!value) return "Just now";
      const date = new Date(value);
      const diff = Math.floor((Date.now() - date.getTime()) / 1000);
      if(diff < 60) return "Just now";
      if(diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if(diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    async function requireUser(){
      const { data, error } = await supabase.auth.getUser();
      if(error) throw error;
      if(!data?.user){
        location.href = `login.html?next=group-chat.html?id=${groupId || ""}`;
        return null;
      }
      currentUser = data.user;
      return currentUser;
    }

    async function loadGroupMeta(){
      const { data, error } = await supabase
        .from("groups")
        .select("id,name,group_image")
        .eq("id", groupId)
        .single();

      if(error) throw error;

      groupTitle.textContent = data.name || "Group Chat";

      if(data.group_image){
        groupAvatar.innerHTML = `<img src="${data.group_image}" alt="${data.name || "Group"}">`;
      } else {
        groupAvatar.textContent = initials(data.name || "Group");
      }
    }

    async function loadProfiles(){
      const { data, error } = await supabase
        .from("profiles")
        .select("id,full_name,username,avatar_url,avatar_path");

      if(error) throw error;
      profileMap = Object.fromEntries((data || []).map(p => [p.id, p]));
    }

    async function loadMembers(){
      const { data, error } = await supabase
        .from("group_members")
        .select("id,user_id,role")
        .eq("group_id", groupId);

      if(error) throw error;

      memberStrip.innerHTML = (data || []).map(m => {
        const p = profileMap[m.user_id] || {};
        const name = p.full_name || p.username || "Member";
        const avatar = p.avatar_url || p.avatar_path || "";
        return `
          <div class="member-item">
            <div class="member-avatar">
              ${avatar ? `<img src="${avatar}" alt="${name}">` : initials(name)}
            </div>
            <div>
              <div class="member-name">${name}</div>
              <div class="member-role">${m.role || "member"}</div>
            </div>
          </div>
        `;
      }).join("") || `<div class="member-item"><div>No members</div></div>`;
    }

    async function loadMessages(){
      const { data, error } = await supabase
        .from("group_messages")
        .select("*")
        .eq("group_id", groupId)
        .order("created_at", { ascending:true });

      if(error && error.code !== "42P01") throw error;

      const messages = data || [];
      messageCountText.textContent = `${messages.length} messages`;

      if(!messages.length){
        chatMessages.innerHTML = `<div style="text-align:center;color:#d4dcff;padding:24px">No messages yet. Start the conversation.</div>`;
        return;
      }

      chatMessages.innerHTML = messages.map(msg => {
        const me = msg.user_id === currentUser.id;
        const p = profileMap[msg.user_id] || {};
        const name = p.full_name || p.username || "Member";

        return `
          <div class="msg-row ${me ? "me" : ""}">
            <div class="msg-bubble">
              <div class="msg-name">${me ? "You" : name}</div>
              <div class="msg-text">${(msg.message || "").replace(/</g, "&lt;")}</div>
              <div class="msg-time">${timeAgo(msg.created_at)}</div>
            </div>
          </div>
        `;
      }).join("");

      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function sendMessage(){
      try{
        const text = messageInput.value.trim();
        if(!text){
          showNotice("Write a message first.", "error");
          return;
        }

        const { error } = await supabase.from("group_messages").insert({
          group_id: groupId,
          user_id: currentUser.id,
          message: text
        });

        if(error) throw error;

        messageInput.value = "";
        await loadMessages();
      }catch(error){
        showNotice(error.message || "Could not send message.", "error");
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", async () => {
      try{
        await loadMessages();
        await loadMembers();
        showNotice("Chat refreshed.", "success");
      }catch(error){
        showNotice(error.message || "Could not refresh chat.", "error");
      }
    });

    document.getElementById("membersBtn").addEventListener("click", () => {
      window.location.href = `group-members.html?id=${groupId}`;
    });

    document.getElementById("openMembersBtn").addEventListener("click", () => {
      window.location.href = `group-members.html?id=${groupId}`;
    });

    document.getElementById("openGroupBtn").addEventListener("click", () => {
      window.location.href = `group-view.html?id=${groupId}`;
    });

    sendBtn.addEventListener("click", sendMessage);

    messageInput.addEventListener("keydown", e => {
      if(e.key === "Enter"){
        e.preventDefault();
        sendMessage();
      }
    });

    (async function init(){
      try{
        await requireUser();
        await loadProfiles();
        await loadGroupMeta();
        await loadMembers();
        await loadMessages();
      }catch(error){
        showNotice(error.message || "Could not load group chat.", "error");
      }
    })();
  </script>
</body>
</html>
