<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #08111f;
      color: white;
    }

    .container {
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
    }

    .card-grid {
      display: grid;
      gap: 15px;
    }

    .card {
      background: #0f1c33;
      border-radius: 16px;
      padding: 20px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .card:hover {
      background: #14254a;
    }

    .card h3 {
      margin: 0 0 8px;
    }

    .card p {
      margin: 0;
      font-size: 14px;
      color: #9fb1d7;
    }

    .btn {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      width: 100%;
      font-weight: bold;
      cursor: pointer;
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .secondary {
      background: rgba(255,255,255,0.08);
      color: white;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #0b1730;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
    }

    .nav button {
      background: none;
      border: none;
      color: #9fb1d7;
      font-size: 12px;
    }

    .nav button.active {
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <div class="title">View AI</div>
      <button onclick="location.href='profile.html'">👤</button>
    </div>

    <div class="card-grid">

      <!-- AI SUPPORT -->
      <div class="card" onclick="location.href='ai-support.html'">
        <h3>💬 AI Support</h3>
        <p>Get help or fix issues</p>

        <button class="btn primary">Open Support</button>
      </div>

      <!-- CREATE WITH AI -->
      <div class="card" onclick="location.href='create-with-ai.html'">
        <h3>✨ Create With AI</h3>
        <p>Build content and ideas</p>

        <button class="btn secondary">Start Creating</button>
      </div>

    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="nav">
    <button onclick="location.href='home.html'">Home</button>
    <button onclick="location.href='explore.html'">Explore</button>
    <button onclick="location.href='create-post.html'">Create</button>
    <button class="active">AI</button>
    <button onclick="location.href='profile.html'">Profile</button>
  </div>

</body>
</html>create
