<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Login | View</title>
  <meta name="theme-color" content="#071120" />
  <meta name="description" content="Login to View." />
  <link rel="manifest" href="/manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#071120;
      --text:#f8fbff;
      --muted:#9db0cf;
      --soft:#7f92b3;
      --line:rgba(255,255,255,.08);
      --panel:rgba(255,255,255,.04);
      --primary:#2d6bff;
      --primary2:#5b8cff;
      --danger:#ef4444;
      --success:#22c55e;
      --shadow:0 20px 50px rgba(0,0,0,.30);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Inter,Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      min-height:100%;
      background:
        radial-gradient(circle at 12% 12%, rgba(59,130,246,.15), transparent 20%),
        radial-gradient(circle at 88% 10%, rgba(239,68,68,.10), transparent 16%),
        linear-gradient(180deg,#08142b 0%, #071120 58%, #050d1a 100%);
      color:var(--text);
      overflow-x:hidden;
    }

    body{
      position:relative;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button{
      border:none;
      outline:none;
      background:none;
      color:inherit;
      font:inherit;
      cursor:pointer;
    }

    .noise{
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.04;
      background-image:radial-gradient(rgba(255,255,255,.35) .7px, transparent .7px);
      background-size:18px 18px;
      z-index:0;
    }

    .page{
      position:relative;
      z-index:1;
      min-height:100vh;
      display:grid;
      grid-template-rows:auto 1fr auto;
    }

    .topbar{
      width:min(100% - 24px, 1100px);
      margin:0 auto;
      padding:14px 0 0;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .brand-mark{
      width:46px;
      height:46px;
      min-width:46px;
      border-radius:15px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#ef4444,#3b82f6);
      color:#fff;
      font-size:21px;
      font-weight:900;
      box-shadow:var(--shadow);
    }

    .brand-copy h1{
      font-size:18px;
      line-height:1;
      font-weight:900;
      letter-spacing:-.02em;
      margin-bottom:5px;
    }

    .brand-copy p{
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .top-link{
      min-height:40px;
      padding:0 14px;
      border-radius:14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:#fff;
      font-size:13px;
      font-weight:700;
      transition:.2s ease;
    }

    .top-link:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.06);
    }

    .main{
      width:min(100% - 24px, 1100px);
      margin:0 auto;
      display:grid;
      grid-template-columns:.95fr 1.05fr;
      gap:34px;
      align-items:center;
      padding:18px 0 20px;
    }

    .left{
      position:relative;
      min-height:320px;
      display:grid;
      place-items:center;
      overflow:hidden;
    }

    .orb{
      position:absolute;
      border-radius:50%;
      filter:blur(2px);
      opacity:.95;
      pointer-events:none;
    }

    .orb.one{
      width:120px;
      height:120px;
      background:radial-gradient(circle, rgba(59,130,246,.75), rgba(59,130,246,.07) 70%, transparent 72%);
      top:36px;
      left:36px;
      animation:float1 7s ease-in-out infinite;
    }

    .orb.two{
      width:150px;
      height:150px;
      background:radial-gradient(circle, rgba(239,68,68,.48), rgba(239,68,68,.06) 70%, transparent 72%);
      right:42px;
      bottom:32px;
      animation:float2 8s ease-in-out infinite;
    }

    .orb.three{
      width:90px;
      height:90px;
      background:radial-gradient(circle, rgba(34,211,238,.5), rgba(34,211,238,.06) 70%, transparent 72%);
      left:70px;
      bottom:70px;
      animation:float3 6s ease-in-out infinite;
    }

    .planet{
      position:relative;
      width:min(220px, 52vw);
      aspect-ratio:1/1;
      border-radius:50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,.80), transparent 18%),
        radial-gradient(circle at 60% 60%, rgba(34,211,238,.26), transparent 28%),
        linear-gradient(145deg, rgba(59,130,246,.92), rgba(19,48,109,.96));
      box-shadow:
        inset -16px -20px 40px rgba(0,0,0,.35),
        0 24px 60px rgba(34,211,238,.10),
        0 16px 50px rgba(0,0,0,.32);
      display:grid;
      place-items:center;
      animation:spin 22s linear infinite;
    }

    .planet::before{
      content:"";
      position:absolute;
      inset:12%;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.12);
    }

    .planet::after{
      content:"";
      position:absolute;
      width:132%;
      height:26%;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.20);
      transform:rotate(-18deg);
      box-shadow:0 0 0 8px rgba(255,255,255,.025);
    }

    .planet-core{
      width:44%;
      aspect-ratio:1/1;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:rgba(7,17,32,.36);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(10px);
    }

    .planet-core span{
      font-size:clamp(1.8rem,6vw,3rem);
      font-weight:900;
      letter-spacing:-.06em;
      color:#fff;
      text-shadow:0 10px 25px rgba(0,0,0,.35);
    }

    .right{
      padding:8px 0;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:28px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(59,130,246,.10);
      border:1px solid rgba(59,130,246,.18);
      color:#dce8ff;
      font-size:12px;
      font-weight:800;
      margin-bottom:14px;
    }

    .heading{
      font-size:clamp(2rem,4vw,2.7rem);
      line-height:1.02;
      font-weight:900;
      letter-spacing:-.04em;
      margin-bottom:16px;
    }

    .form-wrap{
      width:100%;
      max-width:460px;
    }

    .notice-box{
      display:none;
      margin-bottom:14px;
      padding:14px 16px;
      border-radius:14px;
      font-size:14px;
      line-height:1.6;
      border:1px solid transparent;
    }

    .notice-box.show{display:block}
    .notice-box.error{
      background:rgba(239,68,68,.10);
      border-color:rgba(239,68,68,.18);
      color:#ffd7d7;
    }
    .notice-box.success{
      background:rgba(34,197,94,.10);
      border-color:rgba(34,197,94,.18);
      color:#dcffe7;
    }
    .notice-box.info{
      background:rgba(45,107,255,.10);
      border-color:rgba(45,107,255,.18);
      color:#dcebff;
    }

    .field{
      margin-bottom:14px;
    }

    .label-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }

    .label-row label{
      font-size:12px;
      font-weight:800;
      color:#dce8ff;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .forgot-link{
      font-size:12px;
      color:#bcd5ff;
      font-weight:700;
    }

    .forgot-link:hover{
      text-decoration:underline;
    }

    .input-wrap{
      position:relative;
    }

    .input{
      width:100%;
      min-height:54px;
      border:none;
      outline:none;
      border-radius:16px;
      padding:0 16px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:#fff;
      font-size:14px;
      transition:.2s ease;
    }

    .input.password{
      padding-right:56px;
    }

    .input::placeholder{
      color:#8fa3c2;
    }

    .input:focus{
      border-color:rgba(91,140,255,.45);
      box-shadow:0 0 0 4px rgba(45,107,255,.10);
      background:rgba(255,255,255,.055);
    }

    .toggle-password{
      position:absolute;
      top:50%;
      right:10px;
      transform:translateY(-50%);
      min-width:38px;
      height:38px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#dbe8ff;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      font-size:16px;
    }

    .remember-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin:8px 0 16px;
    }

    .check{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:13px;
    }

    .check input{
      accent-color:#2d6bff;
      width:16px;
      height:16px;
    }

    .submit-btn{
      width:100%;
      min-height:54px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      color:#fff;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      box-shadow:0 14px 30px rgba(45,107,255,.24);
      font-size:15px;
      font-weight:900;
      transition:.2s ease;
    }

    .submit-btn:hover{
      transform:translateY(-1px);
    }

    .submit-btn:disabled,
    .social-btn:disabled{
      opacity:.65;
      cursor:not-allowed;
      transform:none;
    }

    .divider{
      display:flex;
      align-items:center;
      gap:12px;
      margin:18px 0;
      color:var(--soft);
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .divider::before,
    .divider::after{
      content:"";
      flex:1;
      height:1px;
      background:var(--line);
    }

    .socials{
      display:grid;
      gap:12px;
    }

    .social-btn{
      min-height:52px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:#fff;
      font-size:14px;
      font-weight:800;
      transition:.2s ease;
    }

    .social-btn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.06);
    }

    .social-icon{
      width:22px;
      text-align:center;
      font-size:18px;
      line-height:1;
    }

    .helper{
      margin-top:16px;
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
    }

    .helper a{
      color:#dce8ff;
      font-weight:800;
    }

    .helper a:hover{
      text-decoration:underline;
    }

    .footer{
      width:min(100% - 24px, 1100px);
      margin:0 auto 18px;
      color:var(--soft);
      font-size:12px;
      line-height:1.7;
      text-align:center;
    }

    .footer a{
      color:#dce8ff;
      font-weight:700;
    }

    @keyframes spin{
      from{transform:rotate(0deg)}
      to{transform:rotate(360deg)}
    }

    @keyframes float1{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-10px)}
    }

    @keyframes float2{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(12px)}
    }

    @keyframes float3{
      0%,100%{transform:translateY(0) scale(1)}
      50%{transform:translateY(-8px) scale(1.04)}
    }

    @media (max-width:980px){
      .main{
        grid-template-columns:1fr;
        gap:16px;
        padding-top:12px;
      }

      .left{
        min-height:220px;
        order:-1;
      }

      .planet{
        width:min(170px, 40vw);
      }
    }

    @media (max-width:640px){
      .topbar{
        padding-top:2px;
      }

      .left{
        min-height:170px;
      }

      .planet{
        width:140px;
      }

      .heading{
        font-size:2.15rem;
      }

      .form-wrap{
        max-width:none;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div class="page">
    <header class="topbar">
      <div class="brand">
        <a class="brand-mark" href="index.html" aria-label="View Home">V</a>
        <div class="brand-copy">
          <h1>View</h1>
          <p>by Ceetify</p>
        </div>
      </div>

      <div class="top-actions">
        <a class="top-link" href="about.html">About</a>
        <a class="top-link" href="contact.html">Contact</a>
      </div>
    </header>

    <main class="main">
      <section class="left" aria-hidden="true">
        <div class="orb one"></div>
        <div class="orb two"></div>
        <div class="orb three"></div>

        <div class="planet">
          <div class="planet-core">
            <span>V</span>
          </div>
        </div>
      </section>

      <section class="right">
        <div class="eyebrow">Welcome back</div>
        <h2 class="heading">Login</h2>

        <div id="noticeBox" class="notice-box"></div>

        <div class="form-wrap">
          <form id="loginForm">
            <div class="field">
              <div class="label-row">
                <label for="emailInput">Email</label>
              </div>
              <div class="input-wrap">
                <input id="emailInput" class="input" type="email" placeholder="Enter your email" required />
              </div>
            </div>

            <div class="field">
              <div class="label-row">
                <label for="passwordInput">Password</label>
                <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
              </div>
              <div class="input-wrap">
                <input id="passwordInput" class="input password" type="password" placeholder="Enter your password" required />
                <button type="button" class="toggle-password" id="togglePassword" aria-label="Show or hide password">👁</button>
              </div>
            </div>

            <div class="remember-row">
              <label class="check">
                <input type="checkbox" id="rememberMe" checked />
                <span>Keep me signed in</span>
              </label>
            </div>

            <button type="submit" class="submit-btn" id="loginBtn">Login</button>
          </form>

          <div class="divider">or continue with</div>

          <div class="socials">
            <button type="button" class="social-btn" id="googleBtn">
              <span class="social-icon">G</span>
              <span>Continue with Google</span>
            </button>

            <button type="button" class="social-btn" id="facebookBtn">
              <span class="social-icon">f</span>
              <span>Continue with Facebook</span>
            </button>
          </div>

          <div class="helper">
            Don’t have an account? <a href="signup.html">Create one</a>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      © 2026 View by Ceetify
    </footer>
  </div>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        flowType: "pkce"
      }
    });

    const noticeBox = document.getElementById("noticeBox");
    const loginForm = document.getElementById("loginForm");
    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const togglePassword = document.getElementById("togglePassword");
    const loginBtn = document.getElementById("loginBtn");
    const googleBtn = document.getElementById("googleBtn");
    const facebookBtn = document.getElementById("facebookBtn");

    function showNotice(message, type = "error") {
      noticeBox.className = `notice-box show ${type}`;
      noticeBox.textContent = message || "";
    }

    function clearNotice() {
      noticeBox.className = "notice-box";
      noticeBox.textContent = "";
    }

    function getRedirectTo() {
      const next = new URLSearchParams(window.location.search).get("next") || "home.html";
      return `${window.location.origin}/${next.replace(/^\/+/, "")}`;
    }

    function setLoadingState(loading) {
      loginBtn.disabled = loading;
      googleBtn.disabled = loading;
      facebookBtn.disabled = loading;
      loginBtn.textContent = loading ? "Please wait..." : "Login";
    }

    togglePassword.addEventListener("click", function () {
      const isPassword = passwordInput.type === "password";
      passwordInput.type = isPassword ? "text" : "password";
      togglePassword.textContent = isPassword ? "🙈" : "👁";
    });

    loginForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      clearNotice();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showNotice("Enter your email and password.", "info");
        return;
      }

      try {
        setLoadingState(true);

        const { error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        showNotice("Login successful. Redirecting...", "success");
        window.location.href = getRedirectTo();
      } catch (error) {
        showNotice(error.message || "Could not login.", "error");
      } finally {
        setLoadingState(false);
      }
    });

    async function continueWithProvider(provider) {
      clearNotice();

      try {
        setLoadingState(true);

        const { error } = await supabaseClient.auth.signInWithOAuth({
          provider,
          options: {
            redirectTo: getRedirectTo()
          }
        });

        if (error) throw error;
      } catch (error) {
        showNotice(error.message || `Could not continue with ${provider}.`, "error");
        setLoadingState(false);
      }
    }

    googleBtn.addEventListener("click", () => continueWithProvider("google"));
    facebookBtn.addEventListener("click", () => continueWithProvider("facebook"));

    async function checkSession() {
      try {
        const { data, error } = await supabaseClient.auth.getUser();
        if (error) throw error;

        if (data.user) {
          window.location.href = getRedirectTo();
        }
      } catch (error) {
        console.error(error);
      }
    }

    checkSession();
  </script>
</body>
</html>
