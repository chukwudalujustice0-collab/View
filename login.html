<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | View</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --primary:#1d4ed8;
      --primary-dark:#143fb3;
      --bg:#f4f7fc;
      --card:#ffffff;
      --text:#111827;
      --soft:#6b7280;
      --border:#e5e7eb;
      --danger:#b91c1c;
      --success:#15803d;
      --info:#1d4ed8;
      --shadow:0 16px 40px rgba(15,23,42,.08);
      --radius:24px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(180deg,#eef4ff 0%, #ffffff 100%);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .wrap{
      width:100%;
      max-width:460px;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:28px 22px;
      border:1px solid #edf2f7;
    }

    .brand{
      text-align:center;
      margin-bottom:22px;
    }

    .brand-badge{
      width:74px;
      height:74px;
      margin:0 auto 12px;
      border-radius:22px;
      background:linear-gradient(135deg,#1d4ed8,#2563eb);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:34px;
      font-weight:800;
      box-shadow:0 16px 30px rgba(29,78,216,.22);
    }

    .brand h1{
      font-size:30px;
      color:var(--primary);
      margin-bottom:4px;
      font-weight:800;
    }

    .brand p{
      font-size:13px;
      color:var(--soft);
    }

    .head{
      text-align:center;
      margin-bottom:22px;
    }

    .head h2{
      font-size:26px;
      margin-bottom:8px;
      font-weight:800;
    }

    .head p{
      font-size:14px;
      color:var(--soft);
      line-height:1.6;
    }

    .group{
      margin-bottom:14px;
    }

    .group label{
      display:block;
      font-size:14px;
      font-weight:700;
      margin-bottom:8px;
    }

    .group input{
      width:100%;
      height:52px;
      border:1px solid var(--border);
      border-radius:14px;
      padding:0 14px;
      font-size:15px;
      background:#fff;
    }

    .group input:focus{
      outline:none;
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(29,78,216,.08);
    }

    .password-wrap{
      position:relative;
    }

    .password-wrap input{
      padding-right:64px;
    }

    .toggle{
      position:absolute;
      right:14px;
      top:50%;
      transform:translateY(-50%);
      font-size:13px;
      color:var(--primary);
      font-weight:700;
      cursor:pointer;
      user-select:none;
    }

    .extras{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:10px 0 18px;
      font-size:13px;
      flex-wrap:wrap;
    }

    .extras label{
      color:var(--soft);
      display:flex;
      align-items:center;
      gap:8px;
    }

    .extras a{
      color:var(--primary);
      text-decoration:none;
      font-weight:700;
    }

    .btn{
      width:100%;
      min-height:52px;
      border:none;
      border-radius:14px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      transition:.2s ease;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--primary-dark);
    }

    .btn-google{
      background:#fff;
      color:#111827;
      border:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-top:14px;
    }

    .btn-google:hover{
      background:#f8fafc;
    }

    .google-icon{
      width:20px;
      height:20px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }

    .divider{
      display:flex;
      align-items:center;
      gap:12px;
      margin:18px 0;
      color:var(--soft);
      font-size:13px;
      font-weight:700;
    }

    .divider::before,
    .divider::after{
      content:"";
      flex:1;
      height:1px;
      background:var(--border);
    }

    .message{
      display:none;
      margin-top:14px;
      padding:12px 14px;
      border-radius:14px;
      text-align:center;
      font-size:14px;
      line-height:1.6;
    }

    .message.show{ display:block; }
    .message.error{ background:#fee2e2; color:var(--danger); }
    .message.success{ background:#dcfce7; color:var(--success); }
    .message.info{ background:#dbeafe; color:var(--info); }

    .bottom{
      text-align:center;
      margin-top:18px;
      font-size:14px;
      color:var(--soft);
    }

    .bottom a{
      color:var(--primary);
      font-weight:700;
      text-decoration:none;
    }

    .helper{
      margin-top:16px;
      font-size:12px;
      color:#6b7280;
      line-height:1.6;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <div class="brand-badge">V</div>
        <h1>View</h1>
        <p>Your world, your view</p>
      </div>

      <div class="head">
        <h2>Sign In</h2>
        <p>Login to continue to your account and manage your content.</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required />
        </div>

        <div class="group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="Enter your password" required />
            <span class="toggle" id="togglePassword">Show</span>
          </div>
        </div>

        <div class="extras">
          <label for="rememberMe">
            <input type="checkbox" id="rememberMe" checked />
            Remember me
          </label>
          <a href="forgot-password.html">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
        <div id="loginMessage" class="message"></div>
      </form>

      <div class="divider">or</div>

      <button type="button" class="btn btn-google" id="googleBtn">
        <span class="google-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.5 3.9-5.5 3.9-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.8 3.5 14.7 2.5 12 2.5A9.5 9.5 0 0 0 2.5 12 9.5 9.5 0 0 0 12 21.5c5.5 0 9.1-3.9 9.1-9.3 0-.6-.1-1.1-.2-1.6H12z"/>
            <path fill="#34A853" d="M3.6 7.9l3.2 2.3C7.7 8.2 9.7 6.7 12 6.7c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.8 3.5 14.7 2.5 12 2.5 8.3 2.5 5.1 4.6 3.6 7.9z"/>
            <path fill="#FBBC05" d="M12 21.5c2.6 0 4.7-.9 6.3-2.4l-2.9-2.4c-.8.6-1.8 1-3.4 1-3.9 0-5.2-2.6-5.5-3.9l-3.2 2.5c1.5 3.3 4.7 5.2 8.7 5.2z"/>
            <path fill="#4285F4" d="M21.1 12.2c0-.6-.1-1.1-.2-1.6H12v3.9h5.5c-.3 1.3-1.2 2.3-2.2 3l2.9 2.4c1.7-1.6 2.9-4 2.9-7.7z"/>
          </svg>
        </span>
        Continue with Google
      </button>

      <div class="bottom">
        Don’t have an account? <a href="signup.html">Sign up</a>
      </div>

      <div class="helper">
        After login, you will be redirected to your home page.
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const loginForm = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const googleBtn = document.getElementById("googleBtn");
    const messageBox = document.getElementById("loginMessage");
    const togglePassword = document.getElementById("togglePassword");

    function showMessage(message, type = "error") {
      messageBox.className = `message show ${type}`;
      messageBox.textContent = message;
    }

    function clearMessage() {
      messageBox.className = "message";
      messageBox.textContent = "";
    }

    function setLoading(button, isLoading, loadingText, defaultText) {
      button.disabled = isLoading;
      button.textContent = isLoading ? loadingText : defaultText;
    }

    togglePassword.addEventListener("click", () => {
      const isPassword = passwordInput.type === "password";
      passwordInput.type = isPassword ? "text" : "password";
      togglePassword.textContent = isPassword ? "Hide" : "Show";
    });

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessage();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showMessage("Enter your email and password.");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Signing in...";
      showMessage("Signing in...", "info");

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;
        if (!data.user && !data.session) {
          throw new Error("Login failed. Please try again.");
        }

        showMessage("Login successful. Redirecting...", "success");
        setTimeout(() => {
          window.location.href = "home.html";
        }, 600);

      } catch (error) {
        showMessage(error.message || "Login failed.");
        loginBtn.disabled = false;
        loginBtn.textContent = "Sign In";
      }
    });

    googleBtn.addEventListener("click", async () => {
      clearMessage();
      googleBtn.disabled = true;
      googleBtn.innerHTML = "Connecting to Google...";

      try {
        const { error } = await supabaseClient.auth.signInWithOAuth({
          provider: "google",
          options: {
            redirectTo: `${window.location.origin}${window.location.pathname.replace(/[^/]*$/, "")}home.html`
          }
        });

        if (error) throw error;
      } catch (error) {
        showMessage(error.message || "Google sign in failed.");
        googleBtn.disabled = false;
        googleBtn.innerHTML = `
          <span class="google-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.5 3.9-5.5 3.9-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.8 3.5 14.7 2.5 12 2.5A9.5 9.5 0 0 0 2.5 12 9.5 9.5 0 0 0 12 21.5c5.5 0 9.1-3.9 9.1-9.3 0-.6-.1-1.1-.2-1.6H12z"/>
              <path fill="#34A853" d="M3.6 7.9l3.2 2.3C7.7 8.2 9.7 6.7 12 6.7c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.8 3.5 14.7 2.5 12 2.5 8.3 2.5 5.1 4.6 3.6 7.9z"/>
              <path fill="#FBBC05" d="M12 21.5c2.6 0 4.7-.9 6.3-2.4l-2.9-2.4c-.8.6-1.8 1-3.4 1-3.9 0-5.2-2.6-5.5-3.9l-3.2 2.5c1.5 3.3 4.7 5.2 8.7 5.2z"/>
              <path fill="#4285F4" d="M21.1 12.2c0-.6-.1-1.1-.2-1.6H12v3.9h5.5c-.3 1.3-1.2 2.3-2.2 3l2.9 2.4c1.7-1.6 2.9-4 2.9-7.7z"/>
            </svg>
          </span>
          Continue with Google
        `;
      }
    });

    async function checkSession() {
      try {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error) throw error;
        if (data.session) {
          window.location.href = "home.html";
        }
      } catch (error) {
        console.log("Session check skipped:", error.message);
      }
    }

    checkSession();
  </script>
</body>
</html>
