<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | View</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --primary:#1d4ed8;
      --primary-dark:#143fb3;
      --bg:#f4f7fc;
      --card:#ffffff;
      --text:#111827;
      --soft:#6b7280;
      --border:#e5e7eb;
      --danger:#b91c1c;
      --success:#15803d;
      --info:#1d4ed8;
      --shadow:0 16px 40px rgba(15,23,42,.08);
      --radius:24px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(180deg,#eef4ff 0%, #ffffff 100%);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .wrap{
      width:100%;
      max-width:440px;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:28px 22px;
      border:1px solid #edf2f7;
    }

    .brand{
      text-align:center;
      margin-bottom:22px;
    }

    .brand-badge{
      width:70px;
      height:70px;
      margin:0 auto 12px;
      border-radius:20px;
      background:linear-gradient(135deg,#1d4ed8,#2563eb);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:32px;
      font-weight:800;
      box-shadow:0 16px 30px rgba(29,78,216,.22);
    }

    .brand h1{
      font-size:30px;
      color:var(--primary);
      margin-bottom:4px;
      font-weight:800;
    }

    .brand p{
      font-size:13px;
      color:var(--soft);
    }

    .head{
      text-align:center;
      margin-bottom:22px;
    }

    .head h2{
      font-size:26px;
      margin-bottom:8px;
      font-weight:800;
    }

    .head p{
      font-size:14px;
      color:var(--soft);
      line-height:1.6;
    }

    .group{
      margin-bottom:14px;
    }

    .group label{
      display:block;
      font-size:14px;
      font-weight:700;
      margin-bottom:8px;
    }

    .group input{
      width:100%;
      height:52px;
      border:1px solid var(--border);
      border-radius:14px;
      padding:0 14px;
      font-size:15px;
      background:#fff;
    }

    .group input:focus{
      outline:none;
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(29,78,216,.08);
    }

    .password-wrap{
      position:relative;
    }

    .password-wrap input{
      padding-right:62px;
    }

    .toggle{
      position:absolute;
      right:14px;
      top:50%;
      transform:translateY(-50%);
      font-size:13px;
      color:var(--primary);
      font-weight:700;
      cursor:pointer;
      user-select:none;
    }

    .extras{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:8px 0 18px;
      flex-wrap:wrap;
      font-size:13px;
      color:var(--soft);
    }

    .extras a{
      color:var(--primary);
      text-decoration:none;
      font-weight:700;
    }

    .btn{
      width:100%;
      min-height:52px;
      border:none;
      border-radius:14px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--primary-dark);
    }

    .message{
      display:none;
      margin-top:14px;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      line-height:1.6;
      text-align:center;
    }

    .message.show{
      display:block;
    }

    .message.error{
      background:#fee2e2;
      color:var(--danger);
    }

    .message.success{
      background:#dcfce7;
      color:var(--success);
    }

    .message.info{
      background:#dbeafe;
      color:var(--info);
    }

    .bottom{
      text-align:center;
      margin-top:18px;
      color:var(--soft);
      font-size:14px;
    }

    .bottom a{
      color:var(--primary);
      font-weight:700;
      text-decoration:none;
    }

    .helper{
      margin-top:16px;
      font-size:12px;
      color:#6b7280;
      line-height:1.6;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <div class="brand-badge">V</div>
        <h1>View</h1>
        <p>Your world, your view</p>
      </div>

      <div class="head">
        <h2>Sign In</h2>
        <p>Login to continue to your account and manage your content.</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required />
        </div>

        <div class="group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="Enter your password" required />
            <span class="toggle" id="togglePassword">Show</span>
          </div>
        </div>

        <div class="extras">
          <label>
            <input type="checkbox" id="rememberMe" checked />
            Remember me
          </label>
          <a href="forgot-password.html">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
        <div id="loginMessage" class="message"></div>
      </form>

      <div class="bottom">
        Don’t have an account? <a href="signup.html">Sign up</a>
      </div>

      <div class="helper">
        After login, you will be redirected to your profile.
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const messageBox = document.getElementById("loginMessage");
    const togglePassword = document.getElementById("togglePassword");

    function showMessage(message, type = "error") {
      messageBox.className = `message show ${type}`;
      messageBox.textContent = message;
    }

    function clearMessage() {
      messageBox.className = "message";
      messageBox.textContent = "";
    }

    function getNextPage() {
      const params = new URLSearchParams(window.location.search);
      return params.get("next") || "profile.html";
    }

    async function waitForSession(maxWaitMs = 4000) {
      const start = Date.now();

      while (Date.now() - start < maxWaitMs) {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error) throw error;
        if (data.session?.user) return data.session;
        await new Promise(resolve => setTimeout(resolve, 200));
      }

      return null;
    }

    async function redirectIfLoggedIn() {
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) return;
      if (data.session?.user) {
        window.location.href = getNextPage();
      }
    }

    togglePassword.addEventListener("click", () => {
      const isPassword = passwordInput.type === "password";
      passwordInput.type = isPassword ? "text" : "password";
      togglePassword.textContent = isPassword ? "Hide" : "Show";
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessage();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showMessage("Enter your email and password.");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Signing in...";
      showMessage("Signing in...", "info");

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        const session = data.session || await waitForSession();

        if (!session?.user) {
          throw new Error("Login completed but no active session was found.");
        }

        showMessage("Login successful. Redirecting...", "success");

        setTimeout(() => {
          window.location.href = getNextPage();
        }, 700);
      } catch (error) {
        showMessage(error.message || "Login failed.");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Sign In";
      }
    });

    redirectIfLoggedIn();
  </script>
</body>
</html>
