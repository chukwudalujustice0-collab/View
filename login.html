<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | View</title>
  <style>
    :root{
      --primary:#0b5ed7;
      --primary-dark:#083b8a;
      --card:#ffffff;
      --text:#1f1f1f;
      --soft:#6b7280;
      --border:#e5e7eb;
      --danger:#dc2626;
      --success:#16a34a;
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{
      min-height:100vh;
      background:linear-gradient(180deg,#eef5ff 0%, #ffffff 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      color:var(--text);
    }
    .wrap{width:100%;max-width:430px}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:24px;
      box-shadow:0 10px 30px rgba(0,0,0,.06);
    }
    .brand{text-align:center;margin-bottom:18px}
    .brand h1{color:var(--primary);font-size:30px;margin-bottom:4px}
    .brand p{font-size:12px;color:var(--soft)}
    .head{text-align:center;margin-bottom:18px}
    .head h2{font-size:24px;margin-bottom:6px}
    .head p{font-size:13px;color:var(--soft);line-height:1.5}
    .group{margin-bottom:14px}
    .group label{display:block;font-size:14px;font-weight:700;margin-bottom:6px}
    .group input{
      width:100%;
      height:48px;
      border:1px solid var(--border);
      border-radius:10px;
      padding:0 14px;
      font-size:14px;
      background:#fff;
    }
    .group input:focus{outline:none;border-color:var(--primary)}
    .password-wrap{position:relative}
    .password-wrap input{padding-right:58px}
    .toggle{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      font-size:12px;
      color:var(--primary);
      font-weight:700;
      cursor:pointer;
      user-select:none;
    }
    .extras{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:8px 0 14px;
      flex-wrap:wrap;
      font-size:13px;
      color:var(--soft);
    }
    .extras a{color:var(--primary);text-decoration:none;font-weight:700}
    .btn{
      width:100%;
      height:48px;
      border:none;
      border-radius:10px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-dark)}
    .message{
      display:none;
      margin-top:12px;
      text-align:center;
      font-size:13px;
      line-height:1.5;
      padding:10px;
      border-radius:10px;
    }
    .message.error{display:block;color:var(--danger);background:#fff5f5;border:1px solid #fecaca}
    .message.success{display:block;color:var(--success);background:#f0fdf4;border:1px solid #bbf7d0}
    .message.info{display:block;color:#0b5ed7;background:#eff6ff;border:1px solid #bfdbfe}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <h1>View</h1>
        <p>Your world, your view</p>
      </div>

      <div class="head">
        <h2>Welcome Back</h2>
        <p>Login to continue.</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="group">
          <label for="email">Email</label>
          <input type="email" id="email" required />
        </div>

        <div class="group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" required />
            <span class="toggle" onclick="togglePassword()">Show</span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">Login</button>
        <div id="loginMessage" class="message"></div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    function togglePassword() {
      const input = document.getElementById("password");
      const toggle = document.querySelector(".toggle");
      const show = input.type === "password";
      input.type = show ? "text" : "password";
      toggle.textContent = show ? "Hide" : "Show";
    }

    function showMessage(message, type = "error") {
      const box = document.getElementById("loginMessage");
      box.className = "message " + type;
      box.textContent = message;
    }

    function getNextPage() {
      const params = new URLSearchParams(window.location.search);
      return params.get("next") || "profile.html";
    }

    async function waitForSession(maxWaitMs = 4000) {
      const start = Date.now();
      while (Date.now() - start < maxWaitMs) {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error) throw error;
        if (data.session?.user) return data.session;
        await new Promise(resolve => setTimeout(resolve, 200));
      }
      return null;
    }

    document.getElementById("loginForm").addEventListener("submit", async function(event) {
      event.preventDefault();

      const loginBtn = document.getElementById("loginBtn");
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        showMessage("Enter your email and password.");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Logging in...";
      showMessage("Signing in...", "info");

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;

        const session = data.session || await waitForSession();
        if (!session?.user) throw new Error("Login completed but no active session was found.");

        showMessage("Login successful. Redirecting...", "success");
        setTimeout(() => {
          window.location.href = getNextPage();
        }, 700);
      } catch (error) {
        showMessage(error.message || "Login failed.");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
      }
    });
  </script>
</body>
</html>
