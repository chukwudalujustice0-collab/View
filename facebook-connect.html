<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connect Facebook | View</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial;
  background:#f5f7fb;
  padding:20px;
}
.card{
  background:#fff;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  max-width:500px;
  margin:auto;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  margin-top:10px;
  cursor:pointer;
}
.primary{background:#1877f2;color:#fff;}
.secondary{background:#eee;}
.notice{
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  display:none;
}
.notice.show{display:block;}
.notice.error{background:#fee;color:#900;}
.notice.success{background:#efe;color:#060;}
.notice.info{background:#eef;color:#036;}
</style>
</head>

<body>

<div class="card">
  <h2>Connect Facebook Page</h2>

  <div id="notice" class="notice"></div>

  <button id="loginBtn" class="primary">Login with Facebook</button>
  <button id="manualBtn" class="secondary" style="display:none;">
    Open Facebook Manually
  </button>

  <div id="pages"></div>
</div>

<script>
const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ✅ YOUR APP ID (CONFIRMED WORKING)
const FACEBOOK_APP_ID = "921040053900296";

// MUST MATCH META EXACTLY
const REDIRECT_URI = "https://view.ceetice.com/facebook-connect.html";

const SCOPES = [
  "pages_show_list",
  "pages_manage_posts",
  "pages_read_engagement"
];

const notice = document.getElementById("notice");
const loginBtn = document.getElementById("loginBtn");
const manualBtn = document.getElementById("manualBtn");
const pagesEl = document.getElementById("pages");

function show(msg,type="info"){
  notice.className = "notice show " + type;
  notice.innerText = msg;
}

async function getUser(){
  const {data} = await supabase.auth.getUser();
  if(!data.user){
    location.href = "login.html";
    return null;
  }
  return data.user;
}

function getAuthUrl(userId){
  return `https://www.facebook.com/v19.0/dialog/oauth?client_id=${FACEBOOK_APP_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${SCOPES.join(",")}&state=${userId}&display=touch`;
}

async function startLogin(){
  const user = await getUser();
  if(!user) return;

  const url = getAuthUrl(user.id);

  show("Opening Facebook...", "info");

  manualBtn.style.display = "block";

  setTimeout(()=>{
    window.location.assign(url);
  },200);
}

loginBtn.onclick = startLogin;

manualBtn.onclick = async ()=>{
  const user = await getUser();
  if(!user) return;
  window.location.href = getAuthUrl(user.id);
};

// =====================
// HANDLE FACEBOOK RETURN
// =====================
function getTokenFromHash(){
  const hash = location.hash.replace("#","");
  const params = new URLSearchParams(hash);

  if(!params.get("access_token")) return null;

  return {
    token: params.get("access_token"),
    state: params.get("state")
  };
}

async function loadPages(token){
  const res = await fetch(
    `https://graph.facebook.com/v19.0/me/accounts?access_token=${token}`
  );

  const data = await res.json();

  if(!data.data){
    throw new Error("No pages found");
  }

  return data.data;
}

function renderPages(pages,user){
  pagesEl.innerHTML = "";

  pages.forEach(p=>{
    const div = document.createElement("div");
    div.style.marginTop = "10px";

    div.innerHTML = `
      <b>${p.name}</b><br/>
      <small>${p.id}</small><br/>
      <button onclick="savePage('${p.id}','${p.access_token}','${p.name}')">
        Use this page
      </button>
    `;

    pagesEl.appendChild(div);
  });
}

window.savePage = async (id,token,name)=>{
  const {error} = await supabase
    .from("connected_accounts")
    .upsert({
      user_id:(await getUser()).id,
      platform:"facebook",
      external_page_id:id,
      external_user_id:id,
      account_name:name,
      access_token:token,
      status:"connected"
    },{
      onConflict:"user_id,platform"
    });

  if(error){
    show(error.message,"error");
    return;
  }

  show("Facebook connected successfully","success");

  setTimeout(()=>{
    location.href="connected-accounts.html?facebook=connected";
  },1000);
};

// =====================
// ON LOAD
// =====================
(async ()=>{
  const data = getTokenFromHash();
  if(!data) return;

  const user = await getUser();
  if(!user) return;

  if(data.state !== user.id){
    show("Security error: state mismatch","error");
    return;
  }

  try{
    show("Fetching pages...","info");

    const pages = await loadPages(data.token);

    renderPages(pages,user);

    show("Select a page below","success");

    history.replaceState({}, "", REDIRECT_URI);

  }catch(e){
    show(e.message,"error");
  }
})();
</script>

</body>
</html>
