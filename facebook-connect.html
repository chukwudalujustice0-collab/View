<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Connect Facebook | View</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#08111f;
      --card:#101b31;
      --text:#f4f7ff;
      --muted:#9fb1d7;
      --primary:#1877f2;
      --success:#10b981;
      --danger:#ef4444;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:linear-gradient(135deg,#08111f,#0f1c3f);
      color:var(--text);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      width:100%;
      max-width:400px;
      background:var(--card);
      border-radius:20px;
      padding:25px;
      box-shadow:0 10px 40px rgba(0,0,0,.4);
      text-align:center;
    }

    .logo{
      font-size:22px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .desc{
      font-size:14px;
      color:var(--muted);
      margin-bottom:25px;
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      font-size:15px;
      cursor:pointer;
      margin-top:10px;
    }

    .facebook{
      background:#1877f2;
      color:#fff;
      font-weight:bold;
    }

    .disconnect{
      background:#ef4444;
      color:#fff;
    }

    .status{
      margin-top:15px;
      font-size:13px;
      color:var(--muted);
    }

    .success{
      color:var(--success);
    }

    .error{
      color:var(--danger);
    }

  </style>
</head>
<body>

<div class="card">
  <div class="logo">Connect Facebook</div>
  <div class="desc">
    Link your Facebook account to publish posts directly from View.
  </div>

  <!-- ✅ CONNECT BUTTON -->
  <button class="btn facebook" id="connectBtn">
    Continue with Facebook
  </button>

  <!-- DISCONNECT -->
  <button class="btn disconnect" id="disconnectBtn" style="display:none;">
    Disconnect Facebook
  </button>

  <div class="status" id="status"></div>
</div>

<script>
/* ================= CONFIG ================= */
const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
const SUPABASE_ANON = "YOUR_ANON_KEY"; // keep your real key

const FACEBOOK_APP_ID = "YOUR_FACEBOOK_APP_ID";
const REDIRECT_URI = window.location.origin + "/facebook-connect.html";

/* ========================================= */

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const connectBtn = document.getElementById("connectBtn");
const disconnectBtn = document.getElementById("disconnectBtn");
const statusDiv = document.getElementById("status");

/* ================= CHECK SESSION ================= */
async function getUser(){
  const { data } = await supabase.auth.getUser();
  return data?.user;
}

/* ================= FACEBOOK LOGIN ================= */
connectBtn.onclick = async () => {
  const user = await getUser();

  if(!user){
    statusDiv.innerHTML = "Login first";
    statusDiv.className = "status error";
    return;
  }

  const scope = "pages_manage_posts,pages_read_engagement,publish_to_groups";

  const url = `https://www.facebook.com/v18.0/dialog/oauth?client_id=${FACEBOOK_APP_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${scope}&response_type=token`;

  window.location.href = url;
};

/* ================= HANDLE REDIRECT ================= */
function handleFacebookRedirect(){
  const hash = window.location.hash;

  if(hash.includes("access_token")){
    const params = new URLSearchParams(hash.substring(1));
    const access_token = params.get("access_token");

    saveFacebookToken(access_token);
  }
}

/* ================= SAVE TOKEN ================= */
async function saveFacebookToken(token){
  const user = await getUser();

  const { error } = await supabase
    .from("connected_accounts")
    .upsert({
      user_id: user.id,
      provider: "facebook",
      access_token: token
    });

  if(error){
    statusDiv.innerHTML = "Error saving account";
    statusDiv.className = "status error";
  } else {
    statusDiv.innerHTML = "Facebook connected successfully";
    statusDiv.className = "status success";

    connectBtn.style.display = "none";
    disconnectBtn.style.display = "block";
  }
}

/* ================= CHECK IF CONNECTED ================= */
async function checkConnection(){
  const user = await getUser();
  if(!user) return;

  const { data } = await supabase
    .from("connected_accounts")
    .select("*")
    .eq("user_id", user.id)
    .eq("provider", "facebook")
    .single();

  if(data){
    connectBtn.style.display = "none";
    disconnectBtn.style.display = "block";
    statusDiv.innerHTML = "Facebook already connected";
    statusDiv.className = "status success";
  }
}

/* ================= DISCONNECT ================= */
disconnectBtn.onclick = async () => {
  const user = await getUser();

  await supabase
    .from("connected_accounts")
    .delete()
    .eq("user_id", user.id)
    .eq("provider", "facebook");

  statusDiv.innerHTML = "Disconnected";
  statusDiv.className = "status";

  connectBtn.style.display = "block";
  disconnectBtn.style.display = "none";
};

/* ================= INIT ================= */
handleFacebookRedirect();
checkConnection();

</script>

</body>
</html>
