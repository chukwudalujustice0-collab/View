<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chat | View</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0b5ed7" />
  <style>
    :root{
      --primary:#0b5ed7;--bg:#f5f8ff;--card:#fff;--text:#1f1f1f;--soft:#6b7280;--border:#e5e7eb;
      --shadow:0 10px 30px rgba(0,0,0,.06);--radius:18px
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:92px}
    button,textarea{font:inherit}
    .topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .topbar-left,.topbar-right{display:flex;align-items:center;gap:10px}
    .avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#dbeafe,#f8fbff);border:1px solid rgba(11,94,215,.12)}
    .page-title h1{font-size:18px;color:var(--primary);margin-bottom:2px;line-height:1}
    .page-title p{font-size:12px;color:var(--soft)}
    .icon-btn,.primary-btn,.outline-btn,.mini-btn,.tool-btn{border:none;border-radius:12px;min-height:42px;padding:0 14px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
    .icon-btn{width:42px;padding:0;background:#fff;border:1px solid var(--border)}
    .primary-btn{background:var(--primary);color:#fff;font-weight:700}
    .outline-btn,.mini-btn,.tool-btn{background:#fff;color:var(--primary);border:1px solid var(--border);font-weight:700}
    .mini-btn{min-height:36px;border-radius:999px;font-size:12px;padding:0 12px}
    .tool-btn{min-height:38px;border-radius:999px;font-size:12px;padding:0 12px}
    .container{max-width:980px;margin:0 auto;padding:18px 16px 0;display:grid;gap:18px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
    .chat-box{display:grid;gap:12px}
    .message-row{display:flex}
    .message-row.sent{justify-content:flex-end}
    .bubble{max-width:78%;padding:12px 14px;border-radius:18px;font-size:14px;line-height:1.6}
    .received .bubble{background:#fff;border:1px solid var(--border);border-top-left-radius:8px}
    .sent .bubble{background:#dcecff;border-top-right-radius:8px}
    .message-meta{font-size:11px;color:var(--soft);margin-top:6px}
    .action-row,.tool-row{display:flex;gap:10px;flex-wrap:wrap}
    .reply-box{display:none;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border:1px dashed rgba(11,94,215,.18);border-radius:14px;background:#f8fbff}
    .composer{display:grid;gap:12px}
    .composer textarea{width:100%;min-height:90px;border:1px solid var(--border);border-radius:16px;padding:14px;resize:vertical;background:#fff}
    .composer textarea:focus{outline:none;border-color:var(--primary)}
    .bottom-nav{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--border);display:none;grid-template-columns:repeat(5,1fr);gap:6px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));z-index:30}
    .bottom-link{min-height:54px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:11px;color:var(--soft);text-decoration:none}
    .bottom-link.active{color:var(--primary);background:rgba(11,94,215,.08);font-weight:700}
    @media(max-width:760px){.bottom-nav{display:grid}}
    @media(max-width:640px){.container{padding:14px 12px 0}.bubble{max-width:90%}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <button class="icon-btn" onclick="window.location.href='messages.html'">←</button>
      <div class="avatar"></div>
      <div class="page-title">
        <h1>Ceetify Media</h1>
        <p>Online now</p>
      </div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" data-chat-call>📞</button>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <div class="chat-box">
        <div class="message-row received">
          <div class="bubble">
            Let’s finish the View app structure today.
            <div class="message-meta">09:15 AM</div>
          </div>
        </div>

        <div class="message-row sent">
          <div class="bubble">
            Alright, send the next pages.
            <div class="message-meta">09:16 AM</div>
          </div>
        </div>

        <div class="message-row received">
          <div class="bubble">
            We should make the publish system premium.
            <div class="message-meta">09:17 AM</div>
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <div id="replyingBox" class="reply-box">
        <div>Replying to <strong id="replyingToName">@user</strong></div>
        <button class="mini-btn" id="closeReplyBox">Close</button>
      </div>

      <div class="tool-row" style="margin:12px 0;">
        <button class="tool-btn" data-chat-tool="emoji">Emoji</button>
        <button class="tool-btn" data-chat-tool="gif">GIF</button>
        <button class="tool-btn" data-chat-tool="sticker">Sticker</button>
        <button class="tool-btn" data-chat-tool="image">Image</button>
        <button class="tool-btn" data-chat-tool="file">File</button>
      </div>

      <div class="composer">
        <textarea id="chatMessageInput" placeholder="Write your message..."></textarea>
        <div class="action-row">
          <button class="outline-btn" id="voiceNoteBtn">Voice Note</button>
          <button class="primary-btn" id="sendMessageBtn">Send</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="action-row">
        <button class="mini-btn" data-message-action="reply">Reply</button>
        <button class="mini-btn" data-message-action="forward">Forward</button>
        <button class="mini-btn" data-message-action="react">React</button>
        <button class="mini-btn" data-message-action="delete">Delete</button>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="home.html" class="bottom-link"><span>🏠</span><span>Home</span></a>
    <a href="explore.html" class="bottom-link"><span>🔍</span><span>Explore</span></a>
    <a href="create-post.html" class="bottom-link"><span>➕</span><span>Create</span></a>
    <a href="messages.html" class="bottom-link active"><span>💬</span><span>Chat</span></a>
    <a href="profile.html" class="bottom-link"><span>👤</span><span>Profile</span></a>
  </nav>

  <script src="config.js"></script>
  <script src="utils.js"></script>
  <script src="app.js"></script>
  <script src="auth.js"></script>
  <script src="chat.js"></script>
</body>
</html>
