<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connect YouTube</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      font-family: Arial;
      background:#f4f6fb;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .card{
      background:#fff;
      padding:30px;
      border-radius:20px;
      width:90%;
      max-width:400px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }
    button{
      background:red;
      color:#fff;
      border:none;
      padding:15px;
      width:100%;
      border-radius:12px;
      font-size:16px;
      cursor:pointer;
    }
    .status{
      margin-top:15px;
      font-size:14px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Connect YouTube</h2>
  <button onclick="connectYouTube()">Connect YouTube</button>
  <div class="status" id="status"></div>
</div>

<script>
const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
const SUPABASE_ANON = "YOUR_ANON_KEY"; // put your anon key

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// check if already connected
const params = new URLSearchParams(window.location.search);
if (params.get("connected")) {
  document.getElementById("status").innerText = "YouTube connected successfully ✅";
}

async function connectYouTube() {
  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    alert("Please login first");
    return;
  }

  const userId = session.user.id;

  const CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID";

  const REDIRECT_URI = "https://view-psi-lac.vercel.app/api/youtube-exchange-code";

  const url = `https://accounts.google.com/o/oauth2/v2/auth
  ?client_id=${CLIENT_ID}
  &redirect_uri=${encodeURIComponent(REDIRECT_URI)}
  &response_type=code
  &access_type=offline
  &prompt=consent
  &scope=${encodeURIComponent("https://www.googleapis.com/auth/youtube.upload")}
  &state=${userId}`;

  window.location.href = url;
}
</script>

</body>
</html>
