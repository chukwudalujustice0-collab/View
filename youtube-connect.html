<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Connect YouTube | View</title>
  <meta name="theme-color" content="#ffffff" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#f6f8fc;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --primary:#2563eb;
      --danger:#dc2626;
      --success:#059669;
      --shadow:0 12px 30px rgba(15,23,42,.08);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(180deg,#fbfcff 0%, #f5f7fb 100%);
      color:var(--text);
      padding:20px 14px;
    }

    .wrap{
      max-width:760px;
      margin:auto;
    }

    .card{
      background:#fff;
      border-radius:20px;
      padding:20px;
      box-shadow:var(--shadow);
      margin-bottom:15px;
    }

    .title{
      font-size:22px;
      font-weight:800;
      margin-bottom:10px;
    }

    .btn{
      width:100%;
      height:50px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,#2563eb,#4f46e5);
      color:#fff;
      font-weight:700;
      cursor:pointer;
      margin-top:10px;
    }

    .notice{
      display:none;
      padding:12px;
      border-radius:10px;
      margin-bottom:12px;
    }

    .notice.show{display:block}
    .success{background:#ecfdf5;color:#065f46}
    .error{background:#fef2f2;color:#991b1b}
    .info{background:#eff6ff;color:#1d4ed8}
  </style>
</head>
<body>

<div class="wrap">

  <div id="notice" class="notice"></div>

  <div class="card">
    <div class="title">Connect YouTube</div>
    <p style="color:#6b7280;font-size:14px;">
      Connect your YouTube account to publish videos directly.
    </p>

    <button id="connectBtn" class="btn">Connect YouTube</button>
  </div>

</div>

<script>
const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ✅ YOUR REAL CLIENT ID
const GOOGLE_CLIENT_ID = "1453516669-1heoa56uql9svtnm0abhoqu95nn6dpcb.apps.googleusercontent.com";

// ✅ YOUR BACKEND
const EXCHANGE_ENDPOINT = "https://view-psi-lac.vercel.app/api/youtube-exchange-code";

// ✅ MUST MATCH GOOGLE CONSOLE
const REDIRECT_URI = window.location.origin + "/youtube-connect.html";

const SCOPES = [
  "https://www.googleapis.com/auth/youtube.upload",
  "https://www.googleapis.com/auth/youtube.readonly",
  "https://www.googleapis.com/auth/youtube"
];

const notice = document.getElementById("notice");
const connectBtn = document.getElementById("connectBtn");

function show(msg,type="info"){
  notice.className="notice show "+type;
  notice.innerText=msg;
}

async function getUser(){
  const { data } = await supabase.auth.getUser();
  if(!data?.user){
    location.href="login.html";
    return null;
  }
  return data.user;
}

// 🚀 START GOOGLE LOGIN
async function connect(){
  try{
    const user = await getUser();
    if(!user) return;

    const params = new URLSearchParams({
      client_id: GOOGLE_CLIENT_ID,
      redirect_uri: REDIRECT_URI,
      response_type: "code",
      scope: SCOPES.join(" "),
      access_type: "offline",
      prompt: "consent",
      state: user.id
    });

    location.href = "https://accounts.google.com/o/oauth2/v2/auth?" + params.toString();

  }catch(e){
    show(e.message,"error");
  }
}

// 🔥 HANDLE RETURN FROM GOOGLE
async function handleCallback(){
  const url = new URL(location.href);
  const code = url.searchParams.get("code");
  const state = url.searchParams.get("state");
  const err = url.searchParams.get("error");

  if(err){
    show("Google denied access","error");
    return;
  }

  if(!code) return;

  try{
    show("Connecting YouTube...","info");

    const res = await fetch(EXCHANGE_ENDPOINT,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        code,
        state,
        redirect_uri: REDIRECT_URI   // ✅ VERY IMPORTANT
      })
    });

    const data = await res.json();

    if(!res.ok){
      throw new Error(data.error || "Connection failed");
    }

    show("YouTube connected successfully","success");

    // clean url
    history.replaceState({}, "", REDIRECT_URI);

    setTimeout(()=>{
      location.href="connected-accounts.html";
    },1500);

  }catch(e){
    show(e.message,"error");
  }
}

connectBtn.onclick = connect;
handleCallback();

</script>
</body>
</html>
