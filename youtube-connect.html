<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>YouTube Connect | View</title>
  <meta name="theme-color" content="#08111f" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#08111f;
      --card:#101b31;
      --line:rgba(255,255,255,.08);
      --text:#f4f7ff;
      --muted:#9fb1d7;
      --youtube:#ff0000;
      --success:#10b981;
      --warn:#f59e0b;
      --danger:#ef4444;
      --shadow:0 14px 40px rgba(0,0,0,.28);
      --safe-bottom:env(safe-area-inset-bottom);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      min-height:100%;
      background:var(--bg);
      color:var(--text);
    }

    body{
      padding:16px 14px 110px;
    }

    button,input,textarea,select{
      font:inherit;
      color:inherit;
    }

    button{
      border:none;
      background:none;
      cursor:pointer;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .wrap{
      width:min(100%, 820px);
      margin:0 auto;
    }

    .notice{
      display:none;
      margin-bottom:14px;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      line-height:1.55;
      box-shadow:var(--shadow);
    }
    .notice.show{display:block}
    .notice.error{background:rgba(127,29,29,.92);color:#fecaca}
    .notice.success{background:rgba(5,46,22,.92);color:#d1fae5}
    .notice.info{background:rgba(30,41,59,.95);color:#dbeafe}

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:16px;
    }

    .top-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
    }

    .icon-btn{
      width:46px;
      height:46px;
      min-width:46px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      font-size:18px;
      color:#fff;
    }

    .title-box{
      min-width:0;
      flex:1;
    }

    .title{
      font-size:22px;
      font-weight:800;
      margin-bottom:3px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .sub{
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }

    .card-head{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .card-head h3{
      font-size:16px;
      font-weight:800;
    }

    .card-body{
      padding:14px;
      display:grid;
      gap:12px;
    }

    .status-box{
      display:flex;
      align-items:center;
      gap:10px;
      min-height:52px;
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
    }

    .dot{
      width:10px;
      height:10px;
      min-width:10px;
      border-radius:50%;
      background:var(--warn);
      box-shadow:0 0 0 4px rgba(245,158,11,.12);
    }

    .dot.ok{
      background:var(--success);
      box-shadow:0 0 0 4px rgba(16,185,129,.12);
    }

    .dot.err{
      background:var(--danger);
      box-shadow:0 0 0 4px rgba(239,68,68,.12);
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      min-height:44px;
      padding:0 14px;
      border-radius:12px;
      font-size:13px;
      font-weight:700;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:#fff;
      cursor:pointer;
    }

    .btn.primary{
      background:linear-gradient(135deg,var(--youtube),#d70000);
      border-color:transparent;
    }

    .btn.danger{
      background:rgba(239,68,68,.12);
      border-color:rgba(239,68,68,.24);
      color:#fecaca;
    }

    .channel-box{
      display:none;
      gap:12px;
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
    }

    .channel-top{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .channel-thumb{
      width:60px;
      height:60px;
      min-width:60px;
      border-radius:16px;
      object-fit:cover;
      background:#0f172a;
      border:1px solid var(--line);
    }

    .channel-meta{
      min-width:0;
      flex:1;
    }

    .channel-name{
      font-size:15px;
      font-weight:800;
      margin-bottom:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .channel-sub{
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .badge{
      width:max-content;
      min-height:30px;
      padding:0 10px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(16,185,129,.12);
      border:1px solid rgba(16,185,129,.22);
      color:#d1fae5;
      font-size:11px;
      font-weight:800;
    }

    .field{
      display:grid;
      gap:8px;
    }

    .label{
      font-size:13px;
      font-weight:700;
      color:#dbeafe;
    }

    .input,
    .textarea,
    .select,
    .file-wrap{
      width:100%;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:var(--text);
      padding:14px;
      outline:none;
    }

    .textarea{
      min-height:120px;
      resize:vertical;
      line-height:1.6;
    }

    .file-wrap{
      padding:10px 12px;
    }

    .file-wrap input[type="file"]{
      width:100%;
      color:var(--muted);
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .progress-wrap{
      display:none;
      gap:8px;
    }

    .progress-track{
      width:100%;
      height:10px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
    }

    .progress-fill{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,var(--youtube),#ff6a00,#7c3aed);
      transition:width .25s ease;
    }

    .progress-text{
      color:var(--muted);
      font-size:12px;
    }

    .result{
      display:none;
      padding:14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      font-size:14px;
      line-height:1.6;
      word-break:break-word;
    }

    .result a{
      color:#93c5fd;
      text-decoration:underline;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:12px;
      width:min(760px, calc(100% - 20px));
      background:rgba(12,20,36,.95);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px 6px calc(8px + var(--safe-bottom));
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      box-shadow:var(--shadow);
      z-index:40;
    }

    .nav-btn{
      min-height:56px;
      border-radius:14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      font-size:11px;
      font-weight:700;
      color:var(--muted);
      text-decoration:none;
    }

    .nav-btn.active{
      background:rgba(37,99,235,.16);
      color:#fff;
    }

    @media (max-width:560px){
      .row{
        grid-template-columns:1fr;
      }
      .btn-row{
        flex-direction:column;
      }
      .btn{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="notice" class="notice"></div>

    <header class="topbar">
      <div class="top-left">
        <button class="icon-btn" onclick="history.back()" title="Back">←</button>
        <div class="title-box">
          <div class="title">YouTube</div>
          <div class="sub">Connect and upload</div>
        </div>
      </div>

      <button class="icon-btn" id="refreshBtn" title="Refresh">↻</button>
    </header>

    <section class="card">
      <div class="card-head">
        <h3>Connection</h3>
      </div>

      <div class="card-body">
        <div class="status-box">
          <span class="dot" id="statusDot"></span>
          <span id="statusText">Checking session...</span>
        </div>

        <div class="btn-row">
          <button class="btn primary" id="connectBtn">Connect</button>
          <button class="btn" id="channelBtn">Check Channel</button>
          <button class="btn danger" id="logoutBtn">Logout</button>
        </div>

        <div class="channel-box" id="channelBox">
          <div class="channel-top">
            <img id="channelThumb" class="channel-thumb" alt="Channel thumbnail" />
            <div class="channel-meta">
              <div class="channel-name" id="channelName">Channel</div>
              <div class="channel-sub" id="channelSub">Details</div>
            </div>
          </div>
          <div class="badge">Connected</div>
        </div>

        <div id="connectResult" class="result"></div>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <h3>Upload</h3>
      </div>

      <div class="card-body">
        <form id="uploadForm" class="card-body" style="padding:0;">
          <div class="field">
            <label class="label" for="videoFile">Video</label>
            <div class="file-wrap">
              <input type="file" id="videoFile" accept="video/*" />
            </div>
          </div>

          <div class="field">
            <label class="label" for="titleInput">Title</label>
            <input class="input" id="titleInput" maxlength="100" placeholder="Title" />
          </div>

          <div class="field">
            <label class="label" for="descriptionInput">Description</label>
            <textarea class="textarea" id="descriptionInput" maxlength="5000" placeholder="Description"></textarea>
          </div>

          <div class="row">
            <div class="field">
              <label class="label" for="privacyInput">Privacy</label>
              <select class="select" id="privacyInput">
                <option value="private">Private</option>
                <option value="unlisted">Unlisted</option>
                <option value="public">Public</option>
              </select>
            </div>

            <div class="field">
              <label class="label" for="categoryIdInput">Category</label>
              <input class="input" id="categoryIdInput" value="22" />
            </div>
          </div>

          <button type="submit" class="btn primary" id="uploadBtn">Upload</button>
        </form>

        <div class="progress-wrap" id="progressWrap">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-text" id="progressText">Preparing...</div>
        </div>

        <div id="uploadResult" class="result"></div>
      </div>
    </section>
  </div>

  <nav class="bottom-nav">
    <a class="nav-btn" href="home.html">
      <span>🏠</span>
      <span>Home</span>
    </a>
    <a class="nav-btn" href="explore.html">
      <span>🔎</span>
      <span>Explore</span>
    </a>
    <a class="nav-btn" href="create-post.html">
      <span>➕</span>
      <span>Create</span>
    </a>
    <a class="nav-btn active" href="youtube-connect.html">
      <span>▶</span>
      <span>YouTube</span>
    </a>
    <a class="nav-btn" href="settings.html">
      <span>⚙️</span>
      <span>Settings</span>
    </a>
  </nav>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";
    const LIVE_REDIRECT_URL = "https://view.ceetice.com/youtube-connect.html";
    const TOKEN_KEY = "view_youtube_provider_token";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        flowType: "pkce"
      }
    });

    const noticeBox = document.getElementById("notice");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const connectBtn = document.getElementById("connectBtn");
    const channelBtn = document.getElementById("channelBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const channelBox = document.getElementById("channelBox");
    const channelThumb = document.getElementById("channelThumb");
    const channelName = document.getElementById("channelName");
    const channelSub = document.getElementById("channelSub");
    const connectResult = document.getElementById("connectResult");
    const uploadForm = document.getElementById("uploadForm");
    const uploadBtn = document.getElementById("uploadBtn");
    const videoFile = document.getElementById("videoFile");
    const titleInput = document.getElementById("titleInput");
    const descriptionInput = document.getElementById("descriptionInput");
    const privacyInput = document.getElementById("privacyInput");
    const categoryIdInput = document.getElementById("categoryIdInput");
    const progressWrap = document.getElementById("progressWrap");
    const progressFill = document.getElementById("progressFill");
    const progressText = document.getElementById("progressText");
    const uploadResult = document.getElementById("uploadResult");

    let providerToken = null;
    let currentSession = null;
    let currentUser = null;
    let autoSavedFromReturn = false;

    function showNotice(message, type = "info") {
      noticeBox.className = `notice show ${type}`;
      noticeBox.textContent = message || "";
      clearTimeout(showNotice._timer);
      showNotice._timer = setTimeout(() => {
        noticeBox.className = "notice";
        noticeBox.textContent = "";
      }, 2600);
    }

    function setStatus(type, message) {
      statusText.textContent = message;
      statusDot.className = "dot";
      if (type === "ok") statusDot.classList.add("ok");
      if (type === "err") statusDot.classList.add("err");
    }

    function setResult(target, message = "", type = "info") {
      if (!message) {
        target.style.display = "none";
        target.innerHTML = "";
        return;
      }

      target.style.display = "block";
      target.innerHTML = message;

      if (type === "error") {
        target.style.background = "rgba(239,68,68,.08)";
        target.style.borderColor = "rgba(239,68,68,.22)";
      } else if (type === "success") {
        target.style.background = "rgba(16,185,129,.08)";
        target.style.borderColor = "rgba(16,185,129,.20)";
      } else {
        target.style.background = "rgba(255,255,255,.04)";
        target.style.borderColor = "rgba(255,255,255,.08)";
      }
    }

    function saveProviderToken(token) {
      if (!token) return;
      providerToken = token;
      try {
        localStorage.setItem(TOKEN_KEY, token);
      } catch {}
    }

    function loadProviderToken() {
      try {
        return localStorage.getItem(TOKEN_KEY) || null;
      } catch {
        return null;
      }
    }

    function clearProviderToken() {
      providerToken = null;
      try {
        localStorage.removeItem(TOKEN_KEY);
      } catch {}
    }

    function setProgress(show, percent = 0, text = "Preparing...") {
      progressWrap.style.display = show ? "grid" : "none";
      progressFill.style.width = `${percent}%`;
      progressText.textContent = text;
      uploadBtn.disabled = show;
      connectBtn.disabled = show;
      channelBtn.disabled = show;
      logoutBtn.disabled = show;
      refreshBtn.disabled = show;
    }

    async function getCurrentUser() {
      const { data, error } = await supabaseClient.auth.getUser();
      if (error) throw error;
      if (!data?.user) throw new Error("Session expired. Sign in again.");
      currentUser = data.user;
      return data.user;
    }

    async function saveConnectedAccount(channel) {
      const user = await getCurrentUser();

      const payload = {
        user_id: user.id,
        platform: "youtube",
        account_name: channel?.snippet?.title || "YouTube",
        account_handle: channel?.id || null,
        status: "connected",
        access_token: providerToken || null,
        refresh_token: null,
        token_expires_at: null,
        external_user_id: channel?.id || null,
        external_page_id: null,
        updated_at: new Date().toISOString()
      };

      const { error } = await supabaseClient
        .from("connected_accounts")
        .upsert(payload, { onConflict: "user_id,platform" });

      if (error) throw error;
    }

    async function connectGoogleYouTube() {
      setResult(connectResult, "");
      try {
        const { error } = await supabaseClient.auth.signInWithOAuth({
          provider: "google",
          options: {
            redirectTo: LIVE_REDIRECT_URL,
            scopes: "openid email profile https://www.googleapis.com/auth/youtube.upload https://www.googleapis.com/auth/youtube.readonly",
            queryParams: {
              access_type: "offline",
              prompt: "consent",
              include_granted_scopes: "true"
            }
          }
        });
        if (error) throw error;
      } catch (error) {
        setStatus("err", "Connect failed.");
        setResult(connectResult, error.message || "Connect failed.", "error");
      }
    }

    async function refreshSessionState() {
      setResult(connectResult, "");
      try {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error) throw error;

        currentSession = data?.session || null;
        currentUser = currentSession?.user || null;

        if (currentSession?.provider_token) saveProviderToken(currentSession.provider_token);
        else providerToken = loadProviderToken();

        if (!currentSession) {
          channelBox.style.display = "none";
          setStatus("err", "No session.");
          return;
        }

        if (!providerToken) {
          channelBox.style.display = "none";
          setStatus("err", "No provider token.");
          setResult(connectResult, "Reconnect Google account.", "error");
          return;
        }

        setStatus("ok", "Ready.");
      } catch (error) {
        setStatus("err", "Session error.");
        setResult(connectResult, error.message || "Session error.", "error");
      }
    }

    async function fetchChannel() {
      if (!providerToken) providerToken = loadProviderToken();
      if (!providerToken) throw new Error("Reconnect Google account.");

      const response = await fetch(
        "https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&mine=true",
        {
          headers: {
            Authorization: `Bearer ${providerToken}`
          }
        }
      );

      const data = await response.json();

      if (!response.ok) throw new Error(data?.error?.message || "Check channel failed.");
      if (!data.items || !data.items.length) throw new Error("No YouTube channel found.");

      return data.items[0];
    }

    function renderChannel(channel) {
      channelThumb.src =
        channel?.snippet?.thumbnails?.high?.url ||
        channel?.snippet?.thumbnails?.default?.url || "";
      channelName.textContent = channel?.snippet?.title || "Channel";
      channelSub.textContent = `Subscribers: ${channel?.statistics?.subscriberCount || 0} • Videos: ${channel?.statistics?.videoCount || 0}`;
      channelBox.style.display = "grid";
    }

    async function autoSaveOnReturn() {
      if (autoSavedFromReturn) return;
      autoSavedFromReturn = true;

      try {
        if (!currentSession?.provider_token && !providerToken) return;

        const channel = await fetchChannel();
        renderChannel(channel);
        await saveConnectedAccount(channel);

        setStatus("ok", "Connected.");
        setResult(connectResult, "YouTube connected.", "success");
        showNotice("YouTube connected.", "success");
      } catch (error) {
        setStatus("err", "Connection incomplete.");
        setResult(connectResult, error.message || "Connection incomplete.", "error");
      }
    }

    async function checkChannel() {
      setResult(connectResult, "");
      try {
        setStatus("ok", "Checking channel...");
        const channel = await fetchChannel();
        renderChannel(channel);
        await saveConnectedAccount(channel);

        setStatus("ok", "Connected.");
        setResult(connectResult, "YouTube connected.", "success");
        showNotice("YouTube connected.", "success");
      } catch (error) {
        channelBox.style.display = "none";
        setStatus("err", "Channel check failed.");
        setResult(connectResult, error.message || "Channel check failed.", "error");
      }
    }

    async function uploadVideo(event) {
      event.preventDefault();
      setResult(uploadResult, "");

      if (!providerToken) providerToken = loadProviderToken();
      if (!providerToken) {
        setStatus("err", "No provider token.");
        setResult(uploadResult, "Reconnect Google account.", "error");
        return;
      }

      const file = videoFile.files?.[0];
      const title = titleInput.value.trim();
      const description = descriptionInput.value.trim();
      const privacy = privacyInput.value;
      const categoryId = categoryIdInput.value.trim() || "22";

      if (!file) return setResult(uploadResult, "Select a video file.", "error");
      if (!title) return setResult(uploadResult, "Enter a title.", "error");

      try {
        setProgress(true, 8, "Preparing...");

        const metadata = {
          snippet: { title, description, categoryId },
          status: { privacyStatus: privacy }
        };

        const boundary = "-------314159265358979323846";
        const delimiter = `\r\n--${boundary}\r\n`;
        const closeDelim = `\r\n--${boundary}--`;
        const fileBuffer = await file.arrayBuffer();

        const metadataPart =
          delimiter +
          "Content-Type: application/json; charset=UTF-8\r\n\r\n" +
          JSON.stringify(metadata);

        const videoHeader =
          delimiter +
          `Content-Type: ${file.type || "video/mp4"}\r\n\r\n`;

        const encoder = new TextEncoder();
        const body = new Blob([
          encoder.encode(metadataPart),
          encoder.encode(videoHeader),
          fileBuffer,
          encoder.encode(closeDelim)
        ]);

        setProgress(true, 42, "Uploading...");

        const response = await fetch(
          "https://www.googleapis.com/upload/youtube/v3/videos?uploadType=multipart&part=snippet,status",
          {
            method: "POST",
            headers: {
              Authorization: `Bearer ${providerToken}`,
              "Content-Type": `multipart/related; boundary=${boundary}`
            },
            body
          }
        );

        setProgress(true, 84, "Finishing...");
        const data = await response.json();

        if (!response.ok) throw new Error(data?.error?.message || "Upload failed.");

        setProgress(true, 100, "Done");

        const videoId = data?.id || "";
        const url = videoId ? `https://www.youtube.com/watch?v=${videoId}` : "";

        setResult(
          uploadResult,
          url ? `Upload complete.<br><a href="${url}" target="_blank" rel="noopener">Open video</a>` : "Upload complete.",
          "success"
        );

        showNotice("Upload complete.", "success");
        setTimeout(() => setProgress(false, 0, "Preparing..."), 700);
      } catch (error) {
        setProgress(false, 0, "Preparing...");
        setResult(uploadResult, error.message || "Upload failed.", "error");
      }
    }

    async function logout() {
      setResult(connectResult, "");
      setResult(uploadResult, "");

      try {
        if (!currentUser) {
          try { await getCurrentUser(); } catch {}
        }

        if (currentUser) {
          await supabaseClient
            .from("connected_accounts")
            .update({
              status: "disconnected",
              access_token: null,
              refresh_token: null,
              updated_at: new Date().toISOString()
            })
            .eq("user_id", currentUser.id)
            .eq("platform", "youtube");
        }

        const { error } = await supabaseClient.auth.signOut();
        if (error) throw error;

        currentUser = null;
        currentSession = null;
        clearProviderToken();
        channelBox.style.display = "none";
        setStatus("err", "Logged out.");
        setResult(connectResult, "Logged out.", "success");
        showNotice("Logged out.", "success");
      } catch (error) {
        setResult(connectResult, error.message || "Logout failed.", "error");
      }
    }

    connectBtn.addEventListener("click", connectGoogleYouTube);
    channelBtn.addEventListener("click", checkChannel);
    logoutBtn.addEventListener("click", logout);
    refreshBtn.addEventListener("click", async () => {
      await refreshSessionState();
      await autoSaveOnReturn();
    });
    uploadForm.addEventListener("submit", uploadVideo);

    supabaseClient.auth.onAuthStateChange(async (_event, session) => {
      if (session?.provider_token) saveProviderToken(session.provider_token);
      await refreshSessionState();
      await autoSaveOnReturn();
    });

    window.addEventListener("load", async () => {
      providerToken = loadProviderToken();
      await refreshSessionState();
      await autoSaveOnReturn();
    });
  </script>
</body>
</html>
