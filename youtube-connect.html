<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect YouTube | View</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial;
  background:#f6f8fc;
  padding:20px;
}
.card{
  background:#fff;
  padding:20px;
  border-radius:16px;
  max-width:500px;
  margin:auto;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
}
h2{margin-bottom:10px;}
button{
  width:100%;
  height:50px;
  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}
.notice{
  margin-bottom:10px;
  padding:10px;
  border-radius:8px;
  display:none;
}
.success{background:#d1fae5;color:#065f46;}
.error{background:#fee2e2;color:#991b1b;}
.info{background:#dbeafe;color:#1e40af;}
</style>
</head>

<body>

<div class="card">

<div id="notice" class="notice"></div>

<h2>Connect YouTube</h2>
<p style="color:#6b7280;font-size:14px;">
Connect your YouTube account to publish videos directly from View.
</p>

<button id="connectBtn">Connect YouTube</button>

</div>

<script>

// ================= CONFIG =================
const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

const GOOGLE_CLIENT_ID = "1453516669-1heoa56uql9svtnm0abhoqu95nn6dpcb.apps.googleusercontent.com";
const EXCHANGE_ENDPOINT = "https://view-psi-lac.vercel.app/api/youtube-exchange-code";
const REDIRECT_URI = window.location.origin + "/youtube-connect.html";

// scopes
const SCOPES = [
  "https://www.googleapis.com/auth/youtube.upload",
  "https://www.googleapis.com/auth/youtube.readonly",
  "https://www.googleapis.com/auth/youtube"
];

// ================= INIT =================
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const notice = document.getElementById("notice");
const btn = document.getElementById("connectBtn");

// ================= UI =================
function show(msg,type="info"){
  notice.className="notice "+type;
  notice.style.display="block";
  notice.innerText=msg;
}

// ================= AUTH =================
async function getUser(){
  const { data } = await supabase.auth.getUser();
  if(!data?.user){
    location.href="login.html";
    return null;
  }
  return data.user;
}

// ================= START CONNECT =================
async function connect(){
  try{

    const user = await getUser();
    if(!user) return;

    show("Redirecting to Google...","info");

    const params = new URLSearchParams({
      client_id: GOOGLE_CLIENT_ID,
      redirect_uri: REDIRECT_URI,
      response_type: "code",
      scope: SCOPES.join(" "),
      access_type: "offline",
      prompt: "consent",
      state: user.id
    });

    location.href =
      "https://accounts.google.com/o/oauth2/v2/auth?"
      + params.toString();

  }catch(e){
    show(e.message,"error");
  }
}

// ================= CALLBACK =================
async function handleCallback(){

  const url = new URL(location.href);

  const code = url.searchParams.get("code");
  const state = url.searchParams.get("state");
  const error = url.searchParams.get("error");

  if(error){
    show("Google denied access","error");
    return;
  }

  if(!code) return;

  try{

    show("Finalizing connection...","info");

    const res = await fetch(EXCHANGE_ENDPOINT,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        code,
        state,
        redirect_uri: REDIRECT_URI
      })
    });

    const data = await res.json();

    if(!res.ok){
      throw new Error(data.error || "Connection failed");
    }

    show("YouTube connected successfully","success");

    // clean url
    history.replaceState({}, "", REDIRECT_URI);

    setTimeout(()=>{
      location.href="connected-accounts.html";
    },1500);

  }catch(e){
    show("Error: "+e.message,"error");
  }
}

// ================= RUN =================
btn.onclick = connect;
handleCallback();

</script>

</body>
</html>
