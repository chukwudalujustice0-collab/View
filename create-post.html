<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Create Post | View</title>
  <meta name="theme-color" content="#08111f" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#08111f;
      --card:#101b31;
      --card2:#16233f;
      --line:rgba(255,255,255,.08);
      --text:#f4f7ff;
      --muted:#9fb1d7;
      --primary:#2563eb;
      --primary2:#7c3aed;
      --success:#10b981;
      --warn:#f59e0b;
      --danger:#ef4444;
      --shadow:0 14px 40px rgba(0,0,0,.28);
      --safe-bottom:env(safe-area-inset-bottom);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      min-height:100%;
      background:var(--bg);
      color:var(--text);
    }

    body{
      padding:16px 14px 110px;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    button,input,textarea,select{
      font:inherit;
      color:inherit;
    }

    button{
      border:none;
      background:none;
      cursor:pointer;
    }

    .wrap{
      width:min(100%, 920px);
      margin:0 auto;
    }

    .notice{
      display:none;
      margin-bottom:14px;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      line-height:1.55;
      box-shadow:var(--shadow);
    }
    .notice.show{display:block}
    .notice.error{background:rgba(127,29,29,.92);color:#fecaca}
    .notice.success{background:rgba(5,46,22,.92);color:#d1fae5}
    .notice.info{background:rgba(30,41,59,.95);color:#dbeafe}

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:16px;
    }

    .top-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
    }

    .icon-btn{
      width:46px;
      height:46px;
      min-width:46px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      font-size:18px;
      color:#fff;
    }

    .title-box{
      min-width:0;
      flex:1;
    }

    .title{
      font-size:22px;
      font-weight:800;
      margin-bottom:3px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .sub{
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .page{
      display:grid;
      gap:16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-head{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .card-head h3{
      font-size:16px;
      font-weight:800;
    }

    .card-body{
      padding:14px;
      display:grid;
      gap:14px;
    }

    .composer-top{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .avatar{
      width:54px;
      height:54px;
      min-width:54px;
      border-radius:18px;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:800;
      color:#fff;
      box-shadow:var(--shadow);
    }

    .composer-meta{
      min-width:0;
      flex:1;
    }

    .composer-name{
      font-size:16px;
      font-weight:800;
      margin-bottom:5px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .top-tools{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .select,
    .input,
    .textarea,
    .file-wrap{
      width:100%;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:var(--text);
      outline:none;
      padding:14px;
    }

    .mini-select{
      min-height:40px;
      padding:0 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:var(--text);
      outline:none;
    }

    .textarea{
      min-height:170px;
      resize:vertical;
      line-height:1.6;
    }

    .field{
      display:grid;
      gap:8px;
    }

    .label{
      font-size:13px;
      font-weight:700;
      color:#dbeafe;
    }

    .post-preview-title{
      display:none;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      font-size:14px;
      color:#dbeafe;
    }

    .post-preview-title.show{
      display:block;
    }

    .media-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .file-wrap{
      padding:10px 12px;
    }

    .file-wrap input[type="file"]{
      width:100%;
      color:var(--muted);
    }

    .hint{
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
    }

    .platform-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }

    .platform-btn{
      position:relative;
      min-height:72px;
      padding:12px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      display:flex;
      align-items:center;
      gap:12px;
      text-align:left;
      transition:.18s ease;
    }

    .platform-btn.active{
      background:rgba(37,99,235,.18);
      border-color:rgba(37,99,235,.4);
    }

    .platform-btn.disabled{
      opacity:.7;
    }

    .platform-icon{
      width:44px;
      height:44px;
      min-width:44px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:18px;
      font-weight:800;
      box-shadow:var(--shadow);
    }

    .facebook{background:linear-gradient(135deg,#1877f2,#0f5fd4)}
    .instagram{background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af,#515bd4)}
    .youtube{background:linear-gradient(135deg,#ff0000,#d70000)}
    .tiktok{background:linear-gradient(135deg,#161616,#25f4ee)}
    .whatsapp{background:linear-gradient(135deg,#25d366,#128c7e)}
    .xhandle{background:linear-gradient(135deg,#0f172a,#334155)}

    .platform-meta{
      min-width:0;
      flex:1;
    }

    .platform-name{
      font-size:14px;
      font-weight:800;
      margin-bottom:4px;
    }

    .platform-sub{
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .platform-check{
      position:absolute;
      right:10px;
      top:10px;
      min-width:24px;
      height:24px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:800;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
    }

    .platform-btn.active .platform-check{
      background:rgba(16,185,129,.18);
      border-color:rgba(16,185,129,.3);
      color:#d1fae5;
    }

    .toolbar{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
    }

    .tool-btn{
      min-height:46px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:#fff;
      font-size:13px;
      font-weight:700;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      min-height:46px;
      padding:0 16px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:#fff;
      font-size:13px;
      font-weight:700;
    }

    .btn.primary{
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      border-color:transparent;
    }

    .btn.success{
      background:linear-gradient(135deg,#059669,#10b981);
      border-color:transparent;
    }

    .btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .status-list{
      display:grid;
      gap:10px;
    }

    .status-item{
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .status-item-name{
      font-size:14px;
      font-weight:800;
    }

    .status-item-sub{
      color:var(--muted);
      font-size:12px;
      margin-top:3px;
    }

    .badge{
      min-height:28px;
      padding:0 10px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:800;
      border:1px solid transparent;
      white-space:nowrap;
    }

    .connected{
      background:rgba(16,185,129,.12);
      border-color:rgba(16,185,129,.22);
      color:#d1fae5;
    }

    .not-connected{
      background:rgba(239,68,68,.12);
      border-color:rgba(239,68,68,.24);
      color:#fecaca;
    }

    .selected{
      background:rgba(37,99,235,.16);
      border-color:rgba(37,99,235,.26);
      color:#dbeafe;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:12px;
      width:min(760px, calc(100% - 20px));
      background:rgba(12,20,36,.95);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px 6px calc(8px + var(--safe-bottom));
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      box-shadow:var(--shadow);
      z-index:40;
    }

    .nav-btn{
      min-height:56px;
      border-radius:14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      font-size:11px;
      font-weight:700;
      color:var(--muted);
      text-decoration:none;
    }

    .nav-btn.active{
      background:rgba(37,99,235,.16);
      color:#fff;
    }

    @media (max-width:720px){
      .platform-grid{grid-template-columns:1fr}
      .toolbar{grid-template-columns:repeat(2,1fr)}
      .media-grid,.row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="notice" class="notice"></div>

    <header class="topbar">
      <div class="top-left">
        <button class="icon-btn" onclick="history.back()" title="Back">←</button>
        <div class="title-box">
          <div class="title">Create Post</div>
          <div class="sub">Publish everywhere</div>
        </div>
      </div>
      <button class="icon-btn" id="reloadBtn" title="Refresh">↻</button>
    </header>

    <main class="page">
      <section class="card">
        <div class="card-head">
          <h3>Composer</h3>
        </div>

        <div class="card-body">
          <div class="composer-top">
            <div class="avatar" id="avatarInitial">V</div>
            <div class="composer-meta">
              <div class="composer-name" id="composerName">Loading...</div>
              <div class="top-tools">
                <select id="privacySelect" class="mini-select">
                  <option value="public">Public</option>
                  <option value="friends">Friends</option>
                  <option value="private">Private</option>
                </select>

                <select id="postTypeSelect" class="mini-select">
                  <option value="text">Text</option>
                  <option value="photo">Photo</option>
                  <option value="video">Video</option>
                </select>
              </div>
            </div>
          </div>

          <div class="field">
            <label class="label" for="postTitle">Post Title</label>
            <input id="postTitle" class="input" placeholder="Post title" maxlength="120" />
          </div>

          <div id="titlePreview" class="post-preview-title"></div>

          <div class="field">
            <label class="label" for="postBody">Caption / Content</label>
            <textarea id="postBody" class="textarea" placeholder="What's new in your world?"></textarea>
          </div>

          <div class="media-grid">
            <div class="field">
              <label class="label" for="postMedia">Photo / Video</label>
              <div class="file-wrap">
                <input id="postMedia" type="file" accept="image/*,video/*" />
              </div>
              <div class="hint" id="mediaNote">No media selected.</div>
            </div>

            <div class="field">
              <label class="label" for="postSticker">Sticker</label>
              <select id="postSticker" class="select">
                <option value="">None</option>
                <option value="🔥 Trending">🔥 Trending</option>
                <option value="✨ New">✨ New</option>
                <option value="🎉 Celebration">🎉 Celebration</option>
                <option value="📢 Announcement">📢 Announcement</option>
                <option value="❤️ Love">❤️ Love</option>
              </select>
            </div>
          </div>

          <div class="toolbar">
            <button class="tool-btn" type="button" id="tagBtn">Tag</button>
            <button class="tool-btn" type="button" id="locationBtn">Location</button>
            <button class="tool-btn" type="button" id="feelingBtn">Feeling</button>
            <button class="tool-btn" type="button" id="moreBtn">More</button>
          </div>

          <div class="row">
            <div class="field">
              <label class="label" for="locationInput">Location</label>
              <input id="locationInput" class="input" placeholder="Optional location" />
            </div>

            <div class="field">
              <label class="label" for="tagsInput">Tags</label>
              <input id="tagsInput" class="input" placeholder="Optional tags" />
            </div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h3>Where to post</h3>
        </div>

        <div class="card-body">
          <div id="platformGrid" class="platform-grid"></div>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h3>Connection status</h3>
        </div>

        <div class="card-body">
          <div id="statusList" class="status-list"></div>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h3>Actions</h3>
        </div>

        <div class="card-body">
          <div class="actions">
            <button id="draftBtn" class="btn" type="button">Save Draft</button>
            <button id="publishBtn" class="btn success" type="button">Publish Post</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <nav class="bottom-nav">
    <a class="nav-btn" href="home.html"><span>🏠</span><span>Home</span></a>
    <a class="nav-btn" href="explore.html"><span>🔎</span><span>Explore</span></a>
    <a class="nav-btn active" href="create-post.html"><span>➕</span><span>Create</span></a>
    <a class="nav-btn" href="connected-accounts.html"><span>🔗</span><span>Accounts</span></a>
    <a class="nav-btn" href="settings.html"><span>⚙️</span><span>Settings</span></a>
  </nav>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        flowType: "pkce"
      }
    });

    const PLATFORMS = [
      { key: "facebook", name: "Facebook", icon: "f", iconClass: "facebook", path: "facebook-connect.html" },
      { key: "instagram", name: "Instagram", icon: "◎", iconClass: "instagram", path: "instagram-connect.html" },
      { key: "youtube", name: "YouTube", icon: "▶", iconClass: "youtube", path: "youtube-connect.html" },
      { key: "tiktok", name: "TikTok", icon: "♪", iconClass: "tiktok", path: "tiktok-connect.html" },
      { key: "whatsapp", name: "WhatsApp", icon: "✆", iconClass: "whatsapp", path: "whatsapp-connect.html" },
      { key: "x", name: "X", icon: "X", iconClass: "xhandle", path: "x-connect.html" }
    ];

    const noticeBox = document.getElementById("notice");
    const reloadBtn = document.getElementById("reloadBtn");
    const composerName = document.getElementById("composerName");
    const avatarInitial = document.getElementById("avatarInitial");
    const postTitle = document.getElementById("postTitle");
    const titlePreview = document.getElementById("titlePreview");
    const postBody = document.getElementById("postBody");
    const postMedia = document.getElementById("postMedia");
    const mediaNote = document.getElementById("mediaNote");
    const postSticker = document.getElementById("postSticker");
    const privacySelect = document.getElementById("privacySelect");
    const postTypeSelect = document.getElementById("postTypeSelect");
    const locationInput = document.getElementById("locationInput");
    const tagsInput = document.getElementById("tagsInput");
    const platformGrid = document.getElementById("platformGrid");
    const statusList = document.getElementById("statusList");
    const draftBtn = document.getElementById("draftBtn");
    const publishBtn = document.getElementById("publishBtn");

    let currentUser = null;
    let connections = {};
    let selectedPlatforms = new Set();
    let cachedMedia = null;

    function showNotice(message, type = "info") {
      noticeBox.className = `notice show ${type}`;
      noticeBox.textContent = message || "";
      clearTimeout(showNotice._timer);
      showNotice._timer = setTimeout(() => {
        noticeBox.className = "notice";
        noticeBox.textContent = "";
      }, 2800);
    }

    function getInitial(name = "V") {
      return String(name).trim().charAt(0).toUpperCase() || "V";
    }

    function updateTitlePreview() {
      const value = postTitle.value.trim();
      if (!value) {
        titlePreview.classList.remove("show");
        titlePreview.textContent = "";
        return;
      }
      titlePreview.classList.add("show");
      titlePreview.textContent = value;
    }

    async function cacheMedia(file) {
      if (!file) {
        cachedMedia = null;
        mediaNote.textContent = "No media selected.";
        return;
      }

      try {
        const buffer = await file.arrayBuffer();
        cachedMedia = {
          name: file.name,
          type: file.type || "",
          buffer
        };
        mediaNote.textContent = `${file.name} ready.`;
      } catch (error) {
        cachedMedia = null;
        mediaNote.textContent = "Could not read media.";
        showNotice("Could not read selected media.", "error");
      }
    }

    function isPlatformConnected(platformKey) {
      const row = connections[platformKey];
      return !!(row && row.status === "connected");
    }

    function getPlatformDisplay(row, fallbackName) {
      return row?.account_name || row?.account_handle || row?.external_user_id || fallbackName;
    }

    function renderPlatforms() {
      platformGrid.innerHTML = PLATFORMS.map(item => {
        const connected = isPlatformConnected(item.key);
        const selected = selectedPlatforms.has(item.key);
        const row = connections[item.key];

        return `
          <button
            type="button"
            class="platform-btn ${selected ? 'active' : ''} ${connected ? '' : 'disabled'}"
            data-platform="${item.key}"
          >
            <div class="platform-icon ${item.iconClass}">${item.icon}</div>
            <div class="platform-meta">
              <div class="platform-name">${item.name}</div>
              <div class="platform-sub">${connected ? getPlatformDisplay(row, item.name) : 'Not connected'}</div>
            </div>
            <div class="platform-check">${selected ? "✓" : connected ? "•" : "!"}</div>
          </button>
        `;
      }).join("");
    }

    function renderStatusList() {
      statusList.innerHTML = PLATFORMS.map(item => {
        const connected = isPlatformConnected(item.key);
        const selected = selectedPlatforms.has(item.key);
        const row = connections[item.key];

        return `
          <div class="status-item">
            <div>
              <div class="status-item-name">${item.name}</div>
              <div class="status-item-sub">${connected ? getPlatformDisplay(row, item.name) : 'Not connected'}</div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
              <span class="badge ${connected ? 'connected' : 'not-connected'}">${connected ? 'Connected' : 'Not Connected'}</span>
              ${selected ? `<span class="badge selected">Selected</span>` : ``}
            </div>
          </div>
        `;
      }).join("");
    }

    async function loadConnections() {
      const { data, error } = await supabaseClient
        .from("connected_accounts")
        .select("id, user_id, platform, account_name, account_handle, status, access_token, refresh_token, token_expires_at, external_user_id, external_page_id")
        .eq("user_id", currentUser.id);

      if (error) throw error;

      connections = {};
      (data || []).forEach(row => {
        if (row.platform) connections[row.platform] = row;
      });

      selectedPlatforms.forEach(platform => {
        if (!isPlatformConnected(platform)) selectedPlatforms.delete(platform);
      });

      renderPlatforms();
      renderStatusList();
    }

    function togglePlatform(platformKey) {
      if (!isPlatformConnected(platformKey)) {
        const item = PLATFORMS.find(p => p.key === platformKey);
        showNotice(`${item?.name || platformKey} is not connected.`, "error");
        return;
      }

      if (selectedPlatforms.has(platformKey)) selectedPlatforms.delete(platformKey);
      else selectedPlatforms.add(platformKey);

      renderPlatforms();
      renderStatusList();
    }

    async function initUser() {
      const { data, error } = await supabaseClient.auth.getUser();
      if (error) throw error;
      if (!data?.user) {
        window.location.href = "login.html?next=create-post.html";
        return false;
      }

      currentUser = data.user;
      const name =
        currentUser.user_metadata?.full_name ||
        currentUser.user_metadata?.name ||
        currentUser.email ||
        "View User";

      composerName.textContent = name;
      avatarInitial.textContent = getInitial(name);
      return true;
    }

    function getPostPayload() {
      return {
        title: postTitle.value.trim(),
        body: postBody.value.trim(),
        privacy: privacySelect.value,
        post_type: postTypeSelect.value,
        sticker: postSticker.value,
        location: locationInput.value.trim(),
        tags: tagsInput.value.trim(),
        selected_platforms: Array.from(selectedPlatforms),
        media_name: cachedMedia?.name || null,
        media_type: cachedMedia?.type || null
      };
    }

    function validatePost() {
      const payload = getPostPayload();

      if (!payload.title && !payload.body && !cachedMedia) {
        throw new Error("Add a title, content, or media.");
      }

      if (selectedPlatforms.size === 0) {
        throw new Error("Select at least one connected platform.");
      }

      for (const platform of selectedPlatforms) {
        if (!isPlatformConnected(platform)) {
          const item = PLATFORMS.find(p => p.key === platform);
          throw new Error(`${item?.name || platform} is not connected.`);
        }
      }

      if ((payload.post_type === "photo" || payload.post_type === "video") && !cachedMedia) {
        throw new Error(`Select ${payload.post_type} media.`);
      }

      return payload;
    }

    async function saveDraft() {
      try {
        const user = currentUser || (await supabaseClient.auth.getUser()).data.user;
        if (!user) throw new Error("Session expired. Sign in again.");

        const payload = getPostPayload();

        const { error } = await supabaseClient
          .from("post_drafts")
          .insert({
            user_id: user.id,
            title: payload.title || null,
            body: payload.body || null,
            privacy: payload.privacy,
            post_type: payload.post_type,
            sticker: payload.sticker || null,
            location: payload.location || null,
            tags: payload.tags || null,
            selected_platforms: payload.selected_platforms,
            media_name: payload.media_name,
            media_type: payload.media_type
          });

        if (error) throw error;
        showNotice("Draft saved.", "success");
      } catch (error) {
        showNotice(error.message || "Could not save draft.", "error");
      }
    }

    async function publishPost() {
      publishBtn.disabled = true;

      try {
        const payload = validatePost();

        for (const platform of selectedPlatforms) {
          if (!isPlatformConnected(platform)) {
            const item = PLATFORMS.find(p => p.key === platform);
            throw new Error(`${item?.name || platform} is not connected.`);
          }
        }

        const { data: userData, error: userError } = await supabaseClient.auth.getUser();
        if (userError) throw userError;
        if (!userData?.user) throw new Error("Session expired. Sign in again.");

        const postRecord = {
          user_id: userData.user.id,
          title: payload.title || null,
          body: payload.body || null,
          privacy: payload.privacy,
          post_type: payload.post_type,
          sticker: payload.sticker || null,
          location: payload.location || null,
          tags: payload.tags || null,
          selected_platforms: payload.selected_platforms,
          media_name: payload.media_name,
          media_type: payload.media_type,
          publish_status: "queued"
        };

        const { error: insertError } = await supabaseClient
          .from("posts")
          .insert(postRecord);

        if (insertError) throw insertError;

        showNotice("Post published.", "success");
      } catch (error) {
        showNotice(error.message || "Could not publish post.", "error");
      } finally {
        publishBtn.disabled = false;
      }
    }

    function bindStaticActions() {
      document.getElementById("tagBtn").addEventListener("click", () => tagsInput.focus());
      document.getElementById("locationBtn").addEventListener("click", () => locationInput.focus());
      document.getElementById("feelingBtn").addEventListener("click", () => postSticker.focus());
      document.getElementById("moreBtn").addEventListener("click", () => showNotice("More options coming soon.", "info"));

      postTitle.addEventListener("input", updateTitlePreview);

      postMedia.addEventListener("change", async (e) => {
        const file = e.target.files?.[0] || null;
        await cacheMedia(file);
      });

      platformGrid.addEventListener("click", (e) => {
        const btn = e.target.closest(".platform-btn");
        if (!btn) return;
        togglePlatform(btn.dataset.platform);
      });

      reloadBtn.addEventListener("click", async () => {
        try {
          await loadConnections();
          showNotice("Connections updated.", "success");
        } catch (error) {
          showNotice(error.message || "Could not refresh.", "error");
        }
      });

      draftBtn.addEventListener("click", saveDraft);
      publishBtn.addEventListener("click", publishPost);
    }

    async function init() {
      try {
        const ready = await initUser();
        if (!ready) return;
        bindStaticActions();
        updateTitlePreview();
        renderPlatforms();
        renderStatusList();
        await loadConnections();
      } catch (error) {
        showNotice(error.message || "Could not load page.", "error");
      }
    }

    init();
  </script>
</body>
</html>
