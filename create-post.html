<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Create Post | View</title>
  <meta name="theme-color" content="#f8fbff" />
  <link rel="manifest" href="/manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#f6f8fc;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --card:#ffffff;
      --primary:#2563eb;
      --primary2:#4f46e5;
      --success:#10b981;
      --danger:#ef4444;
      --warning:#f59e0b;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --shadow-soft:0 18px 40px rgba(37,99,235,.08);
      --safe-bottom:env(safe-area-inset-bottom);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      min-height:100%;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.07), transparent 22%),
        radial-gradient(circle at bottom right, rgba(79,70,229,.08), transparent 22%),
        linear-gradient(180deg,#fbfcff 0%, #f5f7fb 100%);
      color:var(--text);
    }

    body{
      padding:16px 14px 110px;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button,input,textarea,select{
      font:inherit;
      color:inherit;
    }

    button{
      border:none;
      background:none;
      cursor:pointer;
    }

    .wrap{
      width:min(100%, 900px);
      margin:0 auto;
    }

    .notice{
      display:none;
      margin-bottom:14px;
      padding:12px 14px;
      border-radius:16px;
      font-size:14px;
      line-height:1.55;
      box-shadow:var(--shadow);
    }
    .notice.show{display:block}
    .notice.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
    .notice.success{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
    .notice.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .notice.warn{background:#fff7ed;color:#9a3412;border:1px solid #fdba74}

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .top-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
    }

    .icon-btn{
      width:46px;
      height:46px;
      min-width:46px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#fff;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      font-size:18px;
      color:#111827;
      transition:.18s ease;
    }

    .icon-btn:hover{
      transform:translateY(-1px);
      box-shadow:var(--shadow-soft);
    }

    .title-box{
      min-width:0;
      flex:1;
    }

    .title{
      font-size:24px;
      font-weight:800;
      margin-bottom:3px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .sub{
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .section{
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.8);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
      margin-bottom:14px;
    }

    .section-body{
      padding:15px;
      display:grid;
      gap:14px;
    }

    .composer-top{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .avatar{
      width:56px;
      height:56px;
      min-width:56px;
      border-radius:18px;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:23px;
      font-weight:800;
      color:#fff;
      box-shadow:0 8px 24px rgba(37,99,235,.18);
    }

    .composer-meta{
      min-width:0;
      flex:1;
      display:grid;
      gap:6px;
    }

    .composer-name{
      font-size:16px;
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .privacy-select{
      min-height:42px;
      padding:0 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      outline:none;
      width:max-content;
      max-width:100%;
    }

    .field{
      display:grid;
      gap:8px;
    }

    .label{
      font-size:13px;
      font-weight:700;
      color:#374151;
    }

    .textarea,
    .file-wrap{
      width:100%;
      border-radius:16px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      padding:14px;
      outline:none;
    }

    .textarea:focus,
    .privacy-select:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(37,99,235,.08);
    }

    .textarea{
      min-height:180px;
      resize:vertical;
      line-height:1.65;
    }

    .composer-box{
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      padding:12px;
      display:grid;
      gap:12px;
    }

    .file-wrap{
      padding:10px 12px;
    }

    .file-wrap input[type="file"]{
      width:100%;
      color:var(--muted);
    }

    .hint{
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
      word-break:break-word;
    }

    .upload-row{
      display:flex;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .media-preview-wrap{
      display:none;
      position:relative;
      width:180px;
      height:180px;
      border-radius:18px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#f8fafc;
      flex-shrink:0;
      box-shadow:var(--shadow);
    }

    .media-preview-wrap.show{
      display:block;
    }

    .media-preview-image,
    .media-preview-video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:none;
      background:#000;
    }

    .media-preview-image.show,
    .media-preview-video.show{
      display:block;
    }

    .remove-media{
      position:absolute;
      top:8px;
      right:8px;
      width:30px;
      height:30px;
      border-radius:999px;
      background:rgba(17,24,39,.78);
      color:#fff;
      font-size:15px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      z-index:2;
    }

    .stats-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .mini-pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 10px;
      border-radius:999px;
      background:#f8fafc;
      border:1px solid var(--line);
      font-size:12px;
      color:#475569;
      font-weight:700;
    }

    .platforms-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .platform-summary{
      font-size:13px;
      color:var(--muted);
    }

    .platform-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }

    .platform{
      min-height:74px;
      padding:12px;
      border-radius:18px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      gap:12px;
      cursor:pointer;
      transition:.18s ease;
      text-align:left;
    }

    .platform:hover{
      transform:translateY(-1px);
      box-shadow:var(--shadow-soft);
    }

    .platform.active{
      background:#eef4ff;
      border-color:#93c5fd;
    }

    .platform.locked{
      background:#ecfdf5;
      border-color:#a7f3d0;
    }

    .platform.disabled{
      opacity:.7;
    }

    .platform-icon{
      width:42px;
      height:42px;
      min-width:42px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:18px;
      font-weight:800;
      box-shadow:0 8px 18px rgba(15,23,42,.12);
    }

    .facebook{background:linear-gradient(135deg,#1877f2,#0f5fd4)}
    .instagram{background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af,#515bd4)}
    .youtube{background:linear-gradient(135deg,#ff0000,#d70000)}
    .tiktok{background:linear-gradient(135deg,#111827,#25f4ee)}
    .whatsapp{background:linear-gradient(135deg,#25d366,#128c7e)}
    .xhandle{background:linear-gradient(135deg,#111827,#334155)}
    .telegram{background:linear-gradient(135deg,#229ED9,#1277a9)}
    .linkedin{background:linear-gradient(135deg,#0a66c2,#004182)}
    .viewapp{background:linear-gradient(135deg,var(--primary),var(--primary2))}

    .platform-meta{
      min-width:0;
      flex:1;
    }

    .platform-name{
      font-size:14px;
      font-weight:800;
      margin-bottom:4px;
    }

    .platform-sub{
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .platform-check{
      min-width:24px;
      height:24px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:800;
      background:#f8fafc;
      border:1px solid var(--line);
      color:#6b7280;
    }

    .platform.active .platform-check,
    .platform.locked .platform-check{
      background:#dcfce7;
      border-color:#86efac;
      color:#166534;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      flex:1;
      min-height:50px;
      padding:0 16px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      color:#111827;
      font-size:14px;
      font-weight:700;
      transition:.18s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn.primary{
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      border-color:transparent;
      color:#fff;
    }

    .btn.success{
      background:linear-gradient(135deg,#059669,#10b981);
      border-color:transparent;
      color:#fff;
    }

    .btn:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:12px;
      width:min(760px, calc(100% - 20px));
      background:rgba(255,255,255,.92);
      border:1px solid rgba(229,231,235,.9);
      border-radius:20px;
      padding:8px 6px calc(8px + var(--safe-bottom));
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      box-shadow:var(--shadow);
      z-index:40;
      backdrop-filter:blur(10px);
    }

    .nav-btn{
      min-height:56px;
      border-radius:14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      font-size:11px;
      font-weight:700;
      color:var(--muted);
      text-decoration:none;
    }

    .nav-btn.active{
      background:#eef4ff;
      color:#1d4ed8;
    }

    @media (max-width:720px){
      .platform-grid{
        grid-template-columns:repeat(2,1fr);
      }
    }

    @media (max-width:420px){
      .platform-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="notice" class="notice"></div>

    <header class="topbar">
      <div class="top-left">
        <button class="icon-btn" type="button" onclick="history.back()">←</button>
        <div class="title-box">
          <div class="title">Create Post</div>
          <div class="sub">Publish to View and your connected platforms</div>
        </div>
      </div>
      <button class="icon-btn" id="reloadBtn" type="button" title="Refresh connections">↻</button>
    </header>

    <section class="section">
      <div class="section-body">
        <div class="composer-top">
          <div class="avatar" id="avatarInitial">V</div>
          <div class="composer-meta">
            <div class="composer-name" id="composerName">Loading...</div>
            <select id="privacySelect" class="privacy-select">
              <option value="public">Public</option>
              <option value="friends">Friends</option>
              <option value="private">Private</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label class="label" for="postBody">Write something</label>
          <div class="composer-box">
            <textarea id="postBody" class="textarea" maxlength="5000" placeholder="What's new in your world?"></textarea>

            <div class="stats-row">
              <div class="mini-pill"><span>✍</span><span id="charCount">0 / 5000</span></div>
              <div class="mini-pill"><span>📡</span><span id="selectedCount">1 platform selected</span></div>
            </div>

            <div class="upload-row">
              <div id="mediaPreviewWrap" class="media-preview-wrap">
                <button id="removeMediaBtn" class="remove-media" type="button">×</button>
                <img id="mediaPreviewImage" class="media-preview-image" alt="Selected media preview" />
                <video id="mediaPreviewVideo" class="media-preview-video" muted playsinline controls></video>
              </div>
              <div class="hint" id="mediaNote">No media selected.</div>
            </div>
          </div>
        </div>

        <div class="field">
          <label class="label" for="postMedia">Photo / Video</label>
          <div class="file-wrap">
            <input id="postMedia" type="file" accept="image/*,video/*" />
          </div>
          <div class="hint">Recommended: images under 10MB, videos under 50MB. Media uploads first, then your post is queued for publishing.</div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-body">
        <div class="platforms-head">
          <div class="label">Where to post</div>
          <div id="platformSummary" class="platform-summary">View</div>
        </div>
        <div id="platformGrid" class="platform-grid"></div>
      </div>
    </section>

    <section class="section">
      <div class="section-body">
        <div class="actions">
          <button id="draftBtn" class="btn primary" type="button">Save Draft</button>
          <button id="publishBtn" class="btn success" type="button">Publish Post</button>
        </div>
      </div>
    </section>
  </div>

  <nav class="bottom-nav">
    <a class="nav-btn" href="home.html"><span>🏠</span><span>Home</span></a>
    <a class="nav-btn" href="explore.html"><span>🔎</span><span>Explore</span></a>
    <a class="nav-btn active" href="create-post.html"><span>➕</span><span>Create</span></a>
    <a class="nav-btn" href="connected-accounts.html"><span>🔗</span><span>Accounts</span></a>
    <a class="nav-btn" href="settings.html"><span>⚙️</span><span>Settings</span></a>
  </nav>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

    const POST_BUCKET = "post-media";
    const POSTS_TABLE = "posts";
    const DRAFTS_TABLE = "post_drafts";
    const CONNECTIONS_TABLE = "connected_accounts";
    const PUBLISH_JOBS_TABLE = "post_publish_jobs";
    const PROCESS_WORKER_URL = "https://view-psi-lac.vercel.app/api/process-publish-jobs";

    const MAX_IMAGE_SIZE = 10 * 1024 * 1024;
    const MAX_VIDEO_SIZE = 50 * 1024 * 1024;

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        flowType: "pkce"
      }
    });

    const PLATFORMS = [
      { key: "view", name: "View", icon: "V", iconClass: "viewapp", always: true },
      { key: "facebook", name: "Facebook", icon: "f", iconClass: "facebook", connect: "facebook-connect.html" },
      { key: "instagram", name: "Instagram", icon: "◎", iconClass: "instagram", connect: "instagram-connect.html" },
      { key: "youtube", name: "YouTube", icon: "▶", iconClass: "youtube", connect: "youtube-connect.html" },
      { key: "tiktok", name: "TikTok", icon: "♪", iconClass: "tiktok", connect: "tiktok-connect.html" },
      { key: "x", name: "X", icon: "X", iconClass: "xhandle", connect: "x-connect.html" },
      { key: "telegram", name: "Telegram", icon: "✈", iconClass: "telegram", connect: "telegram-connect.html" },
      { key: "whatsapp", name: "WhatsApp", icon: "✆", iconClass: "whatsapp", connect: "whatsapp-connect.html" },
      { key: "linkedin", name: "LinkedIn", icon: "in", iconClass: "linkedin", connect: "linkedin-connect.html" }
    ];

    const PLATFORM_ALIASES = {
      twitter: "x",
      linkedln: "linkedin",
      linked_in: "linkedin"
    };

    const noticeBox = document.getElementById("notice");
    const reloadBtn = document.getElementById("reloadBtn");
    const composerName = document.getElementById("composerName");
    const avatarInitial = document.getElementById("avatarInitial");
    const postBody = document.getElementById("postBody");
    const postMedia = document.getElementById("postMedia");
    const mediaNote = document.getElementById("mediaNote");
    const privacySelect = document.getElementById("privacySelect");
    const platformGrid = document.getElementById("platformGrid");
    const platformSummary = document.getElementById("platformSummary");
    const draftBtn = document.getElementById("draftBtn");
    const publishBtn = document.getElementById("publishBtn");
    const mediaPreviewWrap = document.getElementById("mediaPreviewWrap");
    const mediaPreviewImage = document.getElementById("mediaPreviewImage");
    const mediaPreviewVideo = document.getElementById("mediaPreviewVideo");
    const removeMediaBtn = document.getElementById("removeMediaBtn");
    const charCount = document.getElementById("charCount");
    const selectedCount = document.getElementById("selectedCount");

    let currentUser = null;
    let connections = {};
    let selectedPlatforms = new Set(["view"]);
    let cachedMedia = null;
    let cachedMediaUrl = "";
    let isBusy = false;

    function showNotice(message, type = "info", duration = 3200) {
      noticeBox.className = `notice show ${type}`;
      noticeBox.textContent = message || "";
      clearTimeout(showNotice._timer);

      if (duration > 0) {
        showNotice._timer = setTimeout(() => {
          noticeBox.className = "notice";
          noticeBox.textContent = "";
        }, duration);
      }
    }

    function normalizePlatformKey(platform) {
      const raw = String(platform || "").trim().toLowerCase();
      return PLATFORM_ALIASES[raw] || raw;
    }

    function getInitial(name = "V") {
      return String(name).trim().charAt(0).toUpperCase() || "V";
    }

    function setBusy(state) {
      isBusy = !!state;
      draftBtn.disabled = state;
      publishBtn.disabled = state;
      reloadBtn.disabled = state;
      postMedia.disabled = state;
      postBody.disabled = state;
      privacySelect.disabled = state;
    }

    function updateCounters() {
      charCount.textContent = `${postBody.value.length} / 5000`;
      selectedCount.textContent = `${selectedPlatforms.size} platform${selectedPlatforms.size > 1 ? "s" : ""} selected`;
    }

    function clearMediaPreview() {
      if (cachedMediaUrl) {
        URL.revokeObjectURL(cachedMediaUrl);
        cachedMediaUrl = "";
      }

      mediaPreviewImage.src = "";
      mediaPreviewVideo.pause();
      mediaPreviewVideo.removeAttribute("src");
      mediaPreviewVideo.load();

      mediaPreviewImage.classList.remove("show");
      mediaPreviewVideo.classList.remove("show");
      mediaPreviewWrap.classList.remove("show");
    }

    function showMediaPreview(file) {
      clearMediaPreview();
      cachedMediaUrl = URL.createObjectURL(file);

      if ((file.type || "").startsWith("video/")) {
        mediaPreviewVideo.src = cachedMediaUrl;
        mediaPreviewVideo.classList.add("show");
      } else {
        mediaPreviewImage.src = cachedMediaUrl;
        mediaPreviewImage.classList.add("show");
      }

      mediaPreviewWrap.classList.add("show");
    }

    async function cacheMedia(file) {
      if (!file) {
        cachedMedia = null;
        mediaNote.textContent = "No media selected.";
        clearMediaPreview();
        return;
      }

      const isVideo = (file.type || "").startsWith("video/");
      const limit = isVideo ? MAX_VIDEO_SIZE : MAX_IMAGE_SIZE;

      if (file.size > limit) {
        postMedia.value = "";
        clearMediaPreview();
        cachedMedia = null;
        mediaNote.textContent = "No media selected.";
        throw new Error(isVideo ? "Video is too large. Use a file under 50MB." : "Image is too large. Use a file under 10MB.");
      }

      cachedMedia = file;
      mediaNote.textContent = `${file.name} ready to upload.`;
      showMediaPreview(file);
    }

    function isPlatformConnected(platformKey) {
      if (platformKey === "view") return true;
      const row = connections[platformKey];
      return !!(row && row.status === "connected");
    }

    function getPlatformDisplay(row, fallbackName) {
      return row?.account_name || row?.account_handle || row?.external_user_id || fallbackName;
    }

    function updatePlatformSummary() {
      const names = PLATFORMS
        .filter(p => selectedPlatforms.has(p.key))
        .map(p => p.name);

      platformSummary.textContent = names.join(", ");
      updateCounters();
    }

    function renderPlatforms() {
      platformGrid.innerHTML = PLATFORMS.map(item => {
        const connected = isPlatformConnected(item.key);
        const selected = selectedPlatforms.has(item.key);

        return `
          <button
            type="button"
            class="platform ${selected ? "active" : ""} ${item.always ? "locked" : ""} ${connected ? "" : "disabled"}"
            data-platform="${item.key}"
          >
            <div class="platform-icon ${item.iconClass}">${item.icon}</div>
            <div class="platform-meta">
              <div class="platform-name">${item.name}</div>
              <div class="platform-sub">${
                item.key === "view"
                  ? "Always included"
                  : connected
                    ? getPlatformDisplay(connections[item.key], item.name)
                    : "Tap to connect"
              }</div>
            </div>
            <div class="platform-check">${selected ? "✓" : item.always ? "✓" : connected ? "+" : "!"}</div>
          </button>
        `;
      }).join("");

      updatePlatformSummary();
    }

    async function loadConnections() {
      const { data, error } = await supabaseClient
        .from(CONNECTIONS_TABLE)
        .select("id, user_id, platform, account_name, account_handle, status, external_user_id")
        .eq("user_id", currentUser.id);

      if (error) throw error;

      connections = {};

      (data || []).forEach(row => {
        const key = normalizePlatformKey(row.platform);
        if (key) {
          connections[key] = { ...row, platform: key };
        }
      });

      [...selectedPlatforms].forEach(platform => {
        if (platform !== "view" && !isPlatformConnected(platform)) {
          selectedPlatforms.delete(platform);
        }
      });

      renderPlatforms();
    }

    function togglePlatform(platformKey) {
      const item = PLATFORMS.find(p => p.key === platformKey);
      if (!item || isBusy) return;
      if (platformKey === "view") return;

      if (!isPlatformConnected(platformKey)) {
        if (item.connect) {
          window.location.href = item.connect;
        } else {
          showNotice(`${item.name} connect page not found.`, "warn");
        }
        return;
      }

      if (selectedPlatforms.has(platformKey)) selectedPlatforms.delete(platformKey);
      else selectedPlatforms.add(platformKey);

      renderPlatforms();
    }

    async function initUser() {
      const { data, error } = await supabaseClient.auth.getUser();
      if (error) throw error;

      if (!data?.user) {
        window.location.href = "login.html?next=create-post.html";
        return false;
      }

      currentUser = data.user;

      const name =
        currentUser.user_metadata?.full_name ||
        currentUser.user_metadata?.name ||
        currentUser.email ||
        "View User";

      composerName.textContent = name;
      avatarInitial.textContent = getInitial(name);
      return true;
    }

    function getPostPayload() {
      return {
        content: postBody.value.trim(),
        privacy: privacySelect.value,
        selected_platforms: Array.from(selectedPlatforms)
      };
    }

    function validatePost() {
      const payload = getPostPayload();

      if (!payload.content && !cachedMedia) {
        throw new Error("Write something or select media.");
      }

      if (!payload.selected_platforms.length) {
        throw new Error("Select at least one platform.");
      }

      for (const platform of payload.selected_platforms) {
        if (platform !== "view" && !isPlatformConnected(platform)) {
          const item = PLATFORMS.find(p => p.key === platform);
          throw new Error(`${item?.name || platform} is not connected.`);
        }
      }

      return payload;
    }

    async function uploadMediaIfNeeded() {
      if (!cachedMedia) {
        return {
          media_path: null,
          media_url: null,
          media_type: null,
          media_name: null
        };
      }

      const file = cachedMedia;
      const safeName = (file.name || "media").replace(/[^\w.\-]+/g, "_");
      const filePath = `posts/${currentUser.id}/${Date.now()}-${safeName}`;

      const { data: uploadData, error: uploadError } = await supabaseClient.storage
        .from(POST_BUCKET)
        .upload(filePath, file, {
          upsert: false,
          contentType: file.type || "application/octet-stream"
        });

      if (uploadError) throw uploadError;

      const { data: publicUrlData } = supabaseClient.storage
        .from(POST_BUCKET)
        .getPublicUrl(uploadData.path);

      return {
        media_path: uploadData.path,
        media_url: publicUrlData?.publicUrl || null,
        media_type: file.type || null,
        media_name: file.name || null
      };
    }

    async function triggerWorkerSilently() {
      try {
        await fetch(PROCESS_WORKER_URL, {
          method: "GET",
          mode: "cors",
          cache: "no-store"
        });
      } catch (_) {}
    }

    async function saveDraft() {
      if (isBusy) return;

      try {
        setBusy(true);

        const payload = getPostPayload();

        if (!payload.content && !cachedMedia) {
          throw new Error("Write something or select media before saving draft.");
        }

        let mediaPayload = {
          media_path: null,
          media_url: null,
          media_type: null,
          media_name: null
        };

        if (cachedMedia) {
          showNotice("Uploading media and saving draft...", "info", 0);
          mediaPayload = await uploadMediaIfNeeded();
        } else {
          showNotice("Saving draft...", "info", 0);
        }

        const { error } = await supabaseClient
          .from(DRAFTS_TABLE)
          .insert({
            user_id: currentUser.id,
            content: payload.content || null,
            privacy: payload.privacy,
            selected_platforms: payload.selected_platforms,
            ...mediaPayload
          });

        if (error) throw error;

        showNotice("Draft saved successfully.", "success");
      } catch (error) {
        showNotice(error.message || "Could not save draft.", "error");
      } finally {
        setBusy(false);
      }
    }

    async function publishPost() {
      if (isBusy) return;

      try {
        setBusy(true);

        const payload = validatePost();
        showNotice("Uploading post and queuing publish jobs...", "info", 0);

        const mediaPayload = await uploadMediaIfNeeded();

        const { data: insertedPost, error: postError } = await supabaseClient
          .from(POSTS_TABLE)
          .insert({
            user_id: currentUser.id,
            content: payload.content || null,
            privacy: payload.privacy,
            selected_platforms: payload.selected_platforms,
            publish_status: "queued",
            status: "queued",
            ...mediaPayload
          })
          .select("id")
          .single();

        if (postError) throw postError;

        const jobs = Array.from(selectedPlatforms).map(platform => ({
          post_id: insertedPost.id,
          user_id: currentUser.id,
          platform,
          status: "queued"
        }));

        const { error: jobsError } = await supabaseClient
          .from(PUBLISH_JOBS_TABLE)
          .insert(jobs);

        if (jobsError) throw jobsError;

        await triggerWorkerSilently();

        showNotice("Post queued successfully. Publishing will continue in the background.", "success");

        setTimeout(() => {
          window.location.href = "home.html";
        }, 1400);
      } catch (error) {
        showNotice(error.message || "Could not publish post.", "error");
      } finally {
        setBusy(false);
      }
    }

    function bindStaticActions() {
      postBody.addEventListener("input", updateCounters);

      postMedia.addEventListener("change", async (e) => {
        try {
          const file = e.target.files?.[0] || null;
          await cacheMedia(file);
        } catch (error) {
          showNotice(error.message || "Could not read selected file.", "error");
        }
      });

      removeMediaBtn.addEventListener("click", () => {
        if (isBusy) return;
        cachedMedia = null;
        postMedia.value = "";
        mediaNote.textContent = "No media selected.";
        clearMediaPreview();
      });

      platformGrid.addEventListener("click", (e) => {
        const btn = e.target.closest(".platform");
        if (!btn) return;
        togglePlatform(btn.dataset.platform);
      });

      reloadBtn.addEventListener("click", async () => {
        if (isBusy) return;
        try {
          setBusy(true);
          await loadConnections();
          showNotice("Connections updated.", "success");
        } catch (error) {
          showNotice(error.message || "Could not refresh connections.", "error");
        } finally {
          setBusy(false);
        }
      });

      draftBtn.addEventListener("click", saveDraft);
      publishBtn.addEventListener("click", publishPost);
    }

    async function init() {
      try {
        const ready = await initUser();
        if (!ready) return;

        bindStaticActions();
        renderPlatforms();
        updateCounters();
        await loadConnections();

        supabaseClient.auth.onAuthStateChange((event, session) => {
          if (!session?.user && event === "SIGNED_OUT") {
            window.location.href = "login.html?next=create-post.html";
          }
        });
      } catch (error) {
        showNotice(error.message || "Could not load page.", "error", 5000);
      }
    }

    init();
  </script>
</body>
</html>
