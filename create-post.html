<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Create Post | View</title>
  <meta name="theme-color" content="#08111f" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#08111f;
      --card:#101b31;
      --card-2:#14213d;
      --line:rgba(255,255,255,.08);
      --text:#f4f7ff;
      --muted:#9fb1d7;
      --primary:#2563eb;
      --primary2:#7c3aed;
      --success:#10b981;
      --danger:#ef4444;
      --warn:#f59e0b;
      --shadow:0 14px 40px rgba(0,0,0,.28);
      --safe-bottom:env(safe-area-inset-bottom);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      min-height:100%;
      background:var(--bg);
      color:var(--text);
    }

    body{
      padding:16px 14px 120px;
    }

    button,input,textarea,select{
      font:inherit;
      color:inherit;
    }

    button{
      border:none;
      background:none;
      cursor:pointer;
    }

    .wrap{
      width:min(100%, 820px);
      margin:0 auto;
    }

    .notice{
      display:none;
      margin-bottom:14px;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      line-height:1.55;
      box-shadow:var(--shadow);
    }
    .notice.show{display:block}
    .notice.error{background:rgba(127,29,29,.92);color:#fecaca}
    .notice.success{background:rgba(5,46,22,.92);color:#d1fae5}
    .notice.info{background:rgba(30,41,59,.95);color:#dbeafe}

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:16px;
    }

    .top-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
    }

    .icon-btn{
      width:46px;
      height:46px;
      min-width:46px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      font-size:18px;
      color:#fff;
    }

    .title-box{
      min-width:0;
      flex:1;
    }

    .title{
      font-size:22px;
      font-weight:800;
      margin-bottom:3px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .sub{
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .publish-btn{
      min-height:42px;
      padding:0 14px;
      border-radius:12px;
      font-size:13px;
      font-weight:700;
      color:#fff;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      box-shadow:var(--shadow);
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }

    .card-head{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .card-head h3{
      font-size:16px;
      font-weight:800;
    }

    .card-body{
      padding:14px;
      display:grid;
      gap:12px;
    }

    .profile-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .profile-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
    }

    .avatar{
      width:52px;
      height:52px;
      min-width:52px;
      border-radius:16px;
      overflow:hidden;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-weight:800;
      font-size:18px;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .profile-meta{
      min-width:0;
      flex:1;
    }

    .profile-name{
      font-size:15px;
      font-weight:800;
      margin-bottom:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .profile-sub{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .field{
      display:grid;
      gap:8px;
    }

    .label{
      font-size:13px;
      font-weight:700;
      color:#dbeafe;
    }

    .input,
    .textarea,
    .select,
    .file-wrap{
      width:100%;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:var(--text);
      padding:14px;
      outline:none;
    }

    .textarea{
      min-height:150px;
      resize:vertical;
      line-height:1.65;
    }

    .file-wrap{
      padding:10px 12px;
    }

    .file-wrap input[type="file"]{
      width:100%;
      color:var(--muted);
    }

    .hint{
      color:var(--muted);
      font-size:12px;
      line-height:1.55;
    }

    .platform-scroll{
      display:flex;
      gap:10px;
      overflow:auto;
      padding-bottom:2px;
      scrollbar-width:none;
    }

    .platform-scroll::-webkit-scrollbar{
      display:none;
    }

    .platform-chip{
      min-width:124px;
      padding:12px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      cursor:pointer;
      transition:.18s ease;
    }

    .platform-chip.active{
      background:linear-gradient(135deg, rgba(37,99,235,.25), rgba(124,58,237,.18));
      border-color:rgba(99,102,241,.55);
      box-shadow:0 0 0 1px rgba(99,102,241,.35) inset;
    }

    .platform-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .platform-icon{
      width:36px;
      height:36px;
      min-width:36px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:16px;
      font-weight:800;
    }

    .facebook{background:linear-gradient(135deg,#1877f2,#0f5fd4)}
    .instagram{background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af,#515bd4)}
    .youtube{background:linear-gradient(135deg,#ff0000,#d70000)}
    .tiktok{background:linear-gradient(135deg,#161616,#25f4ee)}
    .whatsapp{background:linear-gradient(135deg,#25d366,#128c7e)}
    .viewapp{background:linear-gradient(135deg,var(--primary),var(--primary2))}
    .xhandle{background:linear-gradient(135deg,#0f172a,#334155)}

    .platform-meta{
      min-width:0;
    }

    .platform-name{
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
    }

    .platform-status{
      font-size:11px;
      color:var(--muted);
      white-space:nowrap;
    }

    .platform-check{
      width:20px;
      height:20px;
      min-width:20px;
      border-radius:50%;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      color:transparent;
    }

    .platform-chip.active .platform-check{
      color:#fff;
      border-color:rgba(255,255,255,.2);
      background:rgba(255,255,255,.14);
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .actions-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .soft-btn{
      min-height:42px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:#fff;
      font-size:13px;
      font-weight:700;
    }

    .preview-box{
      display:none;
      padding:14px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      gap:12px;
    }

    .preview-title{
      font-size:16px;
      font-weight:800;
      display:none;
      line-height:1.5;
    }

    .preview-content{
      white-space:pre-wrap;
      line-height:1.65;
      font-size:14px;
    }

    .preview-sticker{
      font-size:40px;
      line-height:1;
      display:none;
    }

    .preview-media{
      display:none;
      width:100%;
      max-height:360px;
      object-fit:cover;
      border-radius:16px;
      border:1px solid var(--line);
      background:#0f172a;
    }

    .sticker-wrap{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .sticker-chip{
      width:52px;
      height:52px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      cursor:pointer;
    }

    .sticker-chip.active{
      background:linear-gradient(135deg, rgba(37,99,235,.25), rgba(124,58,237,.18));
      border-color:rgba(99,102,241,.55);
    }

    .bottom-bar{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:12px;
      width:min(760px, calc(100% - 20px));
      background:rgba(12,20,36,.95);
      border:1px solid var(--line);
      border-radius:20px;
      padding:10px;
      display:flex;
      gap:10px;
      box-shadow:var(--shadow);
      z-index:40;
    }

    .bottom-bar .soft-btn,
    .bottom-bar .publish-btn{
      flex:1;
      min-height:48px;
    }

    .dropdown-wrap{
      position:relative;
    }

    .menu-btn{
      min-height:42px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:#fff;
      font-size:13px;
      font-weight:700;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .dropdown-menu{
      position:absolute;
      top:50px;
      right:0;
      min-width:190px;
      display:none;
      background:#0f1a30;
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      box-shadow:var(--shadow);
      z-index:50;
    }

    .dropdown-menu.show{
      display:block;
    }

    .dropdown-item{
      width:100%;
      min-height:44px;
      padding:0 14px;
      display:flex;
      align-items:center;
      text-align:left;
      border-bottom:1px solid rgba(255,255,255,.05);
      font-size:13px;
    }

    .dropdown-item:last-child{
      border-bottom:none;
    }

    .hidden{
      display:none !important;
    }

    @media (max-width:640px){
      .row{
        grid-template-columns:1fr;
      }

      .publish-btn{
        min-width:auto;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="notice" class="notice"></div>

    <header class="topbar">
      <div class="top-left">
        <button class="icon-btn" onclick="history.back()" title="Back">←</button>
        <div class="title-box">
          <div class="title">Create Post</div>
          <div class="sub">New post</div>
        </div>
      </div>

      <div class="actions-row">
        <a class="icon-btn" href="drafts.html" title="Drafts">🗂</a>
        <a class="icon-btn" href="publish-history.html" title="History">🕘</a>
      </div>
    </header>

    <section class="card">
      <div class="card-body">
        <div class="profile-row">
          <div class="profile-left">
            <div class="avatar" id="profileAvatar">V</div>
            <div class="profile-meta">
              <div class="profile-name" id="profileName">Loading...</div>
              <div class="profile-sub" id="profileSub">Please wait</div>
            </div>
          </div>

          <div class="dropdown-wrap">
            <button class="menu-btn" id="moreBtn">More ▾</button>
            <div class="dropdown-menu" id="moreMenu">
              <button class="dropdown-item" id="toggleStickerBtn">Stickers</button>
              <button class="dropdown-item" onclick="window.location.href='connected-accounts.html'">Connected Accounts</button>
              <button class="dropdown-item" onclick="window.location.href='scheduled-post.html'">Schedule</button>
            </div>
          </div>
        </div>

        <div class="field">
          <label class="label" for="postTitle">Post Title</label>
          <input class="input" id="postTitle" type="text" maxlength="120" placeholder="Optional title" />
        </div>

        <div class="field">
          <label class="label" for="postContent">Post</label>
          <textarea class="textarea" id="postContent" placeholder="What's on your mind?"></textarea>
        </div>

        <div class="field">
          <label class="label" for="mediaFile">Media</label>
          <div class="file-wrap">
            <input type="file" id="mediaFile" accept="image/*,video/*" />
          </div>
        </div>

        <div class="field hidden" id="stickerSection">
          <label class="label">Stickers</label>
          <div class="sticker-wrap" id="stickerWrap">
            <button class="sticker-chip" data-sticker="🔥">🔥</button>
            <button class="sticker-chip" data-sticker="✨">✨</button>
            <button class="sticker-chip" data-sticker="❤️">❤️</button>
            <button class="sticker-chip" data-sticker="🎉">🎉</button>
            <button class="sticker-chip" data-sticker="😍">😍</button>
            <button class="sticker-chip" data-sticker="🚀">🚀</button>
            <button class="sticker-chip" data-sticker="👏">👏</button>
            <button class="sticker-chip" data-sticker="💯">💯</button>
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <h3>Post To</h3>
      </div>

      <div class="card-body">
        <div class="platform-scroll" id="platformsWrap">
          <button class="platform-chip active" data-platform="view">
            <div class="platform-left">
              <div class="platform-icon viewapp">V</div>
              <div class="platform-meta">
                <div class="platform-name">View</div>
                <div class="platform-status">Ready</div>
              </div>
            </div>
            <div class="platform-check">✓</div>
          </button>

          <button class="platform-chip" data-platform="youtube">
            <div class="platform-left">
              <div class="platform-icon youtube">▶</div>
              <div class="platform-meta">
                <div class="platform-name">YouTube</div>
                <div class="platform-status" id="status-youtube">Checking</div>
              </div>
            </div>
            <div class="platform-check">✓</div>
          </button>

          <button class="platform-chip" data-platform="facebook">
            <div class="platform-left">
              <div class="platform-icon facebook">f</div>
              <div class="platform-meta">
                <div class="platform-name">Facebook</div>
                <div class="platform-status" id="status-facebook">Checking</div>
              </div>
            </div>
            <div class="platform-check">✓</div>
          </button>

          <button class="platform-chip" data-platform="instagram">
            <div class="platform-left">
              <div class="platform-icon instagram">◎</div>
              <div class="platform-meta">
                <div class="platform-name">Instagram</div>
                <div class="platform-status" id="status-instagram">Checking</div>
              </div>
            </div>
            <div class="platform-check">✓</div>
          </button>

          <button class="platform-chip" data-platform="tiktok">
            <div class="platform-left">
              <div class="platform-icon tiktok">♪</div>
              <div class="platform-meta">
                <div class="platform-name">TikTok</div>
                <div class="platform-status" id="status-tiktok">Checking</div>
              </div>
            </div>
            <div class="platform-check">✓</div>
          </button>

          <button class="platform-chip" data-platform="x">
            <div class="platform-left">
              <div class="platform-icon xhandle">X</div>
              <div class="platform-meta">
                <div class="platform-name">X</div>
                <div class="platform-status" id="status-x">Checking</div>
              </div>
            </div>
            <div class="platform-check">✓</div>
          </button>

          <button class="platform-chip" data-platform="whatsapp">
            <div class="platform-left">
              <div class="platform-icon whatsapp">✆</div>
              <div class="platform-meta">
                <div class="platform-name">WhatsApp</div>
                <div class="platform-status" id="status-whatsapp">Checking</div>
              </div>
            </div>
            <div class="platform-check">✓</div>
          </button>
        </div>

        <div class="row">
          <div class="field">
            <label class="label" for="postPrivacy">Privacy</label>
            <select class="select" id="postPrivacy">
              <option value="public">Public</option>
              <option value="friends">Friends</option>
              <option value="private">Only Me</option>
            </select>
          </div>

          <div class="field">
            <label class="label" for="postType">Type</label>
            <select class="select" id="postType">
              <option value="text">Text</option>
              <option value="image">Image</option>
              <option value="video">Video</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <h3>Preview</h3>
      </div>

      <div class="card-body">
        <div class="preview-box" id="previewBox" style="display:grid;">
          <div class="preview-title" id="previewTitle"></div>
          <div class="preview-sticker" id="previewSticker"></div>
          <div class="preview-content" id="previewContent">Your post preview will appear here.</div>
          <img class="preview-media" id="previewImage" alt="Preview image" />
          <video class="preview-media" id="previewVideo" controls playsinline></video>
        </div>
      </div>
    </section>
  </div>

  <div class="bottom-bar">
    <button class="soft-btn" id="saveDraftBtn">Save Draft</button>
    <button class="publish-btn" id="publishBtn">Publish Post</button>
  </div>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";
    const SMART_ACTION_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co/functions/v1/smart-action";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        flowType: "pkce"
      }
    });

    const noticeBox = document.getElementById("notice");
    const profileAvatar = document.getElementById("profileAvatar");
    const profileName = document.getElementById("profileName");
    const profileSub = document.getElementById("profileSub");

    const postTitle = document.getElementById("postTitle");
    const postContent = document.getElementById("postContent");
    const mediaFile = document.getElementById("mediaFile");
    const postPrivacy = document.getElementById("postPrivacy");
    const postType = document.getElementById("postType");

    const previewTitle = document.getElementById("previewTitle");
    const previewSticker = document.getElementById("previewSticker");
    const previewContent = document.getElementById("previewContent");
    const previewImage = document.getElementById("previewImage");
    const previewVideo = document.getElementById("previewVideo");

    const publishBtn = document.getElementById("publishBtn");
    const saveDraftBtn = document.getElementById("saveDraftBtn");
    const toggleStickerBtn = document.getElementById("toggleStickerBtn");
    const stickerSection = document.getElementById("stickerSection");
    const stickerWrap = document.getElementById("stickerWrap");
    const moreBtn = document.getElementById("moreBtn");
    const moreMenu = document.getElementById("moreMenu");

    let currentUser = null;
    let selectedPlatforms = new Set(["view"]);
    let connectedPlatforms = new Set();
    let selectedSticker = "";
    let previewMediaUrl = "";

    function showNotice(message, type = "info") {
      noticeBox.className = `notice show ${type}`;
      noticeBox.textContent = message || "";
      clearTimeout(showNotice._timer);
      showNotice._timer = setTimeout(() => {
        noticeBox.className = "notice";
        noticeBox.textContent = "";
      }, 2600);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function closeMenus() {
      moreMenu.classList.remove("show");
    }

    function toggleMenu() {
      moreMenu.classList.toggle("show");
    }

    function setProfile(user, profile = null) {
      const fullName =
        profile?.full_name ||
        user?.user_metadata?.full_name ||
        user?.user_metadata?.name ||
        user?.email?.split("@")[0] ||
        "User";

      const username =
        profile?.username ||
        user?.user_metadata?.username ||
        user?.email ||
        "View user";

      const avatarUrl =
        profile?.avatar_url ||
        user?.user_metadata?.avatar_url ||
        user?.user_metadata?.picture ||
        "";

      profileName.textContent = fullName;
      profileSub.textContent = username;

      if (avatarUrl) {
        profileAvatar.innerHTML = `<img src="${escapeHtml(avatarUrl)}" alt="${escapeHtml(fullName)}">`;
      } else {
        profileAvatar.textContent = fullName.charAt(0).toUpperCase();
      }
    }

    async function loadProfile(user) {
      try {
        const { data, error } = await supabaseClient
          .from("profiles")
          .select("full_name, username, avatar_url")
          .eq("id", user.id)
          .maybeSingle();

        if (error) throw error;
        setProfile(user, data);
      } catch {
        setProfile(user, null);
      }
    }

    async function loadConnectedAccounts() {
      if (!currentUser) return;

      try {
        const { data, error } = await supabaseClient
          .from("connected_accounts")
          .select("platform, is_connected")
          .eq("user_id", currentUser.id)
          .eq("is_connected", true);

        if (error) throw error;

        connectedPlatforms = new Set((data || []).map(item => item.platform));

        ["youtube","facebook","instagram","tiktok","x","whatsapp"].forEach(platform => {
          const label = document.getElementById(`status-${platform}`);
          if (!label) return;
          label.textContent = connectedPlatforms.has(platform) ? "Connected" : "Not Connected";
        });
      } catch {
        ["youtube","facebook","instagram","tiktok","x","whatsapp"].forEach(platform => {
          const label = document.getElementById(`status-${platform}`);
          if (label) label.textContent = "Unavailable";
        });
      }
    }

    function updatePlatformUI() {
      document.querySelectorAll(".platform-chip").forEach(chip => {
        const platform = chip.dataset.platform;
        chip.classList.toggle("active", selectedPlatforms.has(platform));
      });

      const selectedCount = selectedPlatforms.size;
      publishBtn.textContent = selectedCount > 1 ? `Publish to ${selectedCount} Platforms` : "Publish Post";
    }

    function updatePreview() {
      const title = postTitle.value.trim();
      const content = postContent.value.trim();

      previewTitle.style.display = title ? "block" : "none";
      previewTitle.textContent = title || "";

      previewSticker.style.display = selectedSticker ? "block" : "none";
      previewSticker.textContent = selectedSticker || "";

      previewContent.textContent = content || "Your post preview will appear here.";
    }

    function clearPreviewMedia() {
      previewImage.style.display = "none";
      previewImage.src = "";
      previewVideo.style.display = "none";
      previewVideo.src = "";
      previewMediaUrl = "";
    }

    function updatePreviewMedia(file) {
      clearPreviewMedia();
      if (!file) return;

      previewMediaUrl = URL.createObjectURL(file);

      if (file.type.startsWith("image/")) {
        previewImage.src = previewMediaUrl;
        previewImage.style.display = "block";
      } else if (file.type.startsWith("video/")) {
        previewVideo.src = previewMediaUrl;
        previewVideo.style.display = "block";
      }
    }

    function validateSelectedPlatforms() {
      if (!selectedPlatforms.size) {
        showNotice("Select at least one platform.", "error");
        return false;
      }

      for (const platform of selectedPlatforms) {
        if (platform === "view") continue;
        if (!connectedPlatforms.has(platform)) {
          showNotice(`${platform.charAt(0).toUpperCase() + platform.slice(1)} is not connected.`, "error");
          return false;
        }
      }

      return true;
    }

    function validatePostRequirements() {
      const file = mediaFile.files?.[0] || null;
      const content = postContent.value.trim();
      const type = postType.value;

      if (!content && !file && !selectedSticker) {
        showNotice("Add content, media, or sticker.", "error");
        return false;
      }

      if (selectedPlatforms.has("youtube") && !file) {
        showNotice("Video or media is required for YouTube posting.", "error");
        return false;
      }

      if (selectedPlatforms.has("youtube") && file && !file.type.startsWith("video/")) {
        showNotice("YouTube requires a video file.", "error");
        return false;
      }

      if ((selectedPlatforms.has("instagram") || selectedPlatforms.has("tiktok")) && !file) {
        showNotice("Media is required for the selected platform.", "error");
        return false;
      }

      if (type === "image" && file && !file.type.startsWith("image/")) {
        showNotice("Selected type is image, but media is not an image.", "error");
        return false;
      }

      if (type === "video" && file && !file.type.startsWith("video/")) {
        showNotice("Selected type is video, but media is not a video.", "error");
        return false;
      }

      return true;
    }

    async function uploadMedia(file) {
      if (!file || !currentUser) return null;

      const extension = (file.name.split(".").pop() || "bin").toLowerCase();
      const path = `${currentUser.id}/posts/${Date.now()}-${Math.random().toString(36).slice(2)}.${extension}`;

      const { error } = await supabaseClient.storage
        .from("posts")
        .upload(path, file, { upsert: false });

      if (error) throw error;

      const { data } = supabaseClient.storage.from("posts").getPublicUrl(path);
      return data?.publicUrl || null;
    }

    async function saveDraft() {
      try {
        const title = postTitle.value.trim();
        const content = postContent.value.trim();
        const privacy = postPrivacy.value;
        const type = postType.value;
        const platforms = Array.from(selectedPlatforms);

        if (!title && !content && !selectedSticker && !mediaFile.files?.[0]) {
          showNotice("Nothing to save.", "error");
          return;
        }

        const draft = {
          id: `draft_${Date.now()}`,
          title,
          content,
          privacy,
          type,
          sticker: selectedSticker,
          platforms,
          created_at: new Date().toISOString()
        };

        const existing = JSON.parse(localStorage.getItem("view_post_drafts") || "[]");
        existing.unshift(draft);
        localStorage.setItem("view_post_drafts", JSON.stringify(existing.slice(0, 50)));

        showNotice("Draft saved.", "success");
      } catch {
        showNotice("Could not save draft.", "error");
      }
    }

    async function publishPost() {
      if (!currentUser) {
        window.location.href = "login.html?next=create-post.html";
        return;
      }

      if (!validateSelectedPlatforms()) return;
      if (!validatePostRequirements()) return;

      publishBtn.disabled = true;
      saveDraftBtn.disabled = true;

      try {
        const title = postTitle.value.trim();
        const content = postContent.value.trim();
        const privacy = postPrivacy.value;
        const type = postType.value;
        const file = mediaFile.files?.[0] || null;
        const platforms = Array.from(selectedPlatforms);

        let mediaUrl = null;
        if (file) {
          mediaUrl = await uploadMedia(file);
        }

        const postPayload = {
          user_id: currentUser.id,
          title: title || null,
          content: content || null,
          media_url: mediaUrl,
          type,
          privacy,
          sticker: selectedSticker || null
        };

        const { data: postRow, error: postError } = await supabaseClient
          .from("posts")
          .insert(postPayload)
          .select()
          .single();

        if (postError) throw postError;

        await fetch(SMART_ACTION_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({
            action: "publish_post",
            post_id: postRow.id,
            platforms,
            title: title || null,
            content: content || null,
            media_url: mediaUrl,
            type,
            privacy,
            sticker: selectedSticker || null
          })
        });

        showNotice("Post published.", "success");

        setTimeout(() => {
          window.location.href = "publish-history.html";
        }, 900);
      } catch (error) {
        showNotice(error.message || "Publish failed.", "error");
      } finally {
        publishBtn.disabled = false;
        saveDraftBtn.disabled = false;
      }
    }

    function handlePlatformSelect(chip) {
      const platform = chip.dataset.platform;

      if (platform === "view") {
        selectedPlatforms.add("view");
        updatePlatformUI();
        return;
      }

      if (selectedPlatforms.has(platform)) {
        selectedPlatforms.delete(platform);
      } else {
        selectedPlatforms.add(platform);
      }

      if (!selectedPlatforms.size) {
        selectedPlatforms.add("view");
      }

      updatePlatformUI();
    }

    async function init() {
      try {
        const { data, error } = await supabaseClient.auth.getUser();
        if (error) throw error;

        if (!data.user) {
          window.location.href = "login.html?next=create-post.html";
          return;
        }

        currentUser = data.user;
        await loadProfile(currentUser);
        await loadConnectedAccounts();
        updatePlatformUI();
        updatePreview();
      } catch (error) {
        showNotice(error.message || "Could not load page.", "error");
      }
    }

    document.querySelectorAll(".platform-chip").forEach(chip => {
      chip.addEventListener("click", () => handlePlatformSelect(chip));
    });

    stickerWrap.querySelectorAll(".sticker-chip").forEach(chip => {
      chip.addEventListener("click", () => {
        const sticker = chip.dataset.sticker;
        if (selectedSticker === sticker) {
          selectedSticker = "";
          chip.classList.remove("active");
        } else {
          stickerWrap.querySelectorAll(".sticker-chip").forEach(item => item.classList.remove("active"));
          selectedSticker = sticker;
          chip.classList.add("active");
        }
        updatePreview();
      });
    });

    postTitle.addEventListener("input", updatePreview);
    postContent.addEventListener("input", updatePreview);

    mediaFile.addEventListener("change", () => {
      updatePreviewMedia(mediaFile.files?.[0] || null);
    });

    toggleStickerBtn.addEventListener("click", () => {
      stickerSection.classList.toggle("hidden");
      closeMenus();
    });

    moreBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      toggleMenu();
    });

    document.addEventListener("click", (e) => {
      if (!e.target.closest(".dropdown-wrap")) closeMenus();
    });

    saveDraftBtn.addEventListener("click", saveDraft);
    publishBtn.addEventListener("click", publishPost);

    init();
  </script>
</body>
</html>
