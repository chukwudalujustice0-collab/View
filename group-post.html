<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Group Post | View</title>
  <meta name="theme-color" content="#0a1028" />
  <link rel="manifest" href="/manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg1:#081a8f;
      --bg2:#07115f;
      --bg3:#05093c;
      --blue:#2f7bff;
      --blue2:#5ba0ff;
      --red:#ff2f57;
      --red2:#ff5a74;
      --text:#fff;
      --muted:#d4dcff;
      --line:rgba(255,255,255,.10);
      --shadow:0 18px 42px rgba(0,0,0,.28);
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Inter,Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      min-height:100%;
      background:
        radial-gradient(circle at 12% 10%, rgba(47,123,255,.22), transparent 18%),
        radial-gradient(circle at 88% 10%, rgba(255,47,87,.18), transparent 14%),
        linear-gradient(180deg,var(--bg1),var(--bg2),var(--bg3));
      color:var(--text);
    }

    body{overflow-x:hidden}
    button,textarea{font:inherit}
    a{text-decoration:none;color:inherit}

    .page{
      width:min(100%,900px);
      margin:0 auto;
      padding:calc(12px + var(--safe-top)) 14px calc(20px + var(--safe-bottom));
    }

    .notice{
      display:none;
      margin-bottom:12px;
      padding:12px 14px;
      border-radius:14px;
      font-size:12px;
      line-height:1.5;
      border:1px solid transparent;
      background:rgba(255,255,255,.05);
    }
    .notice.show{display:block}
    .notice.error{background:rgba(239,68,68,.10);border-color:rgba(239,68,68,.22);color:#ffd7df}
    .notice.success{background:rgba(25,195,125,.10);border-color:rgba(25,195,125,.22);color:#dcffe7}
    .notice.info{background:rgba(47,123,255,.10);border-color:rgba(47,123,255,.22);color:#dcebff}

    .topbar{
      display:grid;
      grid-template-columns:48px 1fr auto;
      gap:10px;
      align-items:center;
      margin-bottom:14px;
    }

    .icon-btn{
      width:46px;
      height:46px;
      min-width:46px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .title{
      font-size:18px;
      font-weight:900;
    }

    .subtitle{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }

    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:14px;
    }

    .post-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .post-title{
      font-size:16px;
      font-weight:900;
    }

    .post-time{
      font-size:12px;
      color:var(--muted);
    }

    .post-body{
      font-size:14px;
      line-height:1.7;
      color:#eef4ff;
      white-space:pre-wrap;
      margin-bottom:14px;
    }

    .chip-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .chip{
      min-height:28px;
      padding:0 12px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:800;
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
    }

    .comment-composer{
      display:grid;
      gap:10px;
      margin-top:12px;
    }

    .comment-composer textarea{
      min-height:110px;
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      color:#fff;
      outline:none;
      resize:vertical;
    }

    .comment-composer textarea::placeholder{
      color:#a6b9de;
    }

    .btn-row{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
    }

    .btn{
      min-height:44px;
      border:none;
      border-radius:14px;
      color:#fff;
      font-weight:900;
      cursor:pointer;
    }

    .btn.blue{background:linear-gradient(135deg,var(--blue),var(--blue2))}
    .btn.red{background:linear-gradient(135deg,var(--red),var(--red2))}
    .btn.soft{background:rgba(255,255,255,.08);border:1px solid var(--line)}

    .comment-list{
      display:grid;
      gap:12px;
    }

    .comment-card{
      border:1px solid var(--line);
      border-radius:20px;
      background:rgba(255,255,255,.05);
      padding:12px;
    }

    .comment-name{
      font-size:13px;
      font-weight:900;
      margin-bottom:4px;
    }

    .comment-text{
      font-size:13px;
      line-height:1.6;
      color:#eef4ff;
    }

    .comment-time{
      font-size:11px;
      color:var(--muted);
      margin-top:6px;
    }

    .empty{
      padding:26px 14px;
      text-align:center;
      font-size:13px;
      color:var(--muted);
      border:1px dashed rgba(255,255,255,.18);
      border-radius:18px;
      background:rgba(255,255,255,.03);
    }

    @media (max-width:640px){
      .btn-row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="notice" class="notice"></div>

    <header class="topbar">
      <button class="icon-btn" onclick="history.back()">←</button>
      <div>
        <div class="title">Group Post</div>
        <div class="subtitle">Post details, comments, and linked group actions</div>
      </div>
      <button class="icon-btn" id="refreshBtn">↻</button>
    </header>

    <section class="card">
      <div class="post-head">
        <div class="post-title" id="postTitle">Loading post...</div>
        <div class="post-time" id="postTime">...</div>
      </div>
      <div class="post-body" id="postBody">Please wait...</div>
      <div class="chip-row">
        <span class="chip" id="groupChip">Group</span>
        <span class="chip" id="commentCountChip">0 comments</span>
      </div>
    </section>

    <section class="card">
      <div class="post-title" style="margin-bottom:10px">Add Comment</div>
      <div class="comment-composer">
        <textarea id="commentInput" placeholder="Write your comment..."></textarea>
        <div class="btn-row">
          <button id="postCommentBtn" class="btn blue" type="button">Post Comment</button>
          <button class="btn soft" type="button" id="openGroupBtn">Open Group</button>
          <button class="btn red" type="button" id="openChatBtn">Open Chat</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="post-title" style="margin-bottom:12px">Comments</div>
      <div class="comment-list" id="commentList"></div>
    </section>
  </div>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInR5cCI6IkpXVCJ9";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth:{
        persistSession:true,
        autoRefreshToken:true,
        detectSessionInUrl:true,
        flowType:"pkce"
      }
    });

    const qs = new URLSearchParams(location.search);
    const postId = qs.get("id");
    const groupId = qs.get("group_id");

    const notice = document.getElementById("notice");
    const postTitle = document.getElementById("postTitle");
    const postTime = document.getElementById("postTime");
    const postBody = document.getElementById("postBody");
    const groupChip = document.getElementById("groupChip");
    const commentCountChip = document.getElementById("commentCountChip");
    const commentInput = document.getElementById("commentInput");
    const commentList = document.getElementById("commentList");

    let currentUser = null;
    let profileMap = {};

    function showNotice(message, type="info"){
      notice.className = `notice show ${type}`;
      notice.textContent = message || "";
      clearTimeout(showNotice._timer);
      showNotice._timer = setTimeout(() => {
        notice.className = "notice";
        notice.textContent = "";
      }, 2500);
    }

    function timeAgo(value){
      if(!value) return "Just now";
      const date = new Date(value);
      const diff = Math.floor((Date.now() - date.getTime()) / 1000);
      if(diff < 60) return "Just now";
      if(diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if(diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    async function requireUser(){
      const { data, error } = await supabase.auth.getUser();
      if(error) throw error;
      if(!data?.user){
        location.href = `login.html?next=group-post.html?id=${postId || ""}&group_id=${groupId || ""}`;
        return null;
      }
      currentUser = data.user;
      return currentUser;
    }

    async function loadProfiles(){
      const { data, error } = await supabase
        .from("profiles")
        .select("id,full_name,username");

      if(error) throw error;
      profileMap = Object.fromEntries((data || []).map(p => [p.id, p]));
    }

    async function loadPostPage(){
      const [{ data: post, error: postError }, { data: comments, error: commentsError }] = await Promise.all([
        supabase.from("group_posts").select("*").eq("id", postId).single(),
        supabase.from("group_post_comments").select("*").eq("post_id", postId).order("created_at", { ascending:false })
      ]);

      if(postError) throw postError;
      if(commentsError && commentsError.code !== "42P01") throw commentsError;

      postTitle.textContent = "Group Post";
      postTime.textContent = timeAgo(post.created_at);
      postBody.textContent = post.content || "No content.";
      groupChip.textContent = `Group ${post.group_id || ""}`;

      const list = comments || [];
      commentCountChip.textContent = `${list.length} comments`;

      if(!list.length){
        commentList.innerHTML = `<div class="empty">No comments yet.</div>`;
      } else {
        commentList.innerHTML = list.map(c => {
          const p = profileMap[c.user_id] || {};
          const name = p.full_name || p.username || "Member";
          return `
            <div class="comment-card">
              <div class="comment-name">${name}</div>
              <div class="comment-text">${(c.comment || "").replace(/</g, "&lt;")}</div>
              <div class="comment-time">${timeAgo(c.created_at)}</div>
            </div>
          `;
        }).join("");
      }
    }

    async function postComment(){
      try{
        const text = commentInput.value.trim();
        if(!text){
          showNotice("Write a comment first.", "error");
          return;
        }

        const { error } = await supabase.from("group_post_comments").insert({
          post_id: postId,
          user_id: currentUser.id,
          comment: text
        });

        if(error) throw error;

        commentInput.value = "";
        await loadPostPage();
        showNotice("Comment posted.", "success");
      }catch(error){
        showNotice(error.message || "Could not post comment.", "error");
      }
    }

    document.getElementById("postCommentBtn").addEventListener("click", postComment);

    document.getElementById("openGroupBtn").addEventListener("click", () => {
      window.location.href = `group-view.html?id=${groupId}`;
    });

    document.getElementById("openChatBtn").addEventListener("click", () => {
      window.location.href = `group-chat.html?id=${groupId}`;
    });

    document.getElementById("refreshBtn").addEventListener("click", async () => {
      try{
        await loadPostPage();
        showNotice("Post refreshed.", "success");
      }catch(error){
        showNotice(error.message || "Could not refresh post.", "error");
      }
    });

    (async function init(){
      try{
        await requireUser();
        await loadProfiles();
        await loadPostPage();
      }catch(error){
        showNotice(error.message || "Could not load group post.", "error");
      }
    })();
  </script>
</body>
</html>
