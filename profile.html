<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | View</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;font-family:Arial,sans-serif}
    body{margin:0;background:#f4f7fc;color:#111827;padding:20px}
    .wrap{max-width:520px;margin:0 auto}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .topbar h1{margin:0;font-size:34px;font-weight:800}
    .icon-btn{
      width:46px;height:46px;border:none;border-radius:14px;background:#fff;
      box-shadow:0 8px 24px rgba(15,23,42,.08);font-size:22px;cursor:pointer
    }
    .card{
      background:#fff;border-radius:24px;padding:24px 20px;
      box-shadow:0 10px 30px rgba(15,23,42,.08);margin-bottom:18px
    }
    .hero{
      background:linear-gradient(135deg,#1d4ed8,#2563eb);
      color:#fff;border-radius:26px;padding:24px 20px 20px;
      box-shadow:0 14px 36px rgba(29,78,216,.22);margin-bottom:18px
    }
    .avatar{
      width:86px;height:86px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.28);
      font-size:34px;font-weight:800;margin-bottom:14px
    }
    .name{font-size:28px;font-weight:800;margin:0 0 4px}
    .handle{margin:0 0 10px;color:#dbeafe;font-size:15px}
    .sub{margin:0;color:#eff6ff;font-size:14px;line-height:1.6}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
    .stat{
      background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);
      border-radius:18px;padding:14px 10px;text-align:center
    }
    .stat b{display:block;font-size:24px;margin-bottom:4px}
    .section-title{font-size:20px;font-weight:800;margin:0 0 14px}
    .menu{display:grid;gap:12px}
    .menu a,.menu button{
      text-decoration:none;background:#fff;border:1px solid #e5e7eb;color:#111827;
      min-height:58px;border-radius:18px;padding:0 16px;display:flex;align-items:center;
      justify-content:space-between;font-size:17px;font-weight:700;cursor:pointer;
      box-shadow:0 6px 18px rgba(15,23,42,.04)
    }
    .menu .danger{color:#b91c1c;background:#fef2f2;border-color:#fecaca}
    .left{display:flex;align-items:center;gap:12px}
    .left .emoji{font-size:20px}
    .notice{
      display:none;padding:12px 14px;border-radius:14px;margin-bottom:16px;
      font-size:14px;line-height:1.5
    }
    .notice.show{display:block}
    .notice.error{background:#fee2e2;color:#b91c1c}
    .notice.success{background:#dcfce7;color:#15803d}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>Profile</h1>
      <button class="icon-btn" onclick="window.location.href='home.html'">⌂</button>
    </div>

    <div id="notice" class="notice"></div>

    <div class="hero">
      <div class="avatar" id="avatarText">V</div>
      <h2 class="name" id="profileName">Loading...</h2>
      <p class="handle" id="profileHandle">@loading</p>
      <p class="sub" id="profileMeta">Loading profile information...</p>

      <div class="stats">
        <div class="stat">
          <b id="statPosts">0</b>
          <span>Posts</span>
        </div>
        <div class="stat">
          <b id="statPlatforms">0</b>
          <span>Platforms</span>
        </div>
        <div class="stat">
          <b id="statDrafts">0</b>
          <span>Drafts</span>
        </div>
      </div>
    </div>

    <div class="card">
      <h3 class="section-title">Quick Actions</h3>
      <div class="menu">
        <a href="settings.html">
          <span class="left"><span class="emoji">⚙️</span><span>Settings</span></span>
          <span>›</span>
        </a>
        <a href="connected-accounts.html">
          <span class="left"><span class="emoji">🔗</span><span>Connected Accounts</span></span>
          <span>›</span>
        </a>
        <a href="create-post.html">
          <span class="left"><span class="emoji">➕</span><span>Create Post</span></span>
          <span>›</span>
        </a>
        <button class="danger" onclick="logoutUser()">
          <span class="left"><span class="emoji">⇦</span><span>Logout</span></span>
          <span>›</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInR5cCI6IkpXVCJ9".replace("eyJpc3MiOiJIUzI1NiIsInR5cCI6IkpXVCJ9","eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI");
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showNotice(message, type = "error") {
      const box = document.getElementById("notice");
      box.className = `notice show ${type}`;
      box.textContent = message;
    }

    async function requireSession() {
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) throw error;
      if (!data.session) {
        window.location.href = "login.html";
        return null;
      }
      return data.session;
    }

    async function loadProfile() {
      const session = await requireSession();
      if (!session) return;

      const user = session.user;
      const fullName =
        user.user_metadata?.full_name ||
        user.user_metadata?.name ||
        user.email?.split("@")[0] ||
        "View User";

      const username =
        user.user_metadata?.username ||
        fullName.toLowerCase().replace(/\s+/g, "") ||
        "viewuser";

      document.getElementById("profileName").textContent = fullName;
      document.getElementById("profileHandle").textContent = "@" + username;
      document.getElementById("profileMeta").textContent = user.email || "No email found";
      document.getElementById("avatarText").textContent = fullName.charAt(0).toUpperCase();

      const [{ count: postsCount }, { count: connectedCount }, { count: draftsCount }] = await Promise.all([
        supabaseClient.from("posts").select("*", { count: "exact", head: true }).eq("user_id", user.id),
        supabaseClient.from("connected_accounts").select("*", { count: "exact", head: true }).eq("user_id", user.id).eq("status", "connected"),
        supabaseClient.from("posts").select("*", { count: "exact", head: true }).eq("user_id", user.id).eq("status", "draft")
      ]);

      document.getElementById("statPosts").textContent = postsCount || 0;
      document.getElementById("statPlatforms").textContent = connectedCount || 0;
      document.getElementById("statDrafts").textContent = draftsCount || 0;
    }

    async function logoutUser() {
      const { error } = await supabaseClient.auth.signOut();
      if (error) {
        showNotice(error.message || "Could not log out.");
        return;
      }
      window.location.href = "login.html";
    }

    loadProfile().catch(err => showNotice(err.message || "Could not load profile."));
  </script>
</body>
</html>
