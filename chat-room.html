<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chat Room | View</title>
  <meta name="theme-color" content="#0b0a23" />
  <link rel="manifest" href="/manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#0b0820;
      --bg2:#14092e;
      --bg3:#1e0d44;
      --panel:rgba(255,255,255,.06);
      --panel2:rgba(255,255,255,.04);
      --stroke:rgba(255,255,255,.08);
      --text:#f8f6ff;
      --muted:#cbbdf1;
      --soft:#9f8cd5;
      --blue:#4e88ff;
      --blue2:#79a7ff;
      --red:#ff3c63;
      --red2:#ff5d7f;
      --green:#34d17b;
      --danger:#ef4444;
      --shadow:0 18px 40px rgba(0,0,0,.28);
      --shadow-soft:0 10px 24px rgba(0,0,0,.18);
      --safe-top:env(safe-area-inset-top, 0px);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
      --composer-h:82px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      font-family:Inter, Arial, sans-serif;
    }

    html,body{
      height:100%;
      background:
        radial-gradient(circle at 18% 16%, rgba(255,80,120,.14), transparent 14%),
        radial-gradient(circle at 76% 18%, rgba(78,136,255,.14), transparent 14%),
        radial-gradient(circle at 52% 65%, rgba(120,90,255,.10), transparent 20%),
        linear-gradient(180deg, #160a32 0%, #12082a 42%, #0b0820 100%);
      color:var(--text);
    }

    body{
      overflow:hidden;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      border-radius:50%;
      filter:blur(30px);
      opacity:.7;
      pointer-events:none;
      z-index:0;
    }

    body::before{
      width:180px;
      height:180px;
      left:-70px;
      top:22%;
      background:radial-gradient(circle, rgba(78,136,255,.22), transparent 70%);
    }

    body::after{
      width:200px;
      height:200px;
      right:-80px;
      bottom:10%;
      background:radial-gradient(circle, rgba(255,60,99,.18), transparent 70%);
    }

    a,button,input,textarea{
      outline:none;
    }

    .app{
      position:relative;
      z-index:1;
      width:min(100%, 820px);
      height:100%;
      margin:0 auto;
      display:flex;
      flex-direction:column;
    }

    .notice{
      display:none;
      margin:8px 12px 0;
      padding:11px 13px;
      border-radius:14px;
      font-size:12px;
      line-height:1.45;
      border:1px solid transparent;
      box-shadow:var(--shadow-soft);
      backdrop-filter:blur(10px);
      z-index:70;
    }
    .notice.show{display:block}
    .notice.error{background:rgba(239,68,68,.13);border-color:rgba(239,68,68,.24);color:#ffd8df}
    .notice.success{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.24);color:#dcffe8}
    .notice.info{background:rgba(78,136,255,.14);border-color:rgba(78,136,255,.24);color:#ddebff}

    .top-shell{
      position:sticky;
      top:0;
      z-index:40;
      padding:calc(10px + var(--safe-top)) 12px 10px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.06), transparent 26%),
        linear-gradient(180deg, rgba(18,8,42,.97), rgba(11,8,32,.95));
      border-bottom:1px solid rgba(255,255,255,.07);
      backdrop-filter:blur(18px);
      box-shadow:0 8px 20px rgba(0,0,0,.2);
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .top-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      flex:1;
    }

    .icon-btn{
      width:42px;
      height:42px;
      min-width:42px;
      border:none;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      font-size:17px;
      cursor:pointer;
      text-decoration:none;
      box-shadow:var(--shadow-soft);
      backdrop-filter:blur(10px);
    }

    .chat-user{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      flex:1;
      cursor:pointer;
    }

    .avatar-wrap{
      position:relative;
      width:46px;
      height:46px;
      min-width:46px;
    }

    .avatar{
      width:46px;
      height:46px;
      border-radius:50%;
      overflow:hidden;
      background:linear-gradient(135deg, var(--blue), var(--red2));
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:18px;
      font-weight:1000;
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 10px 20px rgba(0,0,0,.18);
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .online-dot{
      position:absolute;
      right:1px;
      bottom:1px;
      width:12px;
      height:12px;
      border-radius:50%;
      background:var(--green);
      border:2px solid #170b33;
      box-shadow:0 0 12px rgba(52,209,123,.4);
      display:none;
    }

    .online-dot.show{
      display:block;
    }

    .user-meta{
      min-width:0;
      flex:1;
    }

    .user-name{
      font-size:16px;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-bottom:2px;
    }

    .user-status{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .top-right{
      display:flex;
      align-items:center;
      gap:8px;
      position:relative;
    }

    .dropdown{
      position:absolute;
      top:50px;
      right:0;
      width:210px;
      border-radius:18px;
      background:rgba(20,10,45,.98);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 20px 44px rgba(0,0,0,.34);
      backdrop-filter:blur(16px);
      padding:8px;
      display:none;
      z-index:80;
    }

    .dropdown.show{display:block}

    .dropdown-btn,
    .dropdown-link{
      width:100%;
      min-height:40px;
      border:none;
      border-radius:12px;
      background:transparent;
      color:#fff;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:0 12px;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      text-align:left;
    }

    .dropdown-btn:hover,
    .dropdown-link:hover{
      background:rgba(255,255,255,.06);
    }

    .reply-bar{
      display:none;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:8px 12px 0;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(78,136,255,.12);
      border:1px solid rgba(78,136,255,.22);
      box-shadow:var(--shadow-soft);
    }

    .reply-bar.show{display:flex}

    .reply-info{
      min-width:0;
      flex:1;
    }

    .reply-title{
      font-size:10px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#d9e8ff;
      margin-bottom:4px;
    }

    .reply-preview{
      font-size:12px;
      color:#fff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .reply-close{
      width:30px;
      height:30px;
      min-width:30px;
      border:none;
      border-radius:50%;
      background:rgba(255,255,255,.08);
      color:#fff;
      cursor:pointer;
      font-size:14px;
    }

    .messages-shell{
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
    }

    .messages-scroll{
      flex:1;
      min-height:0;
      overflow:auto;
      padding:10px 12px 8px;
      scroll-behavior:smooth;
    }

    .messages-scroll::-webkit-scrollbar{
      width:7px;
    }

    .messages-scroll::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,.12);
      border-radius:999px;
    }

    .day-divider{
      display:flex;
      justify-content:center;
      margin:8px 0 12px;
    }

    .day-divider span{
      min-height:26px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.08);
      color:#d8ccf5;
      font-size:10px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(10px);
    }

    .message-row{
      display:flex;
      margin-bottom:8px;
    }

    .message-row.me{
      justify-content:flex-end;
    }

    .message-row.them{
      justify-content:flex-start;
    }

    .bubble-wrap{
      max-width:min(80%, 540px);
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .bubble{
      position:relative;
      border-radius:20px;
      padding:10px 12px 8px;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow-soft);
      backdrop-filter:blur(12px);
      overflow:hidden;
      word-break:break-word;
    }

    .bubble.me{
      background:linear-gradient(135deg, rgba(78,136,255,.95), rgba(110,86,255,.95));
      border-bottom-right-radius:8px;
    }

    .bubble.them{
      background:rgba(255,255,255,.07);
      border-bottom-left-radius:8px;
    }

    .reply-chip{
      margin-bottom:8px;
      padding:8px 10px;
      border-radius:12px;
      background:rgba(0,0,0,.16);
      border-left:3px solid rgba(255,255,255,.35);
      font-size:11px;
      color:#f2efff;
      line-height:1.45;
    }

    .reply-chip strong{
      display:block;
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.06em;
      margin-bottom:3px;
      opacity:.9;
    }

    .bubble-text{
      font-size:14px;
      line-height:1.5;
      white-space:pre-wrap;
      color:#fff;
    }

    .bubble-media{
      width:100%;
      border-radius:16px;
      overflow:hidden;
      margin-bottom:8px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
    }

    .bubble-media img,
    .bubble-media video{
      width:100%;
      display:block;
      max-height:320px;
      object-fit:cover;
      background:#12082a;
    }

    .file-card{
      margin-bottom:8px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px;
      border-radius:14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      text-decoration:none;
      color:#fff;
    }

    .file-icon{
      width:40px;
      height:40px;
      min-width:40px;
      border-radius:12px;
      background:rgba(255,255,255,.12);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
    }

    .file-meta{
      min-width:0;
      flex:1;
    }

    .file-name{
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-bottom:3px;
    }

    .file-sub{
      font-size:11px;
      color:#d5c9f3;
    }

    .voice-box{
      margin-bottom:8px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
    }

    .voice-play{
      width:34px;
      height:34px;
      min-width:34px;
      border:none;
      border-radius:50%;
      background:rgba(255,255,255,.14);
      color:#fff;
      cursor:pointer;
      font-size:12px;
      font-weight:1000;
    }

    .wave{
      flex:1;
      display:flex;
      align-items:center;
      gap:3px;
      height:20px;
    }

    .wave span{
      display:block;
      width:4px;
      border-radius:999px;
      background:rgba(255,255,255,.8);
      animation:wave 1.1s infinite ease-in-out;
    }

    .wave span:nth-child(1){height:9px;animation-delay:0s}
    .wave span:nth-child(2){height:15px;animation-delay:.1s}
    .wave span:nth-child(3){height:7px;animation-delay:.2s}
    .wave span:nth-child(4){height:17px;animation-delay:.3s}
    .wave span:nth-child(5){height:11px;animation-delay:.4s}
    .wave span:nth-child(6){height:16px;animation-delay:.5s}
    .wave span:nth-child(7){height:8px;animation-delay:.6s}
    .wave span:nth-child(8){height:13px;animation-delay:.7s}

    @keyframes wave{
      0%,100%{transform:scaleY(.72);opacity:.72}
      50%{transform:scaleY(1.08);opacity:1}
    }

    .voice-time{
      font-size:11px;
      font-weight:900;
      color:#fff;
    }

    .bubble-meta{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:6px;
      margin-top:7px;
      font-size:10px;
      color:rgba(255,255,255,.9);
    }

    .tick{
      font-weight:1000;
      letter-spacing:-1px;
      min-width:14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .tick.read{
      color:#bde9ff;
    }

    .msg-actions{
      display:none;
      gap:6px;
      margin-top:7px;
      flex-wrap:wrap;
    }

    .message-row:hover .msg-actions{
      display:flex;
    }

    .action-chip{
      min-height:24px;
      padding:0 8px;
      border:none;
      border-radius:999px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.10);
      color:#fff;
      font-size:10px;
      font-weight:900;
      cursor:pointer;
    }

    .typing-bar{
      display:none;
      align-items:center;
      gap:8px;
      margin:0 12px 8px;
      padding:9px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow-soft);
      font-size:12px;
      color:#dcecff;
      font-weight:800;
    }

    .typing-bar.show{display:flex}

    .typing-dots{
      display:flex;
      gap:4px;
    }

    .typing-dots span{
      width:6px;
      height:6px;
      border-radius:50%;
      background:#fff;
      animation:typing 1s infinite;
    }

    .typing-dots span:nth-child(2){animation-delay:.15s}
    .typing-dots span:nth-child(3){animation-delay:.3s}

    @keyframes typing{
      0%,80%,100%{opacity:.35;transform:translateY(0)}
      40%{opacity:1;transform:translateY(-3px)}
    }

    .composer-shell{
      position:sticky;
      bottom:0;
      z-index:30;
      padding:8px 12px calc(10px + var(--safe-bottom));
      background:linear-gradient(180deg, rgba(11,8,32,.10), rgba(11,8,32,.94) 30%, rgba(11,8,32,.98));
      backdrop-filter:blur(18px);
      border-top:1px solid rgba(255,255,255,.07);
    }

    .upload-pill{
      display:none;
      align-items:center;
      gap:8px;
      margin-bottom:8px;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(78,136,255,.12);
      border:1px solid rgba(78,136,255,.20);
      font-size:12px;
      font-weight:800;
      color:#deecff;
      box-shadow:var(--shadow-soft);
    }

    .upload-pill.show{display:flex}

    .spinner{
      width:16px;
      height:16px;
      border:2px solid rgba(255,255,255,.24);
      border-top-color:#fff;
      border-radius:50%;
      animation:spin .8s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .composer{
      display:flex;
      align-items:flex-end;
      gap:8px;
    }

    .composer-action{
      width:42px;
      height:42px;
      min-width:42px;
      border:none;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.09);
      color:#fff;
      font-size:17px;
      cursor:pointer;
      box-shadow:var(--shadow-soft);
    }

    .input-wrap{
      flex:1;
      min-width:0;
      display:flex;
      align-items:flex-end;
      gap:8px;
      border-radius:20px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      padding:8px 10px;
      box-shadow:var(--shadow-soft);
    }

    .message-input{
      flex:1;
      min-width:0;
      min-height:22px;
      max-height:120px;
      resize:none;
      border:none;
      background:transparent;
      color:#fff;
      font-size:14px;
      line-height:1.45;
      padding:4px 0;
    }

    .message-input::placeholder{
      color:#a99ad8;
    }

    .send-btn{
      width:46px;
      height:46px;
      min-width:46px;
      border:none;
      border-radius:50%;
      background:linear-gradient(135deg, var(--red), #d8234c);
      color:#fff;
      font-size:18px;
      font-weight:1000;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(255,60,99,.26);
    }

    .send-btn:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    .sheet-backdrop{
      position:fixed;
      inset:0;
      background:rgba(4,6,18,.58);
      backdrop-filter:blur(8px);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index:120;
      padding:12px;
    }

    .sheet-backdrop.show{
      display:flex;
    }

    .sheet{
      width:min(100%, 720px);
      background:linear-gradient(180deg, #1a0c39, #12082a);
      border-radius:24px 24px 18px 18px;
      border:1px solid rgba(255,255,255,.10);
      padding:12px 14px 16px;
      box-shadow:0 24px 70px rgba(0,0,0,.42);
    }

    .sheet-handle{
      width:52px;
      height:5px;
      border-radius:999px;
      background:rgba(255,255,255,.18);
      margin:4px auto 14px;
    }

    .sheet-head{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
    }

    .sheet-avatar{
      width:54px;
      height:54px;
      min-width:54px;
      border-radius:50%;
      overflow:hidden;
      background:linear-gradient(135deg, var(--blue), var(--red2));
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:20px;
      font-weight:1000;
    }

    .sheet-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .sheet-title{
      font-size:17px;
      font-weight:900;
      margin-bottom:4px;
    }

    .sheet-sub{
      font-size:12px;
      color:var(--muted);
    }

    .sheet-actions{
      display:grid;
      gap:8px;
    }

    .sheet-action{
      width:100%;
      min-height:46px;
      border:none;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:0 14px;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      text-decoration:none;
    }

    .sheet-action.danger{
      background:rgba(239,68,68,.10);
      border-color:rgba(239,68,68,.18);
      color:#ffd9df;
    }

    .emoji-grid{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:8px;
    }

    .emoji-btn{
      min-height:42px;
      border:none;
      border-radius:12px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      font-size:20px;
      cursor:pointer;
    }

    .empty{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:var(--muted);
      padding:28px 18px;
    }

    .empty-card{
      max-width:340px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      padding:24px 18px;
      box-shadow:var(--shadow);
    }

    .empty-card h3{
      font-size:20px;
      color:#fff;
      margin-bottom:8px;
    }

    .empty-card p{
      font-size:13px;
      line-height:1.7;
    }

    .hidden{
      display:none !important;
    }

    @media (max-width:560px){
      .bubble-wrap{max-width:86%}
      .emoji-grid{grid-template-columns:repeat(5,1fr)}
      .bubble-media img,.bubble-media video{max-height:250px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="notice" class="notice"></div>

    <header class="top-shell">
      <div class="topbar">

    function getLocalMap(key) {
      try { return JSON.parse(localStorage.getItem(key) || "{}"); }
      catch { return {}; }

    function setLocalMap(key, value) {

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function autoGrowTextarea() {

    function getInitial(name) {

    function setAvatar(el, avatar, name) {
      if (avatar) {
        el.innerHTML = `<img src="${escapeHtml(avatar)}" alt="${escapeHtml(name)}">`;

      }
    }

    function formatTime(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "";
      return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function formatDay(value) {
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "";
      const now = new Date();
      const yesterday = new Date();
      yesterday.setDate(now.getDate() - 1);

      if (d.toDateString() === now.toDateString()) return "Today";
      if (d.toDateString() === yesterday.toDateString()) return "Yesterday";

      return d.toLocaleDateString([], { day: "2-digit", month: "short", year: "numeric" });
    }

    function formatLastSeen(value) {
      if (!value) return "Offline";
      try {
        const d = new Date(value);
        const now = new Date();
        const diff = now - d;
        const mins = Math.floor(diff / 60000);
        const hours = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);

        if (mins < 1) return "Active now";
        if (mins < 60) return `Last seen ${mins}m ago`;
        if (hours < 24) return `Last seen ${hours}h ago`;
        if (days < 7) return `Last seen ${days}d ago`;
        return `Last seen ${d.toLocaleDateString()}`;
      } catch {
        return "Offline";
      }
    }

    function isOtherUserOnline() {

    function getTickHTML(message) {
      const mine = (message.sender_id || "") === currentUserId;
      if (!mine) return "";

      if (String(message.id || "").startsWith("temp-")) {
        return `<span class="tick">✓</span>`;
      }

      const wasRead = !!message.read_at || !!message.seen_at || message.is_read === true || message.is_seen === true;
      if (wasRead) return `<span class="tick read">✓✓</span>`;
      return `<span class="tick">✓✓</span>`;
    }

    function getReplyHtml(message) {
      if (!message.reply_meta || typeof message.reply_meta !== "object") return "";
      return `
        <div class="reply-chip">
          <strong>${escapeHtml(message.reply_meta.title || "Reply")}</strong>
          <span>${escapeHtml(message.reply_meta.text || "")}</span>
        </div>

    }

    function filterByClearState(messages) {
      const clearStamp = getClearTimestamp(conversationId);
      if (!clearStamp) return messages;
      const clearTime = new Date(clearStamp).getTime();
      return messages.filter(msg => {
        const t = new Date(msg.created_at || 0).getTime();
        return t > clearTime;
      });
    }

    function renderMessages() {
      const visibleMessages = filterByClearState(currentMessages);

      if (!visibleMessages.length) {
        messagesScroll.innerHTML = `
          <div class="empty">
            <div class="empty-card">
              <h3>No messages yet</h3>
              <p>Start this private conversation by sending your first message.</p>
            </div>
          </div>
        `;
        return;
      }

      let lastDay = "";
      let html = "";

      visibleMessages.forEach(message => {
        const isMe = (message.sender_id || "") === currentUserId;
        const day = formatDay(message.created_at);
        const type = message.message_type || "text";
        const text = message.message || message.content || "";
        const mediaUrl = message.media_url || "";
        const fileName = message.file_name || "Attachment";

        if (day !== lastDay) {
          html += `<div class="day-divider"><span>${escapeHtml(day)}</span></div>`;
          lastDay = day;
        }

        let mediaHtml = "";

        if (type === "image" && mediaUrl) {
          mediaHtml = `
            <div class="bubble-media">
              <img src="${escapeHtml(mediaUrl)}" alt="Image">
            </div>
          `;
        } else if (type === "video" && mediaUrl) {
          mediaHtml = `
            <div class="bubble-media">
              <video src="${escapeHtml(mediaUrl)}" controls playsinline preload="metadata"></video>
            </div>
          `;
        } else if ((type === "document" || type === "file") && mediaUrl) {
          mediaHtml = `
            <a class="file-card" href="${escapeHtml(mediaUrl)}" target="_blank" rel="noopener">
              <div class="file-icon">📄</div>
              <div class="file-meta">
                <div class="file-name">${escapeHtml(fileName)}</div>
                <div class="file-sub">Tap to open</div>
              </div>
            </a>
          `;
        } else if (type === "voice" && mediaUrl) {
          mediaHtml = `
            <div class="voice-box">
              <button class="voice-play" type="button" onclick="playVoice('${escapeHtml(mediaUrl)}')">▶</button>
              <div class="wave">
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
              </div>
              <div class="voice-time">${escapeHtml(message.voice_duration || "0:10")}</div>
            </div>
          `;
        }

        html += `
          <div class="message-row ${isMe ? "me" : "them"}">
            <div class="bubble-wrap">
              <div class="bubble ${isMe ? "me" : "them"}">
                ${getReplyHtml(message)}
                ${mediaHtml}
                ${text ? `<div class="bubble-text">${escapeHtml(text)}</div>` : ""}
                <div class="bubble-meta">
                  <span>${escapeHtml(formatTime(message.created_at))}</span>
                  ${getTickHTML(message)}
                </div>
                <div class="msg-actions">
                  <button class="action-chip" type="button" onclick="replyToMessage('${escapeHtml(message.id)}')">Reply</button>
                  <button class="action-chip" type="button" onclick="copyMessage('${escapeHtml(message.id)}')">Copy</button>
                  ${isMe ? `<button class="action-chip" type="button" onclick="deleteMessage('${escapeHtml(message.id)}')">Delete</button>` : ""}
                </div>
              </div>
            </div>
          </div>
        `;
      });

      messagesScroll.innerHTML = html;
      requestAnimationFrame(() => {
        messagesScroll.scrollTop = messagesScroll.scrollHeight;
      });
    }

    function appendOrReplaceMessage(message) {
      const index = currentMessages.findIndex(m => m.id === message.id);
      if (index >= 0) {
        currentMessages[index] = { ...currentMessages[index], ...message };
      } else {
        currentMessages.push(message);

      currentMessages.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
      knownMessageIds = new Set(currentMessages.map(m => m.id).filter(Boolean));
      renderMessages();
    }

    async function getSessionWithRetry(maxWaitMs = 3200) {
      const start = Date.now();
      while (Date.now() - start < maxWaitMs) {
        const { data, error } = await client.auth.getSession();
        if (error) throw error;
        if (data.session?.user) return data.session;
        await new Promise(resolve => setTimeout(resolve, 200));
      }
      return null;
    }

    async function requireSession() {
      const session = await getSessionWithRetry();
      if (!session?.user) {
        window.location.href = "login.html?next=" + encodeURIComponent(window.location.pathname + window.location.search);
        return null;
      }
      return session;
    }

        .eq("user_id", currentUserId)

    async function loadConversation() {
      const { data, error } = await client
        .from("conversations")
        .select(`
          id,
          created_by,
          title,
          avatar_url,
          is_group,
          created_at,
          updated_at,
          last_message,

          last_message_at,
          is_blocked,
          blocked_by
        `)
        .eq("id", conversationId)
        .maybeSingle();

      if (error) throw error;
      if (!data) throw new Error("Conversation not found.");
      if (data.is_group === true) throw new Error("This file is for private chat only.");
      currentConversation = data;
    }

    async function loadMembersAndOtherUser() {
      const { data: members, error: membersError } = await client
        .from("conversation_members")
        .select("*")
        .eq("conversation_id", conversationId);

      if (membersError) throw membersError;

      const otherMember = (members || []).find(row => row.user_id !== currentUserId);
      if (!otherMember && !otherUserId) {
        throw new Error("Other user not found in this private conversation.");
      }

      if (otherMember?.user_id) {
        otherUserId = otherMember.user_id;
      }

      if (!otherUserId) {
        throw new Error("Missing private chat user.");
      }

      const { data: profile, error: profileError } = await client
        .from("profiles")
        .select("id, full_name, username, avatar_url, is_online, last_seen_at, last_seen")
        .eq("id", otherUserId)
        .maybeSingle();

      if (profileError && profileError.code !== "PGRST116") throw profileError;

      otherUserName =
        profile?.full_name ||
        profile?.username ||
        nameParam ||
        "User";

      otherUserAvatar =
        profile?.avatar_url ||
        avatarParam ||
        "";

      currentConversation.other_last_seen_text = profile?.is_online
        ? "Online"
        : formatLastSeen(profile?.last_seen_at || profile?.last_seen);
    }

    async function loadMessages() {
      const { data, error } = await client
        .from("messages")
        .select(`
          id,
          conversation_id,
          sender_id,
          receiver_id,
          message_type,
          message,
          content,
          media_url,
          thumbnail_url,
          file_name,
          file_size,
          mime_type,
          duration_seconds,
          voice_duration,
          is_read,
          read_at,
          delivered_at,
          is_seen,
          seen_at,
          created_at,
          updated_at,
          reply_to_message_id
        `)
        .eq("conversation_id", conversationId)
        .order("created_at", { ascending: true });

      if (error) throw error;

      const rows = data || [];
      const replyMap = new Map(rows.map(r => [r.id, r]));

      currentMessages = rows.map(row => {
        let reply_meta = null;
        if (row.reply_to_message_id && replyMap.has(row.reply_to_message_id)) {
          const src = replyMap.get(row.reply_to_message_id);
          reply_meta = {
            title: src.sender_id === currentUserId ? "You" : otherUserName,
            text: src.message || src.file_name || src.message_type || "message"
          };
        }
        return { ...row, reply_meta };
      });

      knownMessageIds = new Set(currentMessages.map(m => m.id).filter(Boolean));
      renderMessages();
    }

    async function markMessagesRead() {
      const unreadIds = currentMessages
        .filter(msg =>
          msg.sender_id !== currentUserId &&
          !msg.read_at &&
          msg.is_read !== true &&
          msg.id &&
          !String(msg.id).startsWith("temp-")
        )
        .map(msg => msg.id);

      if (!unreadIds.length) return;

      const payload = {
        is_read: true,
        read_at: new Date().toISOString(),
        is_seen: true,
        seen_at: new Date().toISOString()
      };

      try {
        const { error } = await client
          .from("messages")
          .update(payload)
          .in("id", unreadIds);

        if (!error) {
          currentMessages = currentMessages.map(msg => {
            if (unreadIds.includes(msg.id)) {
              return { ...msg, ...payload };
            }
            return msg;
          });
          renderMessages();
        }
      } catch {}
    }

    async function uploadAttachment(file) {
      if (!file) return null;

      const ext = (file.name.split(".").pop() || "bin").toLowerCase();
      const safeName = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
      const path = `${conversationId}/${safeName}`;

      uploadPillText.textContent = `Uploading ${file.name}...`;
      uploadPill.classList.add("show");

      const { error: uploadError } = await client
        .storage
        .from(MEDIA_BUCKET)
        .upload(path, file, {
          cacheControl: "3600",
          upsert: false
        });

      if (uploadError) {
        uploadPill.classList.remove("show");
        throw uploadError;
      }

      const { data } = client
        .storage
        .from(MEDIA_BUCKET)
        .getPublicUrl(path);

      uploadPill.classList.remove("show");

      const type = file.type.startsWith("image/")
        ? "image"
        : file.type.startsWith("video/")
          ? "video"
          : "document";

      return {
        url: data?.publicUrl || "",
        type,
        name: file.name,
        size: file.size || null,
        mime: file.type || null
      };
    }

    async function sendMessage() {
      const cleanText = String(messageInput.value || "").trim();

      if (!cleanText && !pendingAttachmentFile) return;

      if (isBlockedUser(otherUserId)) {
        showNotice("This user is blocked locally. Unblock first.", "info");
        return;
      }

      sendBtn.disabled = true;

      let attachment = null;
      const tempId = `temp-${Date.now()}`;

      try {
        if (pendingAttachmentFile) {
          attachment = await uploadAttachment(pendingAttachmentFile);
        }

        const tempMessage = {
          id: tempId,
          conversation_id: conversationId,
          sender_id: currentUserId,
          receiver_id: otherUserId || null,
          message_type: attachment ? attachment.type : "text",
          message: cleanText || null,
          media_url: attachment ? attachment.url : null,
          file_name: attachment ? attachment.name : null,
          file_size: attachment ? attachment.size : null,
          mime_type: attachment ? attachment.mime : null,
          reply_meta: replyContext || null,
          created_at: new Date().toISOString()
        };

        appendOrReplaceMessage(tempMessage);

        const payload = {
          conversation_id: conversationId,
          sender_id: currentUserId,
          receiver_id: otherUserId || null,
          message_type: attachment ? attachment.type : "text",
          message: cleanText || null,
          media_url: attachment ? attachment.url : null,
          file_name: attachment ? attachment.name : null,
          file_size: attachment ? attachment.size : null,
          mime_type: attachment ? attachment.mime : null,
          reply_to_message_id: replyContext?.id || null
        };

        const { data, error } = await client
          .from("messages")
          .insert(payload)
          .select()
          .single();

        if (error) throw error;

        currentMessages = currentMessages.filter(msg => msg.id !== tempId);

        appendOrReplaceMessage({
          ...data,
          reply_meta: replyContext ? { ...replyContext } : null
        });

        messageInput.value = "";
        pendingAttachmentFile = null;
        fileInputImage.value = "";
        fileInputVideo.value = "";
        fileInputDoc.value = "";
        clearReply();
        autoGrowTextarea();

        await sendTypingState(false);
      } catch (error) {
        currentMessages = currentMessages.filter(msg => msg.id !== tempId);
        renderMessages();
        showNotice(error.message || "Could not send message.");
      } finally {
        sendBtn.disabled = false;
      }
    }

    async function sendTypingState(active) {
      if (!typingChannel) return;
      try {
        await typingChannel.send({
          type: "broadcast",
          event: "typing",
          payload: {
            conversation_id: conversationId,
            user_id: currentUserId,
            active
          }
        });
      } catch {}
    }

    function handleTypingInput() {
      autoGrowTextarea();

      sendTypingState(true);
      if (localTypingTimer) clearTimeout(localTypingTimer);
      localTypingTimer = setTimeout(() => {
        sendTypingState(false);
      }, 1200);
    }

    async function setupRealtime() {
      if (!messagesChannel) {
        messagesChannel = client
          .channel(`private-messages-${conversationId}`)
          .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "messages",
            filter: `conversation_id=eq.${conversationId}`
          }, async (payload) => {
            if (payload.eventType === "INSERT") {
              const msg = payload.new;
              if (!msg || knownMessageIds.has(msg.id)) return;

              let reply_meta = null;
              if (msg.reply_to_message_id) {
                const src = currentMessages.find(m => m.id === msg.reply_to_message_id);
                if (src) {
                  reply_meta = {
                    title: src.sender_id === currentUserId ? "You" : otherUserName,
                    text: src.message || src.file_name || src.message_type || "message"
                  };
                }
              }

              appendOrReplaceMessage({ ...msg, reply_meta });

              if (msg.sender_id !== currentUserId) {
                await markMessagesRead();
              }
            } else if (payload.eventType === "UPDATE") {
              const msg = payload.new;
              if (!msg) return;
              appendOrReplaceMessage(msg);
            } else if (payload.eventType === "DELETE") {
              const old = payload.old;
              if (!old?.id) return;
              currentMessages = currentMessages.filter(m => m.id !== old.id);
              knownMessageIds.delete(old.id);
              renderMessages();
            }
          })
          .subscribe();
      }

      if (!membersChannel) {
        membersChannel = client
          .channel(`private-members-${conversationId}`)
          .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "conversation_members",
            filter: `conversation_id=eq.${conversationId}`
          }, async () => {
            await loadMembersAndOtherUser();
            updateHeader();
          })
          .subscribe();
      }

      if (!typingChannel) {
        typingChannel = client.channel(`private-typing-${conversationId}`);
        typingChannel
          .on("broadcast", { event: "typing" }, ({ payload }) => {
            if (!payload) return;
            if (payload.conversation_id !== conversationId) return;
            if (payload.user_id === currentUserId) return;

            if (payload.active) {
              showTyping(`${otherUserName || "User"} is typing...`);
              if (typingTimeout) clearTimeout(typingTimeout);
              typingTimeout = setTimeout(() => {
                hideTyping();
              }, 1800);
            } else {
              hideTyping();
            }
          })
          .subscribe();
      }

      if (!presenceChannel) {
        presenceChannel = client.channel(`private-presence-${conversationId}`, {
          config: { presence: { key: currentUserId } }
        });

        presenceChannel
          .on("presence", { event: "sync" }, () => {
            const state = presenceChannel.presenceState();
            const next = new Set();
            Object.keys(state || {}).forEach(key => next.add(key));
            onlineUserIds = next;
            updateHeader();
          })
          .subscribe(async (status) => {
            if (status === "SUBSCRIBED") {
              await presenceChannel.track({
                user_id: currentUserId,
                conversation_id: conversationId,
                online_at: new Date().toISOString()
              });
            }
          });
      }
    }

    function toggleMenu() {
      menuDropdown.classList.toggle("show");
    }

    function closeMenu() {
      menuDropdown.classList.remove("show");
    }

    function buildEmojiGrid() {
      emojiGrid.innerHTML = EMOJIS.map(emoji => `
        <button class="emoji-btn" type="button" data-emoji="${emoji}">${emoji}</button>
      `).join("");

      emojiGrid.querySelectorAll("[data-emoji]").forEach(btn => {
        btn.addEventListener("click", () => {
          messageInput.value += btn.dataset.emoji;
          autoGrowTextarea();
          messageInput.focus();
          closeEmojiSheet({ target: emojiSheetBackdrop });
          handleTypingInput();
        });
      });
    }

    function openAttachSheet() {
      attachSheetBackdrop.classList.add("show");
    }

    function closeAttachSheet(event) {
      if (event && event.target && event.target !== attachSheetBackdrop) return;
      attachSheetBackdrop.classList.remove("show");
    }

    function openEmojiSheet() {
      emojiSheetBackdrop.classList.add("show");
    }

    function closeEmojiSheet(event) {
      if (event && event.target && event.target !== emojiSheetBackdrop) return;
      emojiSheetBackdrop.classList.remove("show");
    }

    function toggleMute() {
      const map = getLocalMap(MUTE_KEY);
      if (map[conversationId]) {
        delete map[conversationId];
        showNotice("Chat unmuted.", "success");
      } else {
        map[conversationId] = true;
        showNotice("Chat muted.", "success");
      }
      setLocalMap(MUTE_KEY, map);
      updateHeader();
      closeMenu();
    }

    function toggleBlock() {
      if (!otherUserId) return;

      const map = getLocalMap(BLOCK_KEY);
      if (map[otherUserId]) {
        delete map[otherUserId];
        showNotice("User unblocked locally.", "success");
      } else {
        map[otherUserId] = true;
        showNotice("User blocked locally.", "success");
      }
      setLocalMap(BLOCK_KEY, map);
      updateHeader();
      closeMenu();
    }

    function clearForMe() {
      const map = getLocalMap(CLEAR_KEY);
      map[conversationId] = new Date().toISOString();
      setLocalMap(CLEAR_KEY, map);
      renderMessages();
      closeMenu();
      showNotice("Chat cleared for you.", "success");
    }

    async function deleteChat() {
      const ok = confirm("Delete this private chat from your list?");
      if (!ok) return;

      try {
        const { error } = await client
          .from("conversation_members")
          .delete()
          .eq("conversation_id", conversationId)
          .eq("user_id", currentUserId);

        if (error) throw error;
        window.location.href = "chats.html";
      } catch (error) {
        showNotice(error.message || "Could not delete chat.");
      }
    }

    async function refreshAll() {
      clearNotice();

      if (!conversationId) {
        throw new Error("Missing conversation ID.");
      }

      const memberOkay = await ensureMembership();
      if (!memberOkay) {
        throw new Error("You do not have access to this chat.");
      }

      await Promise.all([
        loadConversation(),
        loadMembersAndOtherUser(),
        loadMessages()
      ]);

      updateHeader();
      await markMessagesRead();
    }

    messageInput.addEventListener("input", handleTypingInput);

    messageInput.addEventListener("keydown", async (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        await sendMessage();
      }
    });

    sendBtn.addEventListener("click", sendMessage);

    replyCloseBtn.addEventListener("click", clearReply);

    attachOpenBtn.addEventListener("click", openAttachSheet);
    emojiOpenBtn.addEventListener("click", openEmojiSheet);

    pickImageBtn.addEventListener("click", () => {
      closeAttachSheet({ target: attachSheetBackdrop });
      fileInputImage.click();
    });

    pickVideoBtn.addEventListener("click", () => {
      closeAttachSheet({ target: attachSheetBackdrop });
      fileInputVideo.click();
    });

    pickDocBtn.addEventListener("click", () => {
      closeAttachSheet({ target: attachSheetBackdrop });
      fileInputDoc.click();
    });

    fileInputImage.addEventListener("change", () => {
      const file = fileInputImage.files?.[0];
      if (!file) return;
      pendingAttachmentFile = file;
      showNotice(`${file.name} selected. Tap send to upload.`, "info");
    });

    fileInputVideo.addEventListener("change", () => {
      const file = fileInputVideo.files?.[0];
      if (!file) return;
      pendingAttachmentFile = file;
      showNotice(`${file.name} selected. Tap send to upload.`, "info");
    });

    fileInputDoc.addEventListener("change", () => {
      const file = fileInputDoc.files?.[0];
      if (!file) return;
      pendingAttachmentFile = file;
      showNotice(`${file.name} selected. Tap send to upload.`, "info");
    });

    menuBtn.addEventListener("click", toggleMenu);

    document.addEventListener("click", (event) => {
      const insideMenu = event.target.closest("#menuBtn") || event.target.closest("#menuDropdown");
      if (!insideMenu) closeMenu();
    });

    searchBtn.addEventListener("click", () => {
      closeMenu();
      const term = prompt("Search this private chat");
      if (term === null) return;

      const q = String(term).trim().toLowerCase();
      if (!q) {
        renderMessages();
        return;
      }

      const filtered = filterByClearState(currentMessages).filter(msg => {
        return String(msg.message || "").toLowerCase().includes(q)
          || String(msg.file_name || "").toLowerCase().includes(q)
          || String(msg.message_type || "").toLowerCase().includes(q);
      });

      if (!filtered.length) {
        messagesScroll.innerHTML = `
          <div class="empty">
            <div class="empty-card">
              <h3>No result</h3>
              <p>No message matched your search.</p>
            </div>
          </div>
        `;
        return;
      }

      const saved = currentMessages;
      currentMessages = filtered;
      renderMessages();
      currentMessages = saved;
    });

    refreshBtn.addEventListener("click", async () => {
      closeMenu();
      await refreshAll();
      showNotice("Chat refreshed.", "success");
    });

    muteBtn.addEventListener("click", toggleMute);
    clearBtn.addEventListener("click", clearForMe);
    blockBtn.addEventListener("click", toggleBlock);
    deleteBtn.addEventListener("click", deleteChat);

    callBtn.addEventListener("click", () => {
      if (!otherUserId) {
        showNotice("User is not available for calling.", "info");
        return;
      }
      window.location.href = `call-room.html?conversation=${encodeURIComponent(conversationId)}&user=${encodeURIComponent(otherUserId)}&type=voice`;
    });

    chatUserBtn.addEventListener("click", () => {
      if (otherUserId) {
        window.location.href = `public-profile.html?id=${encodeURIComponent(otherUserId)}`;
      }
    });

    window.replyToMessage = (messageId) => {
      const msg = currentMessages.find(m => m.id === messageId);
      if (!msg) return;
      openReply(msg);
      messageInput.focus();
    };

    window.copyMessage = async (messageId) => {
      const msg = currentMessages.find(m => m.id === messageId);
      if (!msg) return;
      try {
        await navigator.clipboard.writeText(msg.message || msg.file_name || msg.media_url || "");
        showNotice("Message copied.", "success");
      } catch {
        showNotice("Could not copy message.");
      }
    };

    window.deleteMessage = async (messageId) => {
      const ok = confirm("Delete this message?");
      if (!ok) return;

      try {
        const { error } = await client
          .from("messages")
          .delete()
          .eq("id", messageId)
          .eq("sender_id", currentUserId);

        if (error) throw error;

        currentMessages = currentMessages.filter(m => m.id !== messageId);
        knownMessageIds.delete(messageId);
        renderMessages();
        showNotice("Message deleted.", "success");
      } catch (error) {
        showNotice(error.message || "Could not delete message.");
      }
    };

    window.playVoice = (url) => {
      const audio = new Audio(url);
      audio.play().catch(() => {});
    };

    async function init() {
      try {
        const session = await requireSession();
        if (!session?.user) return;

        currentUser = session.user;
        currentUserId = session.user.id;

        if (!conversationId) {
          throw new Error("Conversation ID is missing.");
        }

        buildEmojiGrid();
        autoGrowTextarea();
        await refreshAll();
        await setupRealtime();
      } catch (error) {
        showNotice(error.message || "Could not load private chat.");
        messagesScroll.innerHTML = `
          <div class="empty">
            <div class="empty-card">
              <h3>Could not open chat</h3>
              <p>${escapeHtml(error.message || "Please go back and try again.")}</p>
            </div>
          </div>
        `;
      }
    }

    window.closeAttachSheet = closeAttachSheet;
    window.closeEmojiSheet = closeEmojiSheet;

    init();
  </script>
</body>
</html>
