<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Chat Room | View</title>
  <meta name="theme-color" content="#07122b" />
  <link rel="manifest" href="/manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/push-helper.js"></script>

  <style>
    :root{
      --bg:#061126;
      --bg2:#0a1835;
      --panel:rgba(255,255,255,.08);
      --panel2:rgba(255,255,255,.05);
      --stroke:rgba(255,255,255,.08);
      --text:#f8fbff;
      --muted:#9eb2cf;
      --primary:#2d6bff;
      --primary2:#5c8cff;
      --green:#22c55e;
      --danger:#ef4444;
      --shadow:0 20px 50px rgba(0,0,0,.28);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Inter,Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      min-height:100%;
      background:
        radial-gradient(circle at top right, rgba(45,107,255,.18), transparent 24%),
        radial-gradient(circle at top left, rgba(0,255,200,.08), transparent 18%),
        linear-gradient(180deg,#08142e 0%,#061126 52%,#050d1c 100%);
      color:var(--text);
    }

    body{ padding-bottom:98px; }

    .wrap{
      width:min(100%,860px);
      margin:0 auto;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    .notice{
      display:none;
      margin:12px 16px 0;
      padding:13px 15px;
      border-radius:18px;
      font-size:14px;
      line-height:1.5;
      border:1px solid transparent;
      backdrop-filter:blur(10px);
    }
    .notice.show{display:block}
    .notice.error{
      background:rgba(239,68,68,.12);
      border-color:rgba(239,68,68,.25);
      color:#ffdada;
    }
    .notice.success{
      background:rgba(34,197,94,.12);
      border-color:rgba(34,197,94,.25);
      color:#ddffe7;
    }
    .notice.info{
      background:rgba(45,107,255,.14);
      border-color:rgba(45,107,255,.26);
      color:#dbe8ff;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      padding:12px 16px 10px;
      backdrop-filter:blur(18px);
      background:linear-gradient(180deg, rgba(5,13,28,.92), rgba(5,13,28,.72));
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .topbar-row{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .icon-btn{
      width:48px;
      height:48px;
      min-width:48px;
      border:none;
      border-radius:18px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      cursor:pointer;
      text-decoration:none;
      box-shadow:0 10px 24px rgba(0,0,0,.16);
    }

    .chat-head{
      flex:1;
      min-width:0;
      display:flex;
      align-items:center;
      gap:12px;
      overflow:hidden;
    }

    .avatar-wrap{
      position:relative;
      width:56px;
      height:56px;
      min-width:56px;
    }

    .avatar-btn{
      width:56px;
      height:56px;
      border:none;
      border-radius:50%;
      overflow:hidden;
      background:linear-gradient(135deg, var(--primary), #7da2ff);
      color:#fff;
      font-size:22px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      box-shadow:0 12px 25px rgba(45,107,255,.25);
    }

    .avatar-btn img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .online-dot{
      position:absolute;
      right:2px;
      bottom:2px;
      width:14px;
      height:14px;
      border-radius:50%;
      background:var(--green);
      border:2px solid #091530;
      box-shadow:0 0 0 4px rgba(34,197,94,.10);
      display:none;
    }
    .online-dot.show{display:block}

    .title-wrap{
      min-width:0;
      flex:1;
    }

    .chat-title{
      font-size:20px;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-bottom:4px;
    }

    .chat-subtitle{
      font-size:13px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .head-actions{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .messages-area{
      flex:1;
      display:flex;
      flex-direction:column;
      min-height:0;
      padding:14px 16px 8px;
    }

    .messages-scroll{
      flex:1;
      min-height:0;
      overflow:auto;
      padding-bottom:12px;
      scroll-behavior:smooth;
    }

    .day-divider{
      display:flex;
      justify-content:center;
      margin:14px 0;
    }

    .day-divider span{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;
      padding:7px 12px;
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      backdrop-filter:blur(10px);
    }

    .message-row{
      display:flex;
      margin-bottom:12px;
    }

    .message-row.me{ justify-content:flex-end; }
    .message-row.them{ justify-content:flex-start; }

    .bubble-wrap{
      max-width:min(80%, 520px);
      display:flex;
      flex-direction:column;
      gap:5px;
    }

    .sender-label{
      font-size:11px;
      color:var(--muted);
      padding:0 8px;
    }

    .bubble{
      position:relative;
      border-radius:22px;
      padding:11px 13px 10px;
      backdrop-filter:blur(14px);
      box-shadow:0 14px 30px rgba(0,0,0,.14);
      border:1px solid rgba(255,255,255,.08);
      overflow:hidden;
      word-wrap:break-word;
      overflow-wrap:anywhere;
    }

    .bubble.me{
      background:linear-gradient(135deg, var(--primary), var(--primary2));
      color:#fff;
      border-bottom-right-radius:8px;
    }

    .bubble.them{
      background:rgba(255,255,255,.08);
      color:#fff;
      border-bottom-left-radius:8px;
    }

    .bubble-media{
      width:100%;
      border-radius:16px;
      overflow:hidden;
      margin-bottom:8px;
      background:rgba(255,255,255,.06);
    }

    .bubble-media img,
    .bubble-media video{
      display:block;
      width:100%;
      max-height:360px;
      object-fit:cover;
      background:#0b1428;
    }

    .file-card{
      display:flex;
      align-items:center;
      gap:10px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:12px;
      margin-bottom:8px;
      text-decoration:none;
      color:#fff;
    }

    .file-icon{
      width:42px;
      height:42px;
      min-width:42px;
      border-radius:14px;
      background:rgba(255,255,255,.12);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
    }

    .bubble-text{
      font-size:14.5px;
      line-height:1.55;
      white-space:pre-wrap;
    }

    .bubble-meta{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:7px;
      margin-top:7px;
      font-size:11px;
      opacity:.92;
    }

    .tick{
      font-weight:900;
      letter-spacing:-1px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:16px;
    }

    .tick.read{
      color:#b8f0ff;
    }

    .typing-bar{
      min-height:24px;
      display:flex;
      align-items:center;
      padding:0 6px 10px;
      color:#7ef3a4;
      font-size:13px;
      font-weight:700;
    }

    .typing-bar.hidden{ visibility:hidden; }

    .composer-shell{
      position:sticky;
      bottom:0;
      z-index:25;
      padding:8px 12px calc(12px + env(safe-area-inset-bottom));
      background:linear-gradient(180deg, rgba(5,13,28,.10), rgba(5,13,28,.92) 30%);
      backdrop-filter:blur(18px);
    }

    .composer{
      display:flex;
      align-items:flex-end;
      gap:10px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      padding:10px;
      box-shadow:var(--shadow);
    }

    .composer-side{
      display:flex;
      align-items:center;
      gap:8px;
      flex-shrink:0;
    }

    .circle-btn{
      width:46px;
      height:46px;
      min-width:46px;
      border:none;
      border-radius:18px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      font-size:20px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .input-wrap{
      flex:1;
      min-width:0;
      display:flex;
      align-items:flex-end;
      gap:8px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:8px 10px;
    }

    textarea{
      flex:1;
      min-height:24px;
      max-height:120px;
      resize:none;
      border:none;
      outline:none;
      background:transparent;
      color:#fff;
      font-size:15px;
      line-height:1.5;
      padding:4px 2px;
    }

    textarea::placeholder{ color:#94a8c8; }

    .send-btn{
      width:54px;
      height:54px;
      min-width:54px;
      border:none;
      border-radius:20px;
      background:linear-gradient(135deg, #1ad96d, #12b65a);
      color:#062012;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:900;
      box-shadow:0 16px 36px rgba(18,182,90,.32);
    }

    .send-btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .hidden{ display:none !important; }

    .empty{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:var(--muted);
      padding:30px 20px;
    }

    .empty-card{
      max-width:360px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      padding:26px 20px;
      box-shadow:var(--shadow);
    }

    .empty-card h3{
      font-size:22px;
      margin-bottom:8px;
      color:#fff;
    }

    .empty-card p{
      line-height:1.7;
      font-size:14px;
    }

    .sheet-backdrop{
      position:fixed;
      inset:0;
      background:rgba(3,8,20,.58);
      backdrop-filter:blur(8px);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index:120;
      padding:12px;
    }

    .sheet-backdrop.show{ display:flex; }

    .sheet{
      width:min(100%, 700px);
      background:linear-gradient(180deg, #0a1835, #08142e);
      border-radius:28px 28px 18px 18px;
      border:1px solid rgba(255,255,255,.08);
      padding:12px 14px 16px;
      box-shadow:0 24px 70px rgba(0,0,0,.42);
    }

    .sheet-handle{
      width:54px;
      height:5px;
      border-radius:999px;
      background:rgba(255,255,255,.18);
      margin:4px auto 14px;
    }

    .sheet-head{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .sheet-avatar{
      width:58px;
      height:58px;
      border-radius:50%;
      overflow:hidden;
      background:linear-gradient(135deg, var(--primary), #7da2ff);
      color:#fff;
      font-size:22px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .sheet-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .sheet-title{
      font-size:18px;
      font-weight:900;
      margin-bottom:4px;
    }

    .sheet-sub{
      color:var(--muted);
      font-size:13px;
    }

    .sheet-actions{
      display:grid;
      gap:10px;
    }

    .sheet-action{
      width:100%;
      min-height:54px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.06);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:0 16px;
      cursor:pointer;
      text-decoration:none;
      font-size:15px;
      font-weight:700;
    }

    .sheet-action.danger{
      color:#ffd8d8;
      background:rgba(239,68,68,.10);
      border-color:rgba(239,68,68,.18);
    }

    .upload-pill{
      font-size:12px;
      color:#cfe0ff;
      padding:7px 10px;
      border-radius:999px;
      background:rgba(45,107,255,.12);
      border:1px solid rgba(45,107,255,.16);
      display:none;
      margin:0 6px 8px;
    }
    .upload-pill.show{
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .spinner{
      width:18px;
      height:18px;
      border:2px solid rgba(255,255,255,.24);
      border-top-color:#fff;
      border-radius:50%;
      display:inline-block;
      animation:spin .8s linear infinite;
    }

    @keyframes spin{
      to{ transform:rotate(360deg); }
    }

    @media (max-width:640px){
      .chat-title{ font-size:18px; }
      .icon-btn{
        width:46px;
        height:46px;
        min-width:46px;
      }
      .bubble-wrap{ max-width:88%; }
      .head-actions .icon-btn:nth-child(2){ display:none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="notice" class="notice"></div>

    <header class="topbar">
      <div class="topbar-row">
        <button id="backBtn" class="icon-btn" type="button" aria-label="Back">←</button>

        <div class="chat-head">
          <div class="avatar-wrap">
            <button id="profileBtn" class="avatar-btn" type="button" aria-label="Open profile">U</button>
            <span id="onlineDot" class="online-dot"></span>
          </div>

          <div class="title-wrap">
            <div id="chatTitle" class="chat-title">Loading...</div>
            <div id="chatSubtitle" class="chat-subtitle">Connecting...</div>
          </div>
        </div>

        <div class="head-actions">
          <button id="callBtn" class="icon-btn" type="button" title="Call">📞</button>
          <button id="videoBtn" class="icon-btn" type="button" title="Video">🎥</button>
          <button id="menuBtn" class="icon-btn" type="button" title="More">⋮</button>
        </div>
      </div>
    </header>

    <div id="messagesArea" class="messages-area">
      <div id="messagesScroll" class="messages-scroll">
        <div class="empty">
          <div class="empty-card">
            <h3>Loading chat</h3>
            <p>Please wait while we load your conversation.</p>
          </div>
        </div>
      </div>

      <div id="typingBar" class="typing-bar hidden">Typing...</div>

      <div id="uploadPill" class="upload-pill">
        <span class="spinner"></span>
        <span id="uploadPillText">Uploading...</span>
      </div>
    </div>

    <div class="composer-shell">
      <form id="composerForm" class="composer">
        <div class="composer-side">
          <button id="emojiBtn" class="circle-btn" type="button" title="Emoji">😊</button>
          <button id="attachBtn" class="circle-btn" type="button" title="Attach file">📎</button>
          <input id="fileInput" class="hidden" type="file" />
        </div>

        <div class="input-wrap">
          <textarea id="messageInput" rows="1" placeholder="Type a message..."></textarea>
        </div>

        <button id="sendBtn" class="send-btn" type="submit" aria-label="Send">➤</button>
      </form>
    </div>
  </div>

  <div id="optionsSheetBackdrop" class="sheet-backdrop" onclick="closeOptionsSheet(event)">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>

      <div class="sheet-head">
        <div id="sheetAvatar" class="sheet-avatar">U</div>
        <div>
          <div id="sheetTitle" class="sheet-title">User</div>
          <div id="sheetSub" class="sheet-sub">Chat options</div>
        </div>
      </div>

      <div class="sheet-actions">
        <a id="sheetProfileAction" class="sheet-action" href="#">
          <span>View User Profile</span>
          <span>↗</span>
        </a>

        <button id="sheetMuteAction" class="sheet-action" type="button">
          <span>Mute Chat</span>
          <span>🔕</span>
        </button>

        <button id="sheetBlockAction" class="sheet-action" type="button">
          <span>Block User</span>
          <span>⛔</span>
        </button>

        <button id="sheetClearAction" class="sheet-action" type="button">
          <span>Clear Chat For Me</span>
          <span>🧹</span>
        </button>

        <button id="sheetRefreshAction" class="sheet-action" type="button">
          <span>Refresh Chat</span>
          <span>↻</span>
        </button>

        <button id="sheetDeleteAction" class="sheet-action danger" type="button">
          <span>Delete Chat</span>
          <span>🗑️</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

    const ROUTES = {
      chats: "chats.html",
      publicProfile: "public-profile.html",
      groups: "groups.html",
      call: "call.html"
    };

    const MEDIA_BUCKET = "chat-media";
    const MUTE_KEY = "view_muted_chat_map_v1";
    const BLOCK_KEY = "view_blocked_user_map_v1";
    const CLEAR_KEY = "view_cleared_chat_map_v1";

    const EMOJIS = ["😀","😁","😂","🤣","😊","😍","🥳","😎","🔥","❤️","💯","🎉","✨","🙏","👍","💙","💚","🫶","📸","🎥","🚀"];

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const noticeBox = document.getElementById("notice");
    const backBtn = document.getElementById("backBtn");
    const profileBtn = document.getElementById("profileBtn");
    const onlineDot = document.getElementById("onlineDot");
    const chatTitle = document.getElementById("chatTitle");
    const chatSubtitle = document.getElementById("chatSubtitle");
    const callBtn = document.getElementById("callBtn");
    const videoBtn = document.getElementById("videoBtn");
    const menuBtn = document.getElementById("menuBtn");
    const messagesScroll = document.getElementById("messagesScroll");
    const typingBar = document.getElementById("typingBar");
    const uploadPill = document.getElementById("uploadPill");
    const uploadPillText = document.getElementById("uploadPillText");
    const composerForm = document.getElementById("composerForm");
    const emojiBtn = document.getElementById("emojiBtn");
    const attachBtn = document.getElementById("attachBtn");
    const fileInput = document.getElementById("fileInput");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    const optionsSheetBackdrop = document.getElementById("optionsSheetBackdrop");
    const sheetAvatar = document.getElementById("sheetAvatar");
    const sheetTitle = document.getElementById("sheetTitle");
    const sheetSub = document.getElementById("sheetSub");
    const sheetProfileAction = document.getElementById("sheetProfileAction");
    const sheetMuteAction = document.getElementById("sheetMuteAction");
    const sheetBlockAction = document.getElementById("sheetBlockAction");
    const sheetClearAction = document.getElementById("sheetClearAction");
    const sheetRefreshAction = document.getElementById("sheetRefreshAction");
    const sheetDeleteAction = document.getElementById("sheetDeleteAction");

    const urlParams = new URLSearchParams(window.location.search);
    const conversationId = urlParams.get("id") || urlParams.get("conversation_id") || "";

    let currentUser = null;
    let currentUserId = "";
    let currentConversation = null;
    let currentMembers = [];
    let currentMessages = [];
    let otherUser = null;
    let conversationIsGroup = false;

    let messagesChannel = null;
    let presenceChannel = null;
    let typingChannel = null;
    let onlineUserIds = new Set();
    let otherTypingTimeout = null;
    let localTypingCooldown = null;
    let knownMessageIds = new Set();

    function showNotice(message, type = "error") {
      noticeBox.className = `notice show ${type}`;
      noticeBox.textContent = message || "";
    }

    function clearNotice() {
      noticeBox.className = "notice";
      noticeBox.textContent = "";
    }

    function getLocalMap(key) {
      try { return JSON.parse(localStorage.getItem(key) || "{}"); }
      catch { return {}; }
    }

    function setLocalMap(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function isMutedChat(id) {
      const map = getLocalMap(MUTE_KEY);
      return !!map[id];
    }

    function isBlockedUser(id) {
      const map = getLocalMap(BLOCK_KEY);
      return !!map[id];
    }

    function getClearTimestamp(id) {
      const map = getLocalMap(CLEAR_KEY);
      return map[id] || null;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getInitial(name) {
      const safe = String(name || "U").trim();
      return safe ? safe.charAt(0).toUpperCase() : "U";
    }

    function formatTime(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function formatDay(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      const now = new Date();
      const yesterday = new Date();
      yesterday.setDate(now.getDate() - 1);

      if (date.toDateString() === now.toDateString()) return "Today";
      if (date.toDateString() === yesterday.toDateString()) return "Yesterday";

      return date.toLocaleDateString([], {
        day: "2-digit",
        month: "short",
        year: "numeric"
      });
    }

    function autoGrowTextarea() {
      messageInput.style.height = "24px";
      messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + "px";
    }

    function getProfileDisplayName(profile = {}, fallback = "User") {
      const list = [
        profile.full_name,
        profile.display_name,
        profile.username,
        profile.name,
        [profile.first_name, profile.last_name].filter(Boolean).join(" ").trim()
      ].filter(Boolean);

      const value = list.find(Boolean);
      return value ? String(value).trim() : fallback;
    }

    function getProfileAvatar(profile = {}) {
      return profile.avatar_url || profile.profile_picture || profile.photo_url || profile.image_url || "";
    }

    function getMessageContent(message) {
      return message.message || "";
    }

    function getMessageType(message) {
      return message.message_type || "text";
    }

    function getMessageMediaUrl(message) {
      return message.media_url || "";
    }

    function getMessageFileName(message) {
      return message.file_name || "Attachment";
    }

    function getTickHTML(message) {
      const isMine = (message.sender_id || "") === currentUserId;
      if (!isMine) return "";

      if (String(message.id || "").startsWith("temp-")) {
        return `<span class="tick">✓</span>`;
      }

      const wasRead = !!message.read_at || message.is_read === true;
      if (wasRead) {
        return `<span class="tick read">✓✓</span>`;
      }

      return `<span class="tick">✓✓</span>`;
    }

    function setTypingVisible(text = "Typing...") {
      typingBar.textContent = text;
      typingBar.classList.remove("hidden");
    }

    function hideTypingVisible() {
      typingBar.textContent = "Typing...";
      typingBar.classList.add("hidden");
    }

    function isOtherUserOnline() {
      if (!otherUser?.id) return false;
      return onlineUserIds.has(otherUser.id);
    }

    function updateHeader() {
      if (!currentConversation) {
        chatTitle.textContent = "Chat";
        chatSubtitle.textContent = "Unavailable";
        profileBtn.textContent = "U";
        onlineDot.classList.remove("show");
        return;
      }

      if (conversationIsGroup) {
        const groupName = currentConversation.name || currentConversation.title || "Group";
        chatTitle.textContent = groupName;
        chatSubtitle.textContent = `${currentMembers.length} member${currentMembers.length === 1 ? "" : "s"}`;

        const avatar = currentConversation.avatar_url || "";
        profileBtn.innerHTML = avatar
          ? `<img src="${escapeHtml(avatar)}" alt="${escapeHtml(groupName)}">`
          : escapeHtml(getInitial(groupName));

        onlineDot.classList.remove("show");
      } else {
        const name = otherUser?.name || "User";
        chatTitle.textContent = name;
        chatSubtitle.textContent = isBlockedUser(otherUser?.id) ? "Blocked locally" : (isOtherUserOnline() ? "Online" : "Offline");
        profileBtn.innerHTML = otherUser?.avatar
          ? `<img src="${escapeHtml(otherUser.avatar)}" alt="${escapeHtml(name)}">`
          : escapeHtml(getInitial(name));

        onlineDot.classList.toggle("show", isOtherUserOnline());
      }
    }

    function filterMessagesByClearState(messages) {
      const clearStamp = getClearTimestamp(conversationId);
      if (!clearStamp) return messages;
      const clearTime = new Date(clearStamp).getTime();
      return messages.filter(msg => {
        const t = new Date(msg.created_at || 0).getTime();
        return t > clearTime;
      });
    }

    function renderMessages() {
      const visibleMessages = filterMessagesByClearState(currentMessages);

      if (!visibleMessages.length) {
        messagesScroll.innerHTML = `
          <div class="empty">
            <div class="empty-card">
              <h3>No messages yet</h3>
              <p>Start the conversation by sending your first message.</p>
            </div>
          </div>
        `;
        return;
      }

      let lastDay = "";
      let html = "";

      visibleMessages.forEach(message => {
        const senderId = message.sender_id || "";
        const isMe = senderId === currentUserId;
        const day = formatDay(message.created_at);
        const type = getMessageType(message);
        const text = getMessageContent(message);
        const mediaUrl = getMessageMediaUrl(message);
        const fileName = getMessageFileName(message);

        if (day !== lastDay) {
          html += `
            <div class="day-divider">
              <span>${escapeHtml(day)}</span>
            </div>
          `;
          lastDay = day;
        }

        let mediaHtml = "";
        if (type === "image" && mediaUrl) {
          mediaHtml = `
            <div class="bubble-media">
              <img src="${escapeHtml(mediaUrl)}" alt="Image" />
            </div>
          `;
        } else if (type === "video" && mediaUrl) {
          mediaHtml = `
            <div class="bubble-media">
              <video src="${escapeHtml(mediaUrl)}" controls playsinline></video>
            </div>
          `;
        } else if ((type === "file" || type === "document") && mediaUrl) {
          mediaHtml = `
            <a class="file-card" href="${escapeHtml(mediaUrl)}" target="_blank" rel="noopener">
              <span class="file-icon">📎</span>
              <div>
                <div style="font-weight:800;font-size:13px;">${escapeHtml(fileName)}</div>
                <div style="font-size:12px;color:#c2d2ec;">Tap to open</div>
              </div>
            </a>
          `;
        }

        html += `
          <div class="message-row ${isMe ? "me" : "them"}">
            <div class="bubble-wrap">
              ${conversationIsGroup && !isMe ? `<div class="sender-label">${escapeHtml(message.sender_name || "User")}</div>` : ""}
              <div class="bubble ${isMe ? "me" : "them"}">
                ${mediaHtml}
                ${text ? `<div class="bubble-text">${escapeHtml(text)}</div>` : ""}
                <div class="bubble-meta">
                  <span>${escapeHtml(formatTime(message.created_at))}</span>
                  ${getTickHTML(message)}
                </div>
              </div>
            </div>
          </div>
        `;
      });

      messagesScroll.innerHTML = html;
      requestAnimationFrame(() => {
        messagesScroll.scrollTop = messagesScroll.scrollHeight;
      });
    }

    function appendOrReplaceMessage(message) {
      const index = currentMessages.findIndex(m => m.id === message.id);
      if (index >= 0) {
        currentMessages[index] = { ...currentMessages[index], ...message };
      } else {
        currentMessages.push(message);
      }

      currentMessages.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
      knownMessageIds = new Set(currentMessages.map(m => m.id).filter(Boolean));
      renderMessages();
    }

    async function getSessionWithRetry(maxWaitMs = 3000) {
      const start = Date.now();
      while (Date.now() - start < maxWaitMs) {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error) throw error;
        if (data.session?.user) return data.session;
        await new Promise(resolve => setTimeout(resolve, 200));
      }
      return null;
    }

    async function requireSession() {
      const session = await getSessionWithRetry();
      if (!session?.user) {
        window.location.href = ROUTES.chats;
        return null;
      }
      return session;
    }

    async function ensureMembership() {
      const { data, error } = await supabaseClient
        .from("conversation_members")
        .select("*")
        .eq("conversation_id", conversationId)
        .eq("user_id", currentUserId)
        .maybeSingle();

      if (error) throw error;
      return !!data;
    }

    async function loadConversation() {
      const { data, error } = await supabaseClient
        .from("conversations")
        .select("*")
        .eq("id", conversationId)
        .maybeSingle();

      if (error) throw error;
      if (!data) throw new Error("Conversation not found.");
      currentConversation = data;
      conversationIsGroup = !!(data.is_group || data.type === "group");
    }

    async function loadConversationMembers() {
      const { data, error } = await supabaseClient
        .from("conversation_members")
        .select("*")
        .eq("conversation_id", conversationId);

      if (error) throw error;
      currentMembers = data || [];
    }

    async function loadProfiles(ids) {
      if (!ids.length) return [];
      const { data, error } = await supabaseClient
        .from("profiles")
        .select("*")
        .in("id", ids);

      if (error) {
        console.warn("Profiles load warning:", error.message);
        return [];
      }
      return data || [];
    }

    async function loadMessages() {
      const { data, error } = await supabaseClient
        .from("messages")
        .select("*")
        .eq("conversation_id", conversationId)
        .order("created_at", { ascending: true });

      if (error) throw error;
      currentMessages = data || [];
      knownMessageIds = new Set(currentMessages.map(m => m.id).filter(Boolean));
    }

    async function tryMarkRead() {
      const incomingUnread = currentMessages.filter(msg =>
        (msg.sender_id || "") !== currentUserId &&
        !msg.read_at &&
        msg.is_read !== true &&
        msg.id &&
        !String(msg.id).startsWith("temp-")
      );

      if (!incomingUnread.length) return;

      const ids = incomingUnread.map(m => m.id);
      try {
        const payload = {
          is_read: true,
          read_at: new Date().toISOString()
        };

        const { error } = await supabaseClient
          .from("messages")
          .update(payload)
          .in("id", ids);

        if (!error) {
          currentMessages = currentMessages.map(msg => {
            if (ids.includes(msg.id)) {
              return { ...msg, is_read: true, read_at: payload.read_at };
            }
            return msg;
          });
          renderMessages();
        }
      } catch {
        // keep silent to avoid breaking on schemas that do not fully support these columns
      }
    }

    async function refreshAll() {
      clearNotice();

      if (!conversationId) {
        showNotice("Missing conversation ID.");
        messagesScroll.innerHTML = `
          <div class="empty">
            <div class="empty-card">
              <h3>Invalid chat link</h3>
              <p>This conversation link is missing or broken.</p>
            </div>
          </div>
        `;
        return;
      }

      const memberOkay = await ensureMembership();
      if (!memberOkay) {
        showNotice("You do not have access to this chat.");
        messagesScroll.innerHTML = `
          <div class="empty">
            <div class="empty-card">
              <h3>Access denied</h3>
              <p>This conversation does not belong to you.</p>
            </div>
          </div>
        `;
        return;
      }

      await Promise.all([
        loadMessages(),
        loadConversation(),
        loadConversationMembers()
      ]);

      const memberIds = [...new Set(currentMembers.map(m => m.user_id).filter(Boolean))];
      const profiles = await loadProfiles(memberIds);
      const profileMap = new Map(profiles.map(p => [p.id, p]));

      if (conversationIsGroup) {
        currentMessages = currentMessages.map(msg => {
          const profile = profileMap.get(msg.sender_id) || {};
          return {
            ...msg,
            sender_name: getProfileDisplayName(profile, "User")
          };
        });
      } else {
        const otherMember = currentMembers.find(m => m.user_id !== currentUserId);
        const otherProfile = profileMap.get(otherMember?.user_id) || {};
        otherUser = {
          id: otherMember?.user_id || "",
          name: getProfileDisplayName(otherProfile, "User"),
          avatar: getProfileAvatar(otherProfile)
        };
      }

      updateHeader();
      renderMessages();
      await tryMarkRead();
    }

    function detectFileType(file) {
      if (!file) return "file";
      if (file.type.startsWith("image/")) return "image";
      if (file.type.startsWith("video/")) return "video";
      return "file";
    }

    async function uploadAttachment(file) {
      if (!file) return null;

      const ext = (file.name.split(".").pop() || "bin").toLowerCase();
      const safeName = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
      const path = `${conversationId}/${safeName}`;

      uploadPillText.textContent = `Uploading ${file.name}...`;
      uploadPill.classList.add("show");

      const { error: uploadError } = await supabaseClient
        .storage
        .from(MEDIA_BUCKET)
        .upload(path, file, {
          cacheControl: "3600",
          upsert: false
        });

      if (uploadError) {
        uploadPill.classList.remove("show");
        throw uploadError;
      }

      const { data } = supabaseClient
        .storage
        .from(MEDIA_BUCKET)
        .getPublicUrl(path);

      uploadPill.classList.remove("show");

      return {
        url: data?.publicUrl || "",
        type: detectFileType(file),
        name: file.name,
        size: file.size || null,
        mime: file.type || null
      };
    }

    async function sendMessage({ text = "", attachment = null }) {
      const cleanText = String(text || "").trim();
      if (!cleanText && !attachment) return;

      if (!conversationIsGroup && otherUser?.id && isBlockedUser(otherUser.id)) {
        showNotice("This user is blocked locally. Unblock from the menu first.", "info");
        return;
      }

      sendBtn.disabled = true;

      const tempId = `temp-${Date.now()}`;

      try {
        const tempMessage = {
          id: tempId,
          conversation_id: conversationId,
          sender_id: currentUserId,
          receiver_id: conversationIsGroup ? null : (otherUser?.id || null),
          message_type: attachment ? attachment.type : "text",
          message: cleanText || null,
          media_url: attachment ? attachment.url : null,
          file_name: attachment ? attachment.name : null,
          file_size: attachment ? attachment.size : null,
          mime_type: attachment ? attachment.mime : null,
          created_at: new Date().toISOString(),
          sender_name: "You"
        };

        appendOrReplaceMessage(tempMessage);

        const payload = {
          conversation_id: conversationId,
          sender_id: currentUserId,
          receiver_id: conversationIsGroup ? null : (otherUser?.id || null),
          message_type: attachment ? attachment.type : "text",
          message: cleanText || null,
          media_url: attachment ? attachment.url : null,
          file_name: attachment ? attachment.name : null,
          file_size: attachment ? attachment.size : null,
          mime_type: attachment ? attachment.mime : null
        };

        const { data, error } = await supabaseClient
          .from("messages")
          .insert(payload)
          .select()
          .single();

        if (error) throw error;

        currentMessages = currentMessages.filter(msg => msg.id !== tempId);
        appendOrReplaceMessage({
          ...data,
          sender_name: "You"
        });

        messageInput.value = "";
        fileInput.value = "";
        autoGrowTextarea();
      } catch (error) {
        currentMessages = currentMessages.filter(msg => msg.id !== tempId);
        renderMessages();
        showNotice(error.message || "Could not send message.");
      } finally {
        sendBtn.disabled = false;
      }
    }

    function broadcastTyping() {
      if (!typingChannel) return;
      typingChannel.send({
        type: "broadcast",
        event: "typing",
        payload: {
          conversation_id: conversationId,
          user_id: currentUserId,
          at: new Date().toISOString()
        }
      });
    }

    function setupTypingEvents() {
      messageInput.addEventListener("input", () => {
        autoGrowTextarea();
        broadcastTyping();
        if (localTypingCooldown) clearTimeout(localTypingCooldown);
        localTypingCooldown = setTimeout(() => {}, 1600);
      });
    }

    async function getSenderName(senderId) {
      if (senderId === currentUserId) return "You";
      if (!conversationIsGroup) return otherUser?.name || "User";

      try {
        const { data } = await supabaseClient
          .from("profiles")
          .select("*")
          .eq("id", senderId)
          .maybeSingle();

        return getProfileDisplayName(data || {}, "User");
      } catch {
        return "User";
      }
    }

    async function maybeShowIncomingNotification(message) {
      if (!window.ViewPushHelper) return;
      if ((message.sender_id || "") === currentUserId) return;
      if (isMutedChat(conversationId)) return;

      try {
        await window.ViewPushHelper.showLocalSystemNotification({
          title: otherUser?.name || message.sender_name || "New message",
          body: getMessageContent(message) || "Sent an attachment",
          tag: `chat-${conversationId}`,
          data: { url: `/chat-room.html?id=${conversationId}` }
        });
      } catch {}
    }

    function setupRealtimeMessages() {
      if (messagesChannel) {
        supabaseClient.removeChannel(messagesChannel);
        messagesChannel = null;
      }

      messagesChannel = supabaseClient
        .channel(`chat-room-${conversationId}`)
        .on(
          "postgres_changes",
          {
            event: "INSERT",
            schema: "public",
            table: "messages",
            filter: `conversation_id=eq.${conversationId}`
          },
          async (payload) => {
            const newMessage = payload.new;
            if (!newMessage || knownMessageIds.has(newMessage.id)) return;

            const senderName = await getSenderName(newMessage.sender_id);
            const hydrated = { ...newMessage, sender_name: senderName };
            appendOrReplaceMessage(hydrated);

            if ((newMessage.sender_id || "") !== currentUserId) {
              await tryMarkRead();
              await maybeShowIncomingNotification(hydrated);
            }
          }
        )
        .on(
          "postgres_changes",
          {
            event: "UPDATE",
            schema: "public",
            table: "messages",
            filter: `conversation_id=eq.${conversationId}`
          },
          async (payload) => {
            const updated = payload.new;
            if (!updated) return;
            appendOrReplaceMessage(updated);
          }
        )
        .on(
          "postgres_changes",
          {
            event: "DELETE",
            schema: "public",
            table: "messages",
            filter: `conversation_id=eq.${conversationId}`
          },
          async (payload) => {
            const old = payload.old;
            if (!old?.id) return;
            currentMessages = currentMessages.filter(msg => msg.id !== old.id);
            knownMessageIds.delete(old.id);
            renderMessages();
          }
        )
        .on(
          "postgres_changes",
          {
            event: "*",
            schema: "public",
            table: "conversation_members",
            filter: `conversation_id=eq.${conversationId}`
          },
          async () => {
            await refreshAll();
          }
        )
        .subscribe();
    }

    function setupTypingChannel() {
      if (typingChannel) return;

      typingChannel = supabaseClient.channel(`typing-${conversationId}`);

      typingChannel
        .on("broadcast", { event: "typing" }, ({ payload }) => {
          if (!payload) return;
          if (payload.conversation_id !== conversationId) return;
          if (payload.user_id === currentUserId) return;

          if (conversationIsGroup) {
            setTypingVisible("Someone is typing...");
          } else {
            setTypingVisible(`${otherUser?.name || "User"} is typing...`);
          }

          if (otherTypingTimeout) clearTimeout(otherTypingTimeout);
          otherTypingTimeout = setTimeout(() => {
            hideTypingVisible();
          }, 2200);
        })
        .subscribe();
    }

    function setupPresence() {
      if (presenceChannel) return;

      presenceChannel = supabaseClient.channel(`presence-chat-${conversationId}`, {
        config: {
          presence: { key: currentUserId }
        }
      });

      presenceChannel
        .on("presence", { event: "sync" }, () => {
          const state = presenceChannel.presenceState();
          const next = new Set();
          Object.keys(state || {}).forEach(key => next.add(key));
          onlineUserIds = next;
          updateHeader();
        })
        .subscribe(async status => {
          if (status === "SUBSCRIBED") {
            await presenceChannel.track({
              user_id: currentUserId,
              conversation_id: conversationId,
              online_at: new Date().toISOString()
            });
          }
        });
    }

    function openOptionsSheet() {
      if (!currentConversation) return;

      const name = conversationIsGroup
        ? (currentConversation.name || currentConversation.title || "Group")
        : (otherUser?.name || "User");

      const avatar = conversationIsGroup
        ? (currentConversation.avatar_url || "")
        : (otherUser?.avatar || "");

      sheetAvatar.innerHTML = avatar
        ? `<img src="${escapeHtml(avatar)}" alt="${escapeHtml(name)}">`
        : escapeHtml(getInitial(name));

      sheetTitle.textContent = name;
      sheetSub.textContent = conversationIsGroup
        ? "Group conversation"
        : (isOtherUserOnline() ? "Online now" : "Chat options");

      if (conversationIsGroup) {
        sheetProfileAction.href = `${ROUTES.groups}?id=${encodeURIComponent(conversationId)}`;
        sheetProfileAction.querySelector("span").textContent = "Open Group";
      } else {
        sheetProfileAction.href = `${ROUTES.publicProfile}?id=${encodeURIComponent(otherUser?.id || "")}`;
        sheetProfileAction.querySelector("span").textContent = "View User Profile";
      }

      sheetMuteAction.querySelector("span").textContent = isMutedChat(conversationId) ? "Unmute Chat" : "Mute Chat";
      sheetBlockAction.querySelector("span").textContent = !conversationIsGroup && isBlockedUser(otherUser?.id || "") ? "Unblock User" : "Block User";

      optionsSheetBackdrop.classList.add("show");
    }

    function closeOptionsSheet(event) {
      if (event && event.target && event.target !== optionsSheetBackdrop) return;
      optionsSheetBackdrop.classList.remove("show");
    }

    async function deleteChatForMe() {
      const confirmDelete = window.confirm("Delete this chat from your list?");
      if (!confirmDelete) return;

      try {
        const { error } = await supabaseClient
          .from("conversation_members")
          .delete()
          .eq("conversation_id", conversationId)
          .eq("user_id", currentUserId);

        if (error) throw error;
        window.location.href = ROUTES.chats;
      } catch (error) {
        showNotice(error.message || "Could not delete chat.");
      }
    }

    function toggleMuteChat() {
      const map = getLocalMap(MUTE_KEY);
      if (map[conversationId]) {
        delete map[conversationId];
        showNotice("Chat unmuted.", "success");
      } else {
        map[conversationId] = true;
        showNotice("Chat muted.", "success");
      }
      setLocalMap(MUTE_KEY, map);
      closeOptionsSheet({ target: optionsSheetBackdrop });
    }

    function toggleBlockUser() {
      if (conversationIsGroup || !otherUser?.id) {
        showNotice("Block is only available for direct chats.", "info");
        return;
      }

      const map = getLocalMap(BLOCK_KEY);
      if (map[otherUser.id]) {
        delete map[otherUser.id];
        showNotice("User unblocked locally.", "success");
      } else {
        map[otherUser.id] = true;
        showNotice("User blocked locally.", "success");
      }
      setLocalMap(BLOCK_KEY, map);
      updateHeader();
      closeOptionsSheet({ target: optionsSheetBackdrop });
    }

    function clearChatForMe() {
      const map = getLocalMap(CLEAR_KEY);
      map[conversationId] = new Date().toISOString();
      setLocalMap(CLEAR_KEY, map);
      renderMessages();
      showNotice("Chat cleared for you.", "success");
      closeOptionsSheet({ target: optionsSheetBackdrop });
    }

      window.location.href = ROUTES.chats;

        window.location.href = `${ROUTES.groups}?id=${encodeURIComponent(conversationId)}`;
      } else if (otherUser?.id) {
        window.location.href = `${ROUTES.publicProfile}?id=${encodeURIComponent(otherUser.id)}`;

      if (conversationIsGroup) {
        showNotice("Group video page is not linked yet.", "info");
        return;
      }
      if (!otherUser?.id) {
        showNotice("User is not available for video.", "info");
        return;
      }
      window.location.href = `${ROUTES.call}?user=${encodeURIComponent(otherUser.id)}&conversation=${encodeURIComponent(conversationId)}&type=video`;

    menuBtn.addEventListener("click", openOptionsSheet);

    sheetMuteAction.addEventListener("click", toggleMuteChat);
    sheetBlockAction.addEventListener("click", toggleBlockUser);
    sheetClearAction.addEventListener("click", clearChatForMe);
    sheetRefreshAction.addEventListener("click", async () => {
      closeOptionsSheet({ target: optionsSheetBackdrop });
      await refreshAll();
    });
    sheetDeleteAction.addEventListener("click", async () => {
      closeOptionsSheet({ target: optionsSheetBackdrop });
      await deleteChatForMe();
    });

    composerForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      let attachment = null;
      if (fileInput.files && fileInput.files[0]) {
        try {
          attachment = await uploadAttachment(fileInput.files[0]);
        } catch (error) {
          showNotice(error.message || "Could not upload attachment.");
          return;
        }
      }

      await sendMessage({
        text: messageInput.value,
        attachment
      });
    });

    attachBtn.addEventListener("click", () => {
      fileInput.click();
    });

    fileInput.addEventListener("change", () => {
      const file = fileInput.files?.[0];
      if (!file) return;
      showNotice(`${file.name} selected. Tap send to upload.`, "info");
    });

    emojiBtn.addEventListener("click", () => {
      const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
      messageInput.value += emoji;
      autoGrowTextarea();
      messageInput.focus();
      broadcastTyping();
    });

    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        composerForm.requestSubmit();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeOptionsSheet({ target: optionsSheetBackdrop });
      }
    });

    window.addEventListener("focus", tryMarkRead);
    messagesScroll.addEventListener("scroll", () => {
      if (messagesScroll.scrollTop + messagesScroll.clientHeight >= messagesScroll.scrollHeight - 40) {
        tryMarkRead();
      }
    });

    async function init() {
      try {
        const session = await requireSession();
        if (!session?.user) return;

        currentUser = session.user;
        currentUserId = session.user.id;

        if (!conversationId) {
          showNotice("Conversation ID is missing.");
          messagesScroll.innerHTML = `
            <div class="empty">
              <div class="empty-card">
                <h3>Invalid conversation</h3>
                <p>Open a chat from your chats list and try again.</p>
              </div>
            </div>
          `;
          return;
        }

        autoGrowTextarea();
        await refreshAll();
        setupRealtimeMessages();
        setupTypingChannel();
        setupPresence();
        setupTypingEvents();
      } catch (error) {
        showNotice(error.message || "Could not load chat.");
        messagesScroll.innerHTML = `
          <div class="empty">
            <div class="empty-card">
              <h3>Could not load chat</h3>
              <p>Please go back and try again.</p>
            </div>
          </div>
        `;
      }
    }

    window.closeOptionsSheet = closeOptionsSheet;

    init();
  </script>
</body>
</html>
