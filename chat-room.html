<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Room | View</title>
  <meta name="theme-color" content="#07122a" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{
      background:#07122a;
      color:#fff;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    .notice{
      display:none;
      margin:14px 16px 0;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      line-height:1.5;
    }
    .notice.show{display:block}
    .notice.error{background:#3b1218;color:#fca5a5}
    .notice.success{background:#0f2d20;color:#86efac}
    .notice.info{background:#10233d;color:#93c5fd}

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px;
      border-bottom:1px solid rgba(255,255,255,.06);
      background:#061127;
      position:sticky;
      top:0;
      z-index:10;
    }

    .top-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
    }

    .icon-btn{
      width:46px;
      height:46px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      color:#fff;
      font-size:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      text-decoration:none;
      flex-shrink:0;
    }

    .person{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
      text-decoration:none;
      color:inherit;
    }

    .avatar{
      width:54px;
      height:54px;
      min-width:54px;
      border-radius:50%;
      background:#1d4ed8;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:800;
      overflow:hidden;
    }
    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .meta{
      min-width:0;
      flex:1;
    }

    .name{
      font-size:18px;
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-bottom:3px;
    }

    .status{
      font-size:13px;
      color:#9fb0c9;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .top-right{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .messages{
      flex:1;
      padding:16px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:12px;
      padding-bottom:110px;
    }

    .empty-state{
      margin:auto 0;
      text-align:center;
      color:#9fb0c9;
      line-height:1.7;
      padding:20px;
    }

    .message-row{
      display:flex;
      flex-direction:column;
      max-width:82%;
    }

    .message-row.me{
      align-self:flex-end;
      align-items:flex-end;
    }

    .message-row.other{
      align-self:flex-start;
      align-items:flex-start;
    }

    .bubble{
      border-radius:20px;
      padding:12px 14px;
      font-size:14px;
      line-height:1.6;
      white-space:pre-wrap;
      word-break:break-word;
      box-shadow:0 10px 30px rgba(0,0,0,.14);
    }

    .message-row.me .bubble{
      background:#22c55e;
      color:#07122a;
      border-bottom-right-radius:6px;
    }

    .message-row.other .bubble{
      background:#0d1b37;
      color:#fff;
      border:1px solid rgba(255,255,255,.06);
      border-bottom-left-radius:6px;
    }

    .message-media{
      max-width:100%;
      width:280px;
      border-radius:16px;
      margin-top:8px;
      display:block;
      object-fit:cover;
      background:#000;
      border:1px solid rgba(255,255,255,.08);
    }

    .message-time{
      font-size:11px;
      color:#8ea0ba;
      margin-top:5px;
      padding:0 4px;
    }

    .composer{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      background:#07122a;
      border-top:1px solid rgba(255,255,255,.06);
      padding:12px 14px max(12px, env(safe-area-inset-bottom));
      display:flex;
      align-items:center;
      gap:10px;
      z-index:20;
    }

    .composer-btn{
      width:52px;
      height:52px;
      border:none;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      color:#fff;
      font-size:22px;
      cursor:pointer;
      flex-shrink:0;
    }

    .composer-input{
      flex:1;
      min-height:56px;
      border:none;
      outline:none;
      border-radius:20px;
      padding:0 18px;
      background:#0b1731;
      color:#fff;
      font-size:16px;
      border:1px solid rgba(255,255,255,.06);
    }

    .send-btn{
      width:58px;
      height:58px;
      border:none;
      border-radius:18px;
      background:#22c55e;
      color:#07122a;
      font-size:24px;
      font-weight:800;
      cursor:pointer;
      flex-shrink:0;
      box-shadow:0 10px 26px rgba(34,197,94,.25);
    }

    @media(max-width:640px){
      .name{font-size:16px}
      .avatar{width:50px;height:50px;min-width:50px}
      .icon-btn{width:44px;height:44px}
      .composer-btn{width:48px;height:48px}
      .send-btn{width:54px;height:54px}
    }
  </style>
</head>
<body>
  <div id="notice" class="notice"></div>

  <header class="topbar">
    <div class="top-left">
      <a class="icon-btn" href="chats.html" title="Back">←</a>

      <a id="profileLink" class="person" href="profile.html">
        <div id="headerAvatar" class="avatar">U</div>
        <div class="meta">
          <div id="headerName" class="name">User</div>
          <div id="headerStatus" class="status">Loading...</div>
        </div>
      </a>
    </div>

    <div class="top-right">
      <button id="voiceCallBtn" class="icon-btn" title="Voice Call">📞</button>
      <button id="videoCallBtn" class="icon-btn" title="Video Call">🎥</button>
      <button id="menuBtn" class="icon-btn" title="Menu">⋮</button>
    </div>
  </header>

  <main id="messages" class="messages">
    <div class="empty-state">Loading conversation...</div>
  </main>

  <form id="composerForm" class="composer">
    <button type="button" id="emojiBtn" class="composer-btn" title="Emoji">😊</button>
    <button type="button" id="attachBtn" class="composer-btn" title="Attach">📎</button>
    <button type="button" id="imageBtn" class="composer-btn" title="Image">🖼️</button>
    <input id="messageInput" class="composer-input" type="text" placeholder="Type a message..." />
    <button id="sendBtn" class="send-btn" type="submit">➤</button>
  </form>

  <script>
    const SUPABASE_URL = "https://ezarjrxzkqqsbyirxttg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6YXJqcnh6a3Fxc2J5aXJ4dHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzAzODcsImV4cCI6MjA4OTg0NjM4N30.ERyM_zVPU5jUx9ROrbLnY-jYsHzCD8O0lzAeuzEr0oI";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const params = new URLSearchParams(window.location.search);
    const conversationId = params.get("id");

    const noticeBox = document.getElementById("notice");
    const messagesBox = document.getElementById("messages");
    const profileLink = document.getElementById("profileLink");
    const headerAvatar = document.getElementById("headerAvatar");
    const headerName = document.getElementById("headerName");
    const headerStatus = document.getElementById("headerStatus");
    const voiceCallBtn = document.getElementById("voiceCallBtn");
    const videoCallBtn = document.getElementById("videoCallBtn");
    const composerForm = document.getElementById("composerForm");
    const messageInput = document.getElementById("messageInput");

    let currentUserId = "";
    let otherUserId = "";
    let otherUserProfile = null;
    let allMessages = [];
    let messagesChannel = null;

    function showNotice(message, type = "error") {
      noticeBox.className = `notice show ${type}`;
      noticeBox.textContent = message;
    }

    function clearNotice() {
      noticeBox.className = "notice";
      noticeBox.textContent = "";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatDate(value) {
      if (!value) return "";
      try {
        return new Date(value).toLocaleString();
      } catch {
        return "";
      }
    }

    async function getSessionWithRetry(maxWaitMs = 3000) {
      const start = Date.now();
      while (Date.now() - start < maxWaitMs) {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error) throw error;
        if (data.session?.user) return data.session;
        await new Promise(resolve => setTimeout(resolve, 200));
      }
      return null;
    }

    async function requireSession() {
      const session = await getSessionWithRetry();
      if (!session?.user) {
        window.location.href = "login.html?next=" + encodeURIComponent(location.pathname + location.search);
        return null;
      }
      return session;
    }

    function setHeaderUser(profile) {
      const name = profile?.username || profile?.full_name || "User";
      const avatarUrl = profile?.avatar_url || "";
      const initial = name.charAt(0).toUpperCase();

      headerName.textContent = name;
      headerStatus.textContent = "Online";
      profileLink.href = profile?.id ? `profile.html?user=${encodeURIComponent(profile.id)}` : "profile.html";

      if (avatarUrl) {
        headerAvatar.innerHTML = `<img src="${avatarUrl}" alt="${escapeHtml(name)}">`;
      } else {
        headerAvatar.textContent = initial;
      }
    }

    async function loadConversationMembers() {
      if (!conversationId) {
        throw new Error("Missing conversation id.");
      }

      const { data, error } = await supabaseClient
        .from("conversation_members")
        .select("user_id")
        .eq("conversation_id", conversationId);

      if (error) throw error;
      if (!data || data.length < 2) throw new Error("Conversation members not found.");

      const other = data.find(member => member.user_id !== currentUserId);
      if (!other) throw new Error("Other user not found.");

      otherUserId = other.user_id;

      const { data: profile, error: profileError } = await supabaseClient
        .from("profiles")
        .select("id, username, full_name, avatar_url")
        .eq("id", otherUserId)
        .maybeSingle();

      if (profileError) throw profileError;

      otherUserProfile = profile || null;
      setHeaderUser(otherUserProfile);
    }

    async function loadMessages() {
      const { data, error } = await supabaseClient
        .from("messages")
        .select("id, conversation_id, sender_id, receiver_id, message, media_url, created_at")
        .eq("conversation_id", conversationId)
        .order("created_at", { ascending: true });

      if (error) throw error;

      allMessages = data || [];
      renderMessages();
      scrollToBottom();
    }

    function renderMessages() {
      if (!allMessages.length) {
        messagesBox.innerHTML = `
          <div class="empty-state">
            No messages yet.<br>
            Say hello to start the conversation.
          </div>
        `;
        return;
      }

      messagesBox.innerHTML = allMessages.map(msg => {
        const isMe = msg.sender_id === currentUserId;
        const side = isMe ? "me" : "other";
        const text = escapeHtml(msg.message || "");
        const media = msg.media_url ? escapeHtml(msg.media_url) : "";

        return `
          <div class="message-row ${side}">
            <div class="bubble">${text || (media ? "Attachment" : "")}</div>
            ${media ? `<img class="message-media" src="${media}" alt="Attachment">` : ""}
            <div class="message-time">${escapeHtml(formatDate(msg.created_at))}</div>
          </div>
        `;
      }).join("");
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        messagesBox.scrollTop = messagesBox.scrollHeight;
      });
    }

    async function sendMessage(event) {
      event.preventDefault();

      const message = messageInput.value.trim();
      if (!message) return;

      try {
        clearNotice();

        const { error } = await supabaseClient
          .from("messages")
          .insert({
            conversation_id: conversationId,
            sender_id: currentUserId,
            receiver_id: otherUserId,
            message
          });

        if (error) throw error;

        messageInput.value = "";
      } catch (error) {
        showNotice(error.message || "Could not send message.");
      }
    }

    function subscribeRealtime() {
      if (messagesChannel) return;

      messagesChannel = supabaseClient
        .channel("chat-room-live")
        .on("postgres_changes", {
          event: "*",
          schema: "public",
          table: "messages"
        }, async (payload) => {
          const row = payload.new || payload.old;
          if (!row) return;
          if (row.conversation_id !== conversationId) return;

          await loadMessages();
        })
        .subscribe();
    }

    function openVoiceCall() {
      if (!otherUserId) return;
      window.location.href = `call.html?conversation=${encodeURIComponent(conversationId)}&user=${encodeURIComponent(otherUserId)}&type=voice`;
    }

    function openVideoCall() {
      if (!otherUserId) return;
      window.location.href = `call.html?conversation=${encodeURIComponent(conversationId)}&user=${encodeURIComponent(otherUserId)}&type=video`;
    }

    async function init() {
      try {
        clearNotice();

        if (!conversationId) {
          throw new Error("Missing conversation id.");
        }

        const session = await requireSession();
        if (!session) return;

        currentUserId = session.user.id;

        await loadConversationMembers();
        await loadMessages();
        subscribeRealtime();
      } catch (error) {
        showNotice(error.message || "Could not load chat room.");
        messagesBox.innerHTML = `
          <div class="empty-state">
            ${escapeHtml(error.message || "Could not load chat room.")}
          </div>
        `;
      }
    }

    composerForm.addEventListener("submit", sendMessage);
    voiceCallBtn.addEventListener("click", openVoiceCall);
    videoCallBtn.addEventListener("click", openVideoCall);

    init();
  </script>
</body>
</html>
